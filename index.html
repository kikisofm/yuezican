油即可。\n1 黄瓜、火腿切条，加米醋腌制；糯米蒸熟，倒入米醋，拌匀晾凉。\n2 将鸡蛋摊成饼，切丝。\n3 将糯米平铺在紫菜上，再摆上黄瓜条、火腿条、鸡蛋丝、沙拉酱，卷起，切成3厘米厚片即可。\n## 产后第17天", "notes": "紫菜能补充钙质，改善新妈妈贫血状况，还含有一定量的甘露醇，可辅助治疗产后水肿。"}, "虾酱蒸鸡翅": {"ingredients": "牛肉150克，板栗6颗，姜片、葱段、盐各适量。\n鸡翅中100克，虾酱10克，葱段、姜片、水淀粉、盐、白糖各适量。\n1 牛肉洗净，入开水锅中焯透，切成长块；锅置火上，倒入油，烧至七成热时，下板栗炸2分钟，再将牛肉块炸一下，捞起，沥去油。", "steps": "2 锅中留少许底油，下入葱段、姜片，炒出香味时，放入牛肉、盐和适量清水。\n1 洗净翅中，沥干水分，在翅中上划几刀，用水淀粉和盐腌制15分钟。\n3 当锅沸腾时，撇去浮沫，改用小火炖，待牛肉炖至将熟时，下板栗，烧至肉熟烂板栗酥时收汁即可。\n3 放进微波炉用大火蒸8分钟，取出加入葱段，再放入微波炉中，大火蒸2分钟，取出码入盘中即可。", "notes": "虾酱营养丰富，蛋白质、钙、铁、磷、硒等营养素的含量都较高，同鸡翅一起食用，在增加泌乳量的同时也能促进母乳质量的提高。"}, "萝卜排骨汤": {"ingredients": "鲷鱼1条，橙子1个，红椒半个，冬笋1根，盐、水淀粉各适量。\n猪排骨250克，白萝卜100克，姜片、葱花、盐、料酒各适量。", "steps": "1 精选牛肉馅，加入葱末、姜末、油、盐、香油，搅拌均匀，打入1个鸡蛋，加入适量水淀粉搅拌均匀。\n1 将鲷鱼清理干净，切大块；冬笋、红椒洗净、切丁；橙子取出肉粒。\n2 锅中倒入适量油，鲷鱼块裹适量水淀粉入锅炸至金黄色。\n3 摊平成饼状，用适量油煎熟，或上屉蒸熟，也可以用微波炉大火加热5~10分钟至熟。\n3 锅中放水烧开，放入橙肉粒、红椒、冬笋，加盐调味，用水淀粉勾芡，浇在鲷鱼块上即可。\n1 猪排骨洗净，剁小块，放入沸水中倒少许料酒煮3~5分钟，捞出洗净。\n2 把排骨放入空锅中，放入姜片，加水没过排骨；大火煮沸，2分钟后改小火慢炖。\n3 白萝卜洗净，切成片，放入排骨汤中，大火煮沸，改成中火；白萝卜炖熟后放入葱花、盐调味。\n## 产后第20天\n不要触碰冷水\n不宜湿发结辫\n外出穿平底鞋", "notes": "橙子可以促进肉类蛋白质的分解和吸收，有助于消化，还能补充维生素，同时能提高新妈妈和宝宝的免疫力和抗病能力。\n萝卜含有钾、镁等多种矿物质；排骨则是高蛋白、高钙质含量的食材。"}, "西蓝花彩蔬小炒": {"ingredients": "西蓝花半个，玉米粒2小匙，胡萝卜丁、青椒丁、红椒丁、盐、水淀粉各适量。\n1 小米洗净，浸泡一会儿；羊骨洗净，捣碎。\n2 在锅中放入适量清水，将羊骨、陈皮、姜丝、苹果块放入锅中，用大火烧沸。", "steps": "3 放入小米，待小米熟透即可。\n1 玉米粒洗净备用；西蓝花去老茎，\n掰成小朵；锅烧水，下胡萝卜丁、\n玉米粒焯水 2 分钟。\n2 坐锅烧水，下西蓝花烫 2 分钟，\n捞出沥水。\n3 坐锅放油，下所有原料翻炒1分钟，起锅。\n4 西蓝花围边，用水淀粉勾芡淋在西蓝花上，将炒好的彩蔬放入盘中央。", "notes": "这道菜含有丰富的维生素，在本周新妈妈大量进补期间食用，可缓解胃肠负荷，令新妈妈更健康。"}, "雪菜肉丝汤面": {"ingredients": "猪肝40克，菠菜20克，海米10克，香菜段、香油、盐、醋各适量。营养功效：这道面食营养丰富，味道浓郁鲜美，具有很强的温补作用，能令新妈妈产后尽快提升元气。\n面条、猪肉丝各100克，雪菜1棵，酱油、盐、葱花、姜末、高汤各适量。", "steps": "1 鸡蛋打散在容器中，加入油搅拌均匀。\n2 丝瓜洗净，去皮，切成滚刀状。\n3 锅中放水，倒入丝瓜，水开后，倒入鸡蛋液，起锅时，放入盐调味即可。\n1 猪肝洗净，煮熟，切成薄片；海米用温水浸泡；菠菜洗净，焯烫，切段。\n2用盐、醋、香油兑成调味汁。\n3 将菠菜放在盘内，放入猪肝片、香菜段、海米，倒上调味汁拌匀即可。\n1 雪菜洗净，加清水浸泡2小时，使之变淡，捞出沥干，切碎末；猪肉丝洗净，加盐拌匀。\n2 锅中倒油烧热，下葱花、姜末、肉丝煸炒至肉丝变色，再放入雪菜末翻炒，放入酱油、盐，拌匀盛出。\n3 煮熟面条，挑入盛适量酱油、盐的碗内，舀入适量高汤，再把炒好的雪菜肉丝覆盖在面条上。\n## 产后第21天"}, "非哺乳关键点": {"ingredients": "新鲜猪肝100克，芹菜50克，高汤、葱花、姜末、香菜碎、水淀粉、酱油、香油、盐各适量。"}, "豆浆小米粥": {"ingredients": "小米100克，黄豆50克，蜂蜜适量。", "steps": "1 嫩豌豆洗净，放入开水锅中，用淡盐水焯一下，备用。\n2 炒锅中放入油，待三成热时，将虾仁入锅，快速划散后倒入漏勺中控油。\n3 炒锅内留适量底油，烧热，放入豌豆，翻炒几下，再放入鸡汤、盐，随即放入虾仁，用水淀粉勾薄芡，将炒锅颠翻几下，淋上香油即可。\n1 将黄豆泡好，加水磨成豆浆，用纱布过滤去渣，备用。\n2 小米洗净，泡 30 分钟，磨成糊状，用纱布过滤去渣。\n3 锅中放水，烧开后加入豆浆，再开时撇去浮沫儿，放入小米糊用勺沿一个方向搅匀。\n4 出锅前加入适量蜂蜜调匀即可。", "notes": "在本周新妈妈大补之时，适时喝些清淡营养的粥品对胃肠极有好处，豆浆小米粥醇香甘甜，适合新妈妈食用。"}, "莲藕炖牛腩（288）": {"ingredients": "牛腩260克\n莲藕140克\n姜片3片\n盐5克", "steps": "1 牛腩洗净后，去掉肥脂，切大块后放入滚水中，汆烫去血水。\n2 莲藕去皮、洗净，切片。\n3 将牛腩、莲藕、姜片放入锅内，加入适量清水，用大火煮沸。\n4 煮滚后转至小火，慢煲45分钟。\n5 起锅前，加盐调味即可。"}, "莲藕炖牛腩（jinpai）": {"ingredients": "鸽子1只，香菇、木耳各20克，山药50克，红枣4颗，枸杞子、葱段、姜片、盐各适量。", "notes": "莲藕含有大量的维生素C和膳食纤维，对产后便秘的新妈妈十分有益。莲藕富含铁、钙等矿物质，有补益气血、增强免疫力的作用。"}, "板栗鳝鱼煲": {"ingredients": "牛腩200克，莲藕100克，红小豆50克，姜片、盐各适量。\n鳝鱼200克，板栗50克，姜片、盐、料酒各适量。\n1 香菇洗净；木耳泡发后洗净，撕成大片；山药削皮，切块。\n2 烧开水，将鸽子放入，去血水、去沫，捞出备用。", "steps": "3 砂锅放水烧开，放姜片、葱段、红枣、香菇、鸽子，小火炖1个小时。\n1 牛腩洗净，切大块，放入热水中略煮一下；牛腩取出后再过冷水，洗净，沥干。\n5 最后放入山药，用小火炖至山药酥烂，加盐调味即可。\n2 莲藕洗净，去皮，切成大块；红小豆洗净，并用清水浸泡30分钟。\n3 全部原料放入锅内，加清水大火煮沸。\n4 转小火慢煲 2 小时，出锅前加盐调味即可。\n1 鳝鱼去肠及内脏，洗净后用热水焯烫去黏液，切成段，加盐、料酒拌匀，备用；板栗洗净去壳，备用。\n2 将鳝鱼段、板栗、姜片一同放入砂锅内，加入适量清水大火煮沸，转小火再煲1小时，出锅前加入盐调味。\n## 产后第24天", "notes": "板栗鳝鱼煲有很强的补益作用，特别是对身体虚弱的产后新妈妈补益效果更为明显。"}, "非哺乳关键点（jinpai）": {"ingredients": "南瓜50克，银耳、莲子各10克，红枣5颗，红糖适量。\n少吃高热量食物\n听听舒缓的音乐\n找机会放松身心\n乌鸡1只，生地120克，姜片、盐、料酒、白糖各适量。", "notes": "此汤清热补血、养心安神，是产后新妈妈补血养颜的佳品。\n乌鸡可以为新妈妈补血补铁，而且其肉鲜嫩易消化，即使胃肠功能不佳的新妈妈也可以食用。\n压力不可过大"}, "木耳炒鸡蛋": {"ingredients": "鲫鱼1条，黄豆芽30克，通草3克，盐适量。\n鸡蛋2个，水发木耳50克，葱花、香菜、盐、香油各适量。", "steps": "1 将鲫鱼去鳞、鳃、内脏，洗净；黄豆芽洗净。\n2 锅置火上，加入适量清水，放入鲫鱼，用小火炖煮 15 分钟。\n3 再放入黄豆芽、通草、盐，炖煮10分钟，去掉黄豆芽、通草，即可食鱼饮汤。\n1 将水发木耳洗净，沥水；鸡蛋打入碗内，打散备用。\n2 油锅烧热，将鸡蛋液倒入，炒熟后，出锅备用。\n3另起油锅，将木耳放入锅内炒几下，再放入炒好的鸡蛋，加入盐、葱花、香菜调味，淋上香油即可。", "notes": "通草有通乳汁的作用，与消肿利水、通乳的鲫鱼、黄豆芽共煮制汤菜，具有温中下气、利水通乳的功效，此道汤品是缺乳的新妈妈必备的一道药膳。\n木耳含糖类、蛋白质、维生素和矿物质，有益气强智、止血止痛、补血活血等功效，是产后贫血妈妈重要的保健食物。"}, "青椒牛肉片": {"ingredients": "牛肉200克，青椒150克，盐、葱末、姜末、淀粉各适量。", "notes": "牛肉蛋白质含量高，而脂肪含量低，有补中益气、滋养脾胃、强健筋骨的功效，能提高机体抗病能力，在补血、修复组织等方面特别适宜。"}, "木瓜牛奶饮": {"ingredients": "熟鸡胸肉100克，菠菜60克，熟火腿50克，蒜片、盐、高汤、水淀粉各适量。\n木瓜100克，鲜牛奶250毫升，冰糖适量。\n1 猪腰去除腥臊部分，在黄酒中浸泡一会儿后取出。", "steps": "2 在锅中放入葱段、姜片，加清水用大火烧开。\n3 西蓝花切块，焯一下取出。\n4另起油锅，将葱段、姜片爆香后放入腰花，加酱油、盐、白糖煸炒，之后放入西蓝花一同煸炒，再加水淀粉勾芡，以香油调味即可。\n1把菠菜择好，洗净，切段，用开水焯一下，捞出沥干；熟鸡胸肉撕成丝；熟火腿切成丝。\n2 锅置火上，放油烧热，放入蒜片炒出香味，加上菠菜煸炒几下，放鸡丝、熟火腿丝、盐和高汤。\n3 最后用水淀粉勾芡即可。\n1 木瓜洗净，去皮去子，切成细丝。\n2 木瓜丝放入锅内，加适量水，水没过木瓜即可，大火熬煮至木瓜熟烂。\n3 加入鲜牛奶和冰糖，与木瓜一起调匀，再煮至汤微沸即可。", "notes": "牛奶有利于解除疲劳并助眠，非常适合产后体虚而导致神经衰弱的新妈妈，同时牛奶还是新妈妈最好的美肤养肤食物。"}, "黄金土豆饼": {"steps": "1 大米洗净，放入锅中加适量水开始煮粥。\n2 芹菜、香菜洗净，切碎。\n3 粥煮熟时，把芹菜、虾放入锅中，放盐，搅拌。\n4 继续煮 5 分钟左右，再将香菜放入锅中，淋入香油，煮沸即可。\n1 将土豆、嫩豌豆煮熟，捣成泥状，放适量盐，搅拌均匀。\n2 揪小团用模具压成心形饼。\n3 锅中倒香油，油热后放入土豆饼，煎至两面金黄即可。\n## 产后第28天"}, "鹌鹑蛋竹荪汤": {"ingredients": "竹荪50克，鹌鹑蛋5颗，盐、葱花各适量。", "steps": "1 牛肉洗净切丁；南瓜、胡萝卜分别洗净切丁。\n2 将牛肉放入锅中，用高汤煮至八成熟，加入南瓜丁、胡萝卜丁、盐，煮至全部熟软，浇在熟米饭上即可食用。\n1 竹荪洗净，用清水泡发，备用。\n2 鹌鹑蛋洗净，冷水入锅，小火煮沸后，焖5分钟，捞出，去壳。\n3 锅中倒入适量油烧热，爆香葱花，倒入适量水，放入竹荪、鹌鹑蛋，大火煮开，煲15分钟，调入盐即可。", "notes": "这道菜既能美颜瘦身又能提高免疫力，还可促进乳汁分泌。"}, "草莓牛奶羹": {"ingredients": "鸭肉150克，莲子10克，薏米20克，葱段、姜片、百合、料酒、白糖、盐各适量。"}, "红小豆山药粥": {"ingredients": "新鲜草莓10个，香蕉1根，牛奶250毫升。\n红小豆、薏米各20克，山药1根，燕麦片适量。", "steps": "1 把鸭肉切成块，放入开水中焯一下捞出后放入锅中。\n2 在锅中依次放入葱段、姜片、莲子、百合、薏米、再加入料酒、白糖，倒入适量开水，用大火煲熟。\n3 待汤煲好后出锅时加盐调味即可。\n1 草莓去蒂，洗净，切块；香蕉去皮，放入碗中碾成泥。\n2 牛奶加热，然后放入草莓、香蕉泥稍煮一会儿即可。\n1 红小豆和薏米洗净后，放入锅中，加适量水，用中火烧沸，煮两三分钟，关火，焖30分钟。\n2 山药削皮，洗净切小块；燕麦片切碎。\n3 将山药块和燕麦片倒入锅中，用中火煮沸后，关火，焖熟即可。\n## 产后第5周", "notes": "草莓含有丰富的维生素C，可抗氧化；香蕉可清热润肠，促进胃肠蠕动。此羹清香爽口，会让新妈妈从早餐开始快乐一天。\n红小豆山药粥含较多的膳食纤维，有助于新妈妈排出体内毒素，保持身材。"}, "木瓜牛奶蒸蛋": {"ingredients": "木瓜半个，鸡蛋2个，牛奶200毫升，红糖适量。", "notes": "木瓜口感好，糖分低，其中的木瓜酶可促进乳腺发育，对新妈妈有催乳下奶的作用，牛奶和鸡蛋更是新妈妈坐月子的必备营养品。"}, "芦笋鸡丝汤": {"ingredients": "芦笋、鸡胸肉各100克，金针菇20克，鸡蛋清、高汤、淀粉、盐、香油各适量。\n1 木瓜去皮、去子，切块，平铺碗底；鸡蛋打入另一碗内，加红糖搅匀。\n2 牛奶加温，加入蛋液内，牛奶和蛋液的比例大概是 1:4。\n3 把牛奶、蛋液倒入装木瓜的碗里，隔水蒸 10 分钟即可。", "steps": "1 鸡胸肉切长丝，用鸡蛋清、盐、淀粉拌匀腌20分钟。\n2 芦笋洗净，切成长段；金针菇洗净沥干。\n3 鸡肉丝先用开水烫熟，见肉丝散开即捞起沥干。\n4 锅中放入高汤，加鸡肉丝、芦笋、金针菇同煮，待熟后加盐，淋上香油即可。", "notes": "芦笋含有多种矿物质和氨基酸，可以缓解产后水肿和各种妇科炎症。"}, "清炒油菜": {"ingredients": "油菜400克，蒜瓣1个，盐、白糖、水淀粉各适量。", "notes": "油菜不仅含有丰富的维生素和矿物质，而且有清肠排毒的功效，可以预防产后便秘，同时让新妈妈远离肌肤暗黄。"}, "香菇鸡片": {"ingredients": "鸡胸肉150克，香菇4朵，红椒半个，姜片、盐、香油、高汤各适量。", "steps": "1 将牛肉切成薄片，放在碗里，加适量水淀粉，抓拌均匀。\n2 油锅烧热，将牛肉片放入锅中，用筷子划开炒熟，之后放入葱丝、姜丝、料酒、酱油、盐翻炒几下，用水淀粉勾芡，淋上香油即可。\n1 香菇去蒂，洗净，切片；红椒洗净，去蒂去子，切片；鸡胸肉洗净，切片，焯水备用。\n2 锅内放适量油，炒鸡肉至变色，\n盛出。\n3 另起锅倒入适量油，煸香姜片，再放入香菇片和红椒片翻炒，炒软放入少量高汤烧开，再放盐和香油，倒入炒好的鸡片，再次翻炒，大火收汁即可。\n## 产后第32天"}, "茄子炒牛肉": {"ingredients": "熟牛肉100克，茄子150克，水淀粉、葱段、盐各适量。\n夏天增加饮水量\n出汗不宜立刻进空调房\n不穿过紧的胸罩", "steps": "1 先用热水将海参泡发，从腹下开口取出内脏，放入锅中煮一会儿，捞出，沥干水；黄花菜泡好，沥干，备用。\n2 锅中爆香姜丝，放入泡好的黄花菜、荷兰豆、当归，加入适量清水煮沸。\n3 最后加入百合、海参，用大火煮透后，加入盐调味即可。\n1 将熟牛肉切成小片；茄子洗净，切片。\n2 将茄子片放入锅中煸炒，加入盐，将熟时放入牛肉片。\n3 炒一会儿后撒下葱段，调味炒熟，加水淀粉勾芡即可。", "notes": "茄子对预防产后痔疮有一定的疗效。\n注意腿部保暖"}, "银耳樱桃粥": {"ingredients": "大米30克，红小豆20克，冬瓜、白糖各适量。\n银耳20克，樱桃、大米各30克，糖桂花、冰糖各适量。", "steps": "1 虾洗净，挑出肠线；鱿鱼、里脊肉切片；蛤蜊吐沙。\n2 香油倒入锅中烧热，放葱段和里脊肉片炒香，之后放入虾、蛤蜊、香菇和适量水煮开。\n3 将鱿鱼、鲑鱼放入锅中煮熟，加盐调味后盛入碗中。\n1 红小豆和大米洗净，泡发；冬瓜去皮，切片。\n4 面条用开水煮熟，捞起放入碗里即可。\n2 在锅中加适量清水，用大火烧沸后，放入红小豆和大米，煮至红小豆开裂，加入冬瓜同煮。\n3 熬至冬瓜呈透明状，加白糖即可。\n1 银耳用冷水浸泡回软，洗净，撕成片；樱桃去柄，洗净。\n## 产后第33天\n不要边喂宝宝边看电视\n夏季穿浅色棉质衣服", "notes": "红小豆有清心养神、健脾益肾的功效；还有较多的膳食纤维，具有良好的润肠通便、降血压、降血脂、调节血糖、解毒抗癌、预防结石、健美减肥的作用。\n樱桃中含有铁、磷等矿物质，可促进血红蛋白再生，既可预防缺铁性贫血，又能补钙。"}, "红烧牛肉": {"ingredients": "牛肉100克，土豆、胡萝卜各20克，姜片、酱油、料酒、白糖、淀粉、盐各适量。", "notes": "牛肉可以增强免疫力，促进蛋白质的新陈代谢和合成，从而有助于产后妈妈身体的恢复。"}, "香蕉牛奶草莓粥": {"ingredients": "香蕉1根，新鲜草莓5个，牛奶250毫升，大米80克。", "notes": "草莓含有丰富的维生素C，可帮助消化；香蕉可清热润肠，促进胃肠蠕动。此粥清香爽口，会让新妈妈心情愉快。适合作为早餐和加餐食用。"}, "燕麦南瓜粥（288）": {"ingredients": "燕麦20克 白米粥150克 南瓜100克 冰糖10克", "steps": "1 燕麦洗净，泡入清水30分钟备用。\n2 将南瓜洗净，削皮、切片。\n3 在沸水中，放入南瓜和白米粥一起熬煮。\n4 待南瓜熟透后，再加入冰糖及燕麦，调匀即可。"}, "燕麦南瓜粥（jinpai）": {"ingredients": "海参1个，葱段、姜片、白糖、水淀粉、酱油、盐、熟猪油各适量。", "steps": "1 南瓜洗净削皮，切成小块；大米洗净，用清水浸泡半小时。\n2 将大米放入锅中，加水适量，大火煮沸后换小火煮 20 分钟；然后放入南瓜块，小火煮 10 分钟；再加入燕麦，继续用小火煮 10 分钟。\n3 熄火后，加入盐调味。", "notes": "燕麦中含有丰富的亚油酸，可预防和缓解新妈妈产后水肿、便秘；同时还含有钙、磷、铁、锌等矿物质。和南瓜同食，还是天然、健康的产后瘦身佳品。\n1 草莓去蒂，洗净，切成块；香蕉去皮，放入碗中碾成泥；大米洗净。原料：燕麦、大米各1小把，南瓜1块，盐适量。\n2 将大米放入锅中，加适量清水，\n大火煮沸，放入草莓、香蕉泥同煮至熟，倒入牛奶，稍煮即可。\n可滋阴、补血、通乳，主治产后体虚缺乳。"}, "豌豆鸡丝": {"ingredients": "猪肉200克，芹菜100克，面粉、鸡汤、盐、葱花、姜末、酱油各适量。\n豌豆150克，熟鸡丝100克，蒜片、盐、高汤、水淀粉各适量。", "steps": "1 海参去肠，切成大片，用开水焯烫一下捞出。\n2 锅中放入熟猪油，烧到八成热，\n放入葱段，炸成金黄色后捞出，\n葱油倒出一部分备用。\n1 芹菜择好洗净，切碎。\n3 将留在锅中的葱油烧热，放入海参和姜片，调入酱油、白糖、盐，用中火煨熟海参，调入水淀粉勾芡，淋入备用的葱油即可。\n2 猪肉洗净，剁成泥，加酱油、盐、葱花、姜末及适量水搅拌均匀，包饺子时，加入芹菜碎调拌成馅。\n3 面粉和面团搓成细条，揪剂，擀成薄皮，将调好的馅包入皮中成水饺。\n4 锅中放入清水，用大火烧开，放入包好的饺子，煮至八成熟捞出，再放入煮沸的鸡汤中，约煮2分钟，加盐、葱花略煮，盛入碗内。\n1 将豌豆洗净，放入开水中焯烫至熟，捞出用凉水冲洗，控干水分，备用。\n2 在锅中将蒜片爆香，放入豌豆、鸡丝煸炒，再加入盐和高汤烧沸。\n3 待豌豆、鸡丝入味后，用水淀粉勾芡，翻炒均匀即可。\n## 产后第35天\n不宜轻视失眠\n不要总抱着宝宝\n家务要适量做", "notes": "豌豆中的蛋白质含量丰富，并且含有人体所必需的8种氨基酸，常吃有助于增强人体免疫功能。"}, "冬瓜海带排骨汤": {"ingredients": "猪排骨200克，冬瓜100克，海带、香菜碎、姜片、料酒、盐各适量。", "notes": "冬瓜有利尿消肿、减肥、清热解毒的功效；海带含有丰富的钙，还有降血压的作用；排骨含有大量磷酸钙、骨胶原、骨黏蛋白等，可为产后妈妈提供钙质。"}, "芹菜炒土豆丝": {"ingredients": "土豆、芹菜各100克，胡萝卜丝、葱段、盐、酱油、醋各适量。", "notes": "芹菜含有丰富的膳食纤维，可预防产后便秘。土豆还可以为产后新妈妈提供热量，以增强体能。"}, "生地乌鸡汤": {"steps": "1 南瓜洗净，对半剖开后去子，带皮切成滚刀块。\n2莲子剥去苦心；红枣去除枣核，\n洗净备用；银耳泡发后，撕成小朵，去除根蒂。\n3 将南瓜块、莲子、红枣、泡发银耳和红糖一起放入砂锅中，再加入适量温水，大火烧开后转小火慢慢煲煮约30分钟，将南瓜煲煮至熟烂即可。\n1 将乌鸡洗净；生姜洗净去皮，拍烂；生地用料酒洗净后切片，用白糖拌匀。\n2 将生地放入乌鸡腹中，放入炖盅内，加适量水、姜片，大火煮开，改用小火炖至乌鸡肉熟烂。\n3 汤成后，加入适量盐调味即可。\n## 产后第37天"}, "芹菜竹笋汤": {"ingredients": "芹菜100克，竹笋、肉丝、盐、酱油、淀粉、高汤各适量。", "notes": "竹笋具有低脂肪、低糖、膳食纤维含量高的特点，能促进肠道蠕动，帮助消化，缓解便秘。芹菜还有利于产后妈妈强身健体，提高免疫力。"}, "什锦鸡粥": {"ingredients": "鸡翅1个，香菇3朵，虾5只，大米30克，青菜、葱花、姜末、盐各适量。\n1 芹菜洗净，切段；竹笋洗净，切丝；肉丝用盐、淀粉、酱油腌约5分钟备用。", "steps": "2 高汤倒入锅中煮开后，放入芹菜、笋丝，煮至芹菜软化，再加入肉丝。\n3 待肉熟透后加入盐调味即可。\n1 鸡翅洗净用沸水烫一下取出；香菇切块；青菜洗净切碎；大米洗净。\n2 虾去壳，洗净后切细，用开水烫一下，捞出沥干。\n3 锅内倒入适量清水，放入鸡翅、姜末、葱花，用大火煮开后，改用小火再煮，去其浮油。\n4 将大米倒入锅内，用中火煮沸，\n约 20 分钟后，依次加入虾、香菇、青菜搅匀，待粥熟后加盐调味。", "notes": "此粥含有丰富的蛋白质、脂肪、碳水化合物、钙、磷、铁、B族维生素等多种营养素，能够滋养五脏，补血益气，增强抵抗力。"}, "高汤娃娃菜": {"ingredients": "高汤200毫升，娃娃菜200克，香菇2朵，盐、香油各适量。", "notes": "娃娃菜不仅可以清热除燥，利尿通便，而且含有丰富的叶酸，对宝宝的大脑发育很有好处。"}, "何首乌红枣大米粥": {"ingredients": "猪肚100克，莲子20克，盐、姜片、蒜片、高汤各适量。\n大米、何首乌各30克，红枣3颗。", "steps": "1 将娃娃菜洗净，叶片分开；香菇洗净，掰开。\n2 高汤倒入锅中，汤煮开后放入娃娃菜。\n3 汤再沸时，放入香菇，淋入香油，最后加盐调味即可。\n1 将猪肚用面粉揉搓，放入清水中将两面洗净，然后放入开水锅中加姜片焯烫后捞起，放入冷水中，用刀刮去浮油，切条备用。\n3 将蒜片、猪肚放入油锅中略炒，倒入适量高汤，放入莲子，用中火烧沸后煮15分钟，最后加盐调味即可。\n## 产后第38天\n少吃橘子", "notes": "何首乌粥有净血、安神的作用，能强壮身体，延缓衰老，是产后妈妈的保健补品。"}, "橘瓣银耳羹": {"ingredients": "干银耳15克，新鲜橘子1个，冰糖适量。\n1 糙米、薏米、大米、绿豆、百合洗净，水中浸泡2小时备用。\n2 所有原料放入锅中，加入适量水煮开。", "steps": "3 转小火边搅拌边熬煮半小时至熟烂，粥浓时，加入白糖调味。\n1 将银耳用清水浸泡，涨发后去掉黄根与杂质，洗净备用。\n2 橘子去皮，掰好橘瓣，备用。\n3 将银耳放入锅中，加适量清水，大火烧沸后转小火，煮至银耳软烂。\n4 将橘瓣和冰糖放入锅中，再用小火煮 5 分钟即可。", "notes": "此羹具有滋养肺胃、生津润燥、化痰止咳的功效。产后新妈妈食用既有补益作用，还可开胃，促进食欲。\n腐竹具有良好的健脑作用；黄瓜中含有丰富的维生素C，可起到延年益寿、抗衰老的作用。"}, "鸡丝腐竹拌黄瓜": {"ingredients": "鸡胸肉1块，腐竹50克，黄瓜半根，葱段、姜片、蒜蓉酱各适量。"}, "豆芽木耳汤": {"ingredients": "黄豆芽100克，木耳10克，西红柿1个，高汤、盐各适量。", "notes": "豆芽能减少体内乳酸堆积，消除疲劳；常吃木耳能养血驻颜，令人肌肤红润，容光焕发，还能提高免疫力，很适合产后妈妈恢复身体和护肤。"}, "核桃百合粥": {"ingredients": "核桃仁、鲜百合各20克，黑芝麻10克，大米50克。", "steps": "1 鸡胸肉洗净；腐竹用温水泡开，切段；黄瓜洗净切片。\n2 在锅中放入适量清水，放进葱段和姜片；水沸后把鸡肉放入锅中，焯熟，冷却后用手撕成细丝。\n3 将腐竹段、黄瓜片、鸡丝放入盘中。\n4 在锅中将蒜蓉酱爆香，加水烧沸后浇在盘中即可。\n1 西红柿的外皮轻划十字刀，放入沸水中烫熟，取出泡冷水去皮，切块；木耳泡发后切条；黄豆芽洗净。\n2 锅中放入黄豆芽翻炒，加入高汤，放入木耳、西红柿，用中火烧熟，加入盐调味即可。\n1 鲜百合洗净，掰成片；大米洗净，用清水浸泡 30 分钟，备用。\n2 将大米、核桃仁、百合、黑芝麻一起放入锅中，加适量清水，用大火煮沸。\n3 改用小火继续煮至大米熟透即可。\n## 产后第39天\n不要用香水\n不乱服中药\n吃些清火食物", "notes": "此粥既能强健身体，又能抗衰老。核桃有补血养气、润燥通便等功效，百合能够清心安神，帮助妈妈缓解疲劳。"}, "虾肉奶汤羹": {"ingredients": "鲜虾250克，胡萝卜半根，西蓝花30克，蟹棒、葱段、姜片、牛奶、盐各适量。\n绿豆20克，大米80克，红枣5颗，莲子、红糖各适量。", "notes": "这道汤羹对产后身体虚弱、乳汁分泌少的新妈妈来说，是很好的补品。\n绿豆利湿除烦，莲子安神强心，红枣补血养血，三者同食，可以益气强身，适宜产后虚弱的新妈妈调理之用。"}, "枣莲三宝粥": {"steps": "1 鲜虾取虾仁备用。\n2 将胡萝卜、西蓝花洗净；胡萝卜切成菱形片；西蓝花切小块。\n3 锅内放入葱段、姜片、胡萝卜片、西蓝花块、蟹棒，再加适量牛奶，然后加入盐调味，大火烧开，加入虾仁后煮10分钟。\n1 绿豆、大米淘洗干净；莲子、红枣洗净。\n2 将绿豆和莲子放在带盖的容器内，加入适量开水闷泡 1 小时。\n3 将闷泡好的绿豆、莲子放入锅中，加适量水烧开，再加入红枣和大米，用小火煮至豆烂粥稠，加适量红糖调味即可。\n## 产后第40天\n要补气养血\n注意节食"}, "冬笋冬菇扒油菜": {"ingredients": "油菜40克，冬笋、香菇各30克，葱花、盐各适量。\n贫血时忌瘦身\n进行“中断排尿”练习\n警惕妇科炎症\n做好避孕工作", "steps": "1 将面粉、玉米面、白糖、泡打粉在盆中混合均匀；酵母粉融于温水后倒入面粉中，揉成均匀的面团。\n2 将面团放入蛋糕模具中，放温暖\n处醒发 40 分钟左右至 2 倍大。\n3红枣洗净，加水煮10分钟；将煮好的红枣嵌入发好的面团表面，入蒸锅。\n4 开大火，蒸 20 分钟，立即取出，取下模具，切成厚片即可。\n1 将油菜去掉老叶，清洗干净切段；香菇泡发切半；冬笋切片，并放入开水中焯烫，除去笋中的草酸。\n2 炒锅置火上，倒入适量油烧热，放入葱花、冬笋、香菇煸炒后，倒入少量清水，再放入油菜段、盐，用大火炒熟即可。"}, "红小豆饭": {"ingredients": "红小豆30克，大米40克。", "notes": "红小豆含有丰富的膳食纤维，具有很好的润肠通便、降压降脂、补血消肿的作用。此外，还具有催乳的功效。"}, "麻酱菠菜": {"ingredients": "南瓜、绿豆各80克，糯米100克，冰糖适量。\n菠菜300克，蒜末10克，香油、麻酱、盐各适量。", "steps": "1 糯米洗干净，用水浸泡 10 分钟。\n2 南瓜去皮去瓤，洗净切成块。\n3 锅内加入适量清水，放入糯米、绿豆和南瓜块煮约30分钟后放入冰糖调味，小火焖煮10分钟即可。\n1 将菠菜洗净，放入开水锅中略煮一下，捞出，备用。\n2 麻酱中放入适量盐，倒入温开水，\n搅拌均匀。\n3 将炒锅中放入香油，油热后放入菠菜，翻炒片刻，出锅，浇上麻酱，撒上蒜末即可。", "notes": "此道粥含有丰富的维生素和矿物质，南瓜有清热祛湿、调理胃肠的功效，还有减肥瘦身的作用。而且这款粥美味香甜，适合新妈妈食用。\n麻酱的含钙量很高，几乎可以与豆制品相媲美，麻酱和菠菜搭配，可以帮助新妈妈坚固牙齿和骨骼。"}, "西红柿烧豆腐": {"ingredients": "西红柿2个，豆腐100克，葱花、盐各适量。", "notes": "豆腐富含蛋白质、钙质和异黄酮素，有助于降低胆固醇、强化骨质。西红柿热量低，含丰富的番茄红素，可预防衰老。"}, "虾仁蛋炒饭": {"ingredients": "鸡腿1个，冬瓜100克，干贝10克，姜末、盐各适量。\n米饭1碗，香菇3朵，虾仁20克，胡萝卜半根，鸡蛋1个，盐、葱花、蒜末各适量。", "steps": "1 将西红柿洗净，切片；豆腐切成正方块。\n2 将葱花放入油锅中爆香，再放入西红柿翻炒至出汁，加入豆腐翻炒几下，放盐调味即可。\n1 鸡腿剁块，洗净；冬瓜去皮、去子，洗净，切块状；干贝洗净，泡软，备用。\n2 锅内加适量水煮沸后，放入鸡块，\n捞去浮沫，放入冬瓜、姜末煮至\n鸡肉熟透。\n3 将干贝放入锅中，煮片刻，加盐调味即可。\n1 香菇去蒂，洗净切丁；胡萝卜洗净切丁；鸡蛋打入碗中备用。\n2 锅中倒油烧热，放入鸡蛋液迅速炒散成蛋花，盛出备用。\n3 锅中倒油，下蒜末炒香，倒入虾仁翻炒至七成熟，倒入香菇丁、胡萝卜丁、米饭，拌炒均匀；再加入盐，撒上葱花，翻炒几下入味。", "notes": "虾仁蛋白质含量很高，胡萝卜含有大量的 $ \\beta $-胡萝卜素，可转化成维生素A，利于保护新妈妈眼睛。"}, "通草炖猪蹄": {"ingredients": "猪蹄100克，红枣5颗，通草5克，花生仁20克，姜片、葱段、盐、料酒各适量。", "steps": "1 猪蹄洗净切成块；红枣、花生仁用水泡透；通草洗净切段。\n2 锅内加适量水烧开，放猪蹄，焯去血沫，捞出。\n3 油锅烧热，放入姜片、猪蹄，淋入料酒，爆炒片刻，加入清水、通草段、红枣、花生仁、葱段，用中火煮至汤色变白，加盐调味。", "notes": "通草有通乳的功效，红枣具有养颜补血的功效。\n虾营养丰富，肉质松软易消化，对身体虚弱或病后、产后需要调养的人是极好的食物。此外，虾的通乳作用很强，并且富含磷、\n钙，对宝宝和新妈妈有很好的补益作用。\n剖宫产的妈妈最好伤口恢复以后再吃虾，以防过敏。"}, "鲜虾丝瓜汤": {"ingredients": "鲜虾100克，丝瓜200克，姜丝、葱末、盐各适量。", "steps": "1 将鲜虾去须及足，洗净，加入少许盐拌匀，腌制10分钟；丝瓜削皮，洗净，切成斜片。\n2 锅置火上，倒入油烧热，下姜丝、葱末爆香，再倒入鲜虾翻炒几下，加适量清水煮汤，待沸后，放入丝瓜片，加盐，煮至虾、丝瓜片熟透即可。", "notes": "鲜虾能增强人体的免疫力，除了具有很强的通乳作用之外，还对新妈妈身体疲倦、腰膝酸痛等病症有很好的疗效。"}, "花生鱼头汤": {"ingredients": "鱼头1个，花生仁50克，红枣6颗，姜片、盐各适量。\n1 鱼头处理干净；红枣洗净，去除枣核备用；花生仁洗净备用。\n2 将锅烧热，倒入少量油，放入姜片爆香，再放入鱼头，煎至两面金黄。\n3 加入适量水，没过鱼头，用大火烧开。\n4 加入花生仁和红枣，烧开后转小火煲 40 分钟，加盐调味即可。", "notes": "鱼头富含不饱和脂肪酸，可提高新妈妈免疫力；花生是促进新妈妈乳汁分泌的重要食物，非常适合新妈妈食用，以增加乳汁分泌。"}, "莴苣猪肉粥": {"ingredients": "莴苣、大米各50克，猪肉100克，酱油、盐、香油各适量。", "steps": "1 莴苣去皮洗净，切细丝；大米淘洗干净；猪肉洗净，切成末，放入碗内，加适量酱油、盐，腌10分钟。\n2 锅中放入大米，加适量清水，大火煮沸，加入莴苣丝、猪肉末，改小火煮至米烂时，加盐、香油搅匀即可。", "notes": "莴苣含有多种营养成分，尤其含钙、磷、铁较多，能帮助骨骼生长，坚固牙齿。莴苣有清热、利尿、活血、通乳的作用，尤其适合少乳的产妇食用。"}, "莲藕瘦肉麦片粥": {"ingredients": "大米50克，莲藕30克，猪瘦肉20克，玉米粒、枸杞子、麦片、葱末、盐各适量。", "steps": "1 大米淘洗干净，浸泡 30 分钟；莲藕洗净，切薄片；猪瘦肉切片；枸杞子洗净。\n2 大米下锅，加适量水熬煮成粥。\n3 将藕片、玉米粒焯熟捞出，再放入肉片同样焯熟捞出，把焯过水的藕片、玉米粒、肉片，连同枸杞子、麦片一起放入粥中，继续煮五六分钟。\n4 最后加盐调味，撒上葱末即可。", "notes": "莲藕富含B族维生素，能消除疲劳，还可下乳，对安抚新妈妈焦虑、委屈的情绪也有积极的疗效。"}, "黄花菜熘猪腰": {"ingredients": "猪腰400克，干黄花菜100克，葱段、姜丝、蒜片、水淀粉、盐、白糖各适量。", "steps": "1 将猪腰剔去筋膜和臊腺，洗净，切成小块，剞花刀；干黄花菜用水泡发，撕成小条备用。\n2 锅内加入植物油烧热，放入葱段、姜丝、蒜片爆香，再倒入猪腰，煸炒至变色。\n3 加入黄花菜、白糖、盐，煸炒片刻，用水淀粉勾芡即可。营养功效：干黄花菜有利水通乳、清热利尿等功效，而猪腰中含有丰富的蛋白质、维生素和矿物质，二者搭配食用，能够帮助新妈妈在补充营养的同时提高母乳质量。"}, "美味蛋羹": {"ingredients": "鸡蛋2个，西红柿1个，葱花、盐、水淀粉各适量。", "steps": "1 将西红柿切成小丁。\n2 将鸡蛋打入小圆碟中，把葱花、西红柿丁摆在鸡蛋液上，入锅蒸熟。\n3 锅置火上，放少许油，加入适量清水、盐烧开，用水淀粉勾芡，最后将芡汁淋在鸡蛋羹上即可。", "notes": "鸡蛋中的优质蛋白在体内的消化吸收率很高，能提高母乳质量，并能为新妈妈提供全面均衡的营养。"}, "山楂麦芽饮": {"ingredients": "麦芽10克，山楂3克，红糖适量。", "steps": "1 将山楂切片；山楂片与麦芽分别炒焦（也可在中药店直接购买炒麦芽与干山楂片）。\n2 将炒好的山楂片与炒麦芽放入锅中，加适量水，中火烧开后，转小火继续煮 15 分钟。\n3 将煮好的水放至稍凉后，调入红糖即可。", "notes": "此饮料有回乳的作用，可缓解回乳时乳房胀痛、乳汁淤积等症状，是新妈妈断奶期间最好的饮品。"}, "韭菜炒虾肉": {"ingredients": "韭菜200克，虾仁50克，料酒、高汤、葱丝、姜丝、蒜末、香油、盐各适量。", "steps": "1 虾仁洗净，除去虾肠，沥干水分；韭菜洗净，切成3厘米左右的小段。\n2 油锅烧热，放入葱丝、姜丝、蒜末炒香，然后放入虾仁煸炒，放入料酒、高汤、盐稍炒，然后放入韭菜段。\n3 大火翻炒片刻，淋入香油即可。", "notes": "韭菜中含有大量的维生素和膳食纤维，能促进胃肠蠕动，刺激食欲，让非哺乳妈妈拥有好胃口。\n韭菜与猪肉类食物互相搭配，营养又美味。"}, "人参玉米粥": {"ingredients": "人参末10克，玉米精80克。", "steps": "1 玉米精洗净，浸泡 2 小时。\n2 锅置火上，放入玉米糠和适量水，大火烧沸后改小火，熬煮成粥。\n3 待粥煮熟时，放入人参末，搅拌均匀，略煮片刻即可。营养功效：此粥不但能回乳，还具有健胃除湿、和胃安眠的功效，很适合回乳新妈妈食用。\n## Part10"}, "热牛奶、面包": {"ingredients": "山西五台山有机小米50克，米酒水250毫升，老姜5克。", "steps": "全脂鲜牛奶（也可用半脂鲜牛奶）1杯加热、全麦吐司1块稍微烤热。", "notes": "小米性温，含有丰富的铁、钙、蛋白质、B族维生素，滋阴养血，是产后第一天最好的食物，能调养产妇虚寒的体质，有助于恢复体力。小米好处多多，温胃补水，更易于被产妇因生产而空了很长时间的胃消化吸收。\n补充蛋白质与膳食纤维，让空了很久的胃逐渐恢复正常蠕动。"}, "猪肝菠菜面": {"ingredients": "挂面50克，猪肝50克，\n菠菜叶50克，米酒水30毫升，生粉3克，老姜丝5克，青葱1根（切段），\n豆豉1克，黑芝麻油5克。", "steps": "◇将猪肝切成很薄的薄片，放在滤瓢中用自来水流水将血水冲洗干净，沥干，加生粉拌匀。\n◇铁锅烧热，下入黑芝麻油、老姜丝、豆豉、青葱段爆锅，再将老姜丝、豆豉、青葱段捞出，倒入猪肝片爆炒，加米酒水炝锅，然后放入菠菜叶稍炒盛出。\n另备锅，将挂面加水煮熟捞出。猪肝与面条分开装盒，吃时再将猪肝菠菜与面条拌在一起。", "notes": "养肝、补铁、补血。"}, "炖甜橙": {"ingredients": "美国加州橙（或江西赣南橙或云南储橙）1个，冰糖3颗。", "steps": "将橙子靠上部切开，取下橙盖，加入冰糖，再盖上橙盖，放入蒸锅内，隔水蒸，开火上汽后蒸20分钟即可。", "notes": "橙肉与橙皮有顺气理肺的作用，橙汁能促进铁的吸收，可促进产妇造血功能的恢复。"}, "杂粮粥（jinpai）": {"ingredients": "绿豆、薏米、大米、糙米各50克，干百合10克，白糖适量。", "notes": "此粥可助新妈妈排出体内积水，也有预防产后便秘的作用。"}, "杂粮粥（mama）": {"ingredients": "花芸豆10颗，黑糯米20克，小米30克，大米20克，剥皮花生8颗，无花果1颗，\n剥皮核桃仁1个，红糖5克，\n老姜5克，米酒水250毫升，橘皮10克。", "steps": "原料洗净；将花芸豆先用开水泡好或用高压锅加水稍炖，核桃仁、花生用开水泡开后去皮；所有原料装入紫砂罐，放入蒸锅内，隔水蒸2小时。", "notes": "进一步补充热量与能量。上述原料皆为养胃暖宫、排瘀顺气、理肺补肾补血之食材，多种营养成分混合，有利于产妇尽快恢复体能，促进乳汁分泌。\n## 每日小记\n产后第1天的食谱，主要以恢复元气、调理肠胃、去污排瘀、养肝补血、促进乳汁分泌、加快子宫收缩为目的。\n因女儿分娩侧切有伤口，用\n茶树精油、熏衣草精油各5滴倒入洗净的2升纯净水瓶中，加入温热开水（开水晾凉至以不烫为度），从小腹处缓缓淋下，涓涓细流冲洗会阴区域，然后用电吹风热风挡吹干。每日1~2次。\n擦脸擦身用水：开水晾凉至不烫，加入金银花。\n收藏脐带血：\n脐带血是胎儿娩出、脐带结扎并离断后，残留在胎盘和脐带中的血液，在人类生育史上通常是废弃不用的。但近年来的研究发现，脐带血中含有可以重建人体造血和免疫系统的造血干细胞，这些干细胞可以用来替代骨髓和外周血干细胞进行移植。目前脐带血主要用于血液病的治疗，包括白血病、淋巴癌、贫血等，并且由于脐带血中所含干细胞的免疫功能尚未发育完全，所以在配型上相对容易许多，尤其在家人中间概率更高，所以人们开始有意识地保存脐带血。\n保存脐带血的机构是需要通过国家审核的，未经国家审核批准的机构不能开展脐带血造血干细胞业务。\n## 用餐计划\n7:30: 小米粥1碗（做法同昨日所述，根据产妇的体能、食欲可适当增加分量），煎饼1块。\n8:30：产康乐50毫升。\n10:00: 猪腰蔬菜面1碗。\n12:30：黑鱼汤1碗，椰子油米饭1碗。\n15:00：热牛奶1杯、煎饼1块。\n16:00：产康乐50毫升。\n18:30：牛尾菠菜汤配米饭。\n20:30：红米黑糯米粥1碗。\n## 妈妈下厨"}, "煎饼": {"ingredients": "胡萝卜1根，面粉50克，糯米甜酒酿水200毫升，橄榄油1匙。", "steps": "◇胡萝卜榨汁，倒入面粉、糯米甜酒酿水搅拌均匀。\n◇锅内倒入橄榄油烧热，倒入面糊，摊平，慢慢煎熟。", "notes": "胡萝卜含有丰富的胡萝卜素，补中气、健胃消食，可增强机体免疫力。糯米甜酒有助产妇催奶。"}, "猪腰蔬菜面": {"ingredients": "猪腰2个，挂面50克，青菜叶50克，芝麻油5克，老姜丝5克，豆豉1克，青葱1根（切段），米酒水20毫升。", "steps": "◇猪腰平放，从中间剖开成两个半边，将中间白色的肾腺仔细剔净，将表皮的一层细膜剥掉，然后切成很薄的片，放在滤瓢中，用自来水流水将血水冲洗干净，沥干。青菜叶在滚水中焯一下，马上捞出放入冷水中沥出，切成2厘米长。\n◇铁锅烧热，倒入芝麻油烧锅，再放入老姜丝、豆豉、青葱段爆锅，然后将老姜丝、豆豉、青葱段捞出，下入沥干的猪腰片爆炒，加米酒水炝锅，盛出。\n◇ 铁锅烧热，倒入芝麻油烧锅，再放入老姜丝爆锅，然后将老姜丝捞出，下入青菜叶爆炒，加米酒水炝锅，加入约80毫升水烧开作为面汤。\n另起锅，将挂面煮熟捞出。\n◇菜与面分开装盒，吃时再拌匀食用。", "notes": "猪腰具有补肾气、通膀胱、消积滞、止消渴之功效，可用于治疗肾虚腰痛、水肿等症。"}, "黑鱼汤": {"ingredients": "黑鱼1条（500克左右），\n黑芝麻油5克，豆豉1克，带皮老姜丝5克，葱段3克，米酒水30毫升，\n排骨汤500毫升。", "steps": "◇将黑鱼宰杀、清理内脏后，切成薄片。\n◇ 锅内倒入黑芝麻油烧热，放豆豉、带皮老姜丝、葱段爆锅后捞出，放入黑鱼片急炒，再倒入米酒水、排骨汤，用中火煮6分钟即可。", "notes": "黑鱼健脾胃、益阴血，\n在中医上被认为有补髓养精、明目增乳、愈合伤口之功效。"}, "椰子油米饭": {"ingredients": "上好大米 50 克，Nutiva 椰子油 1 勺。", "steps": "大米淘洗干净，淋上 Nutiva 椰子油，放入电饭锅内煮熟即可。", "notes": "椰子油含有多种维生素与矿物质，所含的脂肪酸是中链甘油三酸酯，简称 MCT，能促进人体新陈代谢，把脂肪转化为能量。"}, "牛尾菠菜汤": {"ingredients": "新鲜牛尾4块，菠菜叶100克，番茄2个，花芸豆10颗，老姜15克，米酒水50毫升。", "steps": "◇ 将新鲜牛尾清洗后焯水（锅中同时放入冷水与牛尾，开中火），逼水后洗净。\n◇ 瓦罐中放入牛尾、花芸豆、老姜、米酒水、番茄，倒入清水 2000 毫升，用慢火煨 6 小时。出锅时盛出一碗放入煮熟的菠菜叶，配上米饭即可。", "notes": "牛尾补气养血，强筋骨、益肾、补胃气，含有大量维生素 $ B_{1} $、维生素 $ B_{2} $、维生素 $ B_{12} $、烟酸、叶酸，营养丰富。花芸豆味甘平、性温，具有温中下气、利肠胃、止呃逆、益肾补元气等功效。"}, "红米黑糯米粥": {"ingredients": "红米30克，\n黑糯米20克。", "steps": "将红米、黑\n糯米洗净，加水煮粥即可。", "notes": "红米富含铁质，\n黑糯米富含钙、磷、铁、维生素\n$ B_{1} $、维生素 $ B_{2} $及蛋白质，具有开胃益中、健脾暖肝、明目活血、补养血气的作用。\n## 每日小记\n当日月子食谱以补血、补肾、去污化瘀、理气、促进乳汁分泌、加快伤口愈合与子宫收缩为主。\n花芸豆不宜多放，以免胀气，放入橘皮后可避免胀气。\n产妇如有胀气，则喝四磨汤（湖南汉森制药出品）。\n如有腰痛，则喝杜仲粉。\n继续用茶树精油、熏衣草精油加温热开水冲洗伤口，也可用北美金缕梅药水（Witch Hazel）洒在卫生巾上，置入冰箱冷藏1小时后取用，有助于伤口愈合及消肿止痛。\n## 用餐计划\n7:30：小米粥1碗，鸡蛋煎饼1块（做法参考昨日）。\n8:00：产康乐50毫升。\n10:00: 温热牛奶1杯，烤热的全麦面包片1块。\n12:30：滋补菠菜，配椰子油米饭1碗。\n13:30：《产后中药滋补方》第一方滋补药汤1碗（制作方法见本书附录）。\n15:00: 产康乐50毫升。\n16:30：滋补青菜，配面条1碗。\n17:30: 橙汁1杯。\n18:30：《产后中药滋补方》第一方滋补药汤1碗。\n20:00：红米薏米黑糯米粥1碗，放少许红糖。\n## 妈妈下厨"}, "滋补基础汤： 多样滋补营养食材汤": {"ingredients": "猪脚2个，排骨3根，猪肚1个，猪腰1个，海参1根，胡萝卜2根（切块），带皮老姜15克（切片），米酒水250毫升。", "steps": "◇海参提前泡制好；所有的肉类食材均先斩件、焯水，猪腰处理方法见昨日。\n◇将除海参外的所有原料放入瓦罐中，加清水2000毫升，用大火烧开之后转小火炖6小时。海参在最后半小时放入瓦罐同炖。", "notes": "猪脚具有通乳、气血双补、补虚养身等功效；猪肚补中益气；海参中微量元素钒的含量居各种食物之首，可以参与血液中铁的输送，增强造血功能，促进伤口愈合，使产妇恢复体力和精力。"}, "滋补菠菜": {"ingredients": "当日滋补基础汤1碗，鲜嫩菠菜叶100克。", "steps": "◇ 菠菜叶过一下水（即将水烧开后，将菠菜放进开水中，即刻捞出用冷水冲淋）。\n◇ 锅内放少量当日炖好的滋补基础汤及汤料，烧开后加进菠菜叶煮2分钟即可。", "notes": "同当日滋补基础汤。"}, "滋补青菜": {"ingredients": "当日滋补基础汤1碗，鲜青菜叶100克。", "steps": "青菜叶过一下水，切成小段。\n◇用小立锅盛出少量当日炖好的滋补基础汤及少许汤料，烧开后加进青菜叶煮3分钟即可。", "notes": "同当日滋补基础汤。"}, "红米薏米黑糯米粥": {"ingredients": "红米30克，黑糯米20克，薏米20克。", "steps": "将红米、黑糯米、薏米洗净，加水煮成粥即可。", "notes": "红米富含铁质；黑糯米富含钙、磷、铁、维生素 $ B_{1} $、维生素 $ B_{2} $、蛋白质，具有开胃益中、健脾暖肝、明目活血、补养血气的作用；薏米含有丰富的矿物质、维生素 $ B_{1} $、维生素 $ B_{2} $、维生素E，可促进新陈代谢。\n## 每日小记\n产后第3天，产妇身体慢慢恢复，将富含胶原蛋白，具有催奶、补肾、补肝、养胃功效的多种食材烩炖在一起，多种营养混合滋补。\n🍓 产康乐继续食用，杜仲与益母膏视个人情况食用，腰痛则食杜仲，恶露排得不好则可加用益母膏。腰痛厉害者，可用热的杜仲粉药包做腰部热敷。\n汤料宜多才能炖出浓浓的汤，家人可一起分享该汤料。\n每日仍用熏衣草精油、茶树精油加温热开水冲淋产妇小腹部以下，然后用电吹风热风挡吹干，同时将短裤裤裆也用电吹风吹干。贴身衣裤宜柔软厚实，床单也应及时更换。产妇乳房容易渗奶，可以用乳房护垫。\n伤口疼痛厉害者，仍可将冰镇的北美金缕梅药水(Witch Hazel)洒在卫生巾上使用。\n👗 产妇生产后容易出现产后抑郁，故家人应给予最大关注，除休息外，不要将产妇单独一人留在房间，应不时问其身体感受，积极处理其各处疼痛及不适问题，让产妇感觉自己受到重视、问题能及时得到解决，从而心情愉悦、有利于恢复。\n产妇可以适当下床慢走，白天注意绑好腹带，晚上松开，以免日后子宫下垂、胃下垂，但绷带不宜绑得太紧，适当托举即可。\n## 用餐计划\n7:30：热牛奶1杯，烤热的全麦面包片1块。\n8:30：产康乐50毫升。\n10:30：当日滋补基础汤料下面条，1碗。\n11:30：《产后中药滋补方》第一方药汤1碗。\n14:00: 小米粥1碗。\n15:00：产康乐50毫升。\n16:00: 橙、葡萄鲜榨果汁1杯。\n18:00：滋补黄芽白，配椰子油红米饭1碗。\n19:00：《产后中药滋补方》第一方药汤1碗。\n20:00: 红糖桂圆糯米甜酒1碗。\n## 妈妈下厨"}, "滋补基础汤： 牛尾滋补营养汤": {"ingredients": "牛尾4块，\n猪筒子骨1根，胡萝卜2根，番茄2个，无花果1个，海参1根，老姜10克，米酒水250毫升。", "steps": "◇将牛尾、猪筒子骨一起加冷水烧开，逼出血水，去除浮沫，捞出冲洗干净。\n◇将除海参外的各种原料一起放入瓦罐中，加清水2000毫升，用猛火烧开后转至小火慢煨6小时，最后半小时放入海参同炖即可。", "notes": "牛尾、海参的功效前面已介绍。"}, "滋补面条": {"ingredients": "当日滋补基础汤1碗，面条100克。", "steps": "取当日滋补基础汤1碗加热，将面条煮熟后放入基础汤中即可。"}, "滋补黄芽白": {"ingredients": "当日滋补基础汤1碗，黄芽白100克。", "steps": "◇锅内放水烧开，下入黄芽白后马上捞出，用冷水冲淋，再切成小段。\n◇锅内放少量当日炖好的滋补基础汤及少许汤料，烧开后加入黄芽白煮3分钟即可。\n的功效。如果产妇生产时有大量出血可多食。"}, "红糖桂圆糯米甜酒": {"ingredients": "红糖1匙，桂圆5粒，糯米甜酒1碗，清水少量。", "notes": "红米含有丰富的铁和其他众多营养素，具有补血及预防贫血"}, "椰子油红米饭": {"ingredients": "红米50克，Nutiva椰子油1勺。\n## 每日小记\n🍓 炖汤的食材在头一天准备好，在头一天下午开始炖，炖好后不要揭盖，避免食物接触空气，这样就不会坏。我们家的孩子出生在冬天，虽然家里有暖气，但食物仍可不进冰箱，只要用瓦罐或高压锅密封就行。如果天气太热，炖好的食物宜放冰箱储存。\n牛尾为补血补钙的食物，海参能补充胶原蛋白、提升人体免疫力，橙加葡萄榨汁有助于铁的吸收。\n产后前几天要把握好排与补的关系，不宜吃虫草、西洋参、鸡等特别滋补的食材。\n继续用茶树精油、熏衣草精油加温热开水冲淋洗净产妇下腹部及伤口，用电吹风热风挡吹干，一直要坚持到第10天。\n止痛药、补铁药根据各人情况使用。我女儿因失血过多，故要补1个月的铁片，止痛药也开了1周，医生吩咐不要因担心吃止痛药产生不良反应而中断服用，只有伤口不痛、休息好才能恢复快，所以止痛药需根据各人情况来决定吃多长时间。\n产妇要适当下床慢走，白天要绑好腹带。\n关于婴儿洗澡：\n水温：大人手肘探入水中不烫即可。\n室温： $ 20^{\\circ}C \\sim 25^{\\circ}C $，不宜过高。\n姿势：把宝宝的头放在左手臂弯，用左手掌握好宝宝左臂，右手托住其臀部，先把臀部和腿在水中轻轻蘸几下，让宝宝适应水温和环境的变化，然后慢慢将宝宝放入水中，左手姿势不变，右手放开，让小屁股坐在水中，此时就可用右手给宝宝洗澡了。洗完后用大块浴巾包裹擦干。\n洗澡的过程中要不断往宝宝胸前和腹部淋水，以免肚子着凉。\n新生儿脐带未脱落前，很多父母担心脐带遇水感染，其实大可放心，只要不去用力挤压搓揉即可，脐带表面可以完全进入水中。\n洗头时，要把宝宝两只耳朵从耳后向前盖住，以免水倒灌进耳朵里。\n洗澡时无需使用任何洗浴液，清水即可。\n如果宝宝皮肤干燥，洗澡后可用医用橄榄油擦拭按摩宝宝全身。可先擦拭屁股，上好尿布后再擦拭其他部位，以免宝宝淘气突然拉屎撒尿。\n## 用餐计划\n7:30：热牛奶1杯，烤热的全麦面包片1块。\n8:30：产康乐50毫升。\n10:30: 滋补面条1碗。\n11:30：《产后中药滋补方》第一方药汤1碗。\n14:30：汤烩西兰花，配红薯小米黑糯米红米饭1碗。\n15:30：产康乐50毫升。\n16:30：橙、葡萄、苹果鲜榨混合果汁1杯。\n18:00：猪排骨肉炒芹菜，烤羊腰，配米饭。\n19:00：《产后中药滋补方》第一方药汤1碗。\n20:30：桂圆红枣糯米甜酒1碗。\n## 妈妈下厨", "steps": "取一小锅，加入糯米甜酒、红糖、桂圆、清水搅匀，烧开即可。\n红米洗净，淋入 Nutiva 椰子油后，放入电饭锅煮熟即可。"}, "滋补基础汤：排骨木瓜鲫鱼汤": {"ingredients": "排骨3根，\n排骨3\n木瓜1个，鲫鱼1条，\n老姜15克，米酒水\n200毫升。", "steps": "◇将鲫鱼去鳞、\n去腮、去内脏，清理\n干净。\n◇将排骨放入冷水中烧开，逼出血水，捞出冲洗干净后，与其他原料一起放入瓦罐中，加清水2000毫升，用猛火烧开后转小火煨4小时。", "notes": "鲫鱼含糖分多，脂肪少，含有丰富的蛋白质、多种维生素、多种微量元素及人体所必需的氨基酸，产妇食用鲫鱼既增加营养，又可催乳。"}, "滋补面条（mama）": {"ingredients": "当日滋补基础汤1碗，面条100克，丝瓜20克（切条），芽\n白菜20克。", "steps": "◇ 锅内倒入滋补基础汤煮开，下入丝瓜、芽白菜，用慢火煮熟，出锅倒入汤碗中。\n◇另取一锅，加水煮熟面条，捞入汤碗中即可。\n## 每日小记\n产妇因为哺乳，需要大量补充钙与微量元素，所以要喝些骨头汤、吃些坚果。\n因前几天喝汤太多，故要做些干食（如馅饺）调剂一下口味。\n👏 产妇经过几天的休息，伤口慢慢愈合、不痛了，精神也好多了，这时会觉得时间漫长而无聊，如果没人陪她聊天，她可能就会看手机微信聊天，容易损耗视力，所以密切关注产妇的情感情绪、陪产妇聊天，也是家人陪护月子的重要任务。在英国，孩子爸爸也可以休产假2～3周，有丈夫陪伴，产妇的情绪会更平稳。医生说在3周之内，产妇可以发泄任何情绪，可以向任何人发火开炮，但3周后仍然如此，就得看医生了。虽然我们家孩子没这毛病，但医生的话我还是谨记，时刻不忘提醒女婿或朋友去陪坐月子的女儿聊些她感兴趣的话题，避免冷落产妇。\n## 用餐计划\n7:30：热牛奶1杯，昨天做的小花卷（蒸热）2个。\n9:30：《产后中药滋补方》\n第二方药汤1碗（制作方法见本书附录）。\n11:30：鸡丝韭花，椰子油红米饭1碗。\n12:30: 水果盘（可以是橙子、葡萄、苹果、菠萝、猕猴桃、樱桃、香蕉、草莓等）。\n16:00: 茄子鱼丸，米饭1碗。\n16:30：《产后中药滋补方》\n第二方药汤1碗。\n19:00: 红糖甜酒荷包鸡蛋\n1碗。\n17:30：坚果1小碟（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）。\n做法：\n◇鱼肚提前两天浸泡（放入沸水中煮20分钟，冷却后用冷水浸泡2天，每天换水）；花芸豆浸泡一晚。\n◇将猪筒子骨焯水后冲净，鱼肚切成手指宽的条，均与枸杞、花生、花芸豆、老姜、米酒水、橘皮一起放入瓦罐内，加500毫升清水，用猛火烧开后改用慢火炖3~4小时即可。\n花生（剥皮）10粒，花芸豆10克，老姜片10克，米酒水200毫升，橘皮5克。\n功效：鱼肚（鱼胶）主要成分为高级胶原蛋白，含多种维生素及钙、锌、铁、硒等多种微量元素。食疗功效显著，对身体各部分均有补益作用。\n## 妈妈下厨"}, "汤烩西兰花": {"ingredients": "当日滋补基础汤1碗，西兰花100克，（从当日滋补基础汤中的排骨上剔下的）排骨肉适量。", "steps": "锅内倒\n入当日滋补\n基础汤烧\n开，下\n入排骨\n肉煮开，\n再下入西兰\n花烩熟即可。"}, "红薯小米黑糯米红米饭": {"ingredients": "红薯半个，小米20克，黑糯米20克，红米20克。", "steps": "红薯去皮后切成小块，与淘洗干净的小米、黑糯米、红米一起放入电饭锅中，加水煮熟即可。", "notes": "产妇容易出现便秘，多食红薯有助于消化通便。"}, "猪排骨肉炒芹菜": {"ingredients": "芹菜（切片）200克，姜丝5克，橄榄油1匙，豆豉5克，（从当日滋补基础汤中的排骨上剔下的）\n排骨肉少许。", "steps": "锅中加入橄榄油烧热，下入姜和豆豉爆香，然后加入芹菜和排骨肉爆炒至熟即可。", "notes": "芹菜含铁量高，有养血补虚的作用，且属于高纤维蔬菜，能帮助消化。"}, "烤羊腰": {"ingredients": "新鲜羊腰1个，老姜米酒10克。", "steps": "将新鲜羊腰剔除肾腺，用老姜米酒腌好，再用锡纸包好，放进烤箱烤25分钟左右，熟透即可。"}, "桂圆红枣糯米甜酒": {"ingredients": "红枣3颗，\n桂圆4颗，红糖5克，\n糯米甜酒半碗。", "steps": "在糯米甜\n酒中放入红枣、桂圆、红糖，\n上火煮开即可。\n## 每日小记\n🍓 木瓜、鲫鱼为下奶食材，但因为月子餐不宜放盐和任何调料，所以必须加进排骨来调味。产妇口味淡，当汤炖得很浓，同时汤中有米酒的香甜味时，产妇不会关注到是否有盐，家人也不会强调菜中是否有盐。\n伦敦的医生在我女儿出院后的第二天、第四天都上门来检查母婴的情况，耐心、和蔼地倾听我们反映情况并给予各种意见。其中要提到的是，我们担心的婴儿黄疸症状，医生检查后觉得不需处理，是正常状况。医生提到，如果婴儿黄疸严重到需要照灯，表现出来的症状一定是不哭不闹、一直嗜睡，而我们家的婴儿知道哭，所以没事，晒晒太阳就行。婴儿湿疹不严重的，可让产妇喝些金银花茶（放3～4根金银花即可），婴儿湿疹严重时要咨询医生意见。\n产妇可以适当下床活动，用金银花水擦擦身子。\n因为婴儿大约1个多小时就要喝一次奶，产妇很难休息好，家人有空时最好用泵奶器将奶水泵出，这样可以让产妇得到充分休息。\n💙 婴儿的脐带已脱落，可以好好收藏。孩子的脐带、头发、小指甲及使用过的物品都可细心保存，这都是难得的、不可再有的珍藏。\n人到老年，会非常怀念儿时的记忆，我就一直后悔没有保留小脚奶奶给我做的绣花鞋。奶奶的女红可是万里挑一，那些绣花鞋、绣花兜啊，现在如存，都是最熟悉最亲切的古董，上面满是奶奶的味道。遗憾随着若干次搬家，竟然一件都没留下。\n## 用餐计划\n7:30：热牛奶1杯，烤热的全麦面包片1块。\n8:30：产康乐50毫升。\n10:30：猪肝菠菜面条1碗。\n11:30: 《产后中药滋补方》第一方药汤1碗。\n14:30：滋补西兰花，配米饭。\n15:30：产康乐50毫升。\n16:30：橙、葡萄、苹果鲜榨混合果汁1杯。\n17:30：《产后中药滋补方》第一方药汤1碗。\n19:00: 五谷杂粮粥1碗，煎鸡蛋1个。\n## 妈妈下厨"}, "滋补基础汤：猪肚排骨汤": {"ingredients": "猪肚300克，排骨200克，姜片20克，葱1根（切段），糯米酒30毫升。", "steps": "◇猪肚洗\n净，焯水后切成\n一指宽的小段；\n排骨斩件，焯水后\n用清水洗净。\n◇将猪肚、排骨、姜、葱放入炖锅中，加入清水煮沸，加入糯米酒，改慢火炖1.5小时，至猪肚焖烂即可。"}, "猪肝菠菜面条": {"ingredients": "猪肝50克，菠菜叶50克，米酒水30毫升，生粉3克，姜丝5克，小葱1根，豆豉1克，黑芝麻油2匙，面条100克。", "steps": "◇将猪肝切成很薄的薄片，放在滤瓢中用自来水流水将血水冲洗干净，沥干，加生粉拌匀。\n◇铁锅烧热，下入黑芝麻油、姜丝、豆豉、小葱爆锅，再将姜丝、豆豉、小葱捞出，倒入拌匀生粉的猪肝片、菠菜叶爆炒，加米酒水炝锅，盛出。\n◇同时另起锅将面条煮熟、装入碗中，再浇盖炒好的猪肝、菠菜即可。\n备注：图片可参考第1天猪肝菠菜面。"}, "滋补西兰花": {"ingredients": "当日滋补基础汤1碗，西兰花100克。", "steps": "西兰花洗净切块；锅中倒入当日滋补基础汤烧开，加入西兰花煮熟即可。", "notes": "西兰花营养丰富，含蛋白质、维生素和胡萝卜素等，营养成分位居同类蔬菜之首。\n## 每日小记\n当日食材以补铁、发奶、补充胶原蛋白为主。\n奶水不足的产妇可以再喝些糯米甜酒，因我家女儿奶水足够，所以不宜再多喝糯米甜酒。\n生产后第1周，排水排毒很重要，所以要多喝汤水，加大排泄，不吃盐也是为了更好地排毒排水且不增加肾的负担。"}, "五 谷杂粮粥": {"ingredients": "黑豆15克，红糙米30克，黑糯米20克，小米20克，芡实10克，红糖5克。", "steps": "◇黑豆、红糙米、芡实提前浸泡一晚。\n◇将所有原料（除红糖外）冲洗干净，放入带有煲粥功能的电饭锅中煲熟，加红糖即可。", "notes": "黑豆营养丰富，含有蛋白质、脂肪、维生素、微量元素等多种营养成分；红糙米能治疗贫血、便秘，净化血液，因而有增强体质的作用。\n## 用餐计划\n7:30：热牛奶1杯，烤热的全麦面包片2块。\n8:30：产康乐50毫升。\n10:30：蔬菜肉丝面疙瘩汤1碗。\n11:30：《产后中药滋补方》第一方药汤1碗。\n14:00：苹果、葡萄鲜榨混合果汁1杯。\n14:30: 滋补南瓜，水煮芦笋，米饭1碗。\n15:30：产康乐50毫升。\n16:30：《产后中药滋补方》第一方药汤1碗。\n19:00: 当日滋补基础汤1碗，自制胡萝卜汁花卷1个。\n川芎5克，老姜5克，米酒水150克，红糖5克。\n## 做法：\n◇土鸡去除\n鸡皮、鸡油，焯水、\n逼出血水。\n◇药材洗净，与土鸡、老姜一起放入瓦罐中，加米酒水、1500毫升清水，用猛火烧开后改小火煨100分钟，加红糖食用。\n功效：土鸡肉富含蛋白质，其脂肪中含有不饱和脂肪酸，最适合体质虚弱者和产后进补者。"}, "蔬菜肉丝面疙瘩汤": {"ingredients": "鸡蛋1个，黄瓜20克，\n西葫芦20克，青菜20克，鸡肉丝20克（取当日滋补基础汤中鸡肉切丝），\n番茄20克，面粉30克。\n## 妈妈下厨"}, "滋补基础汤：益母草鸡汤": {"ingredients": "（宰杀干净的）土鸡1只，益母草10克，香附10克，当归9克，", "steps": "◇将面粉放在碗里，加少量清水搅成面疙瘩。\n◇锅内放水烧开，放入黄瓜、西葫芦、青菜、鸡肉丝、番茄熬煮一会，打入鸡蛋，煮滚后下入面疙瘩，煮开即可。"}, "滋补南瓜": {"ingredients": "南瓜100克，当日滋补基础汤1碗。", "steps": "锅内放当日滋补基础汤\n烧开，将\n烧开，将\n南瓜去皮\n切块后下\n入锅中，\n用慢火熬\n到南瓜熟\n烂即可。", "notes": "南瓜味甜，可改善产妇\n清淡的口味。"}, "水煮芦笋": {"ingredients": "芦笋4根。", "steps": "锅内放水烧开，将芦笋切成两段下入锅中，水烧开后3分钟即可马上捞出食用（煮至用牙签能戳入即可，火候一定要把握好，煮过了口感就差很远，火候刚好芦笋有清甜功效：芦笋味道鲜美清淡，膳食纤维柔软可口，能增进食欲，帮助消化。"}, "胡萝卜汁花卷": {"ingredients": "胡萝卜150克，30℃温水50毫升，面粉300克，酵母粉1茶匙，橄榄油3克，白糖1茶匙。", "steps": "◇将酵母粉和白糖放入杯中，加入 $ 30^{\\circ} $C温水，搅拌溶化后放置10分钟，水表面会出现一层泡沫；将胡萝卜打汁。\n◇将面粉放入盆中，把上一步杯中的泡沫和水再次搅拌均匀，倒入面粉中，然后加入胡萝卜汁，用筷子将面粉搅拌成面絮，揉成面团，放在盆中，用一块湿布盖上，放置温暖处进行发酵至2倍大即可（家中如有烤箱，可预设到 $ 40^{\\circ} $C后关火，再把发揉好的\n面团放入其中发酵。为了达到更好的发酵效可在前一\n天晚上揉好面、放置发酵）。\n◇将发酵好的面团反复揉搓后，擀成3毫米厚的薄面片，刷上一层橄榄油，卷起来，用刀切成每个宽2厘米左右的小面团卷，每两个叠加起来拉长，然后扭转一圈，把两端捏在一起，使一层层的面片翻出来，做成花卷。\n◇将做好的花卷码在蒸架上，相互间隔一个花卷的距离，再次放置醒发30分钟。\n◇开中大火蒸10分钟，关火2分钟后取出即可。\n## 每日小记\n因为宝宝喝奶量增大，所以产妇的饮食量可适当加大。\n由于每天吃的食物油水比较重，所以要将汤上层的浮油去掉（如果上层的油是凝固的就直接刮掉），同时可以多喝汤，少吃汤料。\n每天饮食的营养均衡很重要，肉类、鱼类、内脏、肉骨头、奶、蔬菜、水果要轮流吃。\n最好少食凉性与寒性的蔬菜、水果，以性平性温的为宜，若需要时偶有性凉性寒的也可。\n益母草可使产妇子宫收缩正常，帮助排除恶露，防止恶露不绝以及产后血晕。坐月子期间，益母草鸡汤至少要吃一次。\n## 用餐计划\n7:30：热牛奶1杯，烤热的全麦面包片2块。\n10:30：自制羊肉馄饨1碗。\n11:30：《产后中药滋补方》第一方药汤1碗。\n12:30: 橙子1个，葡萄6颗。\n16:30: 汤烩丝瓜，羊肉抓饭。\n17:30：《产后中药滋补方》第一方药汤1碗。\n20:00: 羊肉泡馍1碗。\n## 妈妈下厨"}, "滋补基础汤：羊肉汤": {"ingredients": "新鲜羊羔肉250克，猪排骨3根，洋葱50克，老姜10克，米酒水50毫升。", "steps": "将羊羔肉、排骨焯水后冲净，与老姜、洋葱一起放入瓦罐内，加清水500毫升、米酒水，用猛火烧开后改用小火煨3小时即可。", "notes": "羊肉肉质细嫩，容易消化吸收，有助于提高身体免疫力。羊肉具有补精血、益虚劳、温中健脾等功效，对产后虚冷、缺乳等症有很好的疗效。"}, "自制羊肉馄饨": {"ingredients": "新鲜羊羔肉100克，佛手瓜20克，芽白菜20克，姜末10克，红糖5克，生粉5克，黑芝麻油2匙，葱花2克，馄饨皮适量。", "steps": "◇将新鲜羊羔肉切片、冲淋血水后，与佛手瓜、芽白菜、姜末、红糖一起用绞肉机搅成碎末，加入生粉、黑芝麻油搅拌均匀，包进馄饨皮内，下入开水锅中煮熟。\n取当日炖好的滋补基础汤——\n羊肉汤作为馄饨汤料，加入些许葱花。"}, "汤烩丝瓜": {"ingredients": "当日滋补基础汤1碗，\n丝瓜150克。", "steps": "锅内放入当日滋补基础汤烧开，将丝瓜去皮切块，下入汤中用慢火煮熟即可。"}, "羊肉抓饭": {"ingredients": "大米100克，葡萄干10克，无花果5克，枸杞5克，洋葱1个（切丝），橄榄油5克，当日滋补基础汤适量。\n大米提前用清水泡发。", "steps": "◇锅底放适量橄榄油，下入洋葱爆锅，再将泡好的大米放入锅内，上面放葡萄干、无花果、枸杞，倒入炖好的滋补基础汤（盖过大米一个手指头），用慢火焖40分钟至熟即可。"}, "羊肉泡馍": {"ingredients": "当日滋补基础汤1碗，土豆20克（切片），西葫芦20克（切丁），番茄20克（切丁），胡萝卜20克（切丁），馍1张（超市卖的印度馍或墨西哥馍也可）。", "steps": "锅中倒入当日滋补基础汤，加入土豆片、西葫芦丁、番茄丁、胡萝卜丁烧熟，加入撕碎的馍搅匀烧开即可。\n## 每日小记\n第8天可以不喝产康乐了。\n产妇活动量可适当加大。\n产妇奶水多的时候可能会胸胀，可用泵奶器泵出奶水，并热敷乳房。\n继续用茶树精油、熏衣草精油加温热开水清洗下腹部及伤口，并用电吹风热风挡吹干。\n👗 家人多陪产妇聊些高兴的事，比如宝宝的举动和趣事、断奶后的度假计划（度假期间孩子请奶奶帮着带，同时致电奶奶）等。\n## 用餐计划\n7:30：杂粮粥1碗，小花卷2个。\nG:30：《产后中药滋补方》第一方药汤1碗。\n11:30：鸡蛋肉馅饺，椰子油红米饭1碗。\n12:30: 橙子1个，葡萄6颗。\n14:30：《产后中药滋补方》第一方药汤1碗。\n15:30：滋补面条1碗。\n18:00：热牛奶1杯，配小碟蓝莓干、松子、腰果、小饼干。\n20:00：当日滋补基础汤1碗，汤中玉米粒若干。\n## 妈妈下厨"}, "滋补基础汤：猪筒子骨干豆角汤": {"ingredients": "猪筒子骨1副，干豆角150克，玉米粒150克，老姜5克，米酒水100毫升。", "steps": "将猪筒\n子骨过水、去血水，\n洗净后与泡好的\n干豆角、玉米粒\n及其他原料一起\n放入瓦罐中，加\n清水1500毫升，炖\n烂即可。"}, "杂粮粥（mama）（mama）2": {"ingredients": "小米20克，黑糯米20克，薏米10克，红米20克，花芸豆10克。", "steps": "花芸豆提前浸泡，煮熟；将小米、黑糯米、薏米、红米洗净，与煮熟的花芸豆一起放入电饭煲中加水煲粥。"}, "小花卷": {"ingredients": "面粉 300 克， $ 30^{\\circ} $C 温水 150 毫升，酵母 3.5 克。", "steps": "◇发面：用 $ 30^{\\circ} $C温水将酵母融化，冲入面粉中，用筷子搅拌成面絮，用手将面絮揉成光滑的面团，盖上一块湿布，放置1个小时，让面团发至2倍大即可。\n成型：将发酵好的面团反复揉搓后，擀成3毫米厚的薄面片，刷上一层橄榄油，撒葱花，卷起来，用刀切成每个宽2厘米左右的小面团卷，每两个\n面团卷叠加起来拉长，\n然后扭转一圈、把两端捏在一起，使一层层的面片翻出来，做成花卷。\n◇制熟：将做好的花卷码在蒸架上，相互间隔一个花卷的距离，再次放置醒发30分钟后，开中大火蒸10分钟，关火2分钟后即可取出。"}, "鸡蛋肉馅饺": {"steps": "◇将梅子肉与佛手瓜（或西葫芦）、黄芽白菜心一起用绞肉机绞成碎末。\n◇将鸡蛋磕入碗中搅匀，下锅煎成薄饼，将肉末放在鸡蛋饼上摊平、卷起来，切断，即成馅饺。\n取当天熬好的滋补基础汤烧开，下入做好的鸡蛋肉馅饺煮熟，加少许姜末、葱末即可。"}, "滋补基础汤：鱼肚筒子骨花芸豆汤": {"ingredients": "鱼肚（敏鱼的鱼胶为最好）1个，猪筒子骨1根，枸杞10粒，"}, "鸡丝韭花": {"ingredients": "鸡肉丝50克，韭菜花50克（切段），黑木耳丝15克，米酒水20克，生姜丝5克，黑芝麻油2匙。", "steps": "◇将鸡肉丝用生粉拌匀。\n◇锅内放黑芝麻油烧热，下入姜丝，然后放黑木耳急炒，再放韭菜花急炒，出锅时倒米酒水炝锅，盛出装盘。"}, "茄子鱼丸": {"ingredients": "茄子1根，鱼肉100克，\n老姜末10克，米酒水10毫升，鸡蛋1个（取蛋清），黑芝麻油1匙。", "steps": "◇ 茄子洗净切条，隔水蒸熟。\n◇ 将鱼肉绞成鱼泥，与老姜末、米酒水、鸡蛋清一同放入碗中搅匀，挤成丸，用黑芝麻好，与茄子一起放入当天熬成的滋补基础汤中同烩至熟。"}, "红糖甜酒荷包鸡蛋": {"ingredients": "鸡蛋1个，红糖1匙，糯米甜酒1碗，清水100毫升。\n☑ 做法：将\n糯米甜酒倒入锅中，加入清水和红糖搅拌均匀，烧开后磕入鸡蛋煮熟即可。\n## 每日小记\n当日服用的《产后中药滋补方》的药方已有改变，需要加入1只白鸡或乌鸡（去皮去油），请仔细看说明。\n从一些中医专家处搜集到的各种水果的性质、功效及食用禁忌：\n橙子：性凉，健脾开胃，清热解毒，有助于铁的吸收、加速伤口愈合，但胃炎、贫血、胆囊炎患者不宜食用。\n葡萄：性平，补气血，暖胃健脾，\n利尿消肿，舒筋活血，能加快术后者康复，糖尿病患者不宜食用。\n苹果：性凉，能减轻慢性腹泻、呕吐、胃炎，但肾炎、糖尿病、痛经患者不宜食用。\n菠萝：性平，生津止渴，消炎消水肿，消食开胃，但肾病、皮肤病、溃疡病患者不宜食用。\n猕猴桃：性寒，解热止渴，利尿消肿，开胃解毒，可防便秘、痔疮、乳痛，但食用猕猴桃时不要与奶制品、牛奶同食。\n樱桃：性温，\n益气养颜，能消除面\n斑与皱纹，最适合孕产\n食用。\n草莓：性凉，利咽生津，滋养补血，清热止咳，明目养肝，因含草酸钙较多，尿路结石患者不宜多吃。\n到了第10天，产妇在自己房间这个有限的空间待久了，可能会觉得无聊，这时家人可与她一起\n妇补血、治崩漏，有助于产后出血过多、周身痛的治疗，但怀孕期间宜少吃，热性咳嗽发热时忌食。\n讨论满月后的计划，比如出月子后第一个周末去\n香蕉：性寒，清热生津，润肠通便，解除抑郁，助安睡，但口淡胃胀、泄泻易晕者以及怀孕期脚肿者不宜\n子后第一个周末去哪里、准备怎么庆祝一下、想去哪家餐馆吃饭等，然后开始将这些计划逐步落实，产妇可以参与其中，比\n预订餐馆、预约去朋友家拜访的时间，以及规划去海边朋友家住两天的线路、需携带的物品及礼物、聚会的具体内容等。\n提示：今日的中药方要煲3小时。\n## 用餐计划\n7:30：热牛奶1杯，抹上果酱的全麦面包2块，煎鸡蛋1个。\n10:00: 当日滋补基础汤1碗，米饭1碗。\n11:30：《产后中药滋补方》\n第三方药汤1碗（制作方法见本书附录）。\n12:30: 水果1盘。\n16:00：乌鸡肉丝炒嫩荷兰豆，米饭1碗。\n17:00：《产后中药滋补方》\n第三方药汤1碗。\n17:30：坚果1小碟（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "滋补基础汤：木瓜鱼汤": {"ingredients": "鲫鱼1条，木瓜半个，\n猪排3根，姜少许，米酒水200克，\n青菜少许。", "steps": "◇猪排焯水、逼出血水；鲫鱼去鳞去鳃去内脏、处理干净。\n◇将所有原料（除青菜外）放入瓦罐中，加清水1200克，用小火煲3小时。", "notes": "鲫鱼肉质细嫩，肉味甜美，营养价值很高。产妇食鲫鱼汤，既可以补虚，又有通乳催奶的功效。\n备注：本菜品做法，与第5天排骨木瓜鲫鱼汤类似，可参考。食用时，在汤中加进青菜少许。"}, "乌鸡肉丝炒嫩荷兰豆": {"ingredients": "《产后中药滋补方》\n第三方药汤中的）乌鸡肉100克，番茄50克，荷兰豆20克，葱段10克，姜丝5克，黑芝麻油1匙，米酒水50克。", "steps": "◇ 将当日中药汤（《产后中药滋补方》第三方）中的乌鸡肉掰成丝；番茄用热水烫后剥皮，切粒；\n◇锅置火上，烧干后倒入黑芝麻油烧热，下入葱段、姜丝、番茄粒爆锅，放入荷兰豆急炒，炒至七成熟时放入鸡丝拌炒，倒入米酒水炝锅，即可出锅。\n## 每日小记\n宝宝喝奶后一定要拍出嗝来，否则因吸奶时吸进空气，容易吐奶。拍嗝时，用手掌窝成空心，轻轻地从宝宝后背下部往上拍，拍出有声音的感觉，只要方法对了，就很容易拍出嗝来。\n宝宝洗澡，可加入艾叶水或金银花水。\n宝宝换完尿布及洗澡后，要抹婴儿护肤霜。\n给产妇的冲淋、电吹风热风挡吹干，一定要坚持到满月，到产后15天后可以不用精油冲淋，可改用金银花水或艾叶水冲洗。\n今天服《产后中药滋补方》\n第三方，功效为补血润肠、畅通大便。\n## 用餐计划\n7:30：热牛奶1杯，抹上果酱的全麦面包2块，煎鸡蛋1个。\nG:30：《产后中药滋补方》第二方药汤1碗（汤药中的乌鸡想吃多少吃多少，不要勉强）。\n11:30：番茄烧鳕鱼，配米饭。\n12:30: 水果1盘。\n16:00：乌鸡肉丝炒参芹，配米饭。\n17:00：《产后中药滋补方》\n第二方药汤1碗。\n17:30：坚果1小碟（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）。\n19:00: 桂圆甜酒枸杞1碗。\n## 妈妈下厨"}, "番茄烧鳕鱼": {"ingredients": "番茄2个，鳕鱼1块（约100克），芦笋4根，生粉3克，老姜丝5克，米酒水10克，葱丝3克，黑芝麻油3克。", "steps": "番茄用开\n水泡过，剥皮切\n块；芦笋切段。\n◇锅内倒入黑芝麻\n麻油烧热，放入姜丝、葱\n麻油烧热，放入姜丝、葱\n丝爆锅，下入番茄熬成汁，再将鳕鱼\n裹上生粉，下入锅中用番茄汁熬制，\n熬至快熟时放入芦笋段、米酒水，约\n2分钟后出锅。"}, "乌鸡肉丝炒参芹": {"ingredients": "（当日中药汤中的）乌鸡肉100克，海参1个（切丝），西芹20克（切段），葱段5克，姜丝5克，米酒水20毫升，黑芝麻油1匙。", "steps": "◇将当日中药汤（《产后中药滋补方》第二方）中的乌鸡肉掰成丝。\n锅置火上，烧干后倒入黑芝麻\n油烧热，下入葱段、姜丝爆锅，放入海参爆炒3分钟，放入西芹，炒至七成熟时放入乌鸡肉丝拌炒，再放米酒水炝锅，即可出锅。"}, "桂圆甜酒枸杞": {"ingredients": "红糖1匙，桂圆5粒，糯米甜酒1碗，枸杞2克。", "steps": "取一小锅，加入糯米甜酒、枸杞、桂圆、红糖、清水搅匀，烧开即可。\n备注：本菜品做法，与第4天红糖桂圆糯米甜酒类似，可参考。\n## 每日小记\n产妇可在家中多走动，坚持做医生指导的体形恢复操，具体做法为：\n第1组：呼吸运动。去枕平卧，双手放在腹部，吸气时腹部肌肉尽量收缩，呼气时尽量放松。\n第2组：提肛运动。吸气时收缩肛门括约肌，呼气时尽量放松。\n第3组：臀部运动。吸气时臀部及骨盆底肌肉收缩，呼气时放松。\n第4组：抬头运动。吸气时下巴尽量上抬，呼气时下巴尽量向胸部靠拢。\n第5组：仰卧起坐。两腿屈曲，双手平伸，吸气时尽量使头和上半身抬离床面，并尽量靠向双腿，呼气时身体缓缓平躺。\n第6组：腿部运动。吸气时一脚底平贴床面曲腿，脚后跟尽量靠近臀部，呼气时缓缓将腿伸直；然后换腿，动作同前。\n需要注意的是，如是剖宫产，在练习仰卧起坐这个动作时需注意腹部伤口，量力而行，锻炼中以不累及伤口为准。产妇（顺产者1天后，剖宫产者2天后）可在床上进行产后恢复体操锻炼，每天2次，每组8次。\n腹带要坚持绑。\n家人可以与产妇讨论、设计宝宝的影集创意。\n## 用餐计划\n7:30：热牛奶1杯，抹上果酱的全麦面包2块，煎鸡蛋1个。\nG:30：《产后中药滋补方》\n第二方药汤1碗。\n11:30：四季豆番茄炒虾，配米饭。\n12:30: 水果1盘。\n16:00: 雪蛤红枣百合鱼片汤，配米饭。\n17:00：《产后中药滋补方》\n第二方药汤1碗。\n17:30：坚果1小碟（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "四 季豆番茄炒虾": {"ingredients": "四季豆100克，虾100克，\n番茄1个，老姜丝5克，葱段3克，\n米酒水10克，黑芝麻油1匙。", "steps": "◇虾去肠留皮、处理干净。\n◇锅内倒入黑芝麻油烧热，放入姜丝、葱段爆锅，下入四季豆、番茄急炒，炒至五成熟后倒入米酒水焖5分钟，再下入去肠的带皮虾，与四季豆、番茄同炒，约2分钟后出锅。"}, "雪蛤红枣百合鱼片汤": {"ingredients": "干雪蛤1个，红枣8颗，百合20克，生鱼片200克，猪肉片100克，老姜丝5克，米酒水30克，黑芝麻油、葱段、生粉各少许。", "steps": "◇将干雪蛤用清水浸透约2小时，除去杂质；红枣去核，百合洗净，生鱼片用生粉拌好。\n◇锅置火上烧干，倒入黑芝麻油烧热，下入葱段、姜丝爆锅，放入生鱼片、猪肉片爆炒，2分钟后下入雪蛤爆锅，倒入米酒水，放入红枣、百合，加入清水500毫升，焖熟即可。\n## 每日小记\n雪蛤能治产后虚弱、神经衰弱、口干、虚热，产后气虚者最宜多吃。生鱼片对产后痔疮、皮肤病、水肿、恶露不绝等都有改善作用。\n各类蔬菜的性质归纳：\n菠菜：性凉。养血，止血。富含钙、铁、维生素C、维生素K。对贫血、体弱、便秘、有热毒的人非常好。喂母乳者可多吃菠菜，通过母乳吸收可助新生儿避免肠出血、脑出血。但肾炎、肾结石患者忌。\n黄芽白：性平。清热解毒，消肿止痛，利尿通便。但气虚、胃寒的人宜少食。\n胡萝卜：性平。补血健脾，养肝明目，顺气止咳。因胡萝卜素只溶解于动物脂肪，所以须与肉类同煮。无禁忌，但多食皮肤容易发黄。\n芹菜：清热，降血压，降血脂，降胆固醇，抗癌，利尿，通便。因含钙量高于牛奶，含铁量也比猪肉、牛肉高3倍，因此是可多吃的蔬菜。但脾胃虚寒、小便多、血压过低者忌食。\n通菜（空心菜）：解热毒，凉血利尿。通菜含钙量比牛肉高约16倍，含铁量也比牛肉高，叶酸含量比牛肉高20倍。若产妇平日体质过热，产后吃通菜很好，可使恶露正常、乳汁畅顺，加速体力恢复。无禁忌。\n黄瓜：性凉。清热止渴，利水消肿。大便易泄者、虚寒体质者以及结肠炎、胃溃疡患者宜少食。\n茼蒿：性平。润肺消炎，养心清血，可防产后失眠、便秘。\n丝瓜：性凉。清热化痰，安胎通乳。产后常吃丝瓜，可令乳汁畅顺，对新生儿大脑发育有帮助。脾胃寒虚、容易腹泻者忌食。\n西兰花：性平。防止产后出血过多，以及皮肤未受碰撞或受轻微碰撞便青瘀。痛风患者忌食。\n茄子：性凉。清热凉血，活血祛瘀，利尿消肿，解毒，软化血管。脾胃虚寒、易腹泻者不宜食用。\n葱：性温。发汗解表，祛痰利尿，安胎止血，通乳汁，治乳痛。\n南瓜：性温。开胃健脾，补中益气，改善贫血，强心，最适合糖尿病患者。产妇可多吃，因南瓜含叶酸特别丰富，对新生儿大脑发育有帮助，还可防便秘。\n生姜：性温。散寒解表，温肺止咳，破血祛瘀。产妇食姜，不但能驱除生产时感受的风寒，保障坐月子时肠胃正常，也能帮助排除瘀血，使恶露排出正常。肺热爆咳、胃热呕吐、自汗盗汗时忌食。\n花菜：性平。治咳嗽，防止皮下出血。多吃花菜可预防乳腺癌、直肠癌。痛风患者忌食。\n淮山：性平。健脾补肺，助筋骨。产后多食可防腰酸疲软、口渴尿多。便秘、腹胀者不宜多食。\n洋葱：性温。温肺化痰，降血糖，降血脂，抗癌，预防骨质疏松，推迟细胞老化，有抗老化作用。肺胃有热、口臭、口干、目矇、发热时忌食。\n不能坚持吃无盐食物的产妇，从本日开始在烹调时可以少量放点盐或生抽。\n## 用餐计划\n7:30：热牛奶1杯，抹上芝麻酱的全麦面包2块，煮鸡蛋1个。\n9:30：《产后中药滋补方》第三方药汤1碗。\n11:30：猪肝鸡丝菜心，配面条。\n12:30: 樱桃、葡萄1盘。\n16:00: 东星斑鱼片汤下涌菜，配椰子油红薯米饭。\n17:00：《产后中药滋补方》\n第三方药汤1碗。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "猪肝鸡丝菜心": {"ingredients": "挂面100克，猪肝50克，鸡丝20克（可用当日中药汤中的鸡肉），菜心30克，米酒水20毫升，\n生粉3克，老姜丝5克，青葱1根（切段），豆豉1克，黑芝麻油5克。", "steps": "◇ 挂面煮熟，盛\n入碗中待用（可加入少许面汤）。\n◇将猪肝切成很薄的薄片，放在滤瓢中用自来水流水将血水冲洗干净，沥干，加生粉拌匀。\n◇铁锅烧热，下入黑芝麻油、老姜丝、豆豉、青葱段爆锅，再将老姜丝、豆豉、青葱段捞出，下入拌好生粉的猪肝片爆炒2分钟，加入鸡丝和菜心继续炒2分钟，再加米酒水炝锅，出锅倒入盛面的碗中即可。"}, "东星斑鱼片汤下通菜": {"ingredients": "东星斑\n鱼1条，排骨200克，通菜（空心菜）100克，米酒水30毫升，生姜10克。", "steps": "◇将东星斑鱼宰杀、处理干净后，\n切片。\n◇将排骨斩件，焯水、洗净后加水熬汤，下鱼片与通菜，汤中放入米酒水与生姜，煮熟即可。\n## 每日小记\n部分海鲜、肉类性质归纳：\n海虾：性温。补肾壮阳、益胃下奶，富含蛋白质，含钙高，能治产后乳汁不足、腰膝酸软，产妇不妨多吃。易患风疹、皮肤瘙痒及一切皮肤病者忌食。\n海参：性平。补肾益精、润燥养血，含铁量、含钙量均高于猪肉、牛肉，且不含胆固醇，低脂肪，富含蛋白质。发热感冒、容易腹泄的人宜少食。\n黄花鱼：性平。健脾益气、益肾养阴，富含蛋白质和钙，脂肪含量低，易消化，适合病后、产后体虚者，乳汁不足、肾虚腰痛的产妇宜食。患疮毒时忌食。\n带鱼：性平。暖胃、补虚，适合产后乳汁不足、出血多及气虚所致的脱肛、胃下垂、乏力气短者。湿疹患者及皮肤过敏者忌食。\n草鱼：性温。暖胃和中、平降肝阳、祛风治痹、明目。适合体虚胃弱、营养不良者。有各种疮症者忌食。\n鳜鱼：性平。补气血、益脾胃，治产后气血不足、虚劳瘦弱、疲倦少食。寒湿体质者慎食。\n鲈鱼：性平。健脾胃、补肝肾、安五脏、益筋骨，产妇多食可缓解腰痛、令关节屈伸顺利。无禁忌。\n鲤鱼：性平。健脾、益胃、消肿、通乳、安胎，可改善产后乳汁不足、小便不利、水肿。风热感冒时忌食。\n甲鱼：性平。滋阴养肾、凉血补虚，含有丰富的蛋白质和铁，补血又止血，有内热、口干、烦躁或患肺结核、恶露过多的产妇最宜食用甲鱼。\n黄鳝：性温。补气养血、祛风湿，能治产后周身酸痛、小便次数多、尿量少、腰痛、双膝无力。感冒、发热、高血压患者勿食。\n鸡肉：性温。温中益气、补精益髓，治产后乳少、小便多、水肿、腰膝酸软疼痛。产后便秘、人感热烦、发热外感、咳嗽时忌食。\n鸡蛋：性平。补气养血、滋阴润燥，能治愈产后乳少、心烦失眠、潮热、盗汗、口干、声音沙哑及产后一切虚弱症状。外感发热、食滞\n胃胀者忌食。\n鸭肉：性平。滋阴补血、益气利水，适合内热、手热、烦躁失眠、便秘、腰酸痛、浮肿、口干的产妇食用。外感未清、大便稀溏、手脚冰冷、特别怕冷者宜少食。\n鸭蛋：性凉。清肺止咳、滋阴平肝，能治产后肚泄、肠炎以及肝火旺所致的头痛、眩晕、咽喉痛、咳嗽等。阳虚怕冷、食后气滞胃胀者少食或忌食。\n鸽肉：性平。补气滋肾、健脾养阴、解毒祛风，适合产后虚劳、口干、皮肤瘙痒、头发脱落、疲倦、腰膝酸软、健忘、无胃口者食用。产后出血多时宜少食。\n鹤鹑：性平。补益中气、强壮筋骨，补五脏、止泻痢。产后腰膝酸软、水肿尿少、血压高、易染感冒咳嗽者吃鹤鹑可改善。无禁忌。\n牛肉：性温。补益脾胃，养气血，强筋骨。产后脾胃虚弱、人瘦无力、腰膝酸软、易泻、脱肛、尿少水肿者可常食。皮肤瘙痒及其他皮肤病患者忌食，高血压、肥胖患者忌食，怀孕中后期宜少食。\n猪肉：性平。益气健脾、滋阴润燥，能治产后气血不足、瘦弱、乳汁不足、口干、干咳、便秘、肌肤干枯、虚肿。肥胖、高血压、泄热痰多患者宜少食。\n猪肝：性温。养肝明目、健脾补血，治产后脾胃虚弱、肝虚目矇、脚气浮肿、水肿、脱肛、贫血、乳汁不下。口干舌燥、有内热烦躁时勿食。\n猪蹄：性平。补气通乳、润泽肌肤，治产后缺奶、气血不足、腰膝酸软，产后食用可使受喂养的婴儿皮肤也得到滋养，减少产妇关节疾病、预防骨质疏松。产妇不喂养母乳时忌食，以避免乳汁不断。\n羊肉：性温。益气养血，补肾壮阳，暖脾胃。产后自觉寒冷、生产出血过多致脸色苍白、手脚冰凉、腰膝酸软无力、讲话有气无力、乳汁不足、肚内有寒痛、小便多者可多食。羊肉温热，夏天不宜食。一向内热、手足发热、肥胖者，皮肤病、外感发热患者以及孕妇忌食。\n本日产后滋补中药调理药汤为第三药方。\n## 用餐计划\n7:30：热牛奶1杯，抹上花生酱的全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第二方药汤1碗。\n11:30：鲍鱼冬菇猪骨枸杞汤下面条。\n12:30: 水果1盘。\n16:00：上午的鲍鱼冬菇猪骨枸杞汤烩西兰花，配椰子油红薯米饭。\n17:00：《产后中药滋补方》\n第二方药汤1碗。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "鲍鱼冬菇猪骨枸杞汤": {"ingredients": "鲜鲍鱼2只，猪筒子骨1副，冬菇4个，枸杞5克，红枣3颗，老姜片5克，米酒水150毫升。", "steps": "将鲜鲍鱼、猪筒子骨焯水、逼出血水后洗净。\n◇将所有食材放入炖盅内，加清水1000毫升，炖4个小时即可，食用时也可加入青菜。", "notes": "鲍鱼含有丰富的蛋白质，还含有较多的钙、铁、碘和维生素A等营养元素，具有滋阴补阳的功效，并是一种补而不燥的海产品。"}, "汤烩西兰花（mama）": {"ingredients": "上午制作的鲍鱼冬菇猪骨枸杞汤1碗，西兰花150克，姜末5克，葱花5克。", "steps": "西兰花洗净切块，与姜末、葱花一起放入鲍鱼汤中煮熟即可。\n备注：本菜品与第5天汤烩西兰花类似，可参考。\n## 每日小记\n每日膳食应营养均衡，要有肉类或鱼类补充动物蛋白，要有蔬菜、水果、坚果等补充维生素、微量元素、膳食纤维，要有奶制品，要有海参、鱼胶、猪蹄等补充胶原蛋白，要有各类粥、米饭、面条、馒头、花卷等补充碳水化合物。\n产妇经过2周的休养，伤口基本愈合，腰及下腹的酸胀已大为减轻，体力慢慢恢复，这时可以洗头洗澡了，但洗头后应迅速用电吹风吹干，洗澡后迅速用事先放在暖气片上温热过的大毛巾擦干身体。\n家人要督促产妇坚持绑腹带，做复原健身操。\n## 用餐计划\n7:30: 热牛奶1杯，馒头2个，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第二方药汤1碗。\n12:30: 水果1盘。\n11:30：鳕鱼肉饼，番茄鸡蛋紫菜汤，配米饭。\n16:00：白菜海参煲，配椰子油红薯米饭。\n17:00：《产后中药滋补方》\n第二方药汤1碗。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n原料：鳕鱼200克，肉末100克，鸡蛋1个（取蛋清），姜丝5克，米酒水10毫升，生粉5克。"}, "番茄鸡蛋紫菜汤": {"ingredients": "番茄1个，鸡蛋1个，紫菜30克，葱末10克，当日中药汤（《产后中药滋补方》第二方药汤）2碗，黑芝麻油1匙。", "steps": "番茄洗净切丁，紫菜泡发。\n◇锅内倒入黑芝麻油烧热，下入葱末爆香，放入番茄炒熟，倒入中药汤和紫菜煮1分钟，慢慢倒入打散的鸡蛋并不断搅拌，\n再次烧开即可出锅。"}, "白菜海参煲": {"ingredients": "海参1根，瘦肉丝100克，嫩白菜100克，香菇5个，姜片5克，葱段5克，甜酒酿50毫升，黑芝麻油1匙。", "steps": "◇海参泡发，备用（海参泡法，请参照附录）。\n◇锅内倒入黑芝麻油烧热，下入姜片、葱段略为爆炒，放入海参、香菇，用大火炒1分钟，放入瘦肉丝，转中火炒3分钟，然后放甜酒酿炝锅，再放白\n菜拌炒1分钟，最后放清水150毫升焖熟即可。\n## 每日小记\n🍓 鳕鱼肉味甘美，营养丰富，肉中蛋白质占16.8%而脂肪只占0.5%。鳕鱼肝脏含油量高，除了富含普通鱼油所含有的DHA、DPA外，还含有人体所必需的维生素A、维生素D、维生素E和其他多种维生素。鳕鱼肝油中这些营养成分的比例，正是人体每天所需要量的最佳比例，可多吃鳕鱼。\n🍁 产妇可以接待闺蜜探访，缓解郁闷情绪。\n## 用餐计划\n7:30: 热牛奶1杯，包子2个，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第三方药汤1碗。\n10:30：当日滋补基础汤1碗。\n11:30：用当日滋补基础汤绘菠菜，配一碗面条。\n12:30: 水果1盘。\n16:00：用当日滋补基础汤中筒子骨上的肉炒佛手瓜与番茄，配小米黑米饭。\n17:00：《产后中药滋补方》\n第三方药汤1碗。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n250 克，\n姜10克，\n葱10克，\n米酒水\n100毫升。\n## 做法：\n◇猪肚洗净，切成一指宽的小段；\n猪筒子骨焯水洗净。\n◇将猪肚、猪筒子骨、姜、葱、米酒水放入瓦罐中，倒入清水500毫升，用大火烧开后转用慢火炖3小时即可。"}, "包子": {"steps": "◇将酵母用 $ 30^{\\circ} $C的温水溶化后，冲入面粉中，用筷子搅拌成面絮，再用手将面絮揉成光滑的面团，盖上一\n## 妈妈下厨\n滋补基础汤：猪肚筒子骨汤\n原料：猪肚1个，猪筒子骨\n块湿布，放置1小时，让面团发至2倍大即可。\n◇ 将包\n子馅原料（除橄榄油外）一起用绞肉机绞成碎末，倒入橄榄油拌匀，成馅料。\n◇将面团揉均匀，揉至表面光滑，分成10份，然后擀成中间厚、周边薄的圆面片，在面片底部沾些面粉（容易出纹路），包入馅料，收口。\n◇将包子放入蒸笼中（蒸笼要涂油，或放硅油纸），再次放置醒发30分钟，然后蒸10分钟左右，关火2分钟后即可。"}, "汤烩菠菜面条": {"ingredients": "当日滋补基础汤（含猪肚）1碗，菠菜50克，面条100克。", "steps": "◇将面条煮熟，盛入碗中待用。\n◇同时另起锅，倒入滋补基础汤烧开，下入菠菜烧开，出锅倒入盛面的碗中即可。"}, "筒子骨肉炒柿瓜": {"ingredients": "当日滋补基础汤1碗，（当日滋补基础汤中的）筒子骨肉、猪肚各50克，番茄50克，佛手瓜50克，米酒水50毫升，黑芝麻油1匙，姜末5克，葱末5克。", "steps": "◇将番茄切丁，佛\n手瓜切片。\n◇锅内放黑芝麻\n油烧热，下入姜末、\n葱末爆香，放入佛手\n瓜、番茄炒2分钟，然\n后加入筒子骨肉、猪肚炒1\n分钟，最后倒入米酒水、滋补基础汤，\n用慢火焖2分钟即可。\n## 每日小记\n月子里，猪肚、猪肾、猪肝可以多吃几次。\n随着喂奶量的增加，产妇饮食的量可适当增加，但为了不摄入太多脂肪，最好以增加蔬菜为主，不要增加肉类与主食类。\n提示：今日服用《产后中药滋补方》第三方，功效为补血润肠、通畅大便。汤药服用注意：肠胃不适、腹泻或感冒者不宜。"}, "滋补基础汤：羊肉淮山番茄汤": {"ingredients": "羊羔肉200克，淮山200克，土豆粉丝100克，番茄2个，香菇2个，老姜丝20克，米酒水50克，纯净水1500克。", "steps": "◇将羊羔肉剁块，清洗后过水，备用；番茄用开水烫，剥皮切块；香菇泡发后切块；淮山去皮洗净，切块。\n◇将所有原料（除淮山、土豆粉丝、番茄外）放进瓦煲内，用大火烧开后转小火煲两个半小时，再放入土豆粉丝、番茄与淮山，再煲半小时即可出锅。"}, "海参炒芽白梗": {"ingredients": "海参半根，芽白梗20克，香菇2个，木耳4朵，青葱1根，姜丝少许，黑芝麻油2匙，当日滋补基础汤1勺。", "steps": "◇将海参提前发好、煮好，切丝；芽白梗、青葱洗净，切段；香菇、木耳用冷水泡发。\n◇锅烧热，倒入黑芝麻油，下入\n姜丝、青葱段拌炒，接着放入海参爆炒，再放芽白梗、香菇、爆炒，炒至成色木耳爆炒，炒至成色差不多时，加入当日滋补基础汤1勺，即可出锅。"}, "番茄鸡蛋面": {"ingredients": "番茄1个，面条100克，鸡蛋2个，葱段少许，黑芝麻油1匙，当日滋补基础汤1碗。", "steps": "◇将番茄（要买那种能炒出水来的番茄，不要买那种硬的）用开水烫后，剥掉外皮（注意用开水烫是有讲究的，要烫得恰到好处，一是开水要滚，二是开水要淹过番茄，三是不能烫久，烫的时间不够皮剥不掉，烫久了番茄蔫了就不好吃了）；鸡蛋打成鸡蛋液。\n◇同时起两锅，一锅加清水，下面条煮熟。\n◇另一锅烧热，倒入黑芝麻油，接着倒入鸡蛋液，边倒边炒，炒至七成熟时，下入番茄充分搅拌，成色差不多时放入葱段，倒入当日滋补基础汤，再加入煮好的面条搅拌，即可出锅食用。\n## 每日小记\n羊肉为温补食物，尤其冬天可多吃两次。\n因为产妇应尽量不吃盐或少吃盐，加之需要发奶，所以每天饮食靠炖汤来调节口味与发奶，同时汤水也便于吸收。产妇如果吃不好也会心情不好，所以口味很重要，每天煲的汤就是配其他菜的美味万能调料。\n今日服用《产后中药滋补方》\n第二方药汤，注意如有感冒症状时，\n炖药汤时不要加入肉类，少吃羊肉。\n## 用餐计划\n7:30: 热牛奶1杯，煎饼2块，煎鸡蛋1个。\nG:30：《产后中药滋补方》\n第二方药汤1碗。\n11:30：当日滋补基础汤以及汤料1碗（鸡腿1只，少许马蹄、胡萝卜等），茄子烩三文鱼，水煮芦笋（做法参考第7天），红米饭1碗。\n12:30: 水果1盘。\n16:00：鸭丝黄瓜面条。\n17:00：《产后中药滋补方》\n第二方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥（加入绿豆）\n1碗。\n由放养吃玉米的鸡）1只，马蹄8个，胡萝卜2根，大无花果1个，香菇2个，米克，老姜30克，纯净水1800毫升。\n做法：\n◇将鱼胶先泡2天，清洗后过水、切段；土鸡宰杀、处理干净，去皮去油后过水，剁块；马蹄削皮，切成小块；胡萝卜削皮清洗后，切成小丁；无花果与香菇清洗后切成丁；老姜切块。\n◇将所有食材倒入瓦煲中，用大火烧开后转小火再煲3小时即可（也\n可用炖盅隔水炖，\n隔水炖不会走气，这样能更好、更充分地保留食材的营养）。\n## 妈妈下厨"}, "滋补基础汤：鱼胶土鸡汤": {"ingredients": "鱼胶200克，土鸡（自"}, "茄子烩三文鱼": {"ingredients": "茄子100克，三文鱼200克，姜丝、大蒜片少许，黑芝麻油1匙，当日滋补基础汤2勺。", "steps": "◇将茄子清洗后削皮，切成条，\n直接蒸至完全熟透，备用；三文鱼清洗后切成块。\n◇锅内放黑芝麻油烧热，下入姜丝、大蒜片爆锅，放入三文鱼爆炒2分钟，放入蒸好的茄子拌炒3分钟，浇上当日滋补基础汤2勺（大汤勺），焖3~4分钟即可出锅。"}, "鸭丝黄瓜面条": {"ingredients": "鸭丝200克，黄瓜1/3根，香菇1个，水发木耳2朵，姜丝5克，生粉5克，甜酒酿50毫升，黑芝麻油1匙，当日滋补基础汤2勺，大蒜片少许。\n◇将黄瓜、香菇、木耳切丝；将鸭丝用生粉、甜酒酿拌匀（也可略加生抽）。", "steps": "◇同时起两锅，一锅加清水烧开，下入面条煮熟。\n◇另一锅内\n倒黑芝麻油烧热，\n下入姜丝、大蒜片爆锅，放\n入鸭丝爆炒至七成熟，放入香菇丝、\n木耳丝略炒，再放入黄瓜丝拌炒，快\n出锅时加入当天的滋补基础汤2勺，\n略烩一会即可出锅，浇在煮好的面条\n上即可食用。\n## 每日小记\n产妇体力进一步恢复，产后体形恢复操可以多做一次。\n因女儿有些上火、嗓子疼，\n故在汤料中加入马蹄，在杂粮粥中\n加入绿豆，马蹄与绿豆都有清火作用。\n产妇看报、看书或看手机的时间，每天控制在1小时内，其余时间家人多陪她谈话，在她休息好之后要及时出现在她面前，否则她容易又看手机，长时间盯着屏幕对视力不利。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第四方药汤1碗（制作方法见本书附录）。\n11:30: 汤绘通菜，配面条1碗。\n12:30: 水果1盘。\n16:00：清炒杂菜，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。"}, "滋补基础汤：牛尾黄豆番茄汤": {"ingredients": "牛尾200克，黄豆20克，番茄2个，胡萝卜2根，香菇2个，小土豆6个，老姜、米酒各少许，纯\n## 妈妈下厨\n◇牛尾清\n洗后过水，黄豆泡好，番茄去皮后切成两半，胡萝卜清洗干净后去皮、切块，香菇泡发、清洗后切成块，小土豆去皮后切成两半。\n◇将所有原料一同放入瓦煲内，用大火烧滚后转小火煲4小时，至牛尾肉与骨头能自动分离即可。\n原料：当日滋补基础汤1碗，通菜（空心菜）200克。", "steps": "净水2000克。"}, "汤烩通菜": {"steps": "锅内倒入当日滋补基础汤烧开，将通菜洗净切段，下入锅中，用小火焖熟即可。"}, "清炒杂菜": {"ingredients": "海参（煮熟）半根，番茄半个，黄瓜半根，鸡蛋1个，黑芝麻油5克，当日滋补基础汤1勺，马蹄片、姜丝各少许。", "steps": "◇将番茄切丁，黄瓜切片，海参切丝，鸡蛋煮熟后剥壳切片。\n◇锅烧热，倒入黑芝麻油，再放入姜丝、鸡蛋圈片煎炒，接着放入海参丝爆炒，再放入马蹄片，最后放入番茄丁、黄瓜片拌炒，加入滋补基础汤，用大火烩2分钟即可出锅。\n## 每日小记\n宝宝可每两天洗一次澡与头，不洗澡的那天就用棉布擦擦身体，主要是腋窝、肘窝、膝窝、脖子、耳后。皮肤不太好时就用艾叶水烧开，晾温后再洗。\n产妇可能会要求吃些口味更重的食物，这时需要做些沟通，可以让她适当吃些口味菜，但为了自身及宝宝的健康，需要克制和忍耐，不能吃辛辣食物。坐月子是女人一生中非常难得的身体调养期，身体的免疫功能、排毒功能如果在此期间调养好了，将终身受益。由于我们家的月子餐确实美味可口，同时女儿自己也懂月子养生的重要，而且为了宝宝喝奶的需要，所以口味清淡一直坚持得很好。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第四方药汤1碗。\n11:30: 青菜疙瘩汤1碗。\n12:30: 水果1盘。\n16:00：猪骨肉炒西兰花，滋补基础汤及汤料1碗，配米饭。\n17:00：《产后中药滋补方》第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n骨100克，米酒水100毫升，姜丝10克，葱花10克，开水500毫升，橄榄油3匙。\n做法：\n◇猪骨过水，洗净\n待用。\n◇炒锅内倒入橄榄油，烧热后下入三文鱼头，煎至微黄，加入开水，煮至鱼汤变白，把三文鱼头及白汤倒入汤锅中，并放入猪骨、豆腐、番茄、米酒水、姜、葱，用大火炖10分钟后改小火炖1小时即可。"}, "青菜疙瘩汤": {"ingredients": "当日滋补基础汤2碗，面粉100克，番茄50克，青菜50克。", "steps": "## 妈妈下厨"}, "滋补基础汤： 三文鱼头猪骨豆腐番茄汤": {"ingredients": "三文鱼头1个，豆腐250克（切块），番茄2个（切块），猪\n◇锅内倒入当日滋补基础汤，烧开后放入番茄、青菜，熬煮一会。\n◇将面粉放在碗里，加少量清水搅成疙瘩，逐个倒入煮开的汤中，煮滚即可。"}, "猪骨肉炒西兰花": {"ingredients": "当日滋补基础汤1碗，（当日滋补基础汤中的）猪骨肉50克，西兰花100克，黑芝麻油1匙，蒜蓉5克。", "steps": "锅中倒入黑芝麻油烧热，下入蒜蓉爆香，下入西兰花、猪骨肉炒2分钟，然后倒入当日滋补基础汤，待西兰花煮熟即可。\n## 每日小记\n三文鱼及三文鱼头含有婴儿发育需要的营养。三文鱼是高蛋白、低热量的健康食品，含有多种维生素以及钙、铁、锌、镁、磷等矿物质，还含有丰富的不饱和脂肪酸，其肝油中富含维生素D等，能促进机体对钙的吸收利用，有助于生长发育，所以怀孕及产后可以多吃几次。\n就餐时间要逐步形成规律，可根据自己与婴儿的作息时间来调整。\n今日服用《产后滋补中药方》\n第四方，主要功效为壮腰补肾。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\nG: 30: 《产后中药滋补方》\n第四方药汤1碗。\n11:30：土豆烩青菜，米饭1碗。\n12:30: 水果1盘。\n16:00：猪骨肉炒胡萝卜丝，滋补基础汤及汤料1碗，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n葱段10克，米酒水100毫升。\n做法：\n◇鱼肚先\n浸泡2天（放入\n沸水中煮20分钟，\n冷却后用冷水浸泡2天，\n每天换水），然后切成1指宽的小段；\n排骨过水。\n◇汤锅中放入排骨、鱼肚、玉米（切成3段）、杜仲、姜片、葱段、米酒水及500毫升清水，开大火烧开后转慢火炖1个半小时即可。"}, "土豆烩青菜": {"ingredients": "土豆1个（切片），青菜100克，当日滋补基础汤1碗，蒜蓉5克，黑芝麻油1匙。\n## 妈妈下厨"}, "滋补基础汤：猪排鱼肚玉米杜仲汤": {"ingredients": "猪排骨200克，鱼肚100克，玉米1根，杜仲10克，姜片10克，", "steps": "锅中倒入黑芝麻油烧热，下入蒜蓉爆香，倒入土豆炒3分钟，倒入当日滋补基础汤、青菜，煮熟即可。"}, "猪骨肉炒胡萝卜丝": {"ingredients": "（当日滋补基础汤中的）\n猪骨肉50克，胡萝卜1个（切丝），\n蒜蓉5克，黑芝麻油1匙。", "steps": "锅内放黑芝麻油烧热，\n下入蒜蓉爆香，倒入胡萝卜丝和猪骨\n肉，炒至胡萝卜丝变软即可。\n## 每日小记\n鱼肚营养价值很高，含有丰富的蛋白质、脂肪、磷质及钙质，主要营养成分是黏性胶体高级蛋白和多糖物质，对人体各部分均有补益功效。\n杜仲强筋健骨，能减轻各种酸胀痛，虽然产后滋补方中也配有杜仲，但还是多吃一次比较好。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\nChanhou Di 23 Tian\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第四方药汤1碗。\n11:30：豆腐焖白菜，米饭1碗。\n12:30: 水果1盘。\n16:00：胡萝卜丝炒肉丝，当日滋补基础汤及汤料1碗，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "滋补基础汤：猪蹄黄花鱼汤": {"ingredients": "猪蹄1个，黄花鱼1条，姜片10克，葱段10克，米酒水100毫升。", "steps": "◇猪蹄去毛、刮皮、剁块，过水待用；黄花鱼洗净切块。\n◇汤锅中加入猪蹄、黄花鱼、姜片、葱段、米酒水，加清水没过锅中原料，用大火烧开后转用小火慢炖2小时左右即可。"}, "豆腐焖白菜": {"ingredients": "白菜100克，老豆腐100克，当日滋补基础汤1碗，葱花3克，蒜蓉5克，黑芝麻油1匙。", "steps": "豆腐、白菜\n切块。\n◇锅内\n放黑芝麻油\n烧热，下入\n葱花、蒜蓉爆\n香，加入白菜\n炒1分钟，再加入豆腐翻炒1分钟，最后倒入滋补基础汤烧开，待白菜煮熟即可。"}, "胡萝卜丝炒肉丝": {"ingredients": "猪肉100克，胡萝卜1根，\n姜末5克，葱花5克，蒜蓉5克，生粉5克，黑芝麻油1匙。", "steps": "◇猪肉切丝，放入生粉中搅匀；胡萝卜切丝。\n◇锅内放黑芝麻油烧热，下入姜末、葱花、蒜蓉爆香，加入猪肉丝爆炒1分钟，倒入胡萝卜丝炒至变软即可。\n备注：本菜品做法，与第22天猪骨肉炒胡萝卜丝类似，可参考。\n## 每日小记\n服用该阶段的产后中药滋补药汤后如有肠胃不适、腹泻或感冒，宜停用。\n由于不能放盐调味，所以汤料必须味足，需要多加进食材，增加不同口味。\n猪蹄黄花鱼汤的烹饪方法与之前炖汤方法相同，猪蹄、黄花鱼的功效也在前面谈过。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第四方药汤1碗。\n11:30：红枣桂圆蒸鸡肉，青菜汤，米饭1碗。\n12:30: 水果1盘。\n16:00：烩菜，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "红枣桂圆蒸鸡肉": {"ingredients": "（当日产后中药滋补药汤中的）鸡肉100克，红枣3粒，桂圆5粒。", "steps": "红枣、桂圆洗净后，用温水浸泡半小时，然后捞出沥干，与鸡肉一起放入碗中，上火蒸10分钟即可。"}, "青菜汤": {"ingredients": "当日中药汤（《产后中药滋补方》第四方）1碗，青菜150克。", "steps": "将青菜放入中药汤中煮熟即可。"}, "烩菜": {"ingredients": "里脊肉50克，佛手瓜50\n克，番茄50克，白菜50克，姜末5克，葱末5克，蒜蓉5克，黑芝麻油1匙，生粉5克。", "steps": "◇里脊肉切丝，用生粉搅拌均匀；佛手瓜切片，番茄切丁，白菜撕片。\n◇锅内放黑芝麻油烧热，下入姜末、葱末、蒜蓉爆香，下入里脊肉爆炒2分钟，然后放入佛手瓜、番茄、白菜一起翻炒2分钟，倒入100毫升水，加盖，用中火焖熟即可。\n## 每日小记\n蔬菜可根据当地情况多样化选择，因为我们在伦敦，难以买到更多品种的蔬菜，许多食材还是我们从国内带到伦敦的。国内的产妇有条件，可以吃到更多更好的时令蔬菜。\n牛奶选用半脂的新鲜奶即可，即超市里保质期7天的鲜奶。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\n## 用餐计划\n7:30：热牛奶1杯，鸡蛋煎饼2块。\nG:30：《产后中药滋补方》\n第四方药汤1碗。\n11:30: 龙虾焗面。\n12:30: 水果1盘。\n16:00：黄瓜丝炒青豆，粉蒸排骨，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n◇将龙虾清洗干净，剁块，撒点生粉，下入油锅过一下油，待龙虾壳转红、虾肉开始变白便可捞起，滤油。\n◇将伊面放进滚水里煮1~2分钟，捞起滤水，装盘备用。\n◇锅内放黑芝麻油烧热，下入葱末、姜末略炒，加水（或高汤）、奶酪，搅拌至奶酪全部溶"}, "黄瓜丝炒青豆": {"ingredients": "黄瓜半根，青豆100克，蒜蓉10克，黑芝麻油1匙。", "steps": "☐黄瓜切丝。\n◇锅内放黑芝麻油烧热，下入蒜蓉爆香，倒入黄瓜丝和青豆炒4~5分钟即可。"}, "粉蒸排骨": {"ingredients": "排骨200克，土豆1个，\n蒸肉粉200克（可从超市购买）。", "steps": "☐排骨剁块、过水，土豆切块。\n◇将蒸肉粉倒入碗中，加入100毫升水搅拌均匀，然后倒入排骨和土豆一起搅拌，让蒸肉粉均匀地包裹在排骨和土豆外面，最后放入高压锅中用中火蒸20分钟即可。\n## 每日小记\n有些菜式做法相似，烹饪方法大家看前面的即可。因为不能放盐与调料，所以全靠食材本身的鲜味与火候以及米酒水、甜酒酿来提味。\n龙虾是高蛋白、低脂肪的食物，蛋白含量达16%~20%，脂肪含量不到0.2%，所含的脂肪主要是由不饱和脂肪酸组成的，易被人体吸收。龙虾肉的锌、碘、硒等微量元素含量要高于其他食品，同时，龙虾肉的肌纤维细嫩，易于消化吸收。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\n# 产后第26天\nChanhou Di 26 Tian\n## 用餐计划\n7:30：热牛奶1杯，鸡蛋煎饼2块。\nG:30：《产后中药滋补方》\n第四方药汤1碗。\n11:30：苋菜汤，配米饭。\n12:30: 水果1盘。\n16:00: 鸭丝炒通菜，配米饭。\n17:00：《产后中药滋补方》\n第四方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "滋补基础汤： 老鸭黄豆汤": {"ingredients": "老鸭1只（约2000克，鸭越老越好，土鸭即可），猪里脊肉50克，黄豆20克（泡发），无花果1枚，虫草3根，菜心1根，姜块5克，米酒水30克。", "steps": "◇猪里脊肉去皮去油脂，过水、\n逼出血水；老鸭宰杀、处理干净，过水。\n◇将鸭肉、猪肉放入\n炖盘中，加入黄豆、无花果、虫草、菜心、姜块、米酒水，隔水炖5小时即可。"}, "苋菜汤": {"ingredients": "当日滋补基础汤1碗，\n苋菜100克。", "steps": "锅内放当日滋补基础汤烧开，将苋菜洗净切碎，下入锅中煮熟即可。"}, "鸭丝炒通菜": {"ingredients": "（当日滋补基础汤中的）\n鸭肉 50 克，通菜 100 克，姜末 5 克，\n葱末 5 克，马蹄片 50 克，木耳丝 20 克，\n青椒半个（不要太辣的），米酒水 50\n毫升，黑芝麻油 1 匙。", "steps": "◇将当日滋补基础汤中的鸭肉取出一部分，切丝；将通菜洗好切段，青椒切丝。\n◇锅内放黑芝麻油烧热，下入姜末、葱末爆锅，再放入马蹄片、木耳丝、青椒丝略炒，放入鸭肉丝拌炒，浇上米酒水稍熬一会，略加清水，烧开后加入通菜段，烧开即可出锅。\n## 每日小记\n老鸭不仅营养丰富，而且因其常年在水中生活，性偏凉，有滋五脏之阳、清虚劳之热、补血行水、养胃生津的功效。\n今日服用《产后中药滋补方》\n第四方，主要功效为壮腰补肾。\n我们家煲产后中药滋补药汤从不放盐，食材丰富、方法得当的话，不放盐亦有咸味。\n## 用餐计划\n7:30：热牛奶1杯，鸡蛋煎饼2块。\n9:30：《产后中药滋补方》\n第五方药汤1碗（制作方法见本书附录）。\n11:30：海参煲，配米饭。\n12:30: 水果1盘。\n16:00：马蹄木耳炒鸡肉，配面条。\n17:00：《产后中药滋补方》\n第五方药汤1碗。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n生粉5克。\n## 做法：\n◇海参切大块；猪肉切小块，用生粉抓匀；香菇泡发，切块。\n◇锅中倒入黑芝麻油2匙烧热，下入香菇、海米拌炒，捞出待用；锅中再加入黑芝麻油1匙烧热，下入姜丝爆香，倒入海参、猪肉，用大火猛炒1分钟，加入炒好的香菇、海米，撒入葱段，继续翻炒3~4分钟，加入100毫升水，煮开后把所有原料倒入沙锅中，改慢火煲40分钟即可。\n## 妈妈下厨"}, "海参煲": {"ingredients": "（泡发好的）海参3个，香菇3个，猪肉50克，海米10克，姜丝5克，葱段5克，黑芝麻油3匙，"}, "马蹄木耳炒鸡肉": {"ingredients": "马蹄5个，木耳50克，（当日中药汤中的）鸡肉50克，姜末5克，蒜蓉5克，黑芝麻油1匙。", "steps": "马蹄去皮切片，木耳洗净切块，\n鸡肉切丝。\n◇锅内放黑芝麻油烧热，下入姜末、蒜蓉爆香，倒入马蹄、木耳和鸡丝一起翻炒，待马蹄炒熟即可。\n## 每日小记\n马蹄（荸荠）口感甜脆，营养丰富，含有蛋白质、脂肪、粗纤维、胡萝卜素、B族维生素、维生素C、铁、钙、磷和碳水化合物，具有解毒、利尿等功效。马蹄中磷的含量是所有茎类蔬菜中最高的，磷元素可以促进人体发育，同时可以促进体内的糖、脂肪、蛋白质三大物质的代谢，调节酸碱平衡。全身水肿、小便不利、湿热黄疸、消化不良者宜食用马蹄。\n今日服用《产后中药滋补方》第五方，适用于产后第27～30天（共4剂），大补元气。\n## 用餐计划\n7:30: 热牛奶1杯，馒头2个，煮鸡蛋1个。\nG:30：《产后中药滋补方》\n第五方药汤1碗。\n11:30：滋补基础汤下青菜，配米饭。\n12:30: 水果1盘。\n16:00：滋补基础汤焖南瓜，配米饭。\n17:00：《产后中药滋补方》\n第五方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 妈妈下厨"}, "滋补基础汤： 鳕鱼猪骨海带腐竹汤": {"ingredients": "鳕鱼200克，猪骨100克，海带100克，腐竹50克，姜片5克，葱段5克。", "steps": "◇猪骨过水，海带切丝，腐竹切段，鳕鱼切块。\n◇汤锅中加入猪骨、海带、腐竹、姜片和葱段，倒入800毫升水，烧开后用慢火炖1个半小时，然后放入鳕鱼继续炖半小时即可。"}, "汤烩青菜": {"ingredients": "青菜150克，当日滋补基础汤1碗。", "steps": "锅内倒入当日滋补基础汤，下入青菜煮熟即可。"}, "汤焖南瓜": {"ingredients": "南瓜150克，当日滋补\n基础汤1碗。", "steps": "锅内倒入当日滋补基础汤，将南瓜去皮切块，放入滋补基础汤中用小火焖30分钟即可。\n## 每日小记\n今日服用《产后中药滋补方》第五方，适用于产后第27~30天（共4剂）。\n今日服用的产后中药滋补药汤大补元气，补气益肾。产妇产后服用，可以调补身体，大补气血，强健身体功能，并预防头晕耳鸣等不适。注意：喉咙燥、咽痛或患感冒者不宜。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》第五方药汤1碗。\n11:30：当日滋补基础汤，配米饭。\n12:30: 水果1盘。\n16:00：猪肚墨鱼炒芦笋，配米饭。\n17:00：《产后中药滋补方》\n第五方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n## 做法：\n新鲜墨鱼整只洗净（不用刮）；猪肚擦洗干净。\n◇将墨鱼、猪肚放入煲锅，放入姜片，加水3碗（750毫升），煲3小时后下入板栗、淮山，再煲30分钟即可。"}, "猪肚墨鱼炒芦笋": {"ingredients": "当日滋补基础汤1碗，（当日滋补基础汤中的）猪肚50克，（当日滋补基础汤中的）墨鱼50克，\n## 妈妈下厨"}, "滋补基础汤：猪肚墨鱼汤": {"ingredients": "墨鱼250克，猪肚250克，板栗10颗，淮山10小块，姜片5克。\n芦笋100克，姜末5克，黑芝麻油1匙。", "steps": "◇猪肚、墨鱼切丝；芦笋切段。\n◇锅内放黑芝麻油烧热，下入芦笋炒2分钟，然后加入猪肚丝、墨鱼丝、姜末同炒，再倒入当日滋补基础汤熬煮2分钟即可。\n## 每日小记\n墨鱼味咸、性平，入肝、肾经，具有养血、通经、催乳、补脾、益肾、滋阴、调经、止带之功效，含有碳水化合物、维生素A、B族维生素以及钙、磷、铁等人体所必需的物质，是一种高蛋白、低脂肪的滋补食品。\n板栗富含蛋白质、脂肪、碳水化合物、钙、磷、铁、锌以及多种维生素，有健脾养胃、补肾强筋、活血止血之功效。孕妇常吃板栗，不仅可以健身壮骨，而且有利于骨盆的发育成熟，还有消除疲劳的作用。\n今日服用《产后中药滋补方》第五方，适用于产后第27～30天（共4剂）。\n## 用餐计划\n7:30：热牛奶1杯，全麦面包2块，煎鸡蛋1个。\n9:30：《产后中药滋补方》\n第五方药汤1碗。\n11:30：当日滋补基础汤，配面条。\n12:30: 水果1盘。\n16:00：当日滋补基础汤及汤料（干豆角），配米饭。\n17:00：《产后中药滋补方》\n第五方药汤1碗及少许汤中鸡肉。\n17:30：坚果（蓝莓、松子、花生、巴达木、核桃、腰果、夏威夷果等）1小碟。\n19:00: 杂粮粥1碗。\n姜丝5克，黑芝麻油2匙。\n做法：\n◇将鲫鱼剖杀去鳞，清理干净，待用；鸡肉剁块。\n◇锅内放黑芝麻油烧至七八成热（油量要适宜，不要过多），下入姜丝爆出香味，下入鲫鱼煎炸至两面金黄（时间不宜太长，否则鱼肉会碎掉），倒入开水（切记一定是开水），放入鸡肉、苹果、干豆角，用大火煮开10分钟后，转小火再煮20分钟，待鱼汤变为浓白色时起锅，撒入葱花即可。\n## 妈妈下厨"}, "滋补基础汤： 鲫鱼苹果鸡肉干豆角汤": {"ingredients": "鲫鱼1条，鸡肉150克，苹果1个（切片），干豆角100克，\n## 每日小记\n豆角（豇豆）性味甘平，健胃补肾，含有易于消化吸收的蛋白、维生素A、维生素 $ B_{1} $、维生素 $ B_{2} $、维生素C、叶酸以及铁、镁、锰、磷、\n钾等矿物质，具有理中益气、健胃补肾、和五脏、调颜养生、生精髓、止消渴的功效。\n🍓 鲫鱼含有蛋白质、脂肪、维生素A、维生素 $ B_{1} $、维生素 $ B_{2} $、维生素 $ B_{12} $、烟酸、钙、磷、铁等成分，具有健脾、开胃、益气、利水、通乳、除湿之功效。\n如有便秘，可吃麻仁丸加药膳粥。做法：取核桃仁5个捣烂，桃仁20克去皮捣烂，黑芝麻20克炒熟研烂，蜂蜜50毫升，与适量粳米煮粥，早晚喝。\n从次日开始菜中可少量放盐，在100天内，饮食以清淡为主。在整个哺乳期内，忌辛辣、酒水及易致过敏食物。\n今日服用《产后中药滋补方》第五方，适用于产后第27～30天（共4剂）。"}, "生化汤的做法": {"ingredients": "当归，川芎，桃仁（去心），烤老姜，炙草（蜜甘草）。", "steps": "瓦煲中加入米酒700毫升，放入以上药料，用慢火煮1小时左右，约剩200毫升，倒出药酒备用（药料留瓦煲中）；在瓦煲中第二次加入米酒350毫升，和第一次煮法相同，煮至约剩100毫升，倒出药酒。把第一次药酒和第二次药酒倒在一起，一天分3次喝完。顺产喝7天，剖宫产喝14天。"}, "生化汤（jinpai）": {"ingredients": "金当归24克，川芎9克，去皮尖的桃仁6克，黑姜、炙甘草各2克，黄酒适量。\n1 红枣洗净，取出枣核备用。\n2 大米洗净，用清水浸泡 30 分钟。\n3 锅内加入清水，放入淘洗好的大米，大火煮沸后，转小火煮 30 分钟，至大米绵软。", "steps": "4 再加入牛奶和红枣，小火慢煮至牛奶烧开，粥浓稠即可。\n1 将金当归、桃仁、川芎、黑姜、炙甘草和水以1:10的比例共同煎煮，调入适量黄酒。\n2 所有原料用小火煮 30 分钟，取汁去渣。\n3 温热服用。", "notes": "这款生化汤具有活血散寒的功效，可缓解产后血瘀腹痛、恶露不净，对脸色青白、四肢不温的虚弱妈妈，有很好的调养和温补的功效。"}, "生化汤（zibu）": {"ingredients": "当归30克，川芎10克，桃仁、炮姜、炙草各5克。", "steps": "① 将所有的药材均洗净，沥干，备用。\n② 锅置火上，加入适量水，再将所有药材放入锅中，加盖以小火熬煮，至汤汁剩1杯时过滤药渣，将药汤盛起，备用。\n③将药渣放入锅中，加适量水，煮至汤汁剩1杯时，沥出汤汁，和之前熬好的汤汁混合即可。"}, "猪肝炒菠菜": {"ingredients": "猪肝250克，菠菜300克，葱片、姜末各少许。", "steps": "① 猪肝洗净后切小薄片；准备好其他材料。（图①）\n② 菠菜择洗干净，切成3厘米长的段，入沸水中焯烫，即刻捞出，沥干水。\n③ 油锅烧热，放葱片、姜末炝锅，放入猪肝片煸炒。（图②）\n④ 烹料酒、白醋，加老抽、白砂糖、花椒粉，再放入菠菜段、盐翻炒均匀，用水淀粉勾芡，出锅装盘即可。（图③、图④）", "notes": "猪肝与菠菜同食不仅可以补血，还有活血化瘀的功效"}, "椒炒猪肝": {"ingredients": "猪肝200克，绿甜椒片50克，姜丝适量。\n香油、盐、干淀粉各适量。\n猪肝350克，姜35克。\n香油50毫升，醪糟水30毫升。", "steps": "① 备齐所需材料。（图①）\n②猪肝洗净，切片，放入碗中，加盐、干淀粉抓匀，腌渍15分钟。（图②）\n③ 锅置火上，加入香油烧热，爆香姜丝，再倒入猪肝片、绿甜椒片翻炒至熟，加盐调味即可。（图③）\n这道菜品可帮助新妈妈收缩子宫、排出污血，促进子宫恢复正常功能。\n① 将猪肝洗净沥干，切成1厘米厚的薄片；姜洗净，连皮切片；准备好其他材料。(图①)\n② 锅加热后，倒入香油，油热后加入姜片，煎到呈浅褐色，捞出待用。\n③ 锅底留油烧热，猪肝入锅以大火快炒，再倒入醪糟水煮开，放入姜片，炒熟即可。（图②、图③）"}, "酸甜猪肝": {"ingredients": "猪肝片400克，菠萝片100克，水发黑木耳50克，葱段10克，香菜叶少许。\n糖醋汁75毫升，酱油、香油各10毫升，干淀粉、水淀粉、油各适量。", "steps": "① 水发黑木耳洗净；备好其他材料。（图①）\n②将猪肝片放入碗内，加入酱油、干淀粉拌匀上浆。（图②）\n③ 油锅烧热，放入猪肝片炒熟，捞出沥油。原油锅内放入菠萝片、水发黑木耳和葱段煸炒，加入糖醋汁烧沸，用水淀粉勾芡，倒入猪肝片炒匀，淋入香油，撒香菜叶即可。（图③）"}, "当归黄芪排骨汤 利尿消肿 + 补血活血": {"ingredients": "排骨200克，黄芪15克，当归2克，姜片适量。\n胡椒粒适量，盐少许。", "steps": "① 备齐所需材料。将排骨洗净切块，放入沸水中略氽烫，捞出，沥干水，盛入盘中备用。（图①）\n② 锅置火上，加入适量清水，放入排骨块、黄芪、当归、胡椒粉、姜片，大火煮沸后再转小火炖2小时。（图②）\n③ 最后开盖，加入盐调味即可。（图③）"}, "西红柿炖牛腩 润肠通便+补中益气": {"ingredients": "牛腩块500克，西红柿2个，白萝卜块、葱段、姜片各适量。\n大料、盐、白糖、花椒、料酒、老抽、油各适量。", "steps": "① 牛腩块氽烫后捞出；西红柿用热水烫一下，去皮，切块；备好其他材料。（图①）\n② 油锅烧热，爆香葱段、姜片、大料和花椒，再倒入牛腩块，放入老抽和白糖炒至牛腩出油。（图②）\n③ 倒入白萝卜块、西红柿块和适量热水，烧开后转小火炖约1小时，加料酒、老抽、盐，转小火再焖15分钟即可。（图③）"}, "紫菜虾皮蛋花汤": {"ingredients": "紫菜30克，虾皮50克，白菜叶50克，鸡蛋1个，葱末适量。\n盐、醋各少许，油适量。\n鸡蛋2个，净虾30克，\n香菇1朵，葱少许。\n盐1小匙，香油少许。\n鲫鱼1条，鸡蛋4个，\n葱丝、红甜椒丝各适量，香菜叶少许。\n盐1小匙，酱油少许。", "steps": "① 将虾皮用温水泡软，洗净沥干；鸡蛋磕入碗中，加醋，打散；紫菜撕碎，放入碗中；备好其他材料。（图①）\n② 油锅烧热，先放入葱末炒香，再添入适量开水，放入虾皮煮至熟透，加入盐、白菜叶。（图②）\n③ 淋入鸡蛋液，待蛋花浮起时，倒入盛有紫菜的碗中即可。（图③）\n补肾下乳+健脑益智\n此菜造型美观，富有营养。\n①葱洗净，切成葱花；香菇洗净，切片；净虾处理干净，洗净；备好鸡蛋。（图①）\n②鸡蛋打散，慢慢加入温开水，加盐拌匀。（图②）\n③蛋液中放入香菇片、虾仁，先用大火蒸3分钟，转中火继续蒸约8分钟。（图③）\n④ 出锅后淋上香油、撒上葱花即可。（图④）\n① 鲫鱼宰杀，去鳞及内脏，然后用清水反复冲洗干净，再在鱼身的两边各刮几刀；备好其他材料。（图①）\n②鲫鱼放入沸水中氽烫片刻，捞出沥干，将其平放于盘中，备用。（图②）\n③鸡蛋打入碗中，加入适量清水、盐、色拉油搅拌均匀，然后倒入盛有鲫鱼的盘中。\n（图③）\n④ 把盘移入蒸笼蒸6~8分钟，待鱼熟、蛋液凝固后取出，淋入酱油，撒上葱丝、红甜椒丝、香菜叶即可。（图④）", "notes": "—— 很多人都误认为产妇分娩时体内大量出血，坐月子第一周应当多喝一些鸡汤、猪蹄汤滋补。殊不知，如果新妈妈天天吃、顿顿吃，就会引起腹胀、腹泻等症状。其实，这道既不油腻又易消化的营养蒸蛋就是坐月子第一天恢复体力的不错选择。\n鲫鱼搭配鸡蛋，二者同蒸，将鲫鱼的清鲜和鸡蛋羹的爽口融合起来，真是妙不可言。"}, "奶汤锅子鱼 渗水利湿+轻身消肿": {"ingredients": "鲤鱼1条，冬笋片20克，火腿片15克，葱段10克，水发香菇5朵，姜4片，葱末5克。\n奶汤150克，料酒1大匙，盐2小匙，白胡椒粉少许，油适量。", "steps": "① 鲤鱼处理干净，洗净，切块；香菇洗净，沥干，切片；备好其他材料。（图①）\n② 油锅烧至七成热，放入鱼肉块稍煎，加料酒、葱段、姜片，炒匀后加入奶汤煮沸。（图②）\n另取净锅，加水、香菇片、火腿片、冬笋片、盐，大火煮5分钟后倒入鱼肉汤锅内，熟后加白胡椒粉和葱末即可。（图③）"}, "豆芽蛤蜊汤": {"ingredients": "黄豆芽250克，蛤蜊50克，红甜椒、葱、蒜瓣各适量。\n盐、料酒、香油各适量。\n苋菜230克，小银鱼100克，蒜2瓣。\n茶油2小匙，高汤100毫升。", "steps": "① 黄豆芽洗净；蛤蜊吐沙后洗净；红甜椒洗净，切条；葱洗净，切段；蒜瓣去皮，切末，备用。（图①）\n② 将洗好的蛤蜊放入锅中煮至开壳，倒入料酒，然后关火，捞出蛤蜊，保留汤汁。（图②）\n③ 锅中放入黄豆芽，煮至黄豆芽的头部薄膜脱落，再放入红甜椒条、葱段和蒜末，煮沸后放入蛤蜊略煮，最后调入盐，淋香油即可。（图③）\n苋菜搭配银鱼，不但为菜品色彩加分，而且营养加倍。\n① 将苋菜择洗干净；蒜切片；备好其他材料。（图①）\n② 将小银鱼放在热水中浸泡一会儿，捞出沥干，备用。\n③ 锅置火上，放入茶油烧热，炒香蒜片，加入小银鱼拌炒，盛出。（图②）\n④ 苋菜入锅，加入高汤煮3分钟，再加入小银鱼煮至沸腾即可。（图③）"}, "翡翠银鱼羹 滋阴补虚+补益脾胃": {"ingredients": "银鱼、小油菜（仅绿叶部分）各150克，鸡蛋1个（取蛋清），蒜末15克，姜3片。\n柴鱼高汤适量，干淀粉2大匙，水淀粉1杯，盐1小匙，油适量。", "steps": "① 备齐所需材料。银鱼洗净，放入加有姜片的沸水中略微汆烫一下，捞出沥干。（图①）\n② 油菜叶打成菜泥，过滤取汁；将菜汁、蛋清、干淀粉拌匀，制成翡翠汁。（图②）\n③ 油锅烧热，下入翡翠汁炸至定型并浮起，捞出并泡入清水中，撇去浮油。（图③）\n④ 倒入柴鱼高汤，煮沸后下入蒜末、银鱼、盐，用水淀粉勾芡，烧开后入翡翠拌匀即可。"}, "鸡蓉小米粥": {"ingredients": "小米30克，大米50克，\n鸡脯肉80克，荷兰豆\n豆粒、胡萝卜末各\n适量。\n盐、鸡汤各适量。", "steps": "① 将大米用清水浸泡约30分钟；鸡脯肉洗净，剁成泥状；备好其他材料。（图①）\n② 将小米与大米放入锅内，再入鸡汤、荷兰豆豆粒，大火煮沸后转小火煮约20分钟。（图②）\n③ 待米煮熟后，加入鸡蓉、胡萝卜末稍煮。起锅前，调入少许盐即可。（图③、图④）", "notes": "—— 小米具有促进肠道蠕动的作用，能够帮助新妈妈的肠胃快速吸收营养，尽快恢复体力。而且，小米熬粥营养丰富，是产后新妈妈的调养佳品，素有“代参汤”之美称。"}, "芹菜蛋皮丝": {"ingredients": "芹菜300克，鸡蛋1个。\n水淀粉1小匙，白砂糖、油各适量，盐、鸡精各少许。\n玉米糁200克，鸡蛋2个。\n盐少许，冰糖适量。", "steps": "① 将芹菜择洗干净，切长段；鸡蛋打散，加入水淀粉搅拌均匀。（图①）\n② 油锅烧热，倒入蛋液，摊成蛋皮，取出放凉，切成丝。（图②）\n③另起一锅，倒入油烧热，放入芹菜段爆炒，然后放入蛋皮丝，同时加入盐、白砂糖、鸡精翻炒均匀，快速出锅即可。（图③、图④）\n① 将玉米糁淘洗净，加水浸泡30分钟左右；鸡蛋去壳，打散，备用。（图①）\n② 锅内加入适量清水，先用大火烧开，然后放入玉米糁，继续烧至水滚沸，再改小火烧煮，同时要不停用勺子进行搅动。\n（图②）\n③ 待粥呈稠状时，加盐、冰糖，最后加鸡蛋液搅拌成蛋花状，稍煮片刻后即可食用。\n（图③）", "notes": "——芹菜具有开胃、利尿、清热、稳定情绪等功效；鸡蛋含有优质蛋白质和多种维生素。这道菜品不仅有助于新妈妈恢复体力，还可以有效维护神经系统的健康，减缓新妈妈产后抑郁。\n新妈妈可以喝些玉米汤，促进体内新陈代谢。"}, "冰糖桂圆肉": {"ingredients": "桂圆肉100克，莲子50克。\n蜂蜜水、冰糖各适量。\n苋菜350克，面粉1大匙，蒜4瓣。\n盐、油各适量。\n青甜椒4个，红甜椒1个。\n盐半小匙，黑豆豉125克，油适量。", "steps": "① 桂圆肉、莲子分别浸入温水中；备好其他材料。（图①）\n②莲子放入盘中，移入蒸锅中稍蒸。（图②）\n③ 锅中加水，放入冰糖，倒入蜂蜜水，搅匀后放入莲子、桂圆肉煮熟即可。（图③）\n苋菜的天然色泽融合在整道汤品中，颜色鲜亮，诱人食欲。\n① 苋菜洗净；备好其他材料。（图①）\n② 油锅烧热，将蒜瓣轻轻压一下，放入油锅煎至熟透，再下入面粉，炒香。（图②）\n③面粉炒香后再向锅中倒入开水，转为大火，烧开后下入苋菜，煮两分钟左右至苋菜熟透，加盐调味即可。（图③、图④）\n① 青甜椒、红甜椒去蒂，去籽，洗净切成菱形块；备好其他材料。（图①）\n② 油锅烧热，放入红甜椒块、青甜椒块煸炒至断生。（图②）\n③倒入黑豆豉，翻炒片刻，加入盐炒匀即可。（图③、图④）", "notes": "—— 苋菜叶里含有高浓度赖氨酸，具有促进人体生长发育的作用。这道汤品可促进新妈妈体内新陈代谢\n甜椒爽口脆嫩，有利于增进新妈妈食欲。\n—— 椒类富含维生素K、胡萝卜素和铁，是强化造血机能的好食材。椒类中的维生素C和B族维生素的含量也比较丰富，能改善新妈妈皮肤方面的问题。对哺乳期妈妈而言，这道营养均衡的菜品还能为宝宝提供成长所需的营养素。"}, "芝麻拌红苋菜": {"ingredients": "苋菜200克，白芝麻15克，蒜6瓣。\n盐适量，高汤3大匙，\n油适量。", "steps": "① 将苋菜洗净切段，入沸水锅中焯烫5秒钟捞起，冲凉沥干，装碗；蒜瓣洗净，切片；备好其他材料。（图①）\n② 油锅烧热，放入盐及蒜片以小火炒香，炒至蒜片呈浅褐色时倒入高汤，烧开后即刻淋在苋菜上。（图②）\n③将白芝麻倒入装有苋菜的碗中，拌匀即可。（图③、图④）", "notes": "—— 苋菜有补血益气的作用，还可改善产后贫血，增强新妈妈的抵抗力。芝麻含有丰富的营养，可以为新妈妈补充全面、均衡的营养，也可以增进新妈妈的食欲。"}, "西红柿厚蛋烧 利尿消肿+润肠通便": {"ingredients": "鸡蛋2个，西红柿1个。\n盐半小匙，油适量。", "steps": "① 西红柿去皮，切丁，丁切得越细越好；备好其他材料。（图①）\n② 鸡蛋打散，加盐、西红柿碎搅拌均匀。（图②）\n③ 油锅烧热，将蛋液均匀地铺一层在锅底，等蛋液慢慢凝固不流动时，从一头慢慢地将蛋皮卷起。卷的时候可以用铲子和筷子配合，更利于卷制。（图③）\n④ 取出切段，装盘即可。（图④）", "notes": "—— 西红柿与鸡蛋是营养互补的最佳实例之一。西红柿含有丰富的维生素C、番茄红素等营养成分；鸡蛋中含有蛋白质等营养成分，二者同食可帮助新妈妈恢复体力。"}, "百 合炒西芹 清心安神 + 利尿消肿": {"ingredients": "百合2颗，西芹3根。\n盐、水淀粉、白糖、油各适量。", "steps": "① 西芹择洗干净，轻轻刮去表面的一层老皮，斜切成4厘米长的段，入沸水锅中焯烫至变色；百合切去头部和尾部，掰开成瓣，清洗干净，备用。（图①、图②）\n② 将所有调料放入碗内，搅拌均匀成芡汁，备用。\n③ 油锅烧至五成热时放入西芹段，中火炒至西芹微塌，倒入百合翻炒均匀，倒入芡汁炒匀即可。（图③）"}, "香菇糯米粉蒸排骨": {"ingredients": "猪肋排块350克，香菇4朵，葱末、姜末、娃娃菜各适量，香菜叶少许，糯米粉80克。\n香油、料酒、酱油、白糖、盐各适量，胡椒粉少许。", "steps": "① 猪肋排块浸泡去血水，捞出沥干。香菇洗净，切丁。备好其他材料。（图①）\n② 在猪肋排中放入除娃娃菜、糯米粉、香菜叶外的所有材料，拌匀后调入所有调料，腌渍半小时，倒入糯米粉，使肋排均匀地粘上一层糯米粉。（图②）\n③ 在盘子底部铺上一层娃娃菜，将肋排块倒在娃娃菜上，蒸熟后撒香菜叶。（图③）"}, "桂圆炖猪腰": {"ingredients": "猪腰300克，桂圆30克，当归、党参、枸杞子各10克，姜丝、蒜片、葱段各5克。", "steps": "① 枸杞子用水泡软，捞出沥干；桂圆去壳；猪腰处理干净，洗净；备好其他材料。（图①）\n②猪腰先切花刀，再切片，加白酒、生抽和少许盐拌匀，腌渍20分钟。（图②、图③）\n③ 锅中加水，放入葱段、姜丝、蒜片稍煮，倒入枸杞子、党参和当归，放入猪腰片，小火慢炖约2个小时，放入桂圆，加盐继续炖约20分钟即可。（图④）", "notes": "—— 当归有补血和调节子宫收缩之效；猪腰有温肾益气、行气利水的功效，《本草纲目》记载“治产劳虚汗，下利崩中”。《名医别录》记载“理肾气，通膀胱”。"}, "肉酱菠菜 补中益气+养肝明目": {"ingredients": "菠菜300克，猪肉末100克。\n盐、酱油、料酒、甜面酱、油各适量。", "steps": "① 备齐所需材料。（图①）\n② 油锅烧热，下肉末煸炒至干香色黄，加入甜面酱、酱油、料酒炒匀。\n③ 锅中加盐及少许清水烧沸，制成肉酱，晾凉后备用。（图②）\n④ 菠菜择洗干净，切成段，放入沸水中焯烫至断生，捞出后晾凉，食用时淋上肉酱拌匀即可。（图③）"}, "大豆猪蹄浓汤 滋养补气+延缓衰老": {"ingredients": "大豆50克，猪蹄1个，花生仁30克，玉米段、姜片、红枣、枸杞子各适量。\n料酒、大料、盐各适量。", "steps": "大豆、花生仁均洗净，加水浸泡；猪蹄剁块，放入加有姜片、大料、料酒的沸水中汆烫，去沫，捞出冲净。\n②将猪蹄块放入加有姜片的砂锅中，倒入少许料酒，加适量清水。（图①）\n③ 放入泡好的大豆、花生仁，大火烧开，转中小火炖煮。待所有材料熟透时放入玉米段、红枣、枸杞子，再用小火炖1小时左右，加盐调味即可。（图②、图③）"}, "猪肝汤 补血养血 + 补肝明目": {"ingredients": "猪肝、豆腐、姜片、葱段各适量。\n盐、干淀粉各适量。", "steps": "猪肝洗净，切成薄片，加干淀粉抓匀上浆；豆腐洗净，切片；备好其他材料。（图①、图②）\n② 锅置火上，加入适量水，放入豆腐片，加少许盐，大火烧开。（图③）\n③放入猪肝片，加盐、葱段、姜片，再煮5分钟即可。（图④）", "notes": "——猪肝中含有丰富的铁元素以及磷元素，可以加强机体的造血功能；豆腐不含胆固醇，而且还具有降低人体胆固醇的功效。这道汤品适合气血亏虚的新妈妈食用。"}, "红枣枸杞蒸猪肝": {"ingredients": "猪肝300克，红枣10个，枸杞子5克，葱花、姜丝各少许。", "steps": "①猪肝用加了醋的水浸泡30分钟，换水2次；红枣、枸杞子均清洗干净；备好其他材料。（图①）\n②猪肝切成0.3厘米厚的片，继续泡水去除多余的血水，沥干。将红枣、枸杞子和猪肝片放到碗里，加入姜丝、干淀粉、少许盐，搅拌均匀，腌渍10分钟。（图②、图③）\n③ 将材料移入锅内蒸约10分钟，待猪肝熟透后取出，撒上葱花即可。（图④）", "notes": "——产后新妈妈气血亏虚，因此及时调理气血是非常重要的，红枣、枸杞子是补气血的好食材。这道菜品可增强新妈妈的体力，改善新妈妈产后浑身无力的状态。"}, "麻油猪腰": {"ingredients": "猪腰1副，姜35克。\n胡麻油50毫升，醪糟水360毫升。", "steps": "①猪腰洗净，切成两半，将里面的白色尿膜剔出，在表面斜切数刀，再切成1毫米厚的薄片；姜洗净，切成薄片；备好其他材料。（图①）\n②将胡麻油倒入锅内，用大火烧热，放入姜片，转小火爆香至姜片的两面均“皱”起来呈褐色时再转大火，放入猪腰片。（图②）\n③将猪腰片快炒至变色，再加入醪糟水煮开，至猪腰片熟透入味即可。（图③、图④）", "notes": "——麻油猪腰是一道很常见的月子餐，这道菜品不仅可以帮助新妈妈健肾补腰、改善气血循环，而且可以补肾气、通乳，促进新妈妈恢复体力"}, "补中益气+通乳消胀": {"ingredients": "猪瘦肉、鲜豌豆各250克，鸡蛋1个（取蛋清）。\n盐、鸡精、料酒、水淀粉、鸡汤各适量。", "steps": "① 将鲜豌豆洗净；备好其他材料。（图①）\n②猪瘦肉洗净后剁碎，砸成肉泥，加入鸡蛋清、盐、鸡精和料酒搅成肉糊状，备用。（图②）\n③ 炒锅内倒入鸡汤烧热，再放入肉糊煮10分钟左右，加入豌豆再煮5分钟，撒入盐和鸡精，用水淀粉勾芡，出锅即可。（图③）"}, "姜汁牛肉汤 补中益气+滋养脾胃": {"ingredients": "牛肉175克，姜1块（约30克），葱末少许。\n白酒1小匙，盐、糖、酱油各半小匙。\n盐适量。\n花生60克，黑豆40克，鸡爪3只，红枣4个。", "steps": "① 备齐所需材料。姜洗净去皮，现磨去渣，滤出1小匙姜汁，盛入碗中。（图①）\n②将牛肉洗净切片后放碗中，加姜汁、白酒、盐、糖和酱油，腌渍10分钟。（图②）\n③ 锅置火上，加入适量清水，加热至七成热时，放入腌渍好的牛肉片，以小火炖煮1小时，随后撒上葱末略煮即可。（图③）\n此道汤品可补血、催乳，特别适合新妈妈食用。\n① 备齐所有材料。花生、黑豆以滚水浸透，洗净。（图①）\n②红枣洗净，用刀拍至裂开。\n③鸡爪脱皮，斩除脚趾尖，洗净，放入沸水中稍氽烫，捞出。（图②）\n④ 锅中加水烧开，加入所有材料，以大火煲至滚，小火再煲2小时，加盐调味即可。（图③、图④）", "notes": "—— 红枣能补益脾胃，产后脾胃虚弱的新妈妈多吃红枣能改善肠胃功能。花生不仅能保持乳腺畅通，还有养血止血的功效。食用这道汤品可为新妈妈补气血、增体力。"}, "鸡粒黄花菜 健胃补脾+温中益气": {"ingredients": "黄花菜200克，鸡肉粒、熟火腿末各50克，青豆适量。\n盐、料酒各1小匙，鸡汤250克，水淀粉、油各适量，干红甜椒段少许。\n鲫鱼1条，冬瓜100克，葱片、姜片各少许。\n盐少许。\n鲜带鱼350克，生木瓜400克，葱段少许，姜片适量。\n醋、盐、酱油、醪糟各适量。\n墨鱼1只，红甜椒块、黄甜椒块、银耳块各10克，葱末、姜末、蒜末各3克。\n生抽、海鲜酱各2小匙，水淀粉1大匙，白糖、盐各1小匙，油适量。", "steps": "① 备齐所需材料。（图①）\n② 黄花菜用沸水焯烫熟，过凉；青豆焯烫去豆腥味；鸡粒汆烫后沥干。\n③ 油锅烧热，将黄花菜、青豆入锅略煸，烹料酒，加鸡汤烧沸后，再加盐，用水淀粉勾芡。（图②）\n④ 倒入鸡肉粒，翻炒推匀，加干红甜椒段炒匀，撒上熟火腿末即可。（图③）\n冬瓜鲫鱼汤是补气血、通乳汁的传统食疗方，适合缺乳的新妈妈食用。\n① 鲫鱼处理干净，洗净；冬瓜洗净后切片；备好其他材料。（图①）\n②锅置火上，倒入适量水，将鲫鱼放入锅中，大火烧开，烧开后再加葱片、姜片，改小火慢炖。（图②）\n③ 当锅中的汤汁出现奶白色时，放入冬瓜片，稍煮后加入盐调味即可。（图③）\n木瓜和带鱼都是比较讨喜的食材，组合成的这道菜品，很受新妈妈喜爱。\n① 备齐所需材料。（图①）\n② 将带鱼去鳃、内脏，洗净，切成3厘米长的段；木瓜洗净，削去瓜皮，除去瓜核，切成3厘米长、2厘米厚的块。（图②）\n③砂锅置火上，加入适量清水及带鱼块、木瓜块、葱段、姜片，稍煮后加醋、盐、酱油、醪糟，烧煮至材料熟透即可。（图③、图④）\n① 备齐所需材料。（图①）\n②墨鱼入沸水中氽烫，捞出；银耳用水泡发；将生抽、海鲜酱、白糖、盐和2大匙水调匀，制成料汁。（图②、图③）\n③ 油锅烧热，放入葱末、姜末、蒜末、红甜椒块、黄甜椒块炒出香味，再放入银耳和墨鱼翻炒片刻，调入料汁炒匀，入水淀粉勾芡即可。（图④）", "notes": "——木瓜可和胃化湿，带鱼可补虚通经，二者搭配食用具有开胃、养阴、补虚、通乳的作用，适于产后肝郁血热所致乳汁不足的新妈妈食用。\n这道菜品营养丰富、色泽艳丽，很适合新妈妈食用。\n——墨鱼属于一种高蛋白、低脂肪的食物。女人一生不论经、孕、产、乳各期，食用墨鱼皆有益，因墨鱼具有养血、通经、安胎、利产、止血、催乳等功效。不过，墨鱼肉不易消化，消化功能弱的新妈妈可用其炖汤喝。"}, "香菇炒油菜": {"ingredients": "水淀粉2小匙，盐少许，油适量。\n油菜200克，水发香菇100克。\n鸡汤适量，料酒、水淀粉各1小匙，盐少许、油适量。\n鲜豌豆150克，火腿30克，葱末、姜末各5克。\n料酒、盐各半小匙，\n油适量。\n茼蒿 200克，水发香菇10克，葱、蒜瓣各适量。\n黄花菜500克。\n料酒1大匙，白砂糖1小匙，盐半小匙，油适量。\n豌豆160克，鲜木瓜30克，鸡蛋1个（取蛋清）。\n海带3片，嫩豆腐1盒，蒜末5克。\n老抽1小匙，牛肉高汤3杯，盐半小匙，油适量。", "steps": "① 香菇洗净，切块；油菜洗净，一切为二。\n（图①）\n②将香菇块放入沸水中焯烫，捞出沥干。（图②）\n③ 油锅烧热，放入油菜，煸炒至断生后放入香菇块。（图③）\n④加盐翻炒均匀，用水淀粉勾芡，翻炒至汤汁收浓，装盘即可。（图④）\n① 将火腿切成小丁；葱、姜切末；备好其他材料。（图①）\n② 油锅烧热，加入葱末、姜末炝锅。（图②）\n③放入火腿丁、豌豆翻炒，加入鸡汤、料酒、盐炒匀。（图③）\n4 开锅后，用水淀粉勾芡，起锅装盘即可。\n（图④）\n①葱洗净，切丝；蒜瓣洗净，切片；茼蒿洗净；香菇洗净，切块。（图①）\n② 茼蒿放入沸水中焯烫一下，捞出沥干。（图②）\n③ 油锅烧热，放入葱丝、蒜片煸炒出香味。（图③）\n④ 放入香菇块翻炒，加入料酒，倒入茼蒿，加盐翻炒均匀即可。（图④）\n① 黄花菜择洗干净，沥干。（图①）\n② 油锅烧热，放入黄花菜煸炒至颜色变亮。（图②）\n③ 加入白砂糖、盐、料酒翻炒均匀即可。（图③、图④）\n① 木瓜去皮洗净，切块；备好其他材料。（图①）\n② 木瓜块、豌豆均焯熟，捞出沥干。（图②）\n③鸡蛋清加入牛奶中，搅拌均匀备用。油锅烧至三成热，放入蛋清牛奶，在油温上升的过程中，用炒勺轻轻推动牛奶蛋清，使之逐渐凝固形成蛋清珍珠，捞出备用。(图③)\n锅底留油，放入蛋清珍珠、豌豆和木瓜，加入盐和白砂糖翻炒均匀即可。（图④）\n① 海带洗净；备好其他材料。（图①）\n② 海带用冷水浸泡1小时，洗净沥干，切细条；嫩豆腐切成小块。（图②）\n③ 油锅烧热，放入蒜末炒香，放入海带丝、老抽，翻炒几下。（图③）\n④ 加入牛肉高汤，煮沸后加入豆腐块炖熟，加盐调味即可。（图④）", "notes": "—— 香菇中含有30多种酶和18种氨基酸，可以帮助新妈妈促进体内新陈代谢。油菜有散血消肿的作用，能促进血液循环，可以缓解新妈妈产后瘀血腹痛的病症。\n这道菜品非常适合一口一口地小口食用，这样可以很好地保护新妈妈的肠胃。\n——豌豆营养丰富，是一种高钾低钠的食物，不仅对保护心血管极其有益，而且还有催乳、滋养肌肤的作用。新妈妈多吃些豌豆可提高泌乳量。\n不是只有肉类、药材等才具有滋补作用，素菜也可以补养新妈妈。\n—— 茼蒿含有维生素、多种氨基酸、胡萝卜素及钠、钾等矿物质，能调节体内代谢、通利小便、消除水肿。这道菜有助于促进产后新妈妈新陈代谢。\n此菜口感软韧、营养丰富，很适合新妈妈食用。\n—— 黄花菜含有丰富的蛋白质、维生素C等营养成分，民间常用黄花菜作为产后新妈妈的补益之品。新妈妈如果不想单食黄花菜，也可以将其和猪肉、猪蹄同炖，成菜可帮助解决产后缺乳、乳汁分泌不足等问题。\n菜品色泽鲜艳、诱人食欲，令新妈妈的胃口也跟着好起来。\n牛奶4大匙，盐1小匙，白砂糖半小匙，油适量。\n——由于豌豆粒圆，故有“豆中珍珠”之称。中医认为，豌豆具有通乳消胀的作用；木瓜也有通乳的作用，这道菜品适合乳汁缺少的新妈妈食用。\n—— 海带中含有的铁是制造人体红细胞的主要原料，有预防缺铁性贫血的作用。但新妈妈不宜大量吃海带，否则过多的碘通过乳汁进入宝宝体内，会导致宝宝出现甲状腺发育障碍。"}, "高汤炖西蓝花": {"ingredients": "西蓝花100克。\n素高汤800毫升，盐适量。", "steps": "① 西蓝花洗净，掰成小朵，备用。（图①）\n②汤锅置于火上，将素高汤放入锅中继续煮沸，放入处理好的西蓝花朵。（图②）\n③ 煮至西蓝花软烂后，放入少许盐调味即可。（图③）"}, "豆焖猪蹄": {"ingredients": "大豆100克，猪蹄1个，葱段、姜片各适量，香菜段少许。\n料酒3大匙，酱油2大匙，鸡精、盐各适量。", "steps": "① 将大豆泡2个小时后捞出；猪蹄洗净，切块，浸冷水后汆烫去血水，加少许酱油、鸡精腌渍10分钟。（图①）\n② 锅中放姜片、葱段、料酒和猪蹄块，中小火焖20分钟。（图②）\n③ 将泡好的黄豆及做法②的材料均移入砂锅里，加盐和酱油小火炖40分钟，放入鸡精调味，撒上香菜段，搅拌均匀即可。\n（图③）"}, "豆香猪肝": {"ingredients": "猪肝500克，大豆150克。", "steps": "大豆洗净；猪肝洗净，切片；备好其他材料。（图①）\n②猪肝片放入沸水中氽烫一下，捞出沥干，放入碗内，加盐和料酒稍微腌渍。（图②）\n③ 锅中加水，放入大豆，煮至八成熟，捞出备用。\n④ 锅中加入适量水，放入猪肝片、桂皮、茴香，加老抽，大火煮沸后，加入大豆，转小火炖30分钟即可。（图③、图④）", "notes": "——大豆含有丰富的植物性蛋白质、钙、维生素A、B族维生素等，对乳房健康大有帮助。这道菜品适用于身体虚弱、营养不良的新妈妈食用。"}, "猪肝红枣养生汤 补血活血+补气健脾": {"ingredients": "猪肝150克，当归18.5克，熟地10克，白芍适量，川芎3.5克，红枣6个。", "steps": "① 将猪肝洗净切片；红枣洗净；备好其他材料。（图①）\n② 锅置火上，加入适量清水，将除猪肝外的材料放入锅中，以中火煮滚后，转小火续煮15分钟。（图②）\n③然后将切好的猪肝片放入锅中，再煮5分钟出锅即可。（图③）"}, "萝卜煲猪蹄": {"ingredients": "猪蹄400克，青萝卜、胡萝卜各200克，蜜枣8颗，陈皮2片，姜3片。\n盐适量。", "steps": "① 猪蹄切小块，放入沸水中氽烫5分钟捞出，洗净备用。（图①）\n②青萝卜、胡萝卜均洗净，去皮，切滚刀块，备用。\n③ 煲锅中倒入4000毫升水以大火煮开，加入青萝卜块、胡萝卜块、蜜枣、陈皮及姜片，以中火煲90分钟。（图②）\n④ 煲锅中再加入猪蹄块继续煲1小时，加盐调味即可。（图③）"}, "双丁炒猪肉 补中益气+健脾消食": {"ingredients": "胡萝卜100克，猪瘦肉200克，豆腐干50克，姜末、葱末各5克，海米25克。\n香油、水淀粉各25克，黄酱10克，酱油、料酒各1小匙，高汤、油各适量。", "steps": "① 备齐所需材料。胡萝卜、猪瘦肉分别洗净，切成小丁；豆腐干切成同样的丁；海米用水发好，备用。（图①）\n② 油锅烧至五成热，放入猪瘦肉丁煸炒，当肉丁变白时，放入葱末、姜末及黄酱，炒2~3分钟，直至酱香浓郁。（图②）\n③ 加入海米、豆腐丁、胡萝卜丁、料酒、酱油，收浓汁，加入高汤，用水淀粉勾芡，淋入香油炒匀即可。（图③、图④）", "notes": "——胡萝卜所含的B族维生素和维生素C等营养素有润肌肤、抗衰老的作用；猪肉可补中益气。这道菜品可以为新妈妈补充营养、润泽肌肤。"}, "清炖冬瓜排骨 补中益气+利尿消肿": {"ingredients": "冬瓜1个，猪小排350克，葱段、姜片、蒜片各适量。\n料酒、盐、鸡精、油各适量。", "steps": "① 冬瓜洗净，切块；猪小排洗净，剁块；备好其他材料。（图①）\n②猪排骨块氽烫至变色，捞出。（图②）\n③ 油锅烧热，用葱段、蒜片、姜片、料酒炒香，放入猪排骨块，加入与肉齐平的水，炖35分钟，待收汁到一半的时候放入冬瓜块，小火继续炖，炖至冬瓜块熟，放入鸡精和盐调味即可。（图③）"}, "山药薏米排骨汤 补中益气 + 健脾益肾": {"ingredients": "猪小排300克，薏米100克，山药200克，葱2段，姜2片。\n盐少许。", "steps": "① 薏米提前用水浸泡10小时以上；山药去皮洗净，切成滚刀块；排骨斩成5厘米长的段；备好其他材料。（图①）\n② 排骨放入沸水中氽烫3分钟，捞出沥干。\n③ 锅内重新加入足量开水，放入所有材料，大火烧开，转小火煲煮60分钟。（图②、图③）\n④ 出锅前加盐调味即可。"}, "黄花菜排骨汤": {"ingredients": "猪小排250克，干黄花菜150克，山药1根，红枣、葱花、姜、火腿各适量。\n黄酒、盐、草果各适量。", "steps": "① 干黄花菜用温水泡20分钟，洗净，沥干；山药去皮，洗净，切细丝；猪排骨剁成约两指宽的段；备好其他材料。（图①）\n②猪排骨段洗净，冷水下锅，煮出血沫后关火，洗净。（图②）\n③ 将除黄花菜外的材料一起放入汤锅里，加适量热水，加黄酒、草果，烧开后改小火煮约1.5小时，加入黄花菜，再煮约20分钟，加盐调味，撒上葱花即可。（图③）"}, "当归桂圆煲羊肉养血安神+补中益气": {"ingredients": "羊腩450克，姜片30克，桂圆肉、当归各适量。\n盐1小匙，白糖少许，醪糟50毫升。", "steps": "①羊腩洗净，切块；备好其他材料。（图①）\n②羊腩肉块放入沸水中氽烫至熟透，捞出，沥干。（图②）\n③净锅置火上，放入所有材料，加适量清水烧开。撇去浮沫后盖上锅盖，加醪糟，转中小火煮1个小时至熟透，用盐、白糖调味即可。（图③）"}, "山药羊肉煲": {"ingredients": "羊肉500克，山药150克，姜片、葱段各10克，葱花少许。\n料酒4小匙，盐半小匙，胡椒少许。\n熟牛肉300克，净绿叶菜150克，姜片、葱段各20克。\n盐2小匙，料酒4小匙，胡椒粉少许，香油1小匙，油适量。", "steps": "① 山药用温水浸透后切成片；备好其他材料。（图①）\n② 羊肉剔去筋膜，洗净，略划几刀，切片，氽烫去血水，留羊肉汤备用。（图②）\n③羊肉片放入锅中，加羊肉汤，放入山药片、姜片、葱段、胡椒、盐、料酒，大火煮沸，撇去浮沫。（图③）\n转小火炖至羊肉片熟烂，原汤中葱段、姜片拣去不用，撒葱花即可。（图④）\n①将熟牛肉撕成细条；绿叶菜洗净，切段。（图①）\n② 油锅烧至三成热，投入牛肉丝略炒，拌入盐、胡椒粉调味，盛出。（图②）\n③ 锅底留油，放入绿叶菜段炒至断生，盛出铺在盘底，牛肉丝放在菜丝上即可。（图③、图④）", "notes": "—— 羊肉营养丰富，特别是钙和铁的含量均高于猪肉。中医认为，羊肉性热，可益气补虚、补血助阳、御寒生热，适合产后虚弱贫血的新妈妈或奶少、乳汁不下、自汗或虚汗不止的新妈妈食用。\n补中益气+润肠通便\n这道菜虽然看着简单，但却香味浓郁。\n——牛肉是高蛋白食物，富含氨基酸，B族维生素以及钙、铁、钾等矿物质，有较强的补血作用，还可增强人体免疫力。绿叶菜含有丰富的膳食纤维，可促进肠道蠕动，预防便秘。"}, "香菇木耳蒸鸡 温中益气+健体益智": {"ingredients": "土鸡半只，干香菇200克，水发黑木耳、姜片、香菜各适量。\n生抽、盐、白糖、料酒、生粉各适量。", "steps": "①土鸡洗净，切块；干香菇用水泡3个小时，洗净，沥干，切大块；水发黑木耳洗净，沥干；备好其他材料。（图①）\n②将鸡块、香菇、黑木耳、姜片放入碗中，加入盐、料酒、生抽、白糖、生粉搅拌均匀，盖上盖腌渍30分钟。（图②）\n③ 锅内放入水和蒸架，将装有材料的碗放入锅中，隔水蒸约15分钟，撒上香菜即可。\n（图③）"}, "红豆乌鸡煲 滋阴补肾 + 养血益精": {"ingredients": "乌鸡肉500克，红豆100克，姜片适量。\n盐1小匙，醪糟50毫升。", "steps": "①红豆洗净后入清水中浸泡4小时，捞出，沥干；乌鸡肉洗净，剁成小块；备好姜片。（图①）\n② 将乌鸡块放入沸水锅中略汆烫，洗净血水后捞出，过凉，备用。\n③ 锅中放入红豆、姜片和适量清水，大火煮沸，再放入乌鸡块，再次煮沸后盖上锅盖，加醪糟，转中小火焖煮40分钟，最后加盐调味即可。（图②、图③）"}, "金针鸡丝": {"ingredients": "金针菇20克，鸡肉丝100克，葱丝、姜丝、土豆丝各适量。\n香油1大匙，酱油、水淀粉、白糖各1小匙，油适量。", "steps": "① 备齐所需材料。（图①）\n② 油锅烧热，放入葱丝、姜丝煸香，放入鸡肉丝炒至变色，加土豆丝炒匀。（图②）\n③ 锅中加酱油炒匀，放入金针菇，加白糖、香油翻炒均匀，用水淀粉勾芡即可。（图③、图④）", "notes": "—— 金针菇有镇静作用，其所富含的赖氨酸、精氨酸可增强机体的生物活性，促进新妈妈体内的新陈代谢。鸡肉可补虚。此道菜品可增强新妈妈身体抵抗力。"}, "红枣雪梨煲黑鱼": {"ingredients": "盐适量。\n黑鱼1条，雪梨半个，\n红枣3个，陈皮1角。", "steps": "① 备齐所需材料。黑鱼处理干净，切成块，沥干；雪梨洗净，留皮，去核，切成块。（图①）\n②红枣洗净，去核，与陈皮一起用暖水浸软。\n③ 油锅烧热，放入黑鱼块，煎至两面微黄。（图②）\n④ 加水后以大火煲滚，放入雪梨块、红枣、陈皮，转慢火煲2小时，加盐调味即可。（图③、图④）", "notes": "—— 黑鱼具有补肝益肾、补脾利水、去瘀生新的功效；红枣可补血养血、补益脾胃，促进皮肤细胞代谢，防止色素沉着，使皮肤白皙。这道汤品适合身体虚弱的新妈妈食用。"}, "补脾益气+暖胃养肝": {"ingredients": "带鱼、葱段各适量。\n浅色老抽、料酒、姜汁、油各适量。", "steps": "①带鱼洗净，切成小块，加姜汁、少许浅色老抽、葱段腌渍30分钟。（图①）\n② 油锅烧热，放入带鱼块，稍炸后捞出。\n③锅底留油，将鱼逐块下锅摊好，转用慢火煎至一面呈金黄色，再煎另一面，并慢慢加少许油，煎至两面金黄色。（图②）\n④ 锅中加料酒、少量开水和浅色老抽，加盖焖约半分钟，连鱼带汁一起盛入碟中，即可食用。（图③）"}, "虾仁鲜蔬炒豆干": {"ingredients": "虾仁200克，豆干100克，油菜50克，姜20克。\n盐半小匙，酱油1小匙，油适量。", "steps": "① 将虾仁去肠泥；豆干洗净，切片；油菜叶洗净，切段；姜洗净，切丝。（图①）\n② 油锅烧热，放入姜丝爆香，随后再放入豆干片炒香。（图②）\n③ 加入虾仁略炒，最后加入油菜段、盐、酱油炒熟即可。（图③）"}, "什锦炒木耳": {"ingredients": "山药、芦笋各100克，黑木耳10克，枸杞子5个。\n盐半小匙，水淀粉1大匙，油适量。\n玉米粒100克，松子仁50克，火腿、红甜椒各30克，葱花5克。\n盐1小匙，白砂糖半小匙，油适量。", "steps": "①山药洗净，削皮，先纵向剖成两半，再斜切成薄片，放入冷水中浸泡；黑木耳泡发洗净，择去根蒂，撕成小朵；枸杞子用温水泡软；备好其他材料。（图①）\n②芦笋洗净，择去老硬的部分，削皮，然后切成丝。\n③ 锅中加水烧沸，将山药片、黑木耳小朵和芦笋丝放入沸水中焯烫约2分钟，捞出，沥干。（图②）\n④ 油锅烧至五成热，放入山药片、芦笋丝和黑木耳小朵翻炒1分钟，调入盐，淋入水淀粉并翻炒均匀，出锅前撒入枸杞子装饰即可。（图③、图④）\n润肠通便+降压降糖\n① 红甜椒去籽洗净，切小丁；火腿切丁；备好其他材料。（图①）\n② 玉米粒放入沸水中焯烫熟，捞出沥干水。\n（图②）\n③ 油锅烧热，放入松子仁，小火翻炒至金黄色，捞出备用。（图③）\n锅底留油，放入葱花煸香，依次放入火腿丁、红甜椒丁、玉米粒和松子仁，加入盐和白砂糖翻炒均匀即可。（图④）", "notes": "—— 维生素E是抗氧化剂，新妈妈摄入丰富的维生素E可以使乳房组织更富弹性，且能帮助调节雌激素的分泌。松子仁含有丰富的脂肪酸和维生素E，既有补虚作用，又有润肠的功效。玉米中也富含维生素E。"}, "蘑菇烧豆腐 补气健脾+强健骨骼": {"ingredients": "蘑菇50克，胡萝卜30克，豆腐1块，油菜、海米各适量，葱丝、姜末各少许。\n水淀粉、盐各少许。", "steps": "①蘑菇洗净，撕成丝，然后用沸水焯烫一下；油菜洗净；胡萝卜洗净，切菱形；备好其他材料。（图①）\n② 豆腐洗净，切块，放入沸水中焯烫一下，捞出。（图②）\n③ 油锅烧热，炒香葱丝和姜末，加入蘑菇、胡萝卜片翻炒，再加入盐、清水拌匀。\n放入豆腐、油菜、海米炒匀，用水淀粉勾芡即可。（图③、图④）", "notes": "—— 豆腐含有人体必需的8种氨基酸，且易于人体吸收。这道菜品可以为新妈妈提供维生素、钙、蛋白质等营养元素，而且蔬菜中含有丰富的膳食纤维，可加强肠道蠕动，从而帮助新妈妈预防便秘。"}, "荷叶蒸豆腐": {"ingredients": "嫩豆腐1盒，荷叶1张，虾仁3个，葱花适量。\n盐、蚝油、酱油各1小匙，水淀粉少许，清汤1碗，油适量。", "steps": "① 将豆腐切片；备好其他材料。（图①）\n②荷叶泡水，洗净，剪成适当的大小，铺在蒸笼中，刷上少许油。将豆腐铺放在荷叶上，在豆腐上撒下少许盐，入蒸锅蒸5~6分钟，熟透后取出。（图②）\n③ 油锅烧热，爆香虾仁，淋入清汤烧开，加入蚝油、酱油、盐调味。用水淀粉勾芡，撒葱花做成味汁，淋到蒸好的豆腐上即可。（图③）"}, "丝瓜炒海米 清热化痰 + 活血通络": {"ingredients": "丝瓜1根，海米、蒜片各适量。\n盐、白醋、水淀粉、油各适量。", "steps": "① 丝瓜洗净，切滚刀块；海米放水里浸泡15分钟，捞出，沥干；备好其他材料。（图①）\n② 油锅烧热，放入蒜片和浸泡好的海米爆香，然后放入丝瓜块翻炒。（图②）\n③加盐调味，烹入少量白醋，倒入适量清水煮至丝瓜变软，最后用水淀粉勾薄芡即可。(图③)"}, "香菇炒菜心": {"ingredients": "鲜香菇350克，菜心100克。\n盐、蚝油、水淀粉、生抽、食用油各适量，高汤少许。", "steps": "① 香菇洗净，大的对半剖开，入沸水中稍微焯烫；菜心在淡盐水里泡10分钟，洗净，沥干。（图①）\n② 油锅烧至七成热时放香菇爆炒，加高汤或开水煮一会儿，加生抽、蚝油。（图②）\n③放入菜心继续翻炒，将熟时加盐调味，用水淀粉勾芡即可。（图③）"}, "TZTSI": {"ingredients": "醋、酱油、白糖各适量，辣椒油少许。\n玉米粒150克，鸭蛋黄2个，青豆适量。\n干淀粉、盐、油各适量。", "steps": "① 海带洗净，放入锅中煮熟，捞出，沥干，晾凉，切块；蒜去皮，切小块；部分泡椒切碎，备用。（图①）\n② 蒜块、泡椒碎、泡椒、醋、酱油、辣椒油、白糖放入碗中，调拌均匀成味汁。（图②）\n③ 将调好的味汁拌入海带块中，搅拌均匀，静置15分钟即可。（图③）\n菜品色泽金黄，诱人食欲，让新妈妈的心情也跟着明朗起来。\n① 备齐所需材料。鸭蛋黄用刀切碎。（图①）\n②将玉米粒、青豆放入碗中，加干淀粉搅匀，放入热油锅中稍炸后捞出，沥油。（图②）\n③另起油锅烧热，倒入鸭蛋黄碎，加少许水炒成黏稠状。（图③）\n④ 锅中放入炸好的玉米粒和青豆，待材料将熟时加盐调味，炒匀即可。（图④）", "notes": "—— 玉米含有丰富的膳食纤维，新妈妈食用玉米，可以预防便秘。此外，新妈妈在食用整根玉米时，可以将玉米粒底部的白色谷胚吃干净，白色谷胚含有丰富的不饱和脂肪酸以及维生素E。"}, "青红豆腐羹 宽中益气+清热散血": {"ingredients": "盒豆腐250克，鸡蛋1个，黄瓜、胡萝卜各15克。\nA. 胡椒粉半小匙，盐少许；B. 水淀粉半小匙，盐少许。", "steps": "① 将豆腐倒出；胡萝卜、黄瓜分别洗净，切丝；备好其他材料。（图①）\n② 将鸡蛋打散入碗中，豆腐用刀背碾成蓉，放入鸡蛋碗中，加少许盐搅拌均匀，移入蒸锅中蒸熟。（图②）\n③ 黄瓜丝、胡萝卜丝、调料A下入沸水锅中煮沸，用水淀粉勾芡，再次煮沸后浇入豆腐羹中即可。（图③）\n## 第四章"}, "姜丝炒肚片": {"ingredients": "猪肚300克，姜50克，枸杞子适量。\n白醋1大匙，盐1/4小匙，冰糖半小匙，胡麻油2小匙。", "steps": "①所有食材洗净，沥干；姜切丝，备用。（图①）\n②猪肚及水放入汤锅炖煮1小时，捞起后沥干，切条。（图②）\n③ 油锅烧热，爆香姜丝，再加入猪肚条及剩余调料，拌炒均匀即可食用。（图③）"}, "枸杞红枣猪蹄汤": {"ingredients": "盐、料酒各适量，胡椒粉少许。\n猪蹄、白扁豆、枸杞子、红枣、薏米、葱段、姜片、香菜末各适量。", "steps": "①红枣洗净，去核；白扁豆、枸杞子洗净；薏米淘洗干净，用清水泡透；猪蹄处理干净，切块；备好其他材料。（图①）\n② 锅置火上，加温水、料酒，放入猪蹄块，汆烫至水开，捞出沥干。（图②）\n③砂锅加水烧开，放入猪蹄块，加剩余材料，大火烧开，烹入料酒。（图③）\n④ 转小火，加入盐和胡椒粉，再煮40分钟，撒上香菜末即可。（图④）", "notes": "——猪蹄可补气，汤中加入枸杞子、红枣同炖，对于产后新妈妈四肢无力、头晕目眩、手脚冰凉等症均有一定功效，而且，这道汤品可美颜润肌。"}, "猪肝炒黄瓜": {"ingredients": "酱油2小匙，淀粉、料酒各1小匙，盐、白糖各少许，油适量。\n猪肝100克，黄瓜200克，葱丝、姜末各少许。", "steps": "① 将猪肝切成柳叶形薄片，用少许淀粉、盐拌匀上浆；黄瓜洗净，切成薄片；备好其他材料。（图①）\n② 油锅烧热，放入猪肝片滑散，捞出沥油。\n（图②）\n③ 锅底留油，加葱丝、姜末爆香，放入猪肝、黄瓜片翻炒均匀。（图③）\n④ 加入酱油、料酒、盐、白糖炒熟，用水淀粉勾芡，拌匀盛盘即可。（图④）", "notes": "—— 黄瓜含有多种维生素，可以护肤美颜。猪肝含有丰富的维生素A、维生素 $ B_{2} $等。这道菜品可补气养血，保护新妈妈的眼睛，而且可增强新妈妈的免疫力。"}, "五 香牛肉 补中益气 + 健脾补血": {"ingredients": "大料、胡椒粉、盐、白砂糖、老抽各适量。\n牛肉100克，胡萝卜1根。", "steps": "① 备齐所需材料。胡萝卜去皮洗净，切块；牛肉洗净，切块。（图①）\n② 牛肉块放入沸水中氽烫一下，捞出，沥干。（图②）\n③ 锅中加水，放入胡萝卜块和大料稍煮，然后倒入牛肉块，加入老抽，用大火烧沸。（图③）\n④ 锅中继续加入胡椒粉、盐和白砂糖，用中火煮至牛肉烂熟即可。（图④）", "notes": "——牛肉所含的蛋白质丰富，而且富含氨基酸及钙、铁等矿物质，有补益气血、强健筋骨的作用，对产后体质虚弱的新妈妈有很好的调理作用。"}, "菜心鸡肉汤": {"ingredients": "嫩菜心250克，新鲜虾仁、新鲜鸡肉各100克，姜数片。\n盐适量。", "steps": "① 嫩菜心洗净；虾仁洗净；鸡肉洗净，切成片；备好其他材料。（图①）\n② 锅中加入清水煮开，放姜片、鸡肉片和虾仁稍煮。（图②）\n③ 煮至鸡肉熟烂，加菜心稍煮，用盐调味即可。（图③、图④）", "notes": "——鸡肉含有牛磺酸，牛磺酸可以增强人体消化能力，并能提高新妈妈的免疫力。菜心含有丰富的膳食纤维，可以促进胃肠蠕动，帮助新妈妈预防便秘。"}, "ATTI": {"steps": "① 备齐所需材料。将鸡胸肉切成丝；蒜薹切成长约4厘米的段。（图①）\n② 鸡蛋清与干淀粉调匀成蛋清淀粉。\n③ 鸡丝加盐、蛋清淀粉上浆，抓拌均匀。\n（图②）\n④ 碗内加盐、胡椒粉、味精、水淀粉、鲜汤调成味汁。\n⑤ 油锅烧至四成热时，放入鸡丝熘散发白，加入蒜薹略炒一下，然后烹入调好的味汁，收汁亮油起锅装盘即可。（图③、图④）", "notes": "——鸡胸肉富含维生素和优质蛋白质，可强化黏膜，起到预防细菌感染、提升免疫力的作用，对新妈妈产后恢复有益。搭配蒜薹食用，可改善新妈妈体质。"}, "百合甜椒鸡丁（288）": {"ingredients": "鸡腿肉150克 甜椒40克 百合20克\n生姜末10克 蒜末10克 盐10克 蛋白1个\n鸡蛋2个 猪绞肉50克 米酒10毫\n2 蛋液用筛子过滤后放入蒸锅，在锅盖和锅子中横放筷子留缝，以中小火蒸熟。\n1 将鸡蛋打入碗中，接着加入米酒、15毫升酱油及270毫升清水，一起拌匀。\n升 水淀粉15毫升 葱末10克 酱油\n3 起油锅，爆香葱末，再放入肉末炒香，放入剩余酱油和清水、盐，再以水淀粉勾芡，浇在蒸好的蛋上即可。色拉油5毫升\n30毫升 盐5克 食用油5毫升", "steps": "2 鸡丁加入5克盐和蛋白抓匀，稍微腌渍一下。\n1 鸡腿去骨切丁；甜椒切丁；百合剥小片，洗净备用。\n3 热油锅，放入鸡丁煎至微黄，再放入生姜末煎香，接着放入蒜末一起爆香。\n4 最后加入盐调味即可。\n4 最后再放入甜椒、百合和盐，拌炒至甜椒和百合软熟即可。"}, "百合甜椒鸡丁（zibu）": {"ingredients": "鲜百合50克，彩椒60克，鸡胸肉80克，蒜2瓣。\n香油、干淀粉、盐、橄榄油各适量，香油少许。", "steps": "①鸡胸肉洗净切丁后，用香油、干淀粉和盐腌拌一下；彩椒洗净切菱形块；蒜切片。（图①）\n② 百合切片洗净，用沸水焯烫至熟。\n③ 热锅后，加入橄榄油，爆香蒜片，加入鸡肉丁炒至五分熟，再加入彩椒片炒熟。起锅前加入百合和香油拌炒均匀即可。（图②、图③）"}, "小鸡炖蘑菇（jinpai）": {"ingredients": "童子鸡200克，蘑菇8朵，葱段、姜片、酱油、料酒、盐、白糖各适量。", "steps": "1 将白萝卜洗净，切成片；牛肉洗净切成丝，放入碗内，加酱油、盐、香油、葱末、姜末随随清片刻。\n2 锅中放入适量开水，先放入白萝卜片，煮沸后放入牛肉丝，稍煮。\n3 等牛肉丝煮熟后加盐调味，撒上香菜碎即可。\n1 将童子鸡剖洗干净，剁成小块。\n2 将蘑菇用温水泡开，洗净备用。\n3 将鸡块放入锅中翻炒，至鸡肉变色放入葱段、姜片、盐、酱油、白糖、料酒，将颜色炒匀，加入适量水；水沸后放入蘑菇，中火炖熟即可。\n## 产后第31天", "notes": "鸡肉和蘑菇能增强人体免疫力，具有抗病毒的作用。蘑菇中的膳食纤维还对预防便秘十分有利。"}, "小鸡炖蘑菇（zibu）": {"ingredients": "嫩公鸡1只，榛蘑100克，葱段、姜片各适量。\n大料、酱油、料酒、盐、鸡精、冰糖、油各适量，干红甜椒少许。", "steps": "① 公鸡处理干净，洗净，剁成块；榛蘑去除杂质和根部，洗净，用温水泡30分钟；备好其他材料。（图①）\n② 油锅烧至六成热，放入鸡块翻炒至鸡肉变色、水分收干时，放入葱段、姜片、大料、干红甜椒炒出香味。（图②）\n③ 加榛蘑、酱油、冰糖、料酒炒匀，加水烧开，改用小火炖至鸡肉酥烂、汤汁收浓，用盐、鸡精调味即可。（图③）"}, "TATSI": {"steps": "①栗子去皮，洗净后沥干；小米、银耳浸透，洗净；南瓜洗净，切块；备好其他材料。（图①）\n② 鲫鱼剖净后抹干，油锅烧热，放入鲫鱼煎至两面微黄后盛起。（图②）\n③ 锅中加清水，大火烧开，放入银耳、陈皮、小米、栗子和南瓜块稍煮。（图③）\n放入鲫鱼，以中慢火煲约1小时，放盐调味即可。（图④）", "notes": "——栗子含有核黄素，常食对于口舌生疮和口腔溃疡有辅助治疗作用。南瓜含有丰富的膳食纤维，可防治便秘。鲫鱼有开胃的功效。这道汤品很适合新妈妈食用。"}, "枸杞海参排骨汤 益气滋阴+补中益气": {"ingredients": "木耳20克，海参（已发）100克，排骨160克，枸杞子40克，葱1根，姜数片。\n盐少许。\n虾、芦笋各100克，\n蒜末少许。\n盐、水淀粉、料酒、白糖、油各适量。", "steps": "① 备齐所需材料。木耳用水发透，洗净备用。（图①）\n② 海参洗净，切块，用姜葱腌渍，出水后沥干。\n③ 枸杞子洗净；排骨洗净，斩块，氽烫后捞出，沥干。（图②）\n④将全部材料放入煲中，加水后用大火煲滚，改用小火煲2小时，最后加盐调味即可。（图③、图④）\n① 虾去皮、去沙线，用少许盐、水淀粉、料酒腌渍，放冰箱冷藏；芦笋斜切段；备好蒜末。（图①）\n② 油锅烧热，滑熟虾仁，盛出。（图②）\n③另起一锅，加入油烧热，放蒜末，倒入芦笋段，加盐、白糖翻炒一会儿，倒入虾仁，合炒一下，盛出即可。（图③、图④）", "notes": "—— 海参有益气滋阴、强健身体的功效。中医认为，海参性温，有补肾气、益精血的功效。排骨有补中益气的作用。这道菜品可以增强新妈妈的免疫力。\n将虾的红色与芦笋的嫩绿搭配，整道菜品色泽诱人、清淡爽口。\n—— 虾仁可以增进食欲，适合不思饮食的新妈妈调养身体。而且虾仁含有丰富的营养，可以补益新妈妈的身体。芦笋含有叶酸，产后新妈妈患贫血时摄入足量的叶酸及其他维生素，可促进铁的吸收。"}, "사진": {"ingredients": "干淀粉、清汤、料酒、盐各适量。", "steps": "① 银耳泡发，洗净，撕小块；茉莉花洗净，去蒂，入盘内；枸杞子洗净；鸡肝洗净。（图①）\n②鸡肝切薄片，入碗内，调入姜汁、盐、干淀粉、料酒拌匀，备用。（图②）\n③ 汤锅中倒入清汤，加盐，再放入银耳块、鸡肝片、枸杞子烧沸，撇去浮沫，待鸡肝片刚熟，入碗内，最后将茉莉花撒入碗内即可。（图③）"}, "虾米蒸蛋": {"ingredients": "鸡蛋5个，虾米20克，葱末适量。\n盐、鸡精、油各适量。\n活泥鳅500克，姜、葱段各10克。", "steps": "① 鸡蛋磕入碗中，搅打均匀，加入温水、盐、鸡精搅匀。（图①）\n② 再放入适量油、虾米、葱末搅打均匀，备用。（图②）\n③ 蒸锅内放入适量清水，大火煮沸后转小火，放入蛋液，蒸至成糕状即可食用。（图③）\n干妈泥鳅\n补中益气+通利小便\n这道菜品口感咸鲜，泥鳅肉质酥香。\n料酒2小匙，盐、醋各1小匙，香油1大匙，花椒粉、白砂糖各半小匙，干妈豆豉、鲜汤各3大匙，辣椒油、油各适量。\n① 备齐所需材料。将泥鳅剪去头，去内脏，加入醋揉洗干净，擦干表面。（图①）\n② 油锅烧至七八成热时，放入泥鳅炸至呈金黄色时捞出。（图②）\n③ 锅底留油，烧至四成热时，放干妈豆豉炒香，加鲜汤、盐、白砂糖、花椒粉、料酒和炸过的泥鳅略烧，再加辣椒油、香油收汁即可。（图③、图④）", "notes": "——泥鳅富含蛋白质、钙、磷、铁、维生素 $ B_{1} $、维生素 $ B_{2} $和氨基酸、赖氨酸等营养物质，是一种高蛋白、低脂肪食物。此道菜品可以帮助新妈妈改善产后水肿。"}, "西红柿黄瓜鸡蛋汤 利水消肿 + 清热解毒": {"ingredients": "黄瓜50克，鸡蛋1个，\n西红柿半个，葱花\n适量。\n清汤、盐、油各适量。", "steps": "① 黄瓜洗净，切成薄片；西红柿烫一下，撕去外皮，切片；鸡蛋磕入碗中，加少许盐搅拌。（图①）\n② 油锅烧热，倒入蛋液，煎熟后盛出。（图②）\n③ 锅底留油，放入黄瓜片略炒，加入清汤、盐，煮沸。（图③）\n④ 将煎蛋及西红柿片下锅，起锅装入汤碗内，撒上葱花即可。（图④）", "notes": "—— 西红柿中含有丰富的谷胱甘肽，这种物质可以抑制黑色素生成，减退沉着的色素；西红柿中含有的胡萝卜素和番茄红素是很好的抗氧化剂，多食西红柿可使新妈妈的皮肤白皙光滑。"}, "凉拌芹菜": {"ingredients": "花生米100克，芹菜1棵。", "steps": "① 芹菜择洗干净，切成小段；花生去皮。（图①）\n②芹菜段焯烫后捞出过凉，沥干；花生入油锅炸脆。（图②、图③）\n③芹菜段和花生均放入碗内，豆瓣酱切碎后与剩余调料拌匀，淋在花生芹菜段上拌匀即可。（图④）", "notes": "——芹菜含有丰富的膳食纤维，膳食纤维具有很强的吸水能力，可以促进胃肠蠕动，在帮助新妈妈预防便秘的同时，还能吸收肠道中的有害物质，促进毒素排出。"}, "什锦小炒": {"ingredients": "水发黑木耳150克，新鲜莲藕1节，西蓝花1/3棵，荷兰豆、胡萝卜片、蒜片各适量。\n盐、白糖、油各适量，醋、柠檬汁各少许。", "steps": "① 莲藕洗净，切片；西蓝花洗净，切小朵；备好其他材料。（图①）\n②将除蒜片外的材料放入加有柠檬汁的清水中浸泡10分钟，捞出。锅中加水、少许油、盐、白糖烧开，放入莲藕片、西蓝花、胡萝卜片，8秒钟后放入荷兰豆、黑木耳，烧开后捞出所有材料。（图②）\n③ 油锅烧热，爆香蒜片，放入焯好的材料翻炒，加盐、白糖、醋稍炒即可。（图③）"}, "口蘑木耳西蓝花": {"ingredients": "口蘑250克，西蓝花100克，黑木耳50克，葱末、姜末各适量。\n蚝油、盐、油各适量。", "steps": "① 口蘑去蒂，洗净，切片；黑木耳冷水泡发后去蒂，洗净，撕小朵；西蓝花洗净，撕小朵；备好其他材料。（图①）\n② 西蓝花、黑木耳均入沸水中焯烫后捞出，备用。\n③ 油锅烧热，放入葱末、姜末爆香，放入口蘑片煸炒至软。（图②）\n④放入黑木耳、西蓝花翻炒25秒，最后加盐、蚝油调味即可。（图③）"}, "炒胡萝卜丝 健脾化滞+润肠通便": {"ingredients": "胡萝卜300克，蒜瓣适量。\n盐、醋、油各适量。", "steps": "①胡萝卜洗净，去皮，切丝；蒜瓣去皮，切片；备好其他材料。（图①）\n② 油锅烧热，放入蒜片，大火炒香。\n③转小火，放入胡萝卜丝，翻炒均匀。\n（图②）\n④加盐、醋调味，翻炒至胡萝卜丝变软即可。（图③）"}, "蒜末西蓝花": {"ingredients": "西蓝花300克，蒜瓣适量。\n盐、鸡精、水淀粉、油各适量。", "steps": "① 将西蓝花洗净，切块，入加有油的沸水中焯烫至熟，捞出，沥干；蒜瓣去皮，切末，备用。（图①）\n②一部分蒜末放入水淀粉中，搅拌均匀，成料汁，备用。（图②）\n③ 锅中加少许清水煮沸，加盐、鸡精调味，倒入料汁勾芡，将调好味的芡汁淋在西蓝花块上即可。（图③）"}, "回锅青红藕片": {"ingredients": "莲藕1节，青甜椒、红甜椒、葱花、姜末各适量。\n料酒、生抽、生粉、\n甜面酱、豆瓣酱、白糖、油各适量。", "steps": "① 莲藕去皮，洗净，切厚片；青甜椒、红甜椒分别洗净，切片。（图①）\n②莲藕片入沸水中焯烫2分钟，捞出，沥干，放入碗中，撒上生粉抓匀。\n③藕片炸至表面微焦，捞出，沥油。（图②）\n④ 锅底留油，炒香葱花、姜末，倒入豆瓣酱翻炒至出红油，加入甜面酱炒匀，然后加入青椒片、红椒片炒至断生，再放入藕片，烹入剩余调料翻炒即可。（图③、图④）", "notes": "——莲藕含有大量淀粉、蛋白质和丰富的钙、磷、铁及多种维生素，是祛瘀生新的佳蔬良药，能够行血化瘀、清热生乳。莲藕还富含纤维素，可刺激肠道蠕动，有效预防便秘。"}, "手撕圆白菜": {"ingredients": "圆白菜500克，姜、蒜瓣各适量。\n干红甜椒少许，花椒、盐、油各适量。\n黄豆芽50克，香菇、金针菇、黑木耳各30克，豆干、芹菜、榨菜、青蒜各适量。\n盐适量。", "steps": "① 圆白菜放入水中浸泡10分钟，洗净后撕成片；干红甜椒洗净，切小段；姜、蒜瓣分别切片，备用。（图①）\n② 油锅烧热，放入花椒、干红甜椒段煸香，再放入姜片、蒜片炒出香味。（图②）\n③放入圆白菜片翻炒至断生，入盐调味，翻炒均匀即可。（图③）\n食材丰富，营养全面，诱人食欲。\n①金针菇洗净；黑木耳泡软，去蒂切丝；香菇泡软后切丝；芹菜择洗干净后切段；黄豆芽洗净；榨菜、豆干均切丝；青蒜切斜段，备用。（图①）\n② 油锅烧热，放入黄豆芽煸炒后放入金针菇继续翻炒。（图②）\n③将剩余材料放入锅内炒熟，加入适量盐调味。（图③）\n④ 将炒熟的菜品装盘，凉后冷藏即可食用。"}, "西蓝花炒胡萝卜润肠通便+补脾和胃": {"ingredients": "西蓝花、胡萝卜各150克，蒜瓣适量。\n盐、素蚝油、油各适量。", "steps": "① 西蓝花洗净，切块；胡萝卜洗净，去皮，切片；蒜切片。（图①）\n② 西蓝花块、胡萝卜片分别入沸水中焯烫后捞出，沥干，备用。（图②）\n③ 油锅烧热，爆香蒜片，然后放入西蓝花块略翻炒，放入胡萝卜片翻炒均匀，最后加盐和素蚝油炒匀即可。（图③）"}, "红枣芹菜汤 补虚益气 + 养血安神": {"ingredients": "芹菜300克，红枣60克。\n红糖适量。", "steps": "① 备齐所需材料。芹菜去根、叶，洗净，切段。（图①）\n②红枣洗净，入清水中泡软，加3碗水煮汤，然后调入红糖同煮。（图②）\n③ 待煮至红枣软透时，放入芹菜段，调成大火煮沸即可。（图③）"}, "西红柿西芹汤 生津止渴 + 健胃消食": {"ingredients": "西红柿300克，胡萝卜200克，西芹180克，洋葱、姜各适量。\n盐适量。", "steps": "①胡萝卜洗净，去皮，切薄片；西芹洗净，切段；西红柿洗净，每个切成四块；洋葱切丝，备用。（图①）\n② 汤锅中入适量水，放入全部材料，先用大火煮沸。（图②）\n③然后调成中火煮40分钟，出锅前加少许盐调味即可。（图③）\nDocument generated by Anna's Archive around 2023-2024 as part of the DuXiu collection (https://annas-blog.org/duxiu-exclusive.html).\nImages have been losslessly embedded. Information about the original file can be found in PDF attachments. Some stats (more in the PDF attachments):\nImages have been losslessly embedded. Information about the original file can be found in PDF attachments):\n{\n\"filename\": \"MTQ2Njk1MDYuemlw\",\n\"filename_decoded\": \"14669506.zip\",\n\"filesize\": 20973501,\n\"md5\": \"0b2f26b6e47f8f0686ea04c4b6c78055\",\n\"header_md5\": \"edb57b78f2bcc42718129cc11ddf9c11\",\n\"sha1\": \"9ad2bfb1061069b5e70177bb57c22b369255d055\",\n\"sha256\": \"12f39637f8e8273e1021e9498fb8ee77965d59ad6cdceb82eb46f112f6935f4a\",\n\"crc32\": 588708937,\n\"zip_password\": \"\",\n\"uncompressed_size\": 26200034,\n\"pdg_dir_name\": \"14669506\",\n\"pdg_main_pages_found\": 152,\n\"pdg_main_pages_max\": 152,\n\"total_pages\": 162,\n\"total_pixels\": 603748144\n}"}, "木耳海参猪肚汤": {"ingredients": "黑木耳，水发海参，猪肚，枸杞", "steps": "1. 猪肚加面粉和白醋清洗干净，然后切小段；\n2. 黑木耳提前 30 分钟用清水泡开，洗净撕成小块；\n3. 去除水发海参里面的沙泥，清洗干净；\n4. 先将猪肚条出水，然后放入锅中，加生姜片、少许黄酒和适量清水，大火煮开后，以小火煲1小时，再把黑木耳和海参倒入煮15分钟左右，加入洗净的枸杞，即可调味出锅。"}, "虫草花乌鸡汤": {"ingredients": "乌鸡，虫草，胡萝卜，红枣，枸杞", "steps": "1. 将乌鸡清洗干净，斩成小块，加葱姜、黄酒出水，然后清洗干净备用；\n2. 胡萝卜刨皮切滚刀块，红枣、枸杞和虫草花都清洗干净备用；\n3. 往锅里加水、生姜片，然后把乌鸡倒入一起煮开，等水开之后，把胡萝卜、虫草花、红枣、枸杞一起加入，小火煮30分钟，并加少许盐调味即可。"}, "黄豆猪脚汤": {"ingredients": "猪脚，黄豆，枸杞\n1. 黄豆提前4小时泡好，让它完全胀开；\n2. 猪脚清洗干净，最好是用刀具把毛全部刮干净。切成小块，出水，撇去泡沫，然后倒出备用；\n3. 往锅里加水和生姜，把出好水的猪脚和黄豆倒入煮开，待水开后，以中小火继续煮40分钟后再加入少许洗净的枸杞，并加少许盐调味即可。"}, "黄花菜鱼龙骨汤": {"ingredients": "鱼龙骨，黄花菜，枸杞制作方法：\n1. 黄花菜、枸杞提前泡好，清洗干净；\n2. 鱼龙骨清洗干净，斩块；\n3. 把鱼龙骨两面煎黄，加入生姜片，再加适量开水一起熬煮，直至汤白，然后把清洗好的黄花菜、枸杞放入再熬3分钟即可调味出锅。"}, "黄芪公鸡汤": {"ingredients": "公鸡，胡萝卜，虫草花，\n黄芪，枸杞", "steps": "1. 胡萝卜刨皮，清洗干净，切滚刀块备用；\n2. 准备好1~2片黄芪和3~5粒枸杞，分别清洗干净，干虫草花泡水清洗干净；\n3. 将公鸡清洗干净，斩小块，然后加入黄酒和生姜片出水备用；\n4. 往锅里放水，把黄芪与生姜、鸡块一起放入煮开，然后改中小火，把虫草花、枸杞、胡萝卜放入再小火焖30分钟。加少许盐调味即可。"}, "竹菸鴿蛋乳鴿汤": {"ingredients": "乳鸽，竹荪，鸽蛋（或鹌鹑蛋），枸杞\n2. 鸽蛋（或鹌鹑蛋）煮熟，去壳备用；\n1. 竹荪提前泡好、两头剪干净，并清洗枸杞；\n3. 乳鸽清洗干净，斩小块，加入黄酒和生姜片出水，并将出过水的乳鸽再清洗干净；", "steps": "4. 往锅里放水，把生姜片和乳鸽一起放入煮开，再加入竹荪，小火焖30分钟，然后再加入鸽蛋（或鹌鹑蛋）继续煮5分钟，加入枸杞，即可调味出锅。"}, "通草鲫鱼豆腐汤": {"ingredients": "鲫鱼，豆腐，枸杞，通草", "steps": "1. 鲫鱼刮鳞，破肚，去腮，清洗干净，然后切成两小段；\n2. 豆腐切成麻将块，出水备用，通草清洗干净后用水泡着备用；\n3. 锅烧热滑油，然后将姜片煸香，把鲫鱼倒入后两面煎黄；\n4. 加适量开水，没过鲫鱼背，倒入洗净的枸杞、通草，一起大火熬10分钟左右，然后再把通草挑出来弃用；\n5. 鲫鱼汤中加入出好水的豆腐，放少许盐和胡椒粉调味即可。"}, "三 丝豆腐羹": {"ingredients": "牛腩肉，山药，番茄，虫草花\n2. 番茄划十字刀，开水烫一下，去皮，切块；\n豆腐，胡萝卜，黑木耳或香菇，里脊肉，鸡蛋1个", "steps": "3. 山药刨皮，然后切成滚刀块；\n1. 牛腩肉清洗干净出水，把上面泡沫撇掉之后再次清洗干净备用；\n4. 往锅里放油，把番茄煸透，加水，加生姜片，然后把牛腩和虫草花一起放入大火煮开，再以小火焖30分钟，再把山药加入煮10分钟，然后用少许盐调味即可。\n1. 豆腐、里脊肉、胡萝卜、黑木耳或香菇全部切丝；\n2. 把肉丝用鸡蛋、生粉和少许盐上浆；\n3. 先把胡萝卜丝、香菇丝或黑木耳丝一起出水，之后再把豆腐丝也出水；\n4. 鸡蛋敲碎打匀：\n5. 往锅里放水，把出好水的丝全部放入一起煮开，然后用少许盐调味，再用生粉勾芡，最后将鸡蛋淋上，加入几滴麻油即可。"}, "清炖石蛙汤": {"ingredients": "石蛙，枸杞\n昂刺鱼，豆腐", "steps": "1. 石蛙剖肚去内脏，去头去皮清洗干净，斩成小块出水，然后撇去泡沫，再次清洗干净备用；\n2. 将枸杞清洗干净；\n3. 把石蛙放进汤盅，加少许盐调味，加入生姜片、放4~5粒枸杞上蒸箱，蒸30分钟即可。"}, "昂刺鱼豆腐汤": {"steps": "1. 把豆腐切成麻将块；\n2. 昂刺鱼清洗干净，往锅里放少许油，加生姜片，然后把昂刺鱼两面煎一下，再加入开水大火煮透；\n3. 待锅里的汤汁煮白，把豆腐放入煮开，加少许盐调味即可出锅。"}, "海带排骨汤": {"ingredients": "排骨，海带结，枸杞\n仔排，黄木瓜，枸杞", "steps": "1. 提前一天将海带结泡开，然后清洗干净；\n2. 排骨清洗干净，斩成小块，加葱、姜、黄酒一起出水，然后撇去泡沫，再次清洗干净备用；\n3. 往锅里放水，把海带结和排骨一起放入煮开，然后小火焖30分钟，再把枸杞倒入煮3分钟，调味即可出锅。"}, "鸡煲鱼胶汤": {"ingredients": "公鸡，鱼胶，虫草花，胡萝卜块", "steps": "1. 将公鸡清洗干净，斩块出水备用；\n2. 将鱼胶提前一天泡开，虫草花提前5分钟泡开，清洗干净；\n3. 往锅里放水，加入生姜片、虫草花和鸡块一起煮开，然后调至小火，把鱼胶放入焖30分钟，加入少许盐调味即可。"}, "丝瓜猪肝肉片汤": {"ingredients": "猪肝，里脊肉，丝瓜，\n虫草花", "steps": "1. 将猪肝清洗干净，切片，再用活水冲净血水；\n2. 将丝瓜去皮，清洗后切滚刀块备用；\n3. 将里脊肉清洗干净切片，然后用盐、料酒腌制10分钟左右；\n4. 把冲好水的猪肝和肉片分别出水备用；\n5. 在锅中加入清水，放丝瓜和虫草花煮开，然后再把猪肝和里脊肉煮到食材熟透，加少许盐调味即可。"}, "山药杜仲猪腰汤": {"ingredients": "公鸡，猪肚，干贝枸杞\n猪腰，山药，杜仲，胡萝卜\n里脊肉，莲藕，枸杞\n1. 将里脊肉切小块，加黄酒和葱姜一起出水备用；\n2. 把莲藕去皮，切成小滚刀块；", "steps": "2. 将公鸡清洗干净，斩块，出水备用；\n1. 将猪肚用白醋和面粉清洗干净，然后切块出水备用；\n3. 往锅里放水，把猪肚熬20分钟左右，然后把鸡块和干贝一起放入，小火熬40分钟后加入枸杞，然后调味即可。\n1. 将2片杜仲清洗干净，放适量的水熬汤备用；\n2. 将猪腰清洗干净，对半剖开，把上面的一层白衣去掉，再把内部腰
