<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月子餐餐谱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍲</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #C97B6B;
  --color-primary-light: #E8A99C;
  --color-primary-dark: #A35A4C;
  --color-accent: #8FAE8B;
  --color-accent-light: #B8D1B5;
  --color-gold: #C9A96E;
  --color-gold-light: #E5D5A8;
  --color-surface: #FBF7F4;
  --color-card: #FFFAF7;
  --color-card-hover: #FFF5EE;
  --color-text: #3D2B1F;
  --color-text-muted: #8B7D75;
  --color-text-light: #B8ADA6;
  --color-border: #EDE4DD;
  --color-border-light: #F5EDE7;
  --color-danger: #D4756B;
  --color-danger-light: #F8E0DD;
  --font-display: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 3px rgba(61,43,31,0.06);
  --shadow-md: 0 4px 16px rgba(61,43,31,0.08);
  --shadow-lg: 0 8px 32px rgba(61,43,31,0.12);
  --shadow-xl: 0 16px 48px rgba(61,43,31,0.16);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--color-surface);
  color: var(--color-text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景装饰 */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(201,122,107,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -150px;
  left: -150px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(143,174,139,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* 头部 */
.app-header {
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, #FDF6F0 0%, #FBF0EA 50%, #F5EDE7 100%);
  border-bottom: 1px solid var(--color-border);
  padding: 32px 0 28px;
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 12px rgba(201,122,107,0.25);
}

.header-text h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: 1px;
}

.header-text p {
  font-size: 13px;
  color: var(--color-text-muted);
  margin-top: 2px;
  font-weight: 300;
}

.btn-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 16px rgba(201,122,107,0.3);
  font-family: var(--font-body);
}

.btn-add:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(201,122,107,0.4);
}

.btn-add:active { transform: translateY(0); }

.btn-add .icon { font-size: 18px; font-weight: 300; }

/* 主内容 */
.app-main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 32px 60px;
}

/* 工具栏 */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 360px;
}

.search-box input {
  width: 100%;
  padding: 10px 16px 10px 42px;
  border: 1.5px solid var(--color-border);
  border-radius: 50px;
  font-size: 14px;
  font-family: var(--font-body);
  background: var(--color-card);
  color: var(--color-text);
  transition: var(--transition);
  outline: none;
}

.search-box input:focus {
  outline: none;
}

.search-box input::placeholder { color: var(--color-text-light); }

.search-box .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-light);
  font-size: 14px;
}

/* 分类标签 */
.tab-bar {
  display: flex;
  gap: 6px;
  background: var(--color-card);
  border: 1px solid var(--color-border-light);
  border-radius: 50px;
  padding: 4px;
}

.tab-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: var(--transition);
  background: transparent;
  color: var(--color-text-muted);
  white-space: nowrap;
  border: 1.5px solid transparent;
}

.tab-btn:hover { color: var(--color-text); background: var(--color-border-light); }

.tab-btn.active {
  background: var(--color-primary);
  color: #fff;
  border-color: var(--color-primary);
  box-shadow: 0 2px 8px rgba(201,122,107,0.25);
}

.tab-btn[data-tab="favorite"].active {
  background: var(--color-gold);
  border-color: var(--color-gold);
  color: #fff;
  box-shadow: 0 2px 8px rgba(201,169,110,0.25);
}

/* 统计条 */
.stats-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  flex: 1;
  background: var(--color-card);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: var(--transition);
}

.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }

.stat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.stat-icon.breakfast { background: #FFF3E0; }
.stat-icon.lunch { background: #E8F5E9; }
.stat-icon.dinner { background: #FCE4EC; }
.stat-icon.snack { background: #FFF8E1; }

.stat-info .stat-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--color-text);
}

.stat-info .stat-label {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 1px;
}

/* 餐谱列表 */
.meal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.meal-card {
  background: var(--color-card);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s ease backwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.meal-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--color-primary-light);
}

.meal-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--color-primary), var(--color-gold));
  opacity: 0;
  transition: var(--transition);
}

.meal-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title-group { flex: 1; }

.card-name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 4px;
}

.card-category {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 500;
}

.card-category.breakfast { background: #FFF3E0; color: #E65100; }
.card-category.lunch { background: #E8F5E9; color: #2E7D32; }
.card-category.dinner { background: #FCE4EC; color: #C62828; }
.card-category.snack { background: #FFF8E1; color: #F57F17; }
.card-stage {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 500;
  background: #F3E5F5;
  color: #7B1FA2;
  margin-left: 6px;
}

.card-desc {
  font-size: 13px;
  color: var(--color-text-muted);
  line-height: 1.7;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.meta-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--color-text-light);
  padding: 3px 8px;
  background: var(--color-border-light);
  border-radius: 6px;
}

.meta-tag .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
}

.meta-tag .dot.warm { background: #E65100; }
.meta-tag .dot.cool { background: #1565C0; }
.meta-tag .dot.neutral { background: var(--color-accent); }

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.empty-icon { font-size: 56px; margin-bottom: 16px; }

.empty-state h3 {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--color-text);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  color: var(--color-text-muted);
  margin-bottom: 24px;
}

/* 手机端优先 - 全局适配 */
body {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

/* ===== 头部 - 移动端紧凑 ===== */
.app-header {
  padding: 16px 0 12px;
}
.header-inner {
  padding: 0 16px;
}
.header-left {
  gap: 10px;
}
.header-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  font-size: 20px;
}
.header-text h1 {
  font-size: 18px;
}
.header-text p {
  font-size: 12px;
}

/* ===== 主内容区 - 移动端紧凑边距 ===== */
.app-main {
  padding: 12px 12px 80px;
}

/* ===== 统计条 - 移动端横向滚动 ===== */
.stats-bar {
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-card {
  padding: 10px 12px;
  gap: 8px;
  border-radius: 10px;
  flex: 1 1 calc(50% - 4px);
  min-width: 0;
}
/* 移动端隐藏"全部菜谱"卡片（与标题重复） */
.stat-card:last-child {
  display: none;
}
.stat-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 14px;
}
.stat-info .stat-num {
  font-size: 16px;
}
.stat-info .stat-label {
  font-size: 11px;
}

/* ===== 工具栏 - 移动端竖排紧凑 ===== */
.toolbar {
  gap: 8px;
  margin-bottom: 12px;
  flex-direction: column;
}
.search-box {
  min-width: 0;
  max-width: 100%;
}
.search-box input {
  padding: 9px 14px 9px 38px;
  font-size: 16px;
}
.search-box .search-icon {
  left: 14px;
  font-size: 13px;
}
.tab-bar {
  gap: 4px;
  padding: 3px;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 7px 14px;
  font-size: 13px;
  min-height: 36px;
}

/* ===== 菜谱列表 - 移动端紧凑双列 ===== */
.meal-grid {
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.meal-card {
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.meal-card:active {
  transform: scale(0.97);
  opacity: 0.9;
}
/* 移动端去掉hover效果（减少抖动） */
.meal-card:hover {
  transform: none;
  box-shadow: none;
  border-color: var(--color-border-light);
}
.meal-card:hover::before { opacity: 0; }
.card-header {
  margin-bottom: 6px;
}
.card-name {
  font-size: 14px;
  line-height: 1.3;
  margin-bottom: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-category {
  padding: 1px 7px;
  font-size: 10px;
}
.card-stage {
  padding: 1px 6px;
  font-size: 10px;
  margin-left: 4px;
}
.card-desc {
  font-size: 11px;
  line-height: 1.5;
  margin-bottom: 6px;
  -webkit-line-clamp: 2;
}
.card-meta {
  gap: 4px;
}
.meta-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
}
/* 动画加速 */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.meal-card {
  animation-duration: 0.2s;
}

/* ===== 空状态 - 移动端紧凑 ===== */
.empty-state {
  padding: 48px 16px;
}
.empty-icon { font-size: 40px; }
.empty-state h3 { font-size: 16px; }

/* 安全区域适配（iPhone X+ 底部） */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .app-main { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  .detail-body { padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-text-light); }

/* 详情弹窗 - 基础样式（移动端优先，底部弹出） */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,43,31,0.4);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.detail-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.detail-panel {
  background: var(--color-card);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.detail-overlay.show .detail-panel {
  transform: translateY(0);
}

.detail-header {
  padding: 20px 16px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.detail-header h2 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.4;
  flex: 1;
}

.detail-close {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 8px;
  background: var(--color-border-light);
  color: var(--color-text-muted);
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.detail-close:hover { background: var(--color-border); color: var(--color-text); }

.detail-tags {
  padding: 10px 16px 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.detail-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.detail-tag.breakfast { background: #FFF3E0; color: #E65100; }
.detail-tag.lunch { background: #E8F5E9; color: #2E7D32; }
.detail-tag.dinner { background: #E3F2FD; color: #1565C0; }
.detail-tag.snack { background: #F3E5F5; color: #7B1FA2; }
.detail-tag.warm { background: #FFF8E1; color: #E65100; }
.detail-tag.cool { background: #E3F2FD; color: #1565C0; }
.detail-tag.neutral { background: #E8F5E9; color: #2E7D32; }
.detail-tag.stage { background: #FCE4EC; color: #C62828; }

.detail-body {
  padding: 16px 16px 32px;
}

.detail-section {
  margin-bottom: 14px;
}

.detail-section:last-child {
  margin-bottom: 0;
}

.detail-section-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.detail-section-content {
  font-size: 13px;
  color: var(--color-text);
  line-height: 1.7;
  white-space: pre-line;
}

.detail-section-content.steps-content {
  counter-reset: step;
}

.detail-desc {
  font-size: 13px;
  color: var(--color-text-muted);
  line-height: 1.7;
  padding: 10px 12px;
  background: var(--color-border-light);
  border-radius: var(--radius);
  margin-bottom: 12px;
}

.detail-no-data {
  text-align: center;
  padding: 32px 20px;
  color: var(--color-text-light);
  font-size: 14px;
}

.meal-card {
  cursor: pointer;
}

/* ===== 大屏适配 ===== */
@media (min-width: 768px) {
  .app-header { padding: 32px 0 28px; }
  .header-inner { padding: 0 32px; }
  .header-left { gap: 16px; }
  .header-icon { width: 52px; height: 52px; border-radius: 16px; font-size: 26px; }
  .header-text h1 { font-size: 24px; }
  .header-text p { font-size: 13px; }
  .app-main { padding: 28px 32px 60px; }
  .stats-bar { gap: 16px; margin-bottom: 24px; flex-wrap: nowrap; overflow: visible; }
  .stat-card { flex: 1; }
  .stat-card { padding: 16px 20px; gap: 12px; }
  .stat-card:last-child { display: flex; }
  .stat-icon { width: 40px; height: 40px; font-size: 18px; }
  .stat-info .stat-num { font-size: 22px; }
  .stat-info .stat-label { font-size: 12px; }
  .toolbar { gap: 12px; margin-bottom: 24px; flex-direction: row; }  .search-box { max-width: 360px; }
  .tab-btn { padding: 8px 18px; font-size: 13px; min-height: auto; }
  .meal-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .meal-card { padding: 20px; border-radius: var(--radius-lg); }
  .meal-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--color-primary-light); }
  .meal-card:hover::before { opacity: 1; }
  .card-name { font-size: 17px; -webkit-line-clamp: unset; }
  .card-category { padding: 2px 10px; font-size: 11px; }
  .card-desc { font-size: 13px; -webkit-line-clamp: 3; }
  .meta-tag { font-size: 12px; padding: 3px 8px; }
  .detail-overlay { padding: 20px; align-items: center; }
  .detail-panel { max-width: 640px; max-height: 85vh; border-radius: var(--radius-lg); transform: translateY(20px) scale(0.97); }
  .detail-overlay.show .detail-panel { transform: translateY(0) scale(1); }
  .detail-header { padding: 28px 28px 0; }
  .detail-header h2 { font-size: 22px; }
  .detail-close { width: 36px; height: 36px; border-radius: 10px; font-size: 18px; }
  .detail-tags { padding: 12px 28px 0; gap: 8px; }
  .detail-tag { font-size: 12px; padding: 4px 10px; }
  .detail-body { padding: 20px 28px 28px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 15px; margin-bottom: 10px; }
  .detail-section-content { font-size: 14px; line-height: 1.8; }
  .detail-desc { font-size: 14px; padding: 12px 16px; margin-bottom: 16px; }
}

</style>
</head>

<script>
const recipeDetails = {"三鲜烩豆腐": {"ingredients": "猪里脊150克\n胡萝卜50克\n嫩豆腐150克\n鸡蛋1个\n木耳50克\n香菜10克\n盐5克\n胡椒粉5克\n芝麻油5毫升\n葱末10克\n生姜末10克\n白糖2克\n水淀粉15毫升\n食用油适量", "steps": "1 豆腐切丁，放入盐水中煮开，浸泡10分钟后捞出，再泡入盐凉水中。\n2 里脊、胡萝卜、木耳切丁。\n3 热油锅，爆香葱末、生姜末，接着放入猪肉丁、胡萝卜和木耳一起翻炒，再加入清水及豆腐丁。\n4 大火煮开后，转小火慢炖15分钟，加入盐、胡椒粉、白糖调味，再以水淀粉勾芡。\n5 最后打入鸡蛋，炒匀，再滴上芝麻油、撒上香菜即完成。", "notes": "豆腐营养容易被人体吸收，可以防衰老，预防心血管疾病和老年痴呆症，维持骨骼健康，降低胆固醇。和三鲜一起入此菜，有生津开胃、补充营养、稳定不良情绪的功效。"}, "南瓜烩豆腐": {"ingredients": "南瓜100克\n嫩豆腐50克\n豌豆仁10克\n酱油15毫升\n盐5克\n芝麻油5毫升\n姜片3片\n丝瓜200克\n红椒50克\n蒜头2瓣\n鸡汤100毫升\n盐5克\n食用油5毫升", "steps": "1 南瓜去掉皮和籽，和嫩豆腐分别切成块。\n2 将芝麻油倒入锅中加热，下姜片爆香。\n3 接着放入南瓜块，用小火煎至九成熟，然后压成泥，再放入酱油和50毫升清水，搅拌均匀。\n4 待烧开时，加入嫩豆腐和豌豆仁一同煨煮一下，最后再放入盐调味即可。\n1 丝瓜洗净、去皮，切成段，再切成片，放入碗中。\n2 将红椒洗净、去籽，切成丝，放在丝瓜上。\n3 再将大蒜切成末，撒在丝瓜与红椒丝上。\n4 菜肴撒上盐，接着淋上鸡汤和食用油。\n5 蒸锅加水烧开，将菜碗放入，猛火蒸3分钟即可。", "notes": "南瓜可促进排便顺畅、预防泌尿系统疾病、抗氧化、滋养肌肤、补中益气；豆腐则含蛋白质、钙、B族维生素等营养，无胆固醇，容易被人体吸收，可维持骨骼健康、降低胆固醇。\n丝瓜性属甘凉，具有清热消暑、止咳化痰、祛斑美白、凉血解毒、通经络、利血脉、下乳汁的作用。故饮用此汤，可帮助妈妈促进恶露排出、利尿清热，改善乳量不足。"}, "虱目鱼粥": {"ingredients": "虱目鱼肚1个\n白饭100克\n生姜丝10克\n香菜末10克\n米酒5毫升\n盐5克\n葱末10克\n芝麻油5毫升", "steps": "1 取汤锅，加入500毫升清水、生姜丝及白饭，煮至汤汁浓稠、白饭软化。\n2 接着加入鱼肚，大火滚煮3分钟，至鱼肚熟透。\n3 最后加入米酒、香菜末、葱末、盐及芝麻油，待再次沸腾即可起锅。"}, "香菇鲈鱼汤": {"ingredients": "鲈鱼250克 新鲜香菇3朵 木耳5克\n米酒15毫升 葱花10克 生姜片3片\n盐5克 食用油适量\n2 鲈鱼去内脏、洗净，擦干鱼身。\n包菜叶6片\n猪绞肉300克\n马蹄50克\n米酒5毫升\n芝麻油5毫升\n白胡椒粉5克\n盐5克", "steps": "1 马头鱼洗净、清除内脏，切成小块后，将生姜丝塞入鱼腹内。\n2 丝瓜去皮，洗净、切段，与马头鱼、600毫升清水一起放入汤锅内，用大火煮沸。\n3 接着盖上锅盖，再用小火慢炖至鱼熟。\n4 起锅前，加入盐调味即可。\n1 香菇洗净后一开二；木耳泡发，去蒂、切块。\n3 热油锅，将鲈鱼两面煎透后，放入生姜片爆香，再加入500毫升清水和米酒，用大火煮开。\n4 盖上锅盖，用小火滚煮10分钟。\n5 待汤头成奶白色时，放入香菇和木耳煮熟。\n6 起锅前，撒入葱花和盐即可。\n1 马蹄洗净，切碎末；包菜叶洗净，切去老梗，放入滚水中煮软，备用。\n2 猪绞肉中加入马蹄末、盐、白胡椒粉、米酒、芝麻油搅拌均匀，至食材出现黏性。\n3 取1片包菜叶，铺上拌好的馅料，包成长方形，即为包菜卷。\n4 将包好的包菜卷放入内锅中，外锅倒入150毫升水，蒸15分钟后掀盖看看是否熟透，若还没熟透可再加点水继续蒸煮，约15分钟即完成。"}, "牛奶西蓝花": {"ingredients": "1 将西蓝花洗净，切成小朵，放入盐水中氽烫，再捞出、沥干水分备用。\n菠菜200克\n猪肉25克\n葱花10克\n姜末10克\n盐5克\n水淀粉5毫升\n食用油5毫升\n2 起油锅，烧热，再加入葱花爆香。\n3 倒入15毫升清水、盐及西蓝花煨煮3分钟，接着加入牛奶，转小火一同熬煮。"}, "肉末菠菜": {"steps": "4 最后用水淀粉勾芡，以盐调味，炒匀即可。\n1 菠菜洗净，切成三厘米长段；猪肉切小丁备用。\n2 烧热油锅，放入葱花和姜末爆香后，放入猪肉丁爆炒。\n3 待猪肉丁快熟时，再放入菠菜一起翻炒。"}, "娃娃菜鲈鱼汤": {"ingredients": "鲈鱼1条 娃娃菜2株 生姜片3片 盐5克\n食用油15毫升 枸杞10克 米酒15毫升", "steps": "1 清除鲈鱼内脏及鳞片、洗净，仔细擦干鱼身水分。\n2 娃娃菜洗净后切去蒂头，再对半剖开。\n3 起油锅、烧热，将鲈鱼煎至两面微黄后，放入生姜片、米酒及600毫升清水，大火煮开后，转小火续煮，煮至汤色呈乳白色。\n4 放入娃娃菜一起熬煮10分钟，接着放入枸杞和盐，再煮3分钟即可。"}, "鲈鱼奶汤": {"ingredients": "鲈鱼1条 黄豆50克 生姜片5片\n八角5克 盐5克 胡椒粉5克\n色拉油15毫升", "steps": "1 鲈鱼去除鳞和内脏、洗净，在背上切上花刀。\n2 起油锅、烧热，放入鲈鱼和生姜片略煎，再倒入600毫升清水烧开。\n3 接着加入八角和黄豆，一起熬煮至鲈鱼熟透、汤呈奶白色。\n4 最后加入盐和胡椒粉调味即可。"}, "虾仁鱼片汤": {"ingredients": "鲜虾仁200克 鱼肉150克 油麦菜心\n30克 香菜10克 食用油适量 盐5克", "steps": "白虾140克\n胡萝卜50克\n白萝卜50克\n柴鱼片15克\n盐5克\n葱花10克 姜末10克\n1 虾仁洗净、去肠泥，放入油锅中微炒后捞出。\n4 待虾煮熟，最后加入盐调味即可。\n2 胡萝卜和白萝卜分别洗净，去皮、切片。\n1 白虾洗净，开背去肠泥。"}, "萝卜鲜虾": {"steps": "5 最后调入盐、撒上香菜即可。"}, "枸杞鸡丁": {"ingredients": "鸡胸肉100克 枸杞10克 马蹄30克 蛋白1个\n食用油5毫升 生粉10克 盐10克 葱段10克\n生姜末10克 蒜末10克", "steps": "1 马蹄去皮、洗净，切丁；枸杞洗净备用。\n2 鸡胸肉洗净、切丁，放入5克盐、蛋白及生粉均匀搅拌。\n3 热油锅，爆香葱段、生姜末及蒜末，放入鸡丁、马蹄、15毫升水和剩余盐，快速翻炒。\n4 最后放入枸杞，再翻炒几下至鸡肉熟透即可。"}, "木耳鸡汤": {"ingredients": "1 乌骨鸡洗净、斩块，汆烫去血水后捞出，放入已注入沸水的砂锅中。\n2 木耳洗净、泡发后，去蒂切小块；红枣洗净，去核备用。\n3 将木耳、桂圆、红枣、生姜片一起放入已放入鸡肉块的砂锅里，待煮沸后，转小火慢炖1小时，炖至鸡肉软烂。"}, "红枣鸡蛋汤": {"ingredients": "熟鸡蛋1个\n红枣30克\n生姜片2片\n红糖20克", "steps": "1 红枣洗净，泡软后去核。\n2 取汤锅，注入500毫升清水和红枣，大火煮沸30分钟。\n3 再加入熟鸡蛋、生姜片和红糖，一起熬煮至出味即可。"}, "皮蛋瘦肉粥": {"ingredients": "白米粥150克\n皮蛋2个\n猪绞肉40克\n油条1根\n葱花10克\n生姜丝10克\n盐5克\n食用油适量\n2 热油锅，放入葱花和猪绞肉炒香，接着加入200毫升清水、白米粥和生姜丝一起煮开，再放入盐调味。\n3 最后放入皮蛋丁，待再次煮开后，盛入碗中，再放入油条段即可。\n1 将皮蛋剥壳、切丁；油条切成小段。"}, "豆浆上海青汤": {"ingredients": "上海青200克 豆浆200毫升 盐5克\n食用油5毫升 葱10克 生姜10克", "steps": "1 将上海青洗净，切段；生姜洗净，切片；葱切成段，备用。\n2 热油锅，放入姜片和葱段爆香。"}, "娃娃菜萝卜汤": {"ingredients": "4 捞去姜片和葱段，接着倒入豆浆，以小火烧开即可。\n娃娃菜200克 胡萝卜80克 豆腐\n200克 食用油5毫升 香菜末10克\n盐5克 葱段20克", "steps": "1 将娃娃菜、豆腐、胡萝卜去皮、洗净，切长条，焯烫后捞出备用。\n2 起油锅烧至五成热，先放入葱段爆香，再倒入500毫升水，接着将胡萝卜、豆腐放入锅中一起煮。\n3 以大火煮开后，再加入娃娃菜。\n4 待再次煮开后，转小火煮至胡萝卜熟透，再加入盐和香菜末即可。"}, "清炒蔬菜": {"ingredients": "蘑菇50克\n西芹200克\n红椒50克\n盐5克\n色拉油15毫升", "steps": "1 将蘑菇、西芹、红椒分别洗净。\n2 西芹切斜刀片；红椒切条状；蘑菇切对半备用。\n3 热油锅，放入蘑菇、西芹和红椒，略为翻炒。\n4 接着加入盐调味，翻炒均匀至熟后即可。"}, "苋菜豆腐鸡蛋汤": {"steps": "板豆腐100克\n苋菜200克\n鸡蛋1个\n蒜末10克\n盐5克\n芝麻油5毫升\n食用油适量\n3 起油锅，先放入蒜末爆香，接着放入苋菜炒熟，加入500毫升清水。\n1 苋菜洗净，切段；豆腐切块。\n2 鸡蛋打散成蛋液，备用。\n4 待水开后，放入豆腐和盐，再倒入蛋液煮成蛋花，稍煮一会。\n5 最后放入芝麻油，关火盛出即可。"}, "黑胡椒豆腐煎": {"ingredients": "板豆腐200克\n木耳30克\n胡萝卜30克\n洋菇50克\n食用油20毫升\n酱油10毫升\n黑胡椒5克\n白糖5克", "steps": "1 木耳、胡萝卜及洋菇洗净后切片；豆腐洗净，切大块。\n2 起油锅，放入豆腐煎至两面略微金黄，使其烹饪过程中不致散开便可。\n3 在原锅中加入胡萝卜拌炒至熟透，再下木耳、洋菇一起拌炒至香味传出。\n4 放入酱油、白糖后，沿锅边轻轻地拌炒均匀，以免豆腐形状散开，起锅前，撒上黑胡椒增香即可。"}, "红枣片菜汤": {"steps": "1 红枣、西芹分别洗净。\n2 西芹去叶，切段；红枣去核备用。"}, "滑蛋虾仁": {"ingredients": "4 接着转小火炖煮10分钟。\n冰糖10克\n虾仁100克 鸡蛋2个 葱花10克 蒜片10\n5 最后再放入冰糖拌匀即可。\n克 生姜末10克 料酒5毫升 盐10克\n生粉15克 水淀粉15毫升 芝麻油5毫升\n1 虾仁洗净、氽烫后捞出，放入碗中，加5克盐和料酒、1个蛋白及生粉，抓腌10分钟。\n食用油5毫升\n2 鸡蛋打散成蛋液，加入盐、水淀粉和葱花拌匀，接着放入腌好的虾仁，再拌匀，静置一会。", "steps": "3 起油锅，放入蒜片、生姜末爆香，再倒入蛋液，轻推锅铲，至蛋液凝固、变熟。\n4 起锅前，淋上芝麻油即可。"}, "小米松阪粥": {"ingredients": "小米100克\n松阪猪肉80克\n枸杞20克\n盐5克\n白糖5克\n胡椒粉5克\n芹菜末5克", "steps": "1 小米洗净，泡水备用；枸杞洗净，加水泡软后沥干备用；松阪猪肉洗净，切小块。\n2 起一锅水，放入浸泡好的小米与三倍的水一起熬煮至黏稠状。\n3 加入松阪猪肉丁一块熬煮，待猪肉呈现熟色后，加入盐、白糖以及胡椒粉搅拌均匀。\n4 最后撒上芹菜末、枸杞搅拌均匀，即可起锅。"}, "何首乌炖乌骨鸡汤": {"ingredients": "何首乌6克\n乌骨鸡500克\n盐5克\n生姜片3片\n料酒15毫升", "steps": "1 将何首乌放入塑胶袋中，敲成小块备用。\n2 乌骨鸡剁成块后洗净，汆烫去血水，再放入砂锅中。\n3 接着加入何首乌、生姜片与料酒，大火煮滚后，盖上锅盖，再以小火炖煮45分钟，至鸡肉软烂。\n4 最后加入盐调味即可。"}, "火腿青豆玉米粥": {"ingredients": "火腿100克\n玉米粒50克\n青豆50克\n葱30克\n饭150克\n盐5克\n胡椒粉5克\n芝麻油5毫升", "steps": "1 将火腿切丁；葱洗净、切末；青豆洗净。\n2 起一锅水，加入火腿丁、玉米粒、青豆及饭一起熬煮，待沸腾后，转小火继续熬煮至米粥稠烂。\n3 待米粥呈现稠状，放入盐、胡椒粉搅拌均匀。\n4 起锅前，均匀洒上芝麻油，并放入葱末搅拌均匀即可盛盘食用。"}, "茭白鲈鱼汤": {"ingredients": "茭白200克 鲈鱼250克 西红柿100克\n木耳50克 葱段10克 生姜片3片 食用油\n2 茭白去皮，切滚刀块；西红柿和木耳分别洗净，切块。\n3 热油锅，放入鲈鱼煎至两面金黄，接着下葱段、生姜片略炒，再放入茭白、西红柿和木耳拌炒均匀。\n1 鲈鱼洗净，仔细擦干鱼身水分。\n4 倒入500毫升清水及米酒，大火煮滚后，盖上锅盖以小火慢炖15分钟。"}, "木瓜炖鱼": {"ingredients": "青木瓜1/4个\n鲈鱼1条\n盐10克", "steps": "5 起锅前加入盐即可。\n1 将青木瓜洗净，去籽后切块；鲈鱼洗净，切块。\n2 取汤锅，加入800毫升清水和青木瓜块，以大火煮滚之后，再转小火炖煮1小时。\n3 待木瓜煮至软烂，再放入鲈鱼块，一起熬煮至鱼块熟透。\n4 最后在起锅前加入盐调味即可。"}, "寿喜烧": {"ingredients": "牛肉片100克 豆腐80克 娃娃\n菜80克 芋头30克 白萝卜50克\n鲜香菇25克 蛋饺50克 葱段20克\n白糖45克 日本酱油100毫升 料酒\n50毫升 鸡蛋1个", "steps": "1 取小碗，放进日本酱油、料酒、白糖和50毫升清水，搅匀成酱汁。\n2 将葱段、芋头、白萝卜及香菇放入锅中略炒后，倒入酱汁同煮入味。\n3 接着加入豆腐、娃娃菜、蛋饺，煮至芋头及萝卜软烂。\n4 最后加入牛肉片、打入鸡蛋，煮至肉片熟后即可。"}, "低脂罗宋汤": {"ingredients": "牛腩100克 土豆100克 西芹1根\n胡萝卜50克 西红柿100克 番茄酱15克\n料酒5毫升 盐5克", "steps": "1 将牛腩、土豆、西芹、胡萝卜及西红柿均切成丁。\n2 土豆和胡萝卜放入蒸锅蒸熟；牛腩放入滚水中，加入料酒一起汆烫，捞出。\n3 汤锅中倒入500毫升清水烧开，放入牛腩、西红柿、土豆、胡萝卜、盐和番茄酱，小火炖煮30分钟。\n4 最后加入西芹，煮至食材熟透即可。"}, "三鲜冬瓜": {"ingredients": "冬瓜200克 海带30克 干虾米15克\n盐5克 食用油5毫升 葱花10克", "steps": "1 冬瓜洗净、去皮，切片。\n2 干虾米和海带分别洗净后，浸泡热开水30分钟。\n3 待海带泡软，将海带切粗丝备用。\n4 热油锅，先放入虾米和葱花爆香，再加入冬瓜片和海带丝一起翻炒。\n5 加入盐调味，翻炒均匀至冬瓜熟软即可。"}, "肉末四季豆": {"ingredients": "四季豆150克 猪肉末50克 姜末5克\n蒜末5克 葱花5克 酱油15毫升\n豆瓣酱15克 白糖5克 芝麻油5毫升食用油适量", "steps": "1 将四季豆撕除筋、去两头，洗净后切成1指长大小，过油备用。\n2 起油锅、烧热，先爆香姜末、蒜末，接着放入猪肉末、酱油、豆瓣酱和白糖，一起翻炒。\n3 炒香后放入四季豆炒匀，再撒上葱花。\n4 盛盘后，淋上芝麻油即可。"}, "香菇豆腐": {"ingredients": "豆腐300克\n香菇3朵\n榨菜30克\n酱油30毫升\n白糖10克\n芝麻油5毫升\n生粉15克", "steps": "1 豆腐切成四方小块，中间挖空。\n2 将香菇泡软，再取出和榨菜分别剁碎，接着加入白糖和生粉拌匀成馅。\n3 将馅镶入豆腐中心，摆在碟上蒸熟。\n4 最后淋上芝麻油和酱油即可食用。"}, "生化粥": {"ingredients": "桃仁9克 当归24克 川芎9克 生\n姜5克 甘草2克 白米50克 红\n糖20克\n1 白米洗净，放清水中浸泡30分钟。", "steps": "2 桃仁、当归、川芎、生姜和甘草加入适量清水中，小火煮30分钟，滤去药材，取汁。\n3 取汤锅，将泡好的白米加入熬好的药汁熬煮至米碎裂，成稀粥状。\n4 最后加入红糖搅匀，趁温热食用。"}, "牛肉西红柿汤": {"ingredients": "牛腩200克 西红柿100克 牛奶200毫升 土\n豆150克 娃娃菜50克 奶油20克 番茄酱15\n克 盐5克", "steps": "1 牛腩切块，放入滚水中汆烫去血水；西红柿焯烫，取出剥皮、切小块。\n2 娃娃菜洗净，对切；土豆去皮、切块，蒸熟备用。\n3 汤锅中放入牛腩、牛奶、土豆、西红柿、娃娃菜和奶油，烧开后捞去浮沫、转小火，炖煮30分钟。\n4 放入番茄酱，转大火加热10分钟后，加盐调味即可。"}, "豆腐皮粥": {"ingredients": "豆腐皮30克\n白米150克\n冰糖10克", "steps": "1 将豆腐皮洗净，切成丝；白米洗净，放清水中浸泡30分钟。\n2 取汤锅，将泡好的白米加入适量水熬煮至米碎裂，再加入豆腐皮丝，继续熬煮至食材熟透。\n3 最后加入冰糖搅匀即可。"}, "益母草粥": {"ingredients": "2 取汤锅，放入益母草及450毫升清水，以中火煮30分钟。\n3 熬成汤汁后，捞出残渣，汤汁备用。胡萝卜100克\n小米30克", "steps": "1 将小米洗净，浸泡清水中30分钟备用。\n2 胡萝卜洗净，去皮、切丝。\n3 取汤锅，放入胡萝卜丝和小米，以及300毫升清水，大火煮开。\n4 接着转小火，盖上锅盖，续煮至汤汁浓稠成粥即可。"}, "百合鲜蔬炒虾仁": {"ingredients": "虾仁100克\n百合10克\n西芹50克\n胡萝卜50克\n荷兰豆50克\n蒜末5克\n生粉15克\n蛋白5克\n米酒2毫升\n盐3克\n食用油适量", "steps": "1 虾仁洗净、去肠泥，加入10克生粉、1克盐、蛋白以及米酒拌匀，腌渍10分钟；剩余生粉加水调成水淀粉。\n2 西芹洗净、切斜刀片；胡萝卜洗净，切薄片；百合洗净，剥成片状；荷兰豆洗净，去蒂头。\n3 热油锅，爆香蒜末，放入西芹、荷兰豆、胡萝卜、虾仁拌炒均匀，再加入少许水、2克盐和百合拌炒一下，起锅前用水淀粉勾芡即完成。"}, "菜心煨猪蹄": {"ingredients": "油麦菜心150克\n猪蹄1个\n葱段10克\n盐5克\n1 油麦菜心去皮、洗净，切成条状。\n猪蹄1个\n干海带100克\n葱段10克\n枸杞5克\n生姜片3片\n料酒15毫升\n2 干海带泡水备用。\n盐10克\n3 水煮沸后加入猪蹄及5克盐汆烫，再捞出猪蹄并将水分沥干。\n炙甘草2克\n川芎6克\n当归10克\n桃仁10颗\n炮姜3克", "steps": "2 猪蹄去毛、洗净，切成小块后汆烫去腥，备用。\n3 将葱段、油麦菜心和猪蹄放进热水中，用大火烧沸后，盖上锅盖，转小火熬至猪蹄熟烂。\n4 最后再加入盐调味即可。\n1 将猪蹄从中间一切为二，再斩成大块。\n4 煲锅中的水煮沸后，放入葱段、生姜片、海带和猪蹄，接着加入盐、料酒及枸杞，盖上锅盖焖煮25分钟，待猪蹄软烂即可。\n1 将所有药材放在流动的水下冲洗5分钟。\n2 将药材放入砂锅中，加700毫升的水，煮滚后盖上锅盖，约煮15分钟，至药汁剩下1/3的分量，倒出药汁。\n3 煮过1次的药材中再加入500毫升的水，煮滚后盖上锅盖，约煮10分钟，至药汁剩下1/2的分量，倒出药汁。\n4 将2次炼出的药汁混合即完成。\n扫一扫，轻松学"}, "娃娃菜豆腐奶白汤": {"ingredients": "豆腐150克 娃娃菜50克 粉丝20克\n干贝10克 虾米20克\n白胡椒粉5克 食用油10克\n料酒5毫升 盐5克 芝麻油5毫升", "steps": "1 娃娃菜对切；干贝、虾米用水洗净，浸泡备用。"}, "金黄素排骨": {"ingredients": "油条1根 大黄瓜50克 胡萝卜25克\n鸡蛋1个 面粉15克 番茄酱15克\n白糖2克 盐5克 醋2毫升\n水淀粉5毫升 食用油适量", "steps": "1 油条切3厘米长；胡萝卜洗净、去皮，切1厘米长；黄瓜洗净，切滚刀块。\n2 鸡蛋打散，加入面粉，调成糊状备用。\n3 将胡萝卜条穿入油条，再裹上面糊，放入油锅炸至金黄，捞出、沥干油。\n4 热锅，加入番茄酱、白糖、盐、醋及50毫升清水，烧开，再倒入炸好的油条和黄瓜块炒匀。\n5 加入水淀粉勾芡即可。"}, "清蒸茄段": {"ingredients": "茄子200克 盐5克 芝麻油5毫升\n蒜泥10克 酱油15毫升 乌醋10毫\n升 葱花10克", "steps": "1 茄子对剖，切成长段，皮朝下放入碗中，再放入蒸锅中，大火蒸熟。\n2 取一碗，将蒜泥、酱油、乌醋、盐和芝麻油拌匀，调成酱料。\n3 取出茄子，沥干水分后，淋上酱料、撒上葱花即可食用。"}, "三菇烩丝瓜": {"ingredients": "丝瓜150克 鸡腿菇50克 香菇50克\n草菇50\n克 蒜片10克 葱末10克 盐5克 芝麻油\n5毫升 白糖2克 胡椒粉5克 水淀粉5毫升\n食用油适量", "steps": "1 丝瓜去皮，切块；香菇泡入100毫升温水，一开四；草菇一开二；鸡腿菇切滚刀块；香菇水留置备用。\n2 热油锅，下蒜片、葱末爆香，再放入鸡腿菇、香菇和草菇炒出香味。\n3 放入丝瓜块跟香菇水煮开，接着加入盐、白糖、胡椒粉调味，再盖上锅盖，焖煮10分钟。\n4 最后以水淀粉勾芡、淋上芝麻油，炒匀即可。"}, "腊肉南瓜汤": {"ingredients": "腊肉片100克 南瓜200克 莲藕片50克\n洋葱末30克 盐10克 食用油5毫升 料酒15\n毫升", "steps": "1 将腊肉过沸水稍微汆烫，去盐分。\n2 南瓜洗净、切开，去籽后切成块。\n3 油烧热，放入洋葱末爆香，再放入腊肉片炒匀，接着调入料酒、倒入500毫升清水。\n4 待煮沸，放入南瓜块及莲藕片，煮至南瓜熟软，加入盐调味即可。"}, "排骨萝卜汤": {"ingredients": "猪小排150克\n白萝卜50克\n盐5克\n醋5毫升\n葱段20克\n姜片3片", "steps": "1 猪小排洗净、切块，过滚水汆烫去血水后，放入砂锅中。"}, "西蓝花炒磨菇": {"ingredients": "西蓝花100克 蘑菇50克 腊肉30克\n料酒5毫升 姜片3片 葱花10克\n盐5克 白糖2克 胡椒粉5克\n色拉油5毫升", "steps": "1 将西蓝花洗净，除去过粗纤维后切小块；腊肉洗净后切片，和西蓝花分别过水汆烫。\n2 蘑菇洗净，一开四备用。\n3 热油锅，先放入腊肉片、姜片一起拌炒，再放料酒，炒至腊肉变色。\n4 再放入西蓝花、蘑菇、盐、白糖、胡椒粉及葱花一起拌炒，炒至西蓝花软熟即可。"}, "鱼丸粉丝菠菜汤": {"ingredients": "菠菜100克 鱼丸50克 粉丝30克\n葱花10克 盐5克", "steps": "1 菠菜洗净，切段。\n2 取汤锅，注入300毫升清水，以大火煮沸后，再加入鱼丸。\n3 待鱼丸煮熟浮起后，再放入菠菜和粉丝。"}, "虾皮烧菜心": {"ingredients": "青菜心150克 笋50克 虾皮10克\n料酒15毫升 盐5克 食用油5毫升", "steps": "1 将菜心洗净，切成均匀的长条状。\n2 笋洗净、切片；虾皮泡发后洗净。\n3 起油锅，烧至六成热，先倒进菜心翻炒1分钟。\n4 放入笋片、虾皮，略为翻炒过后，再放入料酒、50毫升清水及盐。\n5 盖上锅盖，转中火续煮5分钟，待菜肴熟烂即可。"}, "冬笋雪菜鲈鱼汤": {"ingredients": "冬笋30克 雪菜30克 五花肉30克 鲈鱼1/2\n条 葱段10克 生姜片3片 色拉油5毫升\n料酒5毫升 胡椒粉5克 盐5克 芝麻油5毫升", "steps": "1 鲈鱼去鳞、清除内脏，洗净。\n2 冬笋发好、焯烫后洗净、切片；雪菜洗净，切碎；五花肉洗净，切片。\n3 起油锅、烧热，放入鲈鱼煎至两面金黄，再放入姜片、冬笋、雪菜、五花肉和葱段，大火拌炒。\n4 加入500毫升清水，焖煮15分钟，再转大火，放入料酒、胡椒粉、盐和芝麻油，再次煮沸即可。"}, "木瓜白果鸡肉汤": {"ingredients": "青木瓜1/2个\n白果10克\n带骨鸡肉块100克\n枸杞10克\n盐5克\n姜片3片\n2 将青木瓜、白果、鸡块、枸杞、姜片放入煲锅中，加入清水淹过食材，以大火煮开后，加上锅盖，转小火。\n1 鸡肉汆烫去血水；青木瓜去皮、去籽，切块；白果去壳，洗净备用。\n3 炖煮1小时后，加入盐调味即可。"}, "山药水果荷包蛋": {"ingredients": "鸡蛋1个\n紫山药100克\n苹果50克", "steps": "1 山药、苹果分别去皮、切丁，并将苹果丁泡薄盐水防止变色，备用。\n2 取汤锅煮水，再放入山药丁，待水开后稍微再煮3分钟。\n3 接着将鸡蛋打进锅里，待蛋熟后加入苹果丁，稍微煮1分钟后即可起锅。"}, "山药南瓜粥": {"ingredients": "山药100克 南瓜100克 红枣8颗\n黑糖10克 白米粥300克", "steps": "1 山药去皮、洗净，切成块状后放入盐水浸泡一下，捞出后汆烫。\n2 南瓜去皮、切块，红枣洗净、去核。\n3 将山药和南瓜，放入200毫升清水中焖煮15分钟，再加入白米粥和红枣一起熬煮。\n4 煮至南瓜软烂，再加入黑糖拌匀即完成。"}, "冬菇煨鸡": {"ingredients": "鲜冬菇100克 土鸡500克 甜椒20克\n生姜片3片 蒜苗段10克 食用油5毫升\n白糖2克 蚝油15克 酱油10毫升\n生粉15克 芝麻油5毫升", "steps": "1 将鲜冬菇洗净，一开四备用。\n2 甜椒去白膜，和土鸡分别切块。\n3 土鸡加5毫升酱油和生粉腌渍，接着烧热锅，下食用油和芝麻油，放入鸡块煎至表皮焦黄。\n4 接着放入冬菇、姜片、蒜苗段、白糖、蚝油、酱油和15毫升清水，用小火煨至鸡肉入味。\n5 最后加入甜椒块，拌炒均匀即可。"}, "大虾炖豆腐": {"ingredients": "明虾150克 豆腐150克 盐10克 胡椒粉5克\n料酒10毫升 姜片3片 大葱10克 青葱10克", "steps": "1 明虾剪去须、洗净，开背后去肠泥。\n2 豆腐切条状；大葱洗净，切段；青葱洗净，切成葱花。\n3 烧一锅开水、加入5克盐和料酒，再放入明虾和豆腐汆烫。\n4 锅中加入50毫升清水烧开，接着放入明虾、豆腐、料酒、姜片和葱段，用大火再次烧开。\n5 拣去葱段和姜片，撒入盐、胡椒粉和葱花即可。"}, "芥蓝炒虾仁": {"ingredients": "虾仁50克\n芝麻油5毫升\n蒜片10克\n米酒10毫升", "steps": "1 芥蓝洗净、切段，过滚水汆烫备用。\n2 虾仁挑去肠泥，以5毫升米酒和盐腌一下，过油。\n盐10克\n色拉油适量\n3 起油锅，先放入蒜片爆香，再加入芥蓝一起翻炒。"}, "清炒上海青": {"ingredients": "上海青150克 红椒10克 黄椒10克\n3 热油锅，先爆香生姜丝和葱丝，再放入上海青一起拌炒。\n4 接着放入红椒丝及黄椒丝略炒，最后加入盐、米酒，炒匀。\n盐5克 色拉油5毫升 米酒5毫升\n生姜丝5克 葱丝5克 香菜3克\n5 待虾仁和芥蓝熟透，加入芝麻油炒匀即可起锅。\n2 红椒、黄椒洗净，分别切丝备用。", "steps": "1 将上海青洗净，切段。\n5 起锅前撒上香菜即可。"}, "姜丝炒水莲": {"ingredients": "水莲300克\n姜20克\n红甜椒10克\n色拉油20毫升\n盐5克", "steps": "1 水莲洗净后切段；姜切丝备用。\n2 先热油，爆香姜丝，再加入水莲翻炒熟。\n3 最后放入红甜椒丝、盐来回翻炒均匀，即可起锅食用。"}, "鲜虾西芹": {"ingredients": "2 西芹洗净，切斜刀块；辣椒洗净，切片。\n3 取一碗，放入柠檬汁、白糖、淡色酱油和15毫升水，调成酱汁。\n4 起油锅、烧热，将虾炸至红色，捞出。\n5 锅底留油，放入姜末、辣椒片和西芹炒香，再加入虾及酱汁，翻炒几下即可。\n淡色酱油15毫升 食用油适量"}, "干贝汤": {"ingredients": "干贝30克 粉丝50克 葱1/4根\n胡萝卜25克 青豆10个 盐5克\n料酒5毫升 食用油5毫升", "steps": "1 干贝以温水泡发，干贝水留着备用。\n2 粉丝泡软，切成10厘米长段；葱与胡萝卜分别洗净、切丝。\n3 青豆过滚水焯烫，捞出沥干。\n4 起油锅，放入青豆炒香，再放入葱丝、干贝和泡过干贝的水，大火烧沸。\n5 接着加入胡萝卜丝和料酒、盖上锅盖，再次煮滚后，加入粉丝和盐即可。"}, "香菇黄豆粥": {"ingredients": "干香菇20克\n黄豆40克\n白饭150克\n食用油适量\n盐5克\n胡椒5克", "steps": "1 干香菇洗净、泡水至软后，切丝；黄豆泡水备用。\n2 黄豆放入电锅蒸熟备用。\n3 起油锅，爆香香菇丝后，捞起备用。\n4 白饭加800毫升水熬煮至沸腾，再下黄豆、香菇丝一起熬煮。\n5 米粥呈现稠状后，撒上盐、胡椒粉拌匀，即可起锅食用。"}, "凉拌西蓝花": {"ingredients": "芝麻15克\n盐10克\n橄榄油5毫升\n醋5毫升\n白糖5克", "steps": "1 取一锅，放入芝麻干煎至香气传出，便可盛盘备用。\n2 西蓝花洗净后切小朵。\n3 起水锅，放入西蓝花焯烫至熟透，捞起沥干备用。\n4 取小碗，放入盐、橄榄油、醋及白糖，搅拌均匀，再放入芝麻拌匀，制成酱汁。\n5 将制作好的酱汁淋上焯烫好的西蓝花，即可食用。"}, "姜丝小白菜": {"ingredients": "小白菜120克\n姜20克\n橄榄油5毫升\n盐5克\n2 起油锅，放入切好的姜丝爆香，炒至香味传出。", "steps": "3 放入小白菜一起拌炒，待小白菜炒至熟透，放入盐拌炒均匀，即可起锅食用。\n1 小白菜洗净、去根部后，切成适口长段；姜洗净，切丝。"}, "山药南瓜肉松羹": {"ingredients": "南瓜100克\n山药100克\n肉松20克\n鸡蛋1个\n水淀粉15克\n香菜10克\n葱花10克\n盐5克", "steps": "1 将一半的南瓜去皮、切薄片，放入锅中蒸至熟软，取出压成泥。\n2 剩下一半的南瓜切丁；山药切丁；鸡蛋打散成蛋液备用。\n3 南瓜丁和山药丁放入300毫升沸水中煮，加入南瓜泥搅拌，再加入盐调味。\n4 待南瓜丁熟软，接着倒入水淀粉勾芡后，加入蛋液煮成蛋花。\n5 起锅前加入葱花、香菜和肉松即可。", "notes": "南瓜味甘性温，富含膳食纤维，能增加食欲、补中益气、消炎止痛、解毒、利尿和促进骨骼发育，和补益药膳食材的山药一起熬煮，可润肠通便、预防便秘、改善肠道功能。"}, "排骨鲍鱼菇粥": {"ingredients": "排骨100克\n鲍鱼菇80克\n枸杞10克\n葱花30克\n饭150克\n姜2片\n盐10克\n胡椒粉5克\n芝麻油5毫升\n米酒5毫升", "steps": "1 排骨洗净、切小段，用5克盐、米酒均匀抓腌；枸杞洗净后，加水泡发；鲍鱼菇洗净后切片。\n2 起一锅热水，放入排骨汆烫去血水，捞起沥干备用。\n3 另起一锅水，放入鲍鱼菇、姜片、排骨及饭一起熬煮至稠状。\n4 待呈现稠状后，撒上枸杞、盐、胡椒粉及芝麻油搅拌均匀，最后撒上葱花，即可起锅食用。"}, "归芪鲈鱼汤": {"ingredients": "1 鲈鱼洗净，拭干水分，在鱼背处横切一刀，再将5克盐均匀抹在鱼身，腌渍15分钟。\n2 当归洗净，切片；枸杞和黄芪洗净，沥干。\n3 将当归、枸杞、黄芪、料酒和800毫升清水用大火煮沸，再转小火炖煮25分钟。\n4 鱼腹塞入生姜丝，和熬好的药汤一起放入汤锅，以大火煮沸后，改小火炖煮35分钟。\n5 最后再加入盐调味即可。\n克 生姜丝10克 盐10克 料酒5毫升"}, "上海青香菇汤": {"ingredients": "上海青150克\n干香菇20克\n火腿40克\n盐5克\n米酒5毫升", "steps": "1 将上海青洗净，去头，一切为二；火腿切成条状，备用。\n2 香菇洗净去蒂头后，一开四，取一碗温水浸泡，香菇水留置备用。\n3 热锅，先干煎火腿，再将盐、香菇和香菇水放入锅中，煮至香菇熟软，接着下上海青一起熬煮。\n4 待煮至上海青翠绿，淋入米酒，搅拌均匀即可。"}, "川七乌骨鸡汤": {"ingredients": "乌骨鸡1000克 红枣10颗 陈皮8克\n川七15克 盐5克", "steps": "1 乌骨鸡洗净、切块，汆烫去杂质，备用。\n2 将乌骨鸡块、红枣及陈皮放入锅中，加入淹过食材的清水，大火煮开。\n3 接着捞去浮沫，再加入川七，盖上锅盖，以小火一起炖煮。"}, "香菜鸡蛋汤": {"ingredients": "鸡蛋2个 香菜20克 盐5克\n芝麻油5毫升 白胡椒粉5克 食用油5毫升", "steps": "1 鸡蛋打散；香菜洗净，切段。\n2 起油锅，将蛋液倒入后煎成蛋皮，用锅铲切成小块。\n3 倒入300毫升清水，煮开后关火。\n4 最后撒入香菜，再加芝麻油、白胡椒粉和盐调味即可。"}, "炸酱面20 MIN": {"ingredients": "粗面80克 绞肉100克 小黄瓜1条 蒜末5克\n姜末5克 食用油10毫升 甜面酱15克 豆瓣酱15\n克 米酒15毫升 白糖5克", "steps": "1 小黄瓜洗净、切丝，泡冰开水冰镇；面条加盐汆烫后，捞起盛盘备用。\n2 下5毫升油爆香蒜末与姜末，加入甜面酱、豆瓣酱、米酒、白糖与一碗水，大火熬煮至沸腾。\n3 以5毫升油炒香绞肉，待两面呈现熟色，放入做法2的食材中熬煮入味，转小火让酱汁略为收汁。\n4 在面条上淋上酱汁，铺上小黄瓜丝即可食用。"}, "素香茄子": {"ingredients": "茄子150克 辣椒20克 生姜末10克\n素碎肉50克 豆瓣酱30克 盐15克\n米酒15毫升 白糖15克 色拉油适量", "steps": "1 茄子洗净，切滚刀块；辣椒切末。\n2 茄子块入热油锅中过油，略炸1分钟。\n3 另起油锅，放入辣椒末、生姜末、豆瓣酱、盐、米酒、白糖及素碎肉，一同翻炒，炒出香味。\n4 最后再放入茄子块和100毫升清水，焖煮至熟即可。"}, "香芋排骨紫米粥": {"ingredients": "芋头100克\n排骨100克\n葱花30克\n紫米80克\n姜2片\n盐5克\n胡椒粉5克\n芝麻油10毫升\n米酒10毫升", "steps": "1 紫米浸泡数小时；排骨切小段，用米酒、盐均匀抓腌；芋头切丁。\n2 起一锅水，加入紫米熬煮至沸腾，再放入芋头丁、姜片一起熬煮。\n3 排骨用米酒和盐抓腌后，另起锅热水，放入排骨汆烫去血水，再捞起放进做法2的锅中一起熬煮。\n4 待芋头熟软后，撒上盐及胡椒粉搅拌均匀，最后撒上葱花及芝麻油即可。"}, "西红柿蔬菜汤": {"ingredients": "西红柿100克 土豆50克 胡萝卜30克\n西蓝花30克 洋葱30克 玉米粒20克\n食用油5毫升 盐5克 黑胡椒5克"}, "鱼头粉丝冬笋汤": {"ingredients": "嫩豆腐100克 鲈鱼头1个 冬笋60克\n粉丝50克 醋5毫升 生姜片3片\n盐5克 葱段10克 黑糖2克\n胡椒粉5克 香菜段10克\n米酒5毫升 食用油5毫升", "steps": "1 土豆和胡萝卜分别洗净、去皮，切滚刀块。\n2 西蓝花洗净，切小朵；洋葱切碎。\n3 西红柿洗净、焯烫去皮，切块，放入榨汁机中打成泥。\n4 热油锅，放入洋葱碎、西红柿泥和白糖，炒匀后加入300毫升清水。\n5 煮沸后，倒入土豆、胡萝卜、玉米粒、西蓝花，煮2分钟，再加入盐、黑胡椒，搅匀即可。\n1 将鱼头洗净，剖半后再剁成几块，用纸巾拭去水分。\n2 豆腐切厚片；冬笋洗净，切片。\n3 热油锅，将鱼头煎至表面略显微黄，接着加入姜片爆香，再加入清水，以大火烧开。\n4 放入豆腐、粉丝和笋片、米酒和醋，盖上锅盖炖20分钟。\n5 烧至汤呈奶白色，放入葱段、香菜段，再调入盐和黑糖、胡椒粉即可。"}, "牛肉炒西蓝花": {"ingredients": "培根50克 盐5克 蒜末10克\n西蓝花100克 牛里脊肉80克\n色拉油5毫升", "steps": "1 西蓝花洗净、撕小朵，放入煮沸的盐水中汆烫后，捞出沥干。\n2 牛肉洗净，切丝；培根切一指宽。\n3 起油锅，放入牛肉炒至八分熟，起锅备用。\n4 留锅底油，加入蒜末和培根拌炒，煎至培根微焦，再放入牛肉和西蓝花翻炒2分钟。\n5 加入盐炒匀，至西蓝花熟透即可。"}, "双虾通草丝瓜汤": {"ingredients": "虾2只 通草6克 丝瓜30克 食用油5毫升\n葱段10克 姜丝10克 盐5克", "steps": "1 将通草和虾分别洗净，虾挑出肠泥。\n2 丝瓜洗净，去皮、切片。\n3 热油锅，加入葱段和姜丝爆香，接着放入虾、丝瓜一同拌炒。\n4 倒入300毫升水，放入通草，小火煮至丝瓜熟透。\n5 最后加入盐调味即可。"}, "当归羊肉煲": {"ingredients": "当归15克 羊肉300克 料酒15毫升 葱花10\n克 生姜片3片 盐5克", "steps": "1 羊肉洗净、切成小块，煮一锅滚水，将之汆烫去腥，捞出备用；当归洗净，切片。\n2 将当归、羊肉、料酒和生姜片放入砂锅中，加入500毫升水，大火煮沸。\n3 再转中小火，盖上锅盖炖煮50分钟。\n4 待汤成奶白色时，加入盐调味、撒上葱花即可。"}, "干贝乌骨鸡汤": {"ingredients": "乌骨鸡1000克\n当归20克\n桂圆肉20克\n生干贝4颗\n盐5克\n生姜片3片\n2 乌骨鸡洗净、切小块，汆烫去血水后捞出备用。\n1 生干贝放入清水中泡开。\n3 将鸡肉、当归、桂圆肉、干贝及生姜片一起放入锅中，加入淹过食材量的清水，大火煮开。\n4 待水滚，转小火续炖至乌骨鸡熟烂，再加入盐调味即可。"}, "虾仁丝瓜": {"ingredients": "虾仁80克 丝瓜200克 胡椒粉10克\n生粉15克 米酒10毫升 葱段10克\n生姜丝10克 蒜片10克 红辣椒10克\n盐10克 食用油5毫升", "steps": "1 虾仁加入5克盐、米酒、胡椒粉和生粉，拌匀备用。\n2 丝瓜去皮，切滚刀块；辣椒去籽，切丝。\n3 热油锅，爆香生姜丝、蒜片和葱段，先放入虾仁略炒，再放入丝瓜大火快炒。\n4 加入50毫升的清水，煨煮2分钟，再放入胡椒粉、盐及辣椒丝，盖上锅盖煮1分钟。\n5 加入米酒炒匀，即可起锅。"}, "苦瓜镶豆腐": {"ingredients": "苦瓜200克\n豆腐100克\n桂圆肉20克\n白糖5克\n盐5克\n生粉5克", "steps": "1 苦瓜洗净后，切段、挖籽。\n2 豆腐压泥后，加入盐、白糖拌匀备用。\n3 往苦瓜圈内围抹上生粉，放入做法2的豆腐馅。\n4 最后，将食材放入电锅蒸熟，即可食用。"}, "猪肝汤": {"ingredients": "当归3克\n猪肝80克\n红花2克\n肉桂2克\n盐5克"}, "白果鸟梨鸡肉汤": {"ingredients": "白果10克\n鸟梨1个\n鸡肉块150克\n姜片2片\n葱段10克\n盐5克", "steps": "2 将猪肝洗净，切片。\n1 将鸡肉块放入滚水中，汆烫去血水；鸟梨去皮、去核，切块；白果去壳、去心，备用。\n2 将白果、鸟梨、鸡肉块、姜片和葱段一起放入炖盅中，隔水小火慢炖3小时。\n3 最后放入盐调味即可。"}, "凉拌鲜虾米苔日": {"ingredients": "米苔目100克 虾4只\n七味粉5克 柠檬汁10毫升\n味醂10毫升 黑胡椒粒10克\n1 虾氽烫后，剥壳；米苔目盛盘备用。", "steps": "2 将虾整齐地摆在米苔目上方。\n3 混合柠檬汁、味醂、黑胡椒粒，淋在米苔目及虾上。\n4 最后撒上七味粉即可。"}, "黄芪猪肝汤": {"ingredients": "猪肝60克 米酒70毫升 菠菜50克 当归4克\n黄芪5克 生地黄5克 葱白段20克 生姜片3\n片 芝麻油5毫升 盐5克", "steps": "1 将当归、黄芪、生地黄洗净后放入纱布袋中，加600毫升水以及葱白段、生姜片，以大火熬煮30分钟备用。\n2 菠菜洗净，切段备用。\n3 将纱布袋取出，放入菠菜煮开后，再放入猪肝，加盐、米酒和芝麻油，续煮至猪肝熟嫩即可。"}, "糖醋黄鱼": {"ingredients": "黄鱼1条 胡萝卜50克 鲜笋50克 青豆50克\n葱花10克 盐5克 食用油适量 白糖30克\n醋30毫升 酱油15毫升 米酒15毫升 生粉15克", "steps": "1 黄鱼清除内脏、洗净，在背身划几刀，再抹上酱油和米酒，腌渍30分钟；生粉加水调成水淀粉。\n2 胡萝卜去皮、和鲜笋切成丁，再和青豆一起涎烫、捞出。\n3 将黄鱼抹上生粉，放入热油锅中煎至两面金黄，沥干油后放入盘中。\n4 锅底留油，爆香葱花，倒入50毫升清水煮开，放入盐、白糖、醋、笋丁、胡萝卜及青豆，煮熟。\n5 最后以水淀粉勾芡，淋在黄鱼上即可。"}, "花生猪蹄汤": {"ingredients": "生花生50克\n猪蹄1000克\n葱段20克\n生姜片3片\n盐5克\n芝麻油5毫升\n米酒15毫升\n2 将猪蹄、葱段、生姜片、花生与热水，放进锅中，待汤汁快滚时，加入米酒。\n1 猪蹄切块，加入盐，氽烫去血水备用。\n3 接着盖上锅盖，小火焖煮2小时。\n4 待猪蹄煮烂时，加入盐调味，再滴入芝麻油即可。"}, "咖喱烧土豆": {"ingredients": "土豆1个 洋葱50克 白蘑菇5朵\n鸡肉150克 咖喱酱30克 椰汁50毫升\n食用油5毫升 盐5克", "steps": "1 土豆去皮、洗净，切丁后煮熟。\n2 洋葱剥皮，切丁；白蘑菇洗净，切片；鸡肉洗净，切块备用。\n3 起油锅，烧至五成热，先放入鸡肉炒至发白，再放入咖喱酱。\n4 接着加入土豆、洋葱、白蘑菇炒匀，再倒入椰汁搅拌均匀。\n5 加入可淹过食材的清水，待煮滚后加盖，以中火焖至酱汁收干。\n6 最后加盐调味即可。"}, "葡萄干桂圆甜粥": {"ingredients": "葡萄干20克\n桂圆干50克\n饭150克\n松子10克", "steps": "1 取一锅，放入松子干煎至表面微焦，炒至香味传出后，便可起锅备用。\n2 起水锅，加入饭、葡萄干及桂圆干一起熬煮，待沸腾后，转小火继续熬煮至米粥熟烂。\n3 熬煮至香味传出、米粥呈现稠状，即可盛盘，最后均匀地撒上松子即可。"}, "枸杞生姜排骨汤": {"ingredients": "枸杞5克\n生姜片3片\n排骨180克\n土豆100克\n葱段10克\n盐5克\n料酒15毫升", "steps": "1 枸杞洗净；土豆去皮，切块；排骨切块。\n2 水煮沸后，将排骨放入汆烫，煮去血水，再捞出备用。\n3 将排骨、枸杞、生姜片、土豆、葱段和料酒一起放入砂锅，加入适量清水。\n4 待汤滚后，再盖上锅盖，以小火炖45分钟。\n5 起锅前，加入盐调味即可。"}, "黄豆芽炖排骨": {"ingredients": "排骨块250克\n黄豆芽100克\n盐5克\n生姜片3片\n白胡椒5克", "steps": "1 黄豆芽洗净；将排骨块汆烫，去血水。\n2 取汤锅，注入清水后，先将排骨和姜片放入锅中，炖煮30分钟。\n3 待排骨软烂，再放入黄豆芽和白胡椒，拌匀后，略煮一下。\n4 最后加入盐调味即可起锅。"}, "乌骨鸡板栗枸杞汤": {"ingredients": "乌骨鸡500克 板栗70克 香菇50克 葱段10\n克 枸杞10克 生姜片3片 盐5克", "steps": "1 将香菇洗净后，切成四瓣。\n2 板栗去壳，洗净备用。\n3 乌骨鸡切块，放入滚水中汆烫去血水，再过凉水，冲洗干净。\n4 取汤锅，注入500毫升清水烧开，放入乌骨鸡、香菇、板栗、葱段、枸杞和姜片，以大火再次烧开。"}, "海带炖鸡": {"ingredients": "鸡1000克 泡发海带200克 料酒5\n毫升 盐5克 葱花10克 生姜片\n3片 花椒5克 胡椒粉5克 花生\n油5毫升", "steps": "1 鸡肉洗净、切块；海带洗净、切成菱形块，分别汆烫后捞出备用。\n2 热油锅，放入鸡肉、葱花、姜片、花椒、胡椒粉、料酒和海带炒匀。\n3 接着注入500毫升清水，大火煮滚后转小火炖2~3小时至鸡肉熟烂。\n4 最后加入盐调味即可。"}, "红枣猪蹄花生汤": {"ingredients": "红枣8颗 猪蹄1000克 花生50克 黄芪10克\n当归8克 盐5克 米酒15毫升", "steps": "1 将猪蹄洗净、拔除细毛，切成块状后汆烫去杂质，备用。\n2 花生浸泡于冷水中4小时，入锅煮至软。\n3 将红枣、猪蹄、花生、黄芪、当归和米酒放入锅中，再加入热水盖过食材，慢炖1小时。\n4 待猪蹄和花生熟软，再加入盐调味即可。"}, "辣拌茄子": {"ingredients": "茄子200克\n红辣椒10克\n葱末10克\n蒜泥10克\n酱油15毫升\n醋5毫升\n芝麻油5毫升", "steps": "1 红辣椒洗净，去籽、切丝。\n2 取小碗，放入酱油、醋、芝麻油拌匀成调味酱，备用。\n3 茄子对半切开，皮朝下放入盘中，入锅蒸8分钟后取出放凉，用手撕成条状。\n4 将茄子、红辣椒丝、葱末、蒜泥和调味酱一起拌匀至入味即可。"}, "豌豆烧黄鱼": {"ingredients": "黄鱼1条 豌豆100克 大蒜20克 生姜20克\n克 料酒5毫升 醋5毫升 酱油15毫升\n盐10克 冰糖2克 生粉15克", "steps": "1 大蒜、生姜分别拍碎；碗豆洗净沥干备用。\n2 在鱼肚中撒入5克盐、大蒜、生姜，再在鱼身上抹上生粉，腌渍片刻。\n3 烧热油锅，放入黄鱼煎至八分熟后，再倒入豌豆炒熟。\n4 接着放入料酒、醋、酱油和100毫升清水，并用大火煮开。\n5 最后加入盐和冰糖调匀即可。"}, "蔓越莓牛奶粥": {"ingredients": "牛奶500毫升\n蔓越莓干50克\n饭150克\n冰糖5克", "steps": "1 取一锅，加入牛奶、蔓越莓干以及米饭一起熬煮，待沸腾后，转小火继续熬煮至米粥熟烂。\n2 待米粥熬煮至稠状，再放入冰糖搅拌均匀，等到冰糖煮至完全溶化，即可起锅食用。"}, "可乐鸡翅": {"ingredients": "鸡翅3个 葱段10克 生姜片3片 丁香5克\n八角1/2个 花椒5克 桂皮5克 淡色酱油\n15毫升 可乐150毫升 色拉油5毫升"}, "三文鱼鲜蔬沙拉": {"ingredients": "三文鱼150克 嫩黄瓜1根 苹果100克\n橘子2个 生菜50克 红甜椒40克\n盐10克 黑胡椒粒5克 橄榄油10毫升\n橘子汁15毫升 沙拉酱15克", "steps": "3 倒入15毫升清水和可乐、淡色酱油，盖上盖子，以中火焖煮3分钟。\n4 待汤汁浓稠，将鸡翅拌炒均匀即可。\n1 三文鱼撒上黑胡椒粒、橄榄油及盐，腌渍10分钟，再放入蒸锅蒸熟。\n2 将蒸熟的三文鱼取出，切成小块备用。\n3 将黄瓜、苹果、红椒分别洗净，切成小块。\n4 生菜放入冰水中浸泡15分钟后捞出，撕成小片。\n5 将所有食材均匀混合，接着淋上橘子汁、挤上沙拉酱即可食用。"}, "伏苓粥": {"ingredients": "茯苓粉15克 白米饭150克 红枣\n10颗 豆腐50克", "steps": "1 红枣洗净，去核；豆腐切成块。\n2 取汤锅，放入白米饭、红枣及500毫升清水，小火煮成粥品。"}, "红绿豆瘦身粥": {"ingredients": "绿豆100克\n山楂30克\n红枣10个", "steps": "1 将红豆和绿豆洗净，放入清水中浸泡30分钟。\n2 山楂、红枣分别洗净，红枣去核备用。\n3 将红豆、绿豆、山楂及红枣放入锅中，加入500毫升清水，用小火炖煮至红绿豆均呈松软即可。"}, "南瓜炒米粉": {"ingredients": "干米粉100克 南瓜条100克 猪瘦肉丝80克\n洋葱丝80克 木耳丝50克 虾米10克\n酱油15毫升 白糖5克 盐10克 胡椒粉10克\n食用油30毫升 香菜段10克", "steps": "1 取小碗，加入300毫升清水、酱油、白糖、盐和胡椒粉搅拌成酱汁；热油锅，放入虾米、洋葱丝爆香，再加入猪瘦肉丝炒至九成熟。\n2 加入木耳丝，炒香后，放入酱汁炒匀，再加入南瓜条、米粉，炒至汤汁收干，最后放上香菜段装饰即可。"}, "鸭肉海带汤": {"ingredients": "鸭肉50克\n水发海带50克\n盐5克\n姜片3片", "steps": "1 将鸭肉洗净、切块，泡入醋水2小时后，汆烫去血水，捞出备用。\n2 海带洗净，切丝备用。\n3 在砂锅里放入鸭肉、500毫升清水和姜片，以大火煮滚，接着再转小火炖煮30分钟。\n4 加入海带丝，续煮40分钟，至鸭肉软烂。\n5 最后加入盐拌匀即可。"}, "黄芪老鸭汤": {"ingredients": "杏鲍菇200克\n青椒60克\n红椒60克\n橄榄油40毫升\n盐10克\n番茄酱30克\n白糖30克\n白醋20毫升", "steps": "1 鸭肉斩块，过滚水汆烫去血水，接着捞出、冲净沥干。\n2 将生姜片、黄芪、料酒和鸭肉一起放入砂锅中，倒入500毫升清水，以大火煮开。\n3 接着转小火慢炖2小时，至鸭肉软烂。\n4 最后放入枸杞、白胡椒和盐，关火盖上盖子焖一会，至枸杞胀大即可。\n1 杏鲍菇切滚刀块，加入少许盐拌匀，使杏鲍菇入味、出水。\n2 取一小碗，放入番茄酱、白糖及白醋搅拌均匀。\n3 起油锅，放入杏鲍菇炒香，再下青椒、红椒一起拌炒。\n4 待杏鲍菇熟透后，放入做法2的酱汁炒匀，即可起锅盛盘。"}, "牛肉小炒": {"ingredients": "牛肉丝200克 青椒丝100克 冬笋丝100克\n克 葱丝10克 姜丝10克 酱油10毫升\n生粉5克 米酒10毫升 白糖2克\n食用油5毫升", "steps": "1 牛肉丝用5毫升酱油、生粉和米酒腌渍20分钟。\n2 热油锅，开大火，牛肉丝炒至五分熟后捞出。\n3 放入葱丝、姜丝煸出香气，再加入青椒丝、冬笋丝、牛肉丝、酱油、白糖、米酒以及少许清水，炒熟即可。"}, "火腿奶酪三明治": {"ingredients": "白吐司4片\n生菜叶4片\n西红柿50克\n奶酪2片\n火腿2片", "steps": "1 生菜叶洗净；西红柿洗净后去蒂切片；火腿切片。"}, "香菇红枣粥": {"ingredients": "白米饭150克 小香菇6朵 红枣5\n个 鸡胸肉30克 盐5克 米酒5\n毫升 食用油适量", "steps": "1 鸡胸肉洗净，切丁；红枣去核后洗净，香菇洗净，分别泡水备用。\n2 起油锅，下鸡肉丁炒开，再放入香菇、米酒、适量清水、白米饭以及红枣，一起熬煮成粥。\n3 最后再加入盐调味即可。"}, "葱爆牛肉": {"ingredients": "牛肉丝250克 蛋白1个 姜末10克 葱段10克\n蒜末10克 蚝油15克 酱油30毫升 白糖10克\n料酒5毫升 生粉15克 食用油适量", "steps": "1 将牛肉丝洗净，放入碗中，加入15毫升酱油、5克白糖、蛋白、料酒、生粉，腌渍10分钟。\n2 牛肉下油锅，略炒至八分熟，捞出备用。\n3 锅中注油烧热，炒香葱段、姜末、蒜末，接着放入酱油、白糖、蚝油和清水，再放入牛肉丝翻炒均匀，即可出锅。"}, "香菜萝卜": {"ingredients": "香菜末100克\n白萝卜240克\n白醋15毫升\n2 放入碗中，加入盐，充分抓匀，去除生味，逼出萝卜中的水分。\n芝麻油5毫升\n辣油5毫升\n3 抓至萝卜变软，加入白醋、辣油、芝麻油和香菜末，搅拌均匀，即可盛盘。\n盐15克\n1 白萝卜洗净，去皮、切成丝。"}, "开阳白菜": {"ingredients": "白菜500克\n虾米10克\n食用油5毫升\n盐5克\n白糖2克\n水淀粉5毫升", "steps": "1 将白菜挑洗干净，去头，切粗丝备用。\n2 热油锅，先放入虾米爆香，接着加入米酒和白菜一起翻炒。\n3 加入清水、盐及白糖，炒至白菜出水。\n4 用水淀粉勾薄芡即可起锅。"}, "板栗核桃粥": {"ingredients": "去壳核桃50克\n板栗50克\n白米粥450克\n盐（或冰糖）适量", "steps": "1 板栗洗净，放入滚水煮10分钟后取出，用剪刀在蒂头剪一道开口，放入烤箱烤15分钟，剥出果实备用。\n2 将核桃洗净后放入烤箱烤15分钟，烤出香气。\n3 白米粥放入锅中，加适量水煮滚。\n4 板栗与核桃拍碎，放进粥里一起炖煮5分钟，依个人口味放入盐或冰糖调味即可。"}, "南瓜豆沙卷": {"ingredients": "南瓜200克\n面粉70克\n红豆沙90克\n鸡蛋1个\n白糖5克\n食用油5毫升\n红薯300克\n姜泥10克\n黑糖10克", "steps": "1 南瓜去皮和籽，洗净、切片，盖上保鲜膜蒸熟后捣成泥。\n2 将南瓜泥加入蛋液、清水、白糖，再陆续放入面粉，搅拌至面粉无颗粒，制成面糊。\n3 起油锅，将面糊倒入锅中，煎成饼。\n4 再将豆沙放于饼上，卷成南瓜豆沙卷即可。\n1 将红薯洗净后，去皮、切块。\n2 起800毫升水锅，锅内沸腾后，加入黑糖拌匀，再加入红薯煮透。\n3 最后加入姜泥拌煮均匀，即可起锅食用。"}, "鲜虾芦笋": {"ingredients": "材料（一人\n鲜虾16只\n芦笋90克\n姜片2片\n盐15克\n生粉15克\n蚝油15克\n1 鲜虾去壳、虾泥，洗净后抹干，用盐、部分生粉拌匀；剩余生粉加水调成水淀粉。\n3 热锅，下姜片爆香，接着加入虾、蚝油、少量水、盐炒匀，再用水淀粉勾芡。\n2 芦笋洗净，去根部、切斜刀，焯烫熟后，捞出沥干，散开装盘、待凉。\n4 待虾熟后起锅，将之淋在芦笋上即可。"}, "糖醋萝卜": {"ingredients": "萝卜250克\n白糖10克\n醋10毫升\n香菜末10克\n盐10克\n芝麻油5毫升", "steps": "1 萝卜去皮、洗净，切细丝后放入滚水焯烫至软化，捞起沥干，放在盘内。\n2 把醋倒入碗内，加入白糖和盐调匀，淋到萝卜丝上，再撒上香菜末、淋上芝麻油即可。"}, "干贝丝烩娃娃菜": {"ingredients": "娃娃菜250克 干贝20克 虾米15克 姜末10\n克 蚝油15克 白糖2克 芝麻油5毫升\n食用油5毫升 米酒5毫升", "steps": "1 娃娃菜洗净，去头、对切，放入沸水中煮熟，捞出盛盘。\n2 干贝洗净，浸泡30分钟后，取出压成丝状；虾米洗净、浸泡备用；干贝水和虾米水留着备用。\n3 起油锅，爆香姜末后，下干贝、虾米一起翻炒，加入蚝油、白糖、浸泡干贝和虾米的水、米酒，待稍微收汁后，加芝麻油拌匀，起锅后，将汤汁淋在娃娃菜上即可。"}, "葱爆酸甜牛肉": {"ingredients": "牛里脊肉300克 大葱50克 芝麻\n油5毫升 米酒15毫升 酱油15毫\n升 醋5毫升 白糖5克 食用油\n5毫升 蒜末10克", "steps": "1 牛里脊肉洗净，剔去筋膜，切薄片后装碗，加米酒、酱油、芝麻油、白糖拌匀；大葱洗净，切成斜片。\n2 起油锅，下牛里脊肉片、葱片、蒜末，迅速拌炒至肉片断血色，滴入白醋翻炒至熟，起锅装盘即可。"}, "回锅鸭肉": {"ingredients": "鸭肉300克 竹笋100克 西蓝花50克\n青椒40克 红椒40克 白糖2克 盐5克\n水淀粉5毫升 酱油15毫升 辣椒酱5克\n食用油5毫升 米酒5毫升", "steps": "1 鸭肉洗净，加盐和米酒后入滚水汆烫、去腥。\n2 竹笋洗净切片；西蓝花、青椒、红椒分别洗净切块。\n3 起油锅烧热，放入西蓝花、笋片以及辣椒酱、白糖、酱油和15毫升水炒匀。\n4 接着放入鸭肉，用水淀粉勾芡后，加入青椒、红椒一起炒熟即可。\n白菜100克\n虾米10克\n盐10克\n水淀粉5毫升"}, "虾米白菜": {"ingredients": "2 锅中放入虾米炒香，加入白菜快速翻炒至熟，再加盐调味。\n1 将白菜洗净，切成条；虾米用温水泡软，洗净后沥干。\n3 最后用水淀粉勾芡即可。"}, "菠菜炒鸡蛋": {"ingredients": "菠菜180克\n鸡蛋2个\n蒜末10克\n酱油15毫升\n盐5克\n食用油适量\n排骨500克\n青椒20克\n黄椒20克\n白芝麻适量\n白糖20克\n醋10毫升\n番茄酱5克\n酱油10毫升\n米酒5毫升\n盐5克\n生粉5克\n食用油适量", "steps": "1 菠菜洗净，切段，用沸水焯烫；鸡蛋打散成蛋液，再将蛋液炒熟盛盘。\n2 锅中加油烧热，将蒜末爆香后，再倒入菠菜，加盐、酱油翻炒，最后倒入炒好的鸡蛋，翻炒均匀即可。\n1 排骨洗净；黄甜椒及青椒洗净、去籽，切块；取白糖、醋、番茄酱、适量的水以及5毫升酱油，调成酱汁。\n2 排骨放入碗中，先用米酒、盐以及5毫升酱油拌匀，再加入生粉继续搅拌，并腌渍10分钟。\n3 起油锅，将排骨炸至内熟外酥、表面呈金黄色，捞出备用。\n4 将酱汁倒入锅中，放入排骨、青椒和黄椒拌炒均匀，待汤汁稍微收干，即可起锅，最后撒上白芝麻即可。"}, "枸杞皇宫菜": {"ingredients": "皇宫菜240克\n蚝油30克\n芝麻油5毫升\n枸杞10克\n盐5克\n1 将皇宫菜洗净，切去较硬的根部分，放入加盐的沸水中煮熟。"}, "老鸭炖猪蹄": {"ingredients": "老鸭1只 猪蹄1对 香葱1根 生姜1块\n花椒20克 料酒15毫升 盐10克", "steps": "1 老鸭洗净、剁成小块，放入滚水中烫2分钟后捞出，沥干血水后洗净备用。\n2 猪蹄刮净毛垢、洗净，劈为2块；生姜洗净，切片；香葱洗净，切小段。\n3 锅内放适量清水，将鸭块与猪蹄一同放入锅内，大火煮滚。"}, "培根包菜": {"ingredients": "培根150克 胡萝卜片20克\n包菜450克 蒜末10克\n盐5克 食用油5毫升", "steps": "1 包菜洗净，切段；胡萝卜去皮、洗净，切片。\n2 热油锅，以大火炒香蒜末、培根，接着放入胡萝卜、包菜，再加入少许水和盐，煮熟即可。"}, "姜丝龙须菜": {"ingredients": "龙须菜350克 姜丝10克 芝麻油5毫升\n白醋5毫升 淡色酱油15毫升 白糖2克\n盐10克", "steps": "1 龙须菜洗净，切去根部，切成2指长度的段。\n2 沸水中加入少许盐，焯烫龙须菜，再加入姜丝，一起煮片刻后捞出沥干，放入碗中。\n3 加入白糖、白醋、淡色酱油、盐，搅拌均匀，滴上芝麻油即可盛盘。"}, "黄豆莲藕炖牛肉": {"steps": "1 将牛肉洗净、切块，放入沸水中氽烫去腥并捞出。\n2 莲藕和胡萝卜均洗净、去皮，再切块，备用。\n4 汤锅中加水烧沸，放入牛肉块、莲藕块、胡萝卜块和黄豆。"}, "蚝油芥蓝": {"ingredients": "5 大火煮沸后转小火炖45分钟至牛肉熟烂，起锅前加盐调味即可。\n柴鱼片5克\n芥蓝250克\n蚝油15克\n白糖2克\n姜末10克\n盐5克\n食用油5毫升\n米酒5毫升", "steps": "1 芥蓝洗净，整株放入加盐的沸水中焯烫，捞出后沥干水分，切长段，铺盘。\n2 热油锅，炒香姜末后转小火，放入蚝油、白糖、盐，拌炒均匀，再加入米酒和少许水，制成酱汁。\n3 将酱汁淋在芥蓝上，撒入柴鱼片即可。"}, "鱼香肉丝": {"ingredients": "猪肉丝200克\n青椒丝30克\n胡萝卜丝15克\n马蹄5颗\n姜末10克\n葱末10克\n蒜末10克\n生粉5克\n盐10克\n白糖5克\n酱油5毫升\n食用油适量", "steps": "1 猪肉丝、青椒丝、胡萝卜丝分别洗净，沥干备用；马蹄洗净，拍碎。\n2 猪肉丝加入生粉、5克盐，抓匀。\n3 热油锅，将姜末、蒜末爆香。\n4 放入猪肉丝，下白糖、酱油和5克盐，再放入青椒丝、胡萝卜丝、马蹄和少量水，以大火拌炒匀后，最后放入葱末即可。"}, "豆腐丸子": {"ingredients": "海带丝150克 葱末10克 姜末10克\n盐10克 食用油适量 生粉15克\n米酒10毫升\n3 另起油锅，放入海带丝、排骨翻炒，接着加入米酒、盐、水和丸子，盖上锅盖炖煮10分钟即可。\n1 将板豆腐洗净、捣碎，加入猪肉末、姜末、葱末、生粉以及5克盐和米酒，搅拌均匀，做成大丸子；排骨洗净、切块，汆烫后捞出备用。\n2 热油锅，放入丸子，炸至金黄色后捞出。\n豆腐块150克 豆芽菜45克 胡萝卜片\n45克 香菇片25克 青椒圈15克 食\n用油适量 酱油15毫升 葱末5克 胡\n椒粉5克 芝麻油5毫升 米酒5毫升\n水淀粉15毫升", "steps": "1 起油锅，放入豆腐块稍微煎至金黄，再加入香菇片、胡萝卜片、豆芽菜和酱油，翻炒后加入少许水煨煮片刻。\n2 再放入青椒圈、水淀粉、胡椒粉以及米酒翻炒均匀。\n3 最后撒入葱末，淋上芝麻油即可。\n#"}, "板栗烧鸡": {"ingredients": "板栗肉50克\n去骨鸡肉300克\n食用油5毫升\n绍兴酒5毫升\n酱油15毫升\n葱段20克\n生姜片3片\n盐5克\n芝麻油5毫升\n生粉15克\n水淀粉5毫升", "steps": "1 鸡肉切成块，加入盐及生粉，腌渍5分钟，备用；胡萝卜去皮、洗净，切滚刀块。\n鸡肉含优质蛋白质，能强壮身体、温补脾胃、益气养血；板栗则可养胃健脾、补肾强筋、活血止血。故此菜具有补元气、健脾胃、助排恶露的功效。\n2 板栗肉洗净、滤干，起油锅，将板栗肉炸成金黄色备用。\n5 最后以水淀粉勾芡、淋上芝麻油即可。\n3 起油锅，将鸡肉煎至表皮微焦，再加入板栗肉、葱段、生姜片、酱油及适量清水。\n4 待水滚后，加入绍兴酒，盖上锅盖，焖煮10分钟。"}, "金针云耳烧鸡": {"ingredients": "黄花菜60克\n木耳60克\n鸡腿肉150克\n蒜头20克\n食用油10毫升\n酱油10毫升\n白糖5克\n盐5克", "steps": "1 木耳去蒂，切小块；蒜头洗净，切片；鸡腿肉洗净，切小块。\n2 起油锅，先下蒜片炒香，\n续下鸡腿肉炒至金黄色\n时，再放入酱油、白糖、\n盐及100毫升的水，熬煮\n上色。\n3 大火煮至沸腾后转小火，再入黄花菜及木耳，继续熬煮5分钟，入味后起锅即完成。"}, "虾皮冬瓜": {"ingredients": "1 将冬瓜去皮、去籽后洗净，切成小块备用。\n2 起油锅，放入姜末和冬瓜块翻炒，炒至冬瓜块半熟。", "steps": "3 接着加入虾皮、盐、米酒及少量清水搅匀，盖上锅盖，转小火焖至入味即可。"}, "核桃仁花生芹菜汤": {"ingredients": "西芹100克\n核桃仁30克\n花生20克\n芝麻油适量\n盐5克", "steps": "1 西芹洗净，切段。\n2 核桃仁和花生分别洗净，备用。\n3 取汤锅，加入300毫升清水，煮沸后放入西芹、芝麻油及盐。\n4 待再次煮沸时，放入核桃仁和花生，续煮3分钟即可。"}, "桂圆红枣乌骨鸡汤": {"ingredients": "乌骨鸡500克 桂圆50克 红枣10颗\n盐5克 生姜片3片", "steps": "1 乌骨鸡洗净、斩块，汆烫去血水后，将乌骨鸡捞出，放入已注入沸水的砂锅中。\n2 将桂圆、红枣、生姜片一起放入砂锅中，煮沸后，改小火慢炖1小时。"}, "蒸鸡蛋羹": {"ingredients": "鸡蛋2个 葱花10克 盐10克\n芝麻油5毫升", "steps": "1 将鸡蛋打入碗中，均匀搅拌，打至没有块状凝结，制成蛋液。\n2 将蛋液加入75毫升凉开水和盐，边加边搅拌，再用滤网过滤气泡。\n3 放入蒸锅中，将筷子横放在锅盖及锅子中间留缝，以大火加热至水滚，再转小火蒸煮10分钟。\n4 最后淋上芝麻油、撒上葱花即可。"}, "薏仁鸡": {"ingredients": "鸡肉块300克 薏仁50克 生姜片3片\n葱段20克 绍兴酒15毫升 盐5克", "steps": "1 鸡肉块用热水汆烫，捞出；薏仁洗净，用温水泡1小时至软化后捞出。\n2 将鸡肉块和薏仁放入砂锅中，再放入500毫升清水、葱段、姜片和绍兴酒一同炖煮40分钟。\n3 起锅前，加入盐调味即可。"}, "猪蹄黄豆汤": {"ingredients": "1 猪蹄去毛、洗净后切块，放入热水中汆烫去血水。\n3 烧开后，加入姜片、葱段和料酒，盖上锅盖，焖煮至猪蹄软烂。\n2 黄豆用冷水浸泡后，加入500毫升清水，煮至黄豆变软，再加入猪蹄。", "steps": "4 起锅前，加入盐调味即可。"}, "青椒镶饭": {"ingredients": "洋葱50克 红椒1个 青椒1个 香菇20克\n火腿1片 白米饭150克 食用油15毫升\n1 香菇泡软、洗净，切细丁；洋葱、火腿分别洗净，切细丁。\n2 青椒、红椒洗净，去蒂后对半切开、去籽，一半切细丁，另一半里面刮净备用。\n3 热油锅，先放入香菇、火腿、洋葱爆香，再加入米饭、盐、咖喱粉，翻炒片刻，再加入红、青椒丁炒熟。"}, "猪骨萝卜汤": {"ingredients": "排骨300克\n胡萝卜120克\n白萝卜150克\n陈皮5克\n红枣3颗\n盐10克", "steps": "咖喱粉10克 盐15克\n1 排骨洗净，放入加盐的热水中汆烫，捞出备用。\n2 胡萝卜、白萝卜分别去皮、洗净，切成大块；陈皮洗净备用。\n3 煲内放入适量清水，加入陈皮、红枣煲熟，再放入胡萝卜、白萝卜、排骨，以小火焖煮40分钟。\n4 起锅前，加入盐调味即可。"}, "香葱豆腐": {"ingredients": "红椒40克 蛋豆腐100克 葱段10克 香菜10\n克 蚝油15克 酱油15毫升 白糖2克\n水淀粉5毫升 食用油适量", "steps": "1 红椒洗净、去籽及白膜，切滚刀块。\n2 蛋豆腐切正方形小块，再放入热油锅中，炸至表面酥黄，捞出备用。\n3 起油锅，爆香葱段，转小火，加入蚝油、白糖、酱油和豆腐拌炒一下，加入少量清水煨煮一会，再下红椒。"}, "金沙南瓜": {"ingredients": "咸蛋黄1个 咸蛋白1个 南瓜200克\n白糖2克 蒜末10克 辣椒丝10克\n芝麻油5毫升 食用油15毫升", "steps": "1 南瓜去皮、洗净，切成片，放入沸水中煮至熟软，捞出备用；咸蛋白剁碎。\n2 热油锅，爆香蒜末，接着放入咸蛋黄，不停搅拌至蛋黄冒泡。\n3 放入南瓜、咸蛋白，翻炒均匀，再放入辣椒丝、白糖、芝麻油搅匀即可。"}, "猪蹄炖茭白": {"ingredients": "猪蹄500克 花生50克 茭白1根 生姜片3片 盐5克", "steps": "1 花生用盐水发泡2小时；茭白去皮和老梗根部，切成三厘米滚刀块备用。\n2 猪蹄去毛洗净，对半剖开，剁成三厘米大小的块状，放入水中汆烫至变色，捞出备用。\n3 将花生、猪蹄、生姜片放入砂锅中，再加入温水，大火煮开，再转小火炖1小时，最后放入茭白和盐继续以小火炖30分钟即可。"}, "蒸南瓜": {"ingredients": "南瓜230克\n枸杞10克\n蚝油15克\n姜丝10克\n盐5克\n白糖2克\n水淀粉5毫升\n食用油5毫升", "steps": "1 南瓜洗净、切块，放入盘中，再放入蒸锅中以中火蒸20分钟，取出后倒掉蒸出的水。\n2 热油锅，加入姜丝爆香，接着放入蚝油、盐、白糖、少许清水和枸杞，拌炒均匀。\n3 关火后，加入水淀粉制成酱汁。\n4 将酱汁淋在蒸好的南瓜上即可。"}, "玉米笋炒墨鱼": {"ingredients": "玉米笋40克\n墨鱼肉200克\n胡萝卜50克\n小黄瓜50克\n蒜头20克\n盐5克\n食用油5毫升", "steps": "1 玉米笋、胡萝卜、小黄瓜及墨鱼肉洗净、切片，玉米笋及胡萝卜须先汆烫熟透。\n2 起油锅，放入蒜头爆香，\n加入墨鱼肉拌炒至熟色，\n再放入玉米笋、胡萝卜一起拌炒。\n3 最后放入盐及小黄瓜拌炒均匀，即可起锅食用。"}, "西蓝花炒牛肉": {"ingredients": "牛肉150克 西蓝花100克 胡萝卜片50克\n食用油5毫升 盐5克 酱油5毫升\n米酒5毫升 水淀粉5毫升 姜末10克\n1 将西蓝花洗净，掰成小朵，焯烫后沥干。\n2 牛肉横纹切薄片，加盐、酱油、米酒腌10分钟；锅中倒油烧热，放入牛肉片滑炒，待变色即捞出沥油。\n3 锅中重新加油烧热，放入姜末、蒜末爆香，放入胡萝卜片翻炒，再放入牛肉片略炒。\n4 最后加入西蓝花翻炒，再放入盐调味、水淀粉勾芡即可。\n蒜末10克"}, "山药烧鸡": {"ingredients": "山药150克 鸡腿200克 香菇4朵\n胡萝卜块50克 米酒5毫升 盐5克\n酱油15毫升 色拉油5毫升", "steps": "1 山药去皮、洗净后切厚片；香菇泡软，留下香菇水；鸡腿洗净，剁成块。\n2 将胡萝卜块、山药片、香菇及鸡肉，分别汆烫好备用。\n3 热油锅，将胡萝卜块、山药片、香菇放入锅中拌炒，再加入鸡肉略炒一下。\n4 放入酱油、盐及米酒调味，盖上锅盖焖至鸡肉熟透即可。"}, "玉米浓汤": {"ingredients": "玉米酱160克 玉米粒160克 鸡蛋1个 奶油\n30克 水淀粉20毫升 火腿80克 牛奶200毫\n升 黑胡椒粒5克 盐12克", "steps": "1 火腿切丁；鸡蛋打散。\n2 玉米粒、玉米酱放入沸水中煮，接着加入火腿丁、盐、奶油以及牛奶。\n3 煮沸后，用水淀粉勾芡，持续搅拌，再加入蛋液，并不时搅拌汤汁。\n4 关火，放入黑胡椒粒即可盛盘。"}, "乌骨鸡糯米粥": {"ingredients": "乌骨鸡腿1只 糯米45克 红枣2颗\n葱白1根 米酒5毫升 盐5克", "steps": "1 糯米洗净，泡水1小时。\n2 葱白洗净，切丝；红枣拍破；乌骨鸡腿入滚水中汆烫，捞起，备用。\n3 取一锅，放入乌骨鸡腿，加水熬煮，煮滚后放入米酒和红枣，再转小火煮20分钟至鸡肉软烂。\n4 加入糯米，大火煮开后改小火，续煮至粥黏稠。\n5 最后加入盐调味，再将葱丝放入焖煮10分钟即可食用。"}, "枸杞鸡丁（288）": {"ingredients": "鸡胸肉250克 枸杞20克 蛋白1个\n马蹄30克 食用油5毫升 生粉15克\n盐5克 葱末10克 姜末10克 蒜末10克", "steps": "1 枸杞洗净，备用；马蹄去皮后洗净，切成小方丁。\n2 鸡胸肉洗净，切成小方丁，放入盐、蛋白、生粉，搅拌均匀，备用。\n3 锅内倒油烧热，放入腌好的鸡丁，快速翻炒几下，加入盐、蒜末、姜末及马蹄丁。\n4 最后加入枸杞和葱末，再翻炒均匀即可。"}, "干贝香菇鸡汤": {"ingredients": "鸡腿150克\n干贝20克\n香菇30克\n姜片10克\n盐10克\n米酒5毫升", "steps": "1 鸡腿汆烫去血水；香菇泡水；干贝泡入加米酒的水中。\n2 起一锅水，加入姜片、干贝及浸泡过的水、香菇、鸡腿块煮至沸腾，再转小火熬煮20分钟，最后放入盐搅拌均匀，即可起锅。"}, "虾肉冬瓜汤": {"ingredients": "鲜虾10只\n冬瓜250克\n蛋白1个\n姜片3片\n盐5克\n白糖2克\n芝麻油5毫升\n米酒5毫升", "steps": "1 鲜虾挑出肠泥、洗净，加入米酒，隔水蒸8分钟后取出。\n2 冬瓜洗净，切小块后放入锅中与姜片一起煲煮。\n3 再放入虾肉，下盐、白糖以及芝麻油略煮，最后加入蛋白即可。"}, "桂花甜藕": {"ingredients": "莲藕330克 圆糯米50克 莲子25克\n蜂蜜20克 冰糖10克 水淀粉15毫升\n桂花酿10克", "steps": "1 莲藕洗净，切去一端藕节。\n2 糯米用清水漂洗干净，浸泡2小时，接着捞起晾干、塞入莲藕孔内，边灌边用筷子顺孔向内戳，使糯米填满。\n3 将莲藕摆入碗中，放入蒸锅，以大火蒸熟，取出后切大片，摆在盘上。\n4 莲子先放入沸水中，加入冰糖、桂花酸和莲子一起煮滚，再用水淀粉勾芡。\n5 起锅，淋在藕块上，再淋入蜂蜜即可。"}, "菠萝炒鸡胗": {"ingredients": "鸡胗100克 菠萝块50克 嫩姜10\n克 蒜片10克 米酒5毫升 食用\n油5毫升 白糖2克 盐5克", "steps": "1 嫩姜切丝；鸡胗切薄片。\n2 起油锅，放入姜丝及蒜片，炒至待姜丝变软、蒜香味出来。\n3 加入清水、米酒、盐和鸡胗炒匀。\n4 炒至鸡胗变色、变软，加入菠萝块拌炒，并加入白糖，炒至菠萝变软后即可起锅。"}, "铁板豆腐": {"ingredients": "荷兰豆60克 蛋豆腐100克 木耳片40克\n胡萝卜片40克 葱段10克 蒜末10克 香菜10\n克 盐5克 白糖2克 食用油15毫升 芝麻\n油5毫升 蚝油15克 米酒5毫升", "steps": "1 蛋豆腐切做长条状；起滚水锅，加盐，焯烫木耳片、胡萝卜片、荷兰豆，捞出备用。\n2 起油锅，将豆腐煎至两面酥黄，推到锅边，下葱段、蒜末爆香；再加入蚝油、白糖和焯烫过的食材，翻炒一会，加入少许清水煨煮；再加入米酒、芝麻油炒匀。\n3 起锅后，撒入香菜即可。"}, "三元蒸鸡": {"ingredients": "鸡900克 红枣20克 枸杞20克 盐5克 葱丝5克", "steps": "1 鸡洗净后剁成小块，入滚水中汆烫30秒后迅速捞起，沥干水分。\n2 将盐均匀撒在鸡肉上，放入炖皿内，并将红枣、枸杞一起摆入。\n3 炖皿加上皿盖后放入蒸锅内，待水滚后，以大火蒸40分钟，最后撒上葱丝即可。"}, "雪菜冬笋黄鱼汤": {"ingredients": "黄鱼300克 冬笋50克 雪菜50克\n猪肉片30克 料酒5毫升 葱花10克\n生姜丝10克 色拉油5毫升 芝麻油5毫升\n1 将黄鱼去鳞、清除内脏，洗净后抹上薄薄一层生粉。\n3 起油锅、烧热，放入黄鱼煎至两面微黄，再加入500毫升清水、冬笋、雪菜、猪肉片及料酒，大火烧开。\n胡椒粉5克 盐5克 生粉15克\n4 放入葱花、生姜丝和盐，转小火熬煮15分钟，最后加胡椒粉、芝麻油即可。", "steps": "2 冬笋洗净，切片；雪菜洗净，切碎。"}, "腰果虾仁": {"ingredients": "虾仁200克 腰果50克 葱花2克\n蒜片2克 生姜2克 蛋白1个 醋10毫升\n盐30克 生粉15克 料酒30毫升\n芝麻油5毫升 食用油适量\n葱2支\n姜4片\n草鱼180克\n面条1份\n米酒10毫升\n酱油30毫升\n食用油10毫升\n白糖5克", "steps": "1 将虾仁洗净，挑出肠泥；蛋白打散，加入生粉、盐及料酒拌匀，放入虾仁抓腌，静置一会。\n2 起油锅炸腰果，捞出放凉；接着将虾仁入油锅过油，再捞出沥干备用。\n3 锅底留油，放入葱花、蒜片、生姜爆香，再加入料酒、醋、盐、虾仁和腰果翻炒。\n4 最后淋上芝麻油即可起锅。\n1 草鱼洗净，切块；葱切段；\n起一锅水，将面条煮熟后沥干，备用。\n2 草鱼加入米酒及酱油抓腌。\n3 另起油锅，爆香姜片，\n放入葱段炒香，再下草鱼\n煎至两面微焦，香味传出\n后加适量水，大火煮沸。\n4 加入面条、酱油、白糖一起熬煮，最后下米酒提香，盛盘即可。"}, "猪肉香菇大卤面": {"ingredients": "100克 面条200克 豆瓣酱15克 盐5\n小鲍鱼2颗 菠菜50克 蘑菇6朵\n乌龙面1份 盐10克 酱油5毫升\n克 葱花10克 姜末10克 蒜末10克"}, "鲍鱼菠菜面": {"steps": "2 菠菜焯水，去除草酸及涩味，备用。\n1 将豆腐干和香菇分别切碎；起滚水锅，将面条汆烫备用。\n白糖2克 酱油15毫升 生粉5克 食用油适量\n3 热油锅，依序放入豆瓣酱、葱花、姜末、蒜末爆香，再加入猪绞肉、香菇、豆腐干，一起炒出香味。\n2 取一碗，加入生粉、白糖、酱油拌匀，调成芡汁。\n4 锅内接着放入适量清水，待煮沸后加入调好的芡汁和盐，调成卤汁，再将其淋在面条上即可。"}, "桂圆当归鸡蛋汤": {"ingredients": "桂圆50克 当归片5克 熟鸡蛋1个 冰糖10克", "steps": "1 取汤锅，注入300毫升的清水，再将当归片放入，煮滚。\n2 接着加入桂圆，盖上锅盖转小火炖煮15分钟。\n3 熟鸡蛋剥壳后，放入锅内继续炖煮15分钟至微微上色。"}, "鸡肉山药粥": {"ingredients": "山药50克 枸杞20克 熟松子20克\n鸡胸肉70克 大米50克 盐10克", "steps": "1 将鸡胸肉洗净、切丁，汆烫备用。\n2 大米洗净；山药去皮、洗净，切块。\n3 加入500毫升清水至锅中，再将大米、鸡肉、山药一起放入，用大火煮开，接着转小火，将米粒煮熟。\n4 关火前放入枸杞、盐拌匀，再撒上松子即可。"}, "香菇炖鸡": {"ingredients": "1 将干香菇用温水洗净后，放入热水中泡开，香菇水留着备用。\n干香菇2朵鸡500克盐5克葱段10克姜片3片米酒5毫升枸杞5克\n2 鸡洗净、切块，放入沸水中氽烫，捞出备用。\n3 锅内放入葱段、姜片、香菇、香菇水和鸡肉，用大火烧开，捞起浮沫。\n4 加入米酒和枸杞，转小火炖30分钟至鸡肉熟烂，再加入盐调味即可。"}, "咖喱鸡丁意大利面": {"ingredients": "鸡胸肉100克 青椒80克\n意大利面150克 咖喱酱30克\n盐10克 牛奶100毫升 食用油5毫升", "steps": "1 意大利面放入滚水中，加5克盐，将面煮熟备用。\n2 鸡胸肉切丁；青椒洗净去籽，切成块。\n3 起油锅，放入鸡丁翻炒，接着加入咖喱酱，翻炒均匀，倒入牛奶，再加入清水淹过食材。\n4 烧开后转小火，再加入青椒，待酱汁熬至浓稠，加盐调味。\n5 将意大利面盛入碗中，浇上酱汁，拌匀即可。"}, "茄汁豆腐": {"ingredients": "盒装豆腐100克\n小豆干3片\n胡萝卜50克\n食用油10毫升\n白糖10克\n番茄酱5克\n盐2克", "steps": "1 将豆腐及豆干切丁；胡萝卜去皮、切丁，备用。\n2 起油锅，炒香豆干后，\n再下胡萝卜，均匀拌炒至\n食材熟透。\n3 放入豆腐来回拌炒，最后加入白糖、番茄酱及盐调味，均匀拌炒即可盛盘。"}, "火龙果炒鸡丁": {"ingredients": "鸡胸肉270克\n火龙果100克\n青椒70克\n黄椒70克\n盐5克\n1 鸡胸肉洗净，切成丁；火龙果去皮、切丁；青椒、黄椒分别洗净后，切除白膜、切丝备用。\n食用油5毫升\n3 接着放入青椒、黄椒、火龙果，翻炒均匀，即可起锅。\n2 油锅烧热，下鸡丁快速翻炒，加盐调味。"}, "八宝鸡汤": {"ingredients": "党参6克 白术6克 茯苓6克 白芍6克\n熟地黄6克 当归6克 川芎6克\n炙甘草3克 母鸡500克 葱花10克\n姜片3片 米酒5毫升 盐5克", "steps": "1 母鸡洗净、切块，汆烫去血水后捞出，备用。\n2 将所有药材和葱花、姜片一起放入500毫升热水中，再加入鸡肉块和米酒。\n3 接着盖上锅盖、转小火，炖煮45分钟，最后加盐调味即可。"}, "糙米莲子鸡粥": {"ingredients": "1 鸡骨氽烫后，以小火熬煮1小时后制成鸡高汤；鸡胸肉洗净，切小丁；白米洗净。\n2 糙米及干莲子洗净，泡水1小时。\n3 起水锅，加入白米、糙米、莲子以及鸡高汤一起烹煮30分钟。\n4 待米粥煮至稠烂，放入鸡丁拌煮10分钟，加盐调味即可起锅食用。"}, "猪肉香菇大卤面（288）": {"ingredients": "水发香菇60克 猪绞肉50克 木耳40克\n鸡蛋1个 面条1份 葱花10克 姜末10克\n蒜末10克 盐5克 食用油5毫升 豆瓣酱\n20克 白糖5克 酱油5毫升 生粉5克", "steps": "1 将木耳、香菇洗净、切丝；鸡蛋打散备用；面条加盐汆烫后，盛盘备用。\n2 取小碗，放入生粉、白糖、酱油调成芡汁。\n3 起油锅，放入蛋液炒散后，拨至一旁，再放入姜末、蒜末及葱花爆香，最后下豆瓣酱、猪绞肉、香菇、木耳拌炒出香味。\n4 锅内放入少许水，煮至沸腾后加入调好的芡汁、盐拌炒均匀，最后淋在备好的面条上即可。"}, "姜丝牡蛎肉丝汤": {"ingredients": "姜丝10克 牡蛎60克 肉丝20克\n罗勒10克 盐5克 酱油5毫升", "steps": "1 姜洗净，切丝；罗勒、牡蛎各自洗净备用；肉丝洗净后沥干，放入小碗中，加入酱油均匀抓腌。\n2 起水锅，待水煮至沸腾后，加入姜丝及肉丝煮至肉丝熟透。\n3 加入牡蛎一起熬煮，待牡蛎煮熟后，加入盐搅拌均匀。\n4 起锅前，放入罗勒一起熬煮，即可起锅食用。"}, "莲藕干贝排骨汤": {"ingredients": "莲藕100克\n排骨250克\n干干贝15克\n盐5克", "steps": "1 干干贝洗净后浸泡一晚，干贝水保留备用；莲藕洗净后，去皮、切片。\n2 起水锅，放入排骨汆烫后，捞出备用。\n4 起锅前，加入盐，搅拌均匀即可。\n3 取砂锅，放入干贝、莲藕、排骨与适量水一起熬煮，待沸腾后，盖上锅盖，小火慢炖1小时。"}, "时蔬烩竹笋": {"ingredients": "干香菇30克\n竹笋200克\n木耳60克\n胡萝卜60克\n色拉油10毫升\n姜10克\n生粉少许\n酱油5毫升\n胡椒少许\n冰糖5克", "steps": "1 干香菇洗净，泡开后切块；木耳洗净，切小块；胡萝卜洗净，切丁；姜洗净，切末；竹笋洗净，去皮；生粉加少许水调和备用。\n2 起水锅，放入竹笋煮熟后，切大块备用。\n3 起油锅，爆香姜末后，\n放入竹笋、香菇、木耳、\n胡萝卜拌炒后，再加入酱油、\n胡椒、冰糖，略煮至\n收汁。\n4 最后加入水淀粉勾薄芡拌炒均匀，即可起锅食用。"}, "蜜汁黑豆": {"ingredients": "3 加入红糖搅拌均匀后，便可关火、盛盘。\n1 先将黑豆洗净，再浸泡。\n黑豆50克\n红糖10克\n茄子2条\n芝麻酱10克\n醋10毫升\n芝麻油5毫升\n盐5克", "steps": "1 将茄子洗净去蒂，切滚刀块。\n2 取一个适合的盘子，将茄子排列在上方，放入蒸锅中蒸熟。\n3 将芝麻酱与醋、芝麻油以及盐放在小碟中均匀搅拌。\n4 将茄子取出放凉后，淋上拌好的酱汁即完成。"}, "西红柿片香芙蓉": {"ingredients": "豆包2片 西红柿100克 芹菜10克 食用\n油10毫升 番茄酱10克 白糖5克 盐5克\n生粉5克", "steps": "1 西红柿洗净，切块；芹菜洗净，切末；生粉加入少许水，调成水淀粉。\n2 起油锅，加入豆包煎至上色，取出后切小块。\n3 原锅中放入西红柿炒香，再放入番茄酱、白糖及盐、豆包翻炒均匀。\n4 沿锅边均匀淋上水淀粉即可盛盘，最后撒上芹菜末即可。"}, "芦笋炒杏鲍菇": {"ingredients": "芦笋80克 杏鲍菇200克 姜10克 蒜10克\n食用油5毫升 盐5克 米酒5毫升", "steps": "1 芦笋洗净，切段；杏鲍菇洗净后，切成与芦笋段相同的大小；姜、蒜各自洗净、切片。\n2 起油锅，加入姜、蒜爆香，待香味传出后，再放入杏鲍菇及芦笋一起拌炒。\n3 待杏鲍菇炒至熟透，加入盐、米酒来回翻炒，即可起锅食用。"}, "荷兰芹炒饭": {"ingredients": "荷兰芹40克 白饭150克 奶油25克\n盐5克", "steps": "荷兰芹洗净后，将花蕾部分切下剁碎，再把剩下的茎梗聚集剁碎，一起备用。\n2 取一平底锅，开中火，放入奶油炒至融化，再放入米饭反复翻炒，至米饭与奶油香气传出。\n3 在锅里加入剁碎的荷兰芹，来回拌炒均匀。\n4 最后放入盐，拌炒均匀即可盛盘食用。"}, "归芪乌骨鸡汤": {"ingredients": "鸡胸肉300克 玉米粒300克 豌豆100克\n5 用水淀粉勾芡后，将打散的蛋液淋入锅中，快速搅拌即可。\n鸡蛋1个 鸡汤300毫升 盐5克 生粉5克\n2 青豆、玉米粒分别洗净；鸡蛋打散成蛋液，备用；生粉加水调匀。\n4 接着转小火焖20分钟，再加盐调味。\n1 将鸡肉洗净，切成碗豆般大小。\n3 取汤锅，将鸡汤煮开，再将鸡蓉、玉米粒、豌豆放入锅中，大火烧开。\n乌骨鸡500克 当归10克 黄芪10克\n枸杞10克 红枣6颗 葱段20克\n生姜片3片 料酒15毫升 盐5克", "steps": "1 乌骨鸡洗净，剁块。\n2 取砂锅，将乌骨鸡放入锅内，再加入葱段、生姜片、黄芪、红枣、枸杞、当归和料酒一起炖煮。\n3 大火煮开后转小火，盖上锅盖，熬煮1小时。\n4 最后加入盐，搅拌均匀即可。"}, "姜丝鲍鱼菇汤": {"ingredients": "鲍鱼菇100克\n竹笋100克\n姜20克\n盐10克", "steps": "1 鲍鱼菇及竹笋各自洗净、切片；姜洗净，切丝备用。\n2 起水锅，待锅中沸腾后，\n加入鲍鱼菇、竹笋煮熟，再加入姜丝熬煮20分钟。\n3 最后放入盐搅拌均匀，即可起锅食用。"}, "松阪猪山药面": {"ingredients": "山药100克\n松阪猪肉片150克\n姜2片\n面条1份\n盐5克\n葱花30克", "steps": "1 松阪猪洗净，切片；山药洗净，切片。\n胡椒粉5克\n2 起一锅水，将面条煮熟，沥干备用。"}, "麻油猪肝面线": {"ingredients": "3 另起一锅水，放入山药、猪肉片及姜片一起熬煮。\n4 待山药熟软后，放入面条及盐、胡椒粉、芝麻油、葱花，拌煮均匀即可。\n2 起一锅水，沸腾后放入猪肝片，汆烫10秒后捞起，再用冷开水洗净猪肝表面的杂质，沥干备用。\n3 另起一锅，用芝麻油爆香姜丝，再放入猪肝与米酒、盐炒匀后，加入400毫升水熬煮2至3分钟。\n猪肝50克 面线1份 姜20克 米酒30毫升\n芝麻油10毫升 盐5克\n1 猪肝洗净至无血水，切薄片，用米酒腌渍15分钟；姜切丝备用；面线汆烫后盛盘。\n4 将完成的汤料淋在面线上，即可食用。"}, "虱目鱼米粉": {"ingredients": "虱目鱼肚1块 米粉1份 姜丝20克\n芹菜末30克 葱段20克 食用油10\n毫升 米酒30毫升 盐5克", "steps": "1 虱目鱼肚成小块。\n2 起油锅，煎香虱目鱼肚，以鱼肉那面下锅，可减少喷溅。\n3 下葱段、姜丝爆香，再放入米酒去腥，加热开水、米粉及一半芹菜末熬煮。\n4 最后放入盐调味，盛盘后撒上另一半芹菜末即可。"}, "南瓜胡萝卜牛腩饭": {"ingredients": "胡萝卜20克 白饭150克 牛肉100克 南瓜50克\n食用油5毫升 盐5克", "steps": "1 将胡萝卜、南瓜各自洗净后，去皮、切块；牛肉洗净，切块；白饭盛盘备用。\n2 起油锅，放入胡萝卜、南瓜略煎。\n3 加入适量水及牛肉一起熬煮，待沸腾后加入盐搅拌均匀，继续熬煮至蔬菜软烂即可。\n4 在盛好的白饭淋上做法3的食材，便可食用。"}, "醋拌迮藕": {"ingredients": "莲藕120克 辣椒20克 盐5克 醋20毫升\n白糖5克 芝麻油5毫升", "steps": "1 莲藕洗净，去皮；辣椒洗净，切丝；加入适量水及10毫升醋，调制成醋水。\n2 取大碗，放入莲藕及醋水，浸泡5分钟以防止莲藕变色。\n3 莲藕切薄片，用滚水焯烫后捞起，沥干并盛盘备用。\n4 取小碗，放入盐、醋、白糖及芝麻油搅拌均匀，将辣椒丝放在盛好盘的莲藕片上，淋上调制好的酱汁，即可食用。"}, "凉拌青木瓜": {"ingredients": "青木瓜100克 红椒10克 熟杏仁20克\n3 取小碗，加入酱油、白糖及柠檬汁均匀搅拌，搅拌至糖粒溶化，制成酱汁。\n1 青木瓜洗净后，去皮、去籽并切丝；红椒洗净，切丝；取研钵，放入熟杏仁捣碎备用。\n2 取大碗，放入木瓜丝与盐，抓腌均匀。\n4 放入木瓜丝、红椒及杏仁搅拌均匀，盛盘后均匀淋上酱汁即可。\n盐5克 酱油5毫升 白糖5克\n柠檬汁10毫升"}, "南瓜饭": {"ingredients": "白米150克 南瓜50克", "steps": "1 白米洗净；南瓜洗净、去皮，切成小块。\n2 将白米和南瓜放入电锅内锅中，加入300毫升的水，盖上锅盖，按下煮饭键，煮至开关跳起后，再焖10分钟。\n3 将煮好的南瓜饭搅拌均匀即完成。"}, "莲子饭": {"ingredients": "白米150克 莲子50克", "steps": "1 白米洗净，备用；莲子泡水8小时，洗净备用。\n2 将白米和莲子放入电锅内锅中，加入200毫升的水，盖上锅盖，按下煮饭键，煮至开关跳起后，再焖15分钟。\n3 将煮好的莲子饭搅拌均匀即完成。"}, "姜丝炒牛肉": {"ingredients": "牛肉片100克 姜丝10克 酱油30毫升 盐5克\n生粉少许 米酒5毫升 芝麻油5毫升 食用油\n适量\n海带根150克\n姜丝10克\n白醋10毫升\n盐10克\n酱油5毫升\n白糖5克\n芝麻油5毫升", "steps": "1 牛肉片洗净，加入生粉、酱油和米酒，稍微搅拌，腌渍约20分钟。\n2 热油锅，用大火快速翻炒牛肉片至半熟后，捞起备用。\n3 锅底留油，下姜丝炒香，倒入已半熟的牛肉片炒匀，关火，起锅前加入盐和芝麻油即可。"}, "姜丝拌海带": {"steps": "西芹50克\n甜不辣100克\n红甜椒10克\n蒜末5克\n姜丝5克\n食用油适量\n1 西芹洗净，去掉粗梗后切斜刀片；红甜椒洗净，切丝；甜不辣洗净，切长条片状。\n2 热油锅，爆香蒜末、姜丝，放入甜不辣拌炒，接着放入西芹和红甜椒丝炒3分钟，加盐调味后即完成。"}, "八珍排骨汤": {"ingredients": "排骨250克\n黑枣4颗\n党参10克\n白术10克\n伏苓10克\n当归10克\n白芍10克\n甘草5克\n川芎10克\n熟地黄10克\n姜片10克\n盐适量", "steps": "1 将药材洗净，放入冷水中浸泡15分钟，取出沥干备用。\n2 烧一锅滚水，加少许盐，\n放入排骨汆烫去血水，\n捞起备用。\n3 将排骨、姜片和所有药材放入砂锅中，加水至盖过所有材料，开大火煮至沸腾，盖上锅盖，转小火炖煮。\n4 炖煮的过程中，可每隔一阵子掀盖看看水量及汤汁颜色，若水量太少就再加点水，继续炼出药材的药性，大约炖煮1.5小时，起锅前加盐调味即完成。"}, "姜枣乌骨鸡汤": {"ingredients": "乌骨鸡1000克 姜20克 红枣8颗\n枸杞10克 盐5克\n1 乌骨鸡洗净，切块；姜洗净，去皮，并切片；红枣、枸杞洗净，沥干。\n龙须菜300克 白芝麻5克 橄榄油20毫升\n2 烧一锅滚水，加少许盐，放入乌骨鸡氽烫去血水，捞起备用。"}, "芝麻龙须菜": {"ingredients": "玉米笋3根\n秋葵3根\n辣椒80克\n火腿50克\n豆干2块\n罗勒5克\n鸡蛋1个\n饭150克\n食用油10毫升\n酱油10毫升", "steps": "3 在沥干的龙须菜上倒入酱汁，用筷子搅拌均匀，静置10分钟使其入味。\n4 将入味的龙须菜撒上白芝麻，稍微拌匀即完成。\n1 辣椒切斜片；玉米笋、秋葵洗净，切小段；豆干切丁；火腿切丁，罗勒略切碎。\n2 鸡蛋取蛋黄，与米饭一起拌匀。\n3 起油锅，下火腿拌炒出油香，加入豆干、秋葵、玉米笋一起炒熟。\n4 下拌好的米饭和酱油拌炒熟透，再放入罗勒及辣椒拌炒均匀即可。"}, "银耳莲子红枣汤": {"ingredients": "银耳15克 莲子40克 红枣40克 冰糖10克", "steps": "1 银耳泡发，将蒂切除后切成小块；莲子、红枣分别洗净备用。\n2 将莲子、红枣、银耳加入适量清水和冰糖，用大火煮沸。"}, "红枣茶": {"ingredients": "干红枣10颗 白糖10克 蜂蜜适量\n山楂 50克 粳米 50克 黑糖 10克 黑枣 8颗", "steps": "1 将红枣放在冷水中，迅速清洗沥干，用刀背拍破，备用。\n2 取汤锅，放入红枣后注入500毫升清水煮沸。\n3 转小火，上盖慢煮20分钟，让味道更融入水中。\n4 加入白糖，搅拌至溶化后关火，再闷10分钟至出现汤色即可。\n5 饮用前加入蜂蜜拌匀即可。\n1 将粳米、山楂、黑枣分别洗净。\n2 取汤锅，放入800毫升清水煮开，接着放入山楂、粳米、黑枣。\n3 待再次煮开后，稍微搅拌，再转中小火续煮30分钟，最后加入黑糖拌匀即可。"}, "虫草乌骨鸡": {"ingredients": "乌骨鸡1000克\n冬虫夏草5克\n白参须5克\n淫羊藿10克\n黄芪10克\n天花粉10克\n干香菇4朵\n红枣3颗\n枸杞10克\n葱段20克\n姜片5片\n料酒15毫升\n盐5克\n白芝麻少许\n猪大排150克\n蒜头25克\n食用油5毫升\n生粉少许\n酱油10毫升\n白糖5克\n米酒10毫升", "steps": "1 干香菇、冬虫夏草分别泡水备用。\n2 将白参须、淫羊藿、黄芪、天花粉洗净，沥干后装入纱布袋，放入砂锅中煮30分钟，炼出药性。\n3 乌骨鸡洗净、剁块后，汆烫去血水备用。\n4 将鸡肉、香菇、冬虫夏草、红枣、枸杞、葱段、姜片、料酒及纱布袋放入砂锅中，再注入药汤，用小火炖煮2小时。\n5 捞出纱布袋，加盐调味即可。\n1 将白芝麻干锅炒香；蒜头洗净，切末；铝箔纸预先抓皱备用；取小碗，放入酱油、白糖与米酒拌匀。\n2 猪排先用肉槌拍打，再用生粉均匀抹上；取大碗放入猪排、蒜末及调好的酱料腌渍10分钟。\n3 烤箱以  $ 200^{\\circ} $C 预热10分钟，将铺在烤盘上的铝箔纸用刷子涂上一层薄薄的食用油。\n4 将猪排肉放入烤箱烤熟，食用前撒上白芝麻即可。", "notes": "冬虫夏草有调节免疫系统功能的作用，长期服用有助于调养虚弱体质；白参则可大补元气、益血、养心安神、清热润肺、养胃生津。两者和乌骨鸡熬汤可补血滋阴、补肺肾、益精髓。"}, "烩豆腐": {"ingredients": "豆腐200克 黄瓜50克 胡萝卜50克\n生粉15克 芝麻油5毫升 食用油5毫升\n盐5克 酱油15毫升 鲜汤50毫升\n葱花10克 姜末10克", "steps": "1 将豆腐切成丁，放入滚水中焯烫，捞出后沥干水备用；生粉加水调匀。\n2 胡萝卜去皮，和黄瓜分别洗净，均切成4厘米见方的丁状。\n3 起油锅，油热后放入葱花、姜末爆香，随即添入鲜汤、酱油和盐。\n4 煮滚后放入豆腐丁、黄瓜丁和胡萝卜丁，再次煮滚。\n5 用水淀粉勾薄芡，再淋上芝麻油即可。"}, "葱烧豆包": {"ingredients": "豆包80克 青葱40克 姜10克 白糖5克 蚝油5克 酱油5毫升 食用油5毫升", "steps": "1 豆包洗净，沥干水分；葱洗净，切段；姜洗净，切末。\n2 起油锅，放入豆包煎香，待两面微有焦色即可取出，在熟食砧板上切成四等份。\n3 利用锅里的余油，爆香姜末与葱段，待香味传出后放入豆包一起拌炒。\n4 放入蚝油、酱油及白糖，拌炒均匀即可。\n黄芪10克 枸杞5克 母鸡500克 生姜片4片\n绍兴酒15毫升 白胡椒粉5克 盐5克"}, "黄芪枸杞母鸡汤": {"ingredients": "30克 紅椒30克 蒜末10克 葱", "steps": "1 母鸡洗净、切块，入锅且加入米酒一起汆烫、去腥，接着捞出备用。\n米酒5毫升\n花10克 酱油15毫升 食用油5毫\n2 将鸡块、生姜片、黄芪、枸杞、白胡椒粉和绍兴酒都放入锅中，倒入淹过食材的清水，用大火煮开。\n升 白糖2克\n1 去骨鸡腿洗净，切块；菠萝洗净，取肉，切块；青椒、红椒分别洗净，去蒂和籽，切块备用。\n2 热油锅，下鸡腿肉，炒至微黄，再放入葱花、蒜末、白糖、酱油、青椒、红椒，翻炒片刻。\n3 最后放入菠萝炒匀即可。\n3 接着转小火，盖上锅盖，续炖至鸡肉熟软，放入盐调味即可。"}, "咸蛋青花菜": {"ingredients": "咸蛋1个 西蓝花100克 蒜10克 食用油5毫升", "steps": "1 西蓝花洗净，切小朵；蒜洗净，切大片。\n2 将咸蛋白、咸蛋黄分离后，将蛋白、蛋黄分别剁成碎末。\n3 起油锅，爆香蒜片，炒至香味传出后，放入西蓝花一起拌炒，待西蓝花炒熟后加入蛋黄一起拌炒。\n4 将咸蛋黄炒至起泡，再放入咸蛋白炒匀即可。"}, "土豆炒肉丝": {"ingredients": "土豆100克\n肉丝150克\n葱20克\n盐5克\n食用油5毫升\n生粉20克\n3 起油锅，放入葱段爆香，再加入肉丝炒至八分熟。\n1 土豆洗净后，去皮、切丝、泡水；葱洗净，切段；肉丝洗净后，加入生粉拌匀，备用。\n4 加入土豆、盐拌炒均匀，待土豆熟透后即可起锅食用。\n2 起水锅，加入土豆汆烫后捞出、沥干。"}, "黄豆芽木耳炒肉丝": {"ingredients": "黄豆芽60克 木耳30克\n肉丝150克 豆瓣酱10克\n盐少许 白糖少许 食用油5毫升\n生粉5克 酱油10毫升", "steps": "1 木耳洗净，切丝；黄豆芽洗净，去根须。\n2 取小碗，放入肉丝、酱油及生粉均匀抓腌，并静置10分钟入味。\n3 起油锅，放入腌好的肉丝炒至半熟后捞出备用。\n4 原锅中放入木耳、黄豆芽炒至半熟，放入肉丝拌炒均匀，再加入豆瓣酱、盐、白糖一起拌炒。\n5 放入少许水，加盖焖煮至收汁，即可起锅食用。"}, "烤芝士三文鱼": {"steps": "1 三文鱼用料酒、盐抓腌后，再在两面各刷上一层薄薄的油。\n2 将芝士片切粗丝，铺平在三文鱼上。\n3 烤箱以  $ 200^{\\circ} $C 预热10分钟，并将铺在烤盘上的铝箔纸以刷子涂上一层薄薄的油。\n4 将三文鱼放入烤箱内，烤至三文鱼熟透、芝士融化即可。"}, "牛蒡烩鸡腿": {"ingredients": "鸡腿150克 牛蒡30克 胡萝卜30克\n蒜头2颗 玉米笋30克 食用油5毫升\n酱油15毫升 芝麻油5毫升", "steps": "1 将鸡腿洗净、切成大块状后，汆烫备用；胡萝卜切片；蒜头拍扁；玉米笋洗净，切斜刀。\n2 牛蒡洗净后，切成斜刀片，放入滚水中焯烫，再捞出、沥干。\n3 起油锅，爆香蒜片，放入胡萝卜、玉米笋，中火拌炒至熟透。\n4 加入鸡腿、牛蒡、酱油及少许水一起煨煮10分钟，待鸡腿入味后，淋上芝麻油增香，即可起锅盛盘食用。"}, "青椒肉末炒黄豆芽": {"ingredients": "黄豆芽150克\n胡萝卜20克\n青椒40克\n猪绞肉50克\n食用油2毫升\n盐5克", "steps": "1 黄豆芽洗净，去尾；青椒洗净后剖半、去籽，切丝；胡萝卜洗净，切丝。\n2 起油锅，放入猪绞肉，中火慢煎出猪油。\n3 加入胡萝卜、黄豆芽一起拌炒，炒至胡萝卜、黄豆芽都熟透。\n4 放入青椒、盐一起拌炒均匀，待青椒熟软后便可起锅食用。"}, "西红柿卤肉": {"ingredients": "猪肉150克 西红柿50克 葱5克\n五香粉5克 食用油2毫升 盐5克", "steps": "1 猪肉洗净，切块；西红柿洗净后，除去蒂头、切块；葱洗净，切段。\n2 热油锅，放入葱段爆香，再下肉块炒香。"}, "水晶猪蹄": {"ingredients": "猪蹄250克 盐5克 米酒5毫升\n姜15克 葱15克", "steps": "1 猪蹄洗净后，刮净毛、去骨；葱洗净，切小段；姜洗净后切片。\n2 起水锅，加入猪蹄、盐、米酒、葱段及姜片一起炖煮至沸腾，再转小火熬煮半小时。\n3 待猪蹄全熟后，取出、沥干、切片，即可盛盘食用。"}, "山药酥": {"ingredients": "白山药250克 紫山药250克 黑芝麻30克 食\n用油10毫升克 白糖5克 生粉5克", "steps": "1 山药洗净后，去皮、切长条、撒上生粉；黑芝麻干锅炒香，盛盘备用。\n2 起油锅，放入山药煎至熟透，待其呈现外软内硬的状态，便可盛盘备用。\n3 另取一锅，加入白糖与少许水炒化，糖液炒至黏稠后放入山药，让山药均匀沾黏糖液。\n4 糖液尚未凝固时，撒上黑芝麻，即可盛盘食用。"}, "干拌板条": {"ingredients": "去骨鸡腿150克\n板条1份\n芹菜30克\n米酒10毫升\n白糖10克\n黑醋30克\n酱油40毫升\n食用油适量", "steps": "1 芹菜洗净，切末；鸡腿洗净，切块；在小碗里混合所有调味料。\n2 热油锅，将鸡腿煎至金黄色，备用。\n3 放入瓶条拌炒均匀，再加入调好的酱汁、100毫升水一起拌炒至收汁。\n4 加入芹菜末拌炒3分钟，盛盘后铺上鸡腿块即可。"}, "莎莎酱金枪鱼 意大利面": {"ingredients": "洋葱50克 西红柿200克 蒜头3瓣\n熟西蓝花15克 香菜5克 黑胡椒2克\n橄榄油10毫升 柠檬20克 盐2克\n水煮金枪鱼50克 白糖2克\n米酒10毫升 意大利扁面1份", "steps": "1 洋葱、西红柿切丁；蒜头切末；将洋葱丁、西红柿丁、蒜末、橄榄油、柠檬汁、白糖、盐、黑胡椒拌匀，制成莎莎酱。\n2 面条加盐汆烫后捞起冰镇。\n3 将面条与莎莎酱拌匀，最后铺上金枪鱼与熟西蓝花即可。"}, "牡蛎面线": {"ingredients": "牡蛎300克 白面线50克 生粉10克\n蒜头2瓣 葱10克 食用油5毫升 酱油膏30克\n芝麻油5毫升 胡椒粉5克 白糖5克", "steps": "1 葱洗净，切段；蒜头洗净后去皮、切末；面线汆烫后备用。\n2 牡蛎洗净，均匀裹上生粉后放入滚水中，用小火熬煮至其漂浮便可捞起备用。"}, "韩式炒乌龙": {"ingredients": "韩式泡菜50克 猪肉片50克\n4 加入酱油膏调色，最后再放进芝麻油、胡椒粉以及白糖，拌匀即可起锅。\n蒜末20克 乌龙面1份 酱油20毫\n升 韩式泡菜汁20毫升", "steps": "1 起油锅，爆香蒜末，再放进猪肉片煎至一面微焦。\n2 放入韩式泡菜均匀拌炒，炒至猪肉片两面皆呈现熟色。\n3 下乌龙面充分拌炒，使酱汁沾附在面条上，再下酱油、韩式泡菜汁拌炒均匀即可。"}, "榨菜肉丝面": {"ingredients": "榨菜50克 猪肉丝80克 蒜末10克 葱3支\n小白菜50克 粗面1份 盐5克 食用油5毫升\n芝麻油5毫升 酱油30毫升 白糖10克", "steps": "1 小白菜、葱洗净，切段；面条加盐汆烫备用。\n2 起油锅，爆香葱段与蒜末，下肉丝炒香，肉丝两面炒至熟色，加200毫升水熬煮。\n3 加入酱油、白糖调味，汤汁煮滚后再放入榨菜、小白菜煮至熟色。\n4 起锅前点上芝麻油，均匀地淋在面条上即可。"}, "西红柿牛肉面": {"ingredients": "牛肉50克 西红柿200克 葱1支 蒜15克\n粗面1份 食用油10毫升 豆瓣酱10克 盐\n5克 芝麻油5毫升 白胡椒5克", "steps": "1 牛肉洗净，切片；葱、蒜洗净，切末；西红柿洗净，切块；牛肉汆烫备用；面条加盐汆烫备用。\n2 起一锅水约600毫升，加入牛肉熬煮，沸腾后转中火继续熬煮20分钟。\n3 起油锅，爆香蒜末后，加入牛肉炒香，下豆瓣酱均匀拌炒。\n4 再加入西红柿、面条、盐、芝麻油以及白胡椒拌炒均匀，3分钟后即可起锅，盛盘后撒上葱末即可。"}, "剥皮辣椒排骨面": {"ingredients": "剥皮辣椒100克\n排骨120克\n山药80克\n面条1份\n米酒10毫升\n酱油30毫升\n白糖5克", "steps": "1 竹笋洗净，切片；面条汆烫备用。\n2 起一锅水，放入剥皮辣椒、排骨、山药熬煮至沸腾，待沸腾后转小火继续熬煮。\n3 待山药熟烂后，放入面条继续熬煮，再放入酱油与白糖搅拌均匀。\n4 等到锅里再次沸腾后，放入米酒，即可起锅食用。"}, "奶香西蓝花": {"ingredients": "西蓝花150克\n姜20克\n奶油5克\n水淀粉10毫升\n牛奶80毫升\n盐5克", "steps": "1 姜洗净，切末；西蓝花洗净，切小朵。\n2 起一锅水，将西蓝花放入汆烫，熟后捞出沥干。\n3 锅中加入奶油，爆香姜末，再放入西蓝花均匀拌炒。\n4 最后下牛奶与盐拌炒均匀，再沿锅缘下水淀粉勾芡即可关火、起锅。"}, "炒红薯叶": {"ingredients": "红薯叶200克\n姜20克\n盐5克\n食用油5毫升", "steps": "1 红薯叶洗净、去除老叶，单叶分开后沥干备用；姜洗净，切丝。\n2 起油锅，放入姜丝爆炒出香味。\n3 放入红薯叶一起拌炒至熟色。\n4 最后放入盐来回拌炒均匀，即可起锅食用。"}, "苹果玉米蘑菇汤": {"ingredients": "苹果100克 玉米粒25克 蘑菇3朵 盐5克", "steps": "2 起一锅水，加入适量水，放入玉米粒、苹果及蘑菇，用大火熬煮。\n1 苹果洗净，切丁；蘑菇洗净，切片。"}, "小豆苗拌核桃仁": {"ingredients": "盐5克 白糖5克\n醋5毫升 芝麻油5毫升", "steps": "1 小豆苗用开水洗净后，盛盘备用。\n2 准备研钵，放入核桃捣碎。\n3 将盐、白糖、醋及芝麻油放在小碗里搅拌均匀。\n4 将酱汁均匀地撒在小豆苗上，最后撒上核桃碎增香即可。"}, "腐乳空心菜": {"ingredients": "空心菜150克 白豆腐乳30克 姜末20克\n食用油5毫升", "steps": "1 空心菜洗净、去老梗后，切成小段；白豆腐乳放入碗中，压泥备用。\n2 起油锅，放入姜末爆香，再放入空心菜一起拌炒。\n3 放入豆腐乳拌炒均匀，炒的过程中可加入少许水一起拌炒，以免空心菜炒到过干，待空心菜呈现熟色即可盛盘。"}, "萝卜海带汤": {"ingredients": "海带结80克\n白萝卜120克\n盐5克", "steps": "1 海带结洗净；白萝卜洗净，切大块。\n2 将海带结、白萝卜放入锅中，加适量清水，煮至海带熟透。\n3 加入盐搅拌均匀，即可起锅食用。"}, "蘑菇茄子": {"ingredients": "茄子2条 蘑菇50克 青豆50克 板栗50克\n食用油5毫升 酱油10毫升 白糖5克\n生粉5克", "steps": "1 茄子洗净，切成滚刀块；蘑菇洗净，切片；板栗去壳，烫熟备用；生粉加水调和备用。\n2 起一锅水，将茄子烫熟后，盛盘备用；取研钵，将板栗放入捣碎。\n3 另起油锅，加入蘑菇、青豆及烫熟的茄子一起拌炒，待蘑菇炒软后，加入板栗碎炒匀。\n4 加入白糖及酱油一起小火熬煮入味，待酱香味弥漫后，再沿着锅缘淋上水淀粉即可盛盘。"}, "竹荪鲜菇汤": {"ingredients": "竹荪5个\n鲍鱼菇50克\n香菇10克\n姜丝20克\n芹菜末少许\n盐5克", "steps": "1 竹荪洗净后，将之加水浸泡软化，再切小段备用。\n2 鲍鱼菇将梗切下，再对半切，其余部分切片；香菇切片备用。\n3 起水锅，放入竹荪、姜丝、鲍鱼菇、香菇及香菇水一起熬煮。\n4 最后加盐调味，撒上芹菜末，即可起锅食用。"}, "凉拌柠檬藕片": {"ingredients": "莲藕180克\n柠檬50毫升\n蜂蜜10克\n盐5克", "steps": "1 莲藕洗净后，去皮切薄片；柠檬洗净，取皮切丝。\n2 起一锅水，加入盐、莲藕片一起煮，待莲藕熟后，沥干、放凉备用。\n3 挤柠檬汁，加入蜂蜜一起调和。\n4 将放凉的藕片浸在做法3的汁中，放入冰箱1小时，使之入味。\n5 将做法4的食材取出后，另准备一盘，将藕片排列整齐，撒上柠檬丝、淋上少许汤汁即可。"}, "白菜牛奶汤": {"ingredients": "白菜180克\n枸杞10克\n香菇20克\n盐5克\n食用油5毫升\n牛奶300毫升", "steps": "1 白菜洗净后，切成适口长度；枸杞及香菇洗净，切片。\n2 起油锅，加入香菇拌炒出香味，再放入白菜一起拌炒；加入100毫升的清水与牛奶，用小火熬煮至沸腾。\n3 待白菜熟软后，加入枸杞与盐搅拌均匀即可。\n山药100克 胡萝卜50克 鸡腿150克"}, "山药香菇鸡": {"ingredients": "干香菇3朵 酱油10毫升 食用油5毫升\n空心菜200克 蒜20克\n1 将空心菜挑去老叶、切去根部后洗净，切成适口长段；蒜洗净，切成蒜蓉。", "steps": "2 热油锅，放入蒜蓉爆香，待香味传出后，再下空心菜来回翻炒。"}, "蒜蓉空心菜": {"ingredients": "食用油10毫升 盐5克\n2 起油锅，放入鸡腿，将其煎至表面金黄。\n3 放入香菇、山药、胡萝卜拌炒均匀，再加入酱油，并放入少许泡香菇的水一起熬煮。", "steps": "4 继续熬煮10分钟，待胡萝卜、山药皆已熟透，汤汁烧干时便可出锅。"}, "木耳炒姜丝": {"ingredients": "木耳100克 姜10克 青葱1根 蒜末10克\n白醋5毫升 盐15克 食用油5毫升", "steps": "1 木耳、姜及青葱洗净，切丝备用。\n2 取一碗，放入冷开水及葱丝，使其维持翠绿。\n3 起油锅，放入蒜末爆香，再下姜丝、木耳丝一起拌炒至八分熟；加入白醋拌炒至全部吸收，再下盐、少许水一起拌炒均匀。\n4 待木耳熟透后即可装碗，最后加入葱丝即可。"}, "洋葱青椒肉丝": {"ingredients": "瘦肉丝150克 青椒100克 洋葱80克\n食用油5毫升 盐10克 生粉15克\n米酒5毫升", "steps": "1 青椒洗净后，去蒂头、切丝；洋葱洗净后，去皮、去蒂头，切丝备用；生粉加水调和。\n2 取小碗放入肉丝，加入米酒均匀抓腌。\n3 起油锅，爆香洋葱末，再放入肉丝、洋葱丝一起拌炒，待肉丝呈现熟色，加入青椒继续拌炒。\n4 待青椒熟后，加入盐拌炒均匀，再沿着锅边淋上水淀粉略炒，即可起锅食用。"}, "鲜鱼粥": {"ingredients": "白鱼肉100克 豆皮40克 米饭150克 葱15克 姜15克 盐5克 胡椒粉5克 芝麻油5毫升", "steps": "1 鱼肉洗净，切片；豆皮切段；葱洗净，切末；姜洗净，切丝。\n2 起水锅，放入姜丝及鱼片一起熬煮，待鱼片呈现熟色，捞起备用。\n3 在鱼汤里放入米饭、豆皮，熬煮至米粥呈现稠状。\n4 将稍早捞起的鱼片放入一起熬煮，再下盐、胡椒粉均匀搅拌，起锅前撒上葱末及芝麻油，即可食用。"}, "麻油红凤菜": {"ingredients": "红凤菜100克 姜20克 盐5克\n芝麻油20毫升\n1 红凤菜洗净后，去老叶、切段；姜洗净，切丝。\n2 在锅里加入10毫升芝麻油，爆香姜丝。\n3 加入红凤菜及剩余芝麻油一起拌炒，起锅前加盐拌炒均匀即可。"}, "珍珠三鲜汤（288）": {"ingredients": "鸡胸肉50克 板豆腐50克 豌豆50克\n西红柿100克 蛋白1个 水淀粉30毫升\n料酒5毫升 盐10克 高汤300毫升\n芝麻油5毫升 食用油适量", "steps": "1 鸡胸肉剁成细泥；西红柿切成小丁备用。\n2 板豆腐弄碎后放入碗中，和鸡肉泥均匀搅拌，接着加入15毫升高汤、5克盐及蛋白，搅匀和成浆状。\n3 起油锅，下西红柿丁和豌豆，再加入料酒呛一下，接着加入高汤和盐。\n4 用小勺将鸡肉豆腐泥做成珍珠大小的圆形小丸子，放入锅内。\n5 等煮开后，加入水淀粉勾芡，洒上芝麻油即可。"}, "麻油姜煸猪肝": {"ingredients": "猪肝150克 姜30克 米酒10毫升 盐5克\n芝麻油10毫升", "steps": "1 猪肝洗净，切片；姜洗净，切片。\n2 取大碗，将猪肝、米酒放入一起抓腌。\n3 取一锅，用芝麻油爆香姜片，待香味传出后，再下猪肝。\n4 猪肝煎至熟透后，加盐拌炒均匀，即可起锅食用。"}, "红烧豆腐": {"ingredients": "1 板豆腐洗净，切大块；葱洗净，切长段。\n3 放入少许水、板豆腐、酱油及白糖一起熬煮，沸腾后转小火煮至入味，待豆腐入味后即可起锅。\n2 起油锅，将葱段放入爆香。"}, "奶汁海带": {"ingredients": "水发海带100克\n蜂蜜50克\n牛奶150毫升\n奶油10克\n白葡萄酒25毫升\n柠檬2片", "steps": "1 水发海带洗净后，切成菱形片，入锅煮软，再捞出、沥干。\n2 将奶油在砂锅中融化，再放入牛奶、蜂蜜、海带、白葡萄酒一起熬煮，沸腾后转小火继续熬煮，待海带片附上奶浆即关火、盛盘，再放上柠檬片装饰即可。"}, "照烧花椰杏鲍菇": {"ingredients": "杏鲍菇100克 西蓝花100克 姜5克 葱30克\n蒜10克 食用油5毫升 酱油10毫升 白糖5克 芝麻油少许", "steps": "1 杏鲍菇切块；葱切段；姜、蒜切片；西蓝花洗净、取小朵，焯烫后备用。\n2 起油锅，加入姜片、蒜片、葱段爆香，再放入杏鲍菇拌炒。\n3 加入西蓝花，用中火翻炒，再加入酱油、白糖、芝麻油一起翻炒入味即可。"}, "蜜烧秋刀鱼": {"ingredients": "秋刀鱼2尾 白芝麻5克 姜泥10克 盐5克\n料酒10毫升 酱油10毫升 味淋5毫升", "steps": "1 秋刀鱼洗净后，用剪刀剪开肚子，去除内脏。\n2 将盐、料酒和姜泥均匀地抹在鱼身上，腌渍10分钟。\n3 锅中加入腌好的秋刀鱼、酱油、味淋，一起熬煮至入味，最后撒上白芝麻即可起锅。"}, "腰果虾仁（288）": {"ingredients": "虾仁60克 腰果30克 葱花10克 盐10克\n2 利用做法1的油，把腰果放入煎酥，再捞出备用。\n1 虾仁用盐、米酒及蛋白腌渍后，裹上生粉，过油备用。\n3 利用余油爆香姜末、葱花，加入虾仁、腰果一起拌炒，再下盐调味即可起锅食用。\n米酒5毫升 生粉5克 蛋白1个\n姜末5克 食用油10毫升\n猪肚80克\n去心莲子15克\n山药10克\n姜片10克\n盐5克", "steps": "1 莲子加水泡发后备用；猪肚洗净，放入沸水中煮至软烂，再捞出冲洗、切块。\n2 起水锅，加入猪肚、姜片、山药及莲子一起熬煮，待沸腾后，转小火继续炖煮40分钟。\n3 最后加入盐搅拌均匀，即可起锅食用。"}, "桂圆羹": {"ingredients": "桂圆干50克 鸡蛋1个 白果10克\n红枣6个", "steps": "1 白果、红枣洗净备用。\n2 起水锅，加入红枣、桂圆干及白果一起熬煮，沸腾后转小火继续熬煮半小时。\n3 待食材入味后，打入鸡蛋，继续熬煮至鸡蛋熟透，即可起锅食用。"}, "清炒猪蹄筋": {"ingredients": "猪蹄筋200克 豆荚80克 葱10克 食用油5毫\n升 蚝油10克 米酒5毫升 水淀粉20毫升", "steps": "1 葱洗净，切段；豆荚洗净，焯烫；猪蹄筋洗净后切条、汆烫，再捞出、沥干。\n2 起油锅，爆香葱段，加入猪蹄筋、豆荚、米酒、蚝油及少许水煨煮，快速翻炒几下，使猪蹄筋均匀受热。\n3 煮至沸腾后，沿锅边均匀淋上水淀粉，勾好薄芡，熬煮至汤汁收浓即可。"}, "胡萝卜洋葱炒蛋": {"ingredients": "胡萝卜60克\n洋葱20克\n鸡蛋2个\n盐5克\n食用油10毫升\n3 起油锅，加入洋葱丝爆香，再放入胡萝卜丝炒软。\n1 胡萝卜及洋葱洗净、切丝；鸡蛋打在碗里。\n4 最后淋上拌好的蛋液，待鸡蛋煎熟后，即可起锅食用。\n2 在鸡蛋中放入盐搅拌均匀。"}, "彩椒鸡丁": {"ingredients": "红椒50克\n黄椒50克\n鸡胸肉100克\n盐5克\n食用油5毫升\n生粉5克", "steps": "1 红椒、黄椒洗净后切块。\n2 鸡胸肉洗净、切丁，加入生粉，腌渍数分钟。\n3 起油锅，将鸡丁炒至半熟，再放入红椒块、黄椒块炒熟，最后加盐调味即可。"}, "培根奶油蘑菇汤": {"ingredients": "蘑菇70克\n培根25克\n紫菜10克\n柴鱼片10克\n奶油5克\n白芝麻10克\n牛奶500毫升\n面粉15克\n盐5克", "steps": "1 蘑菇洗净，切片；培根切丁；紫菜切小丁。\n2 将蘑菇、牛奶及250毫升水放入果汁机搅打成汁。\n3 锅中加入奶油，煎香培根，\n再加入面粉炒香，放入做法\n2的食材，熬煮至沸腾。\n4 待沸腾后，加入盐搅拌均匀便可起锅，食用前撒上紫菜、柴鱼片及白芝麻即可。", "notes": "蘑菇富含18种氨基酸，包括人体自身不能合成、必须从食物中摄取的8种必需氨基酸，在蘑菇里都能找到。有些蘑菇中蛋白质的氨基酸组成比例甚至比牛肉的更好，研究发现，蘑菇的营养价值仅次于牛奶。"}, "蘑菇炒青椒": {"ingredients": "蘑菇5朵\n青椒40克\n芝麻10克\n食用油10毫升\n盐5克", "steps": "1 将蘑菇、青椒清洗干净；青椒仔细去籽、去蒂头。\n2 蘑菇切下蒂头后，与其余部分一起切成薄片。\n3 青椒切成四等份之后，再按2厘米长度切开。\n4 在平底锅里倒入食用油，放入蘑菇和青椒拌炒至熟。\n5 放入盐，再撒上芝麻拌匀，最后将锅里的食材均匀地盛在盘中即可食用。"}, "青江干丝糙米饭": {"ingredients": "糙米饭150克\n上海青40克\n豆干2片\n食用油5毫升\n盐5克", "steps": "1 上海青洗净后，切未备用。\n2 豆干洗净后，先切成豆干片，再切丝备用。\n3 起油锅，放入糙米饭炒香，待糙米饭香气传出后，放入豆干丝来回拌炒1分钟。\n4 再放入上海青拌炒至熟色，加盐调味，即可盛盘食用。"}, "水果糙米粥": {"ingredients": "橘子80克\n糙米饭150克\n蜂蜜30克", "steps": "1 橘子洗净后，剥皮、取肉、去籽。\n2 起一锅水约600毫升，加入糙米饭一起熬煮至稠状。\n3 放进橘子果肉一起熬煮，均匀搅拌后即可关火盛盘。\n4 待放凉后，加入蜂蜜一起拌匀即可。"}, "莲子枸杞粥": {"ingredients": "银耳10克\n莲子20克\n枸杞20克\n米饭150克\n冰糖10克", "steps": "1 银耳泡发、去蒂后，切成小块备用；莲子、枸杞洗净。\n2 起一锅水，将米饭和莲子一起熬煮至沸腾，再放入银耳小火熬煮40分钟。\n3 待莲子熟软后，再放入枸杞、冰糖搅拌均匀，待甜味均匀分布锅中即可盛盘。"}, "西红柿沙拉": {"ingredients": "西红柿100克\n苹果50克\n百香果1颗\n蛋黄酱15克\n柳橙汁150毫升\n冰糖5克\n生粉10克\n菠菜50克\n柳橙100克\n胡萝卜50克\n苹果100克", "steps": "1 西红柿洗净后，在1/3的部位横切开，将果肉挖出后切成小块；苹果洗净后，去皮、切块；百香果洗净、切开，取果肉；生粉加水调合。\n2 取一个小碗，将苹果块、西红柿块、百香果肉与蛋黄酱拌匀，再用汤匙放入西红柿容器中便可盛盘。\n3 起一锅，将柳橙汁与冰糖熬煮至充分融合，待沸腾后，延着锅缘加入水淀粉均匀搅拌后，淋在做法2的食材上即可食用。\n1 菠菜洗净后切段；柳橙、胡萝卜与苹果洗净后，去皮、切块。\n2 起一锅水，放入菠菜焯烫熟透后，捞起、沥干备用。\n3 将柳橙、胡萝卜、苹果及烫熟的菠菜放入果汁机中一起榨汁后，即可装杯饮用。"}, "牛奶馒头": {"ingredients": "面粉300克\n酵母粉5克\n白糖5克\n发粉5克\n醋5毫升\n食用油5毫升\n牛奶50毫升\n南瓜200克\n糯米粉150克\n藕粉30克\n鲜香菇5朵\n素肉酱30克\n食用油20毫升\n酱油10毫升\n白糖5克", "steps": "1 用温开水将白糖化开，再加入酵母粉搅拌均匀，并倒进面粉中，放入发粉、醋、食用油以及牛奶充分搓揉成面团。\n2 将面团放置一旁，发酵50分钟备用。\n3 将发酵好的面团用擀面棍擀平，并卷成长条，再用刀切成大小相同的块状。\n4 将切好的面团块放入蒸笼内蒸15分钟即可食用。\n1 南瓜洗净后，去皮、去籽，放入蒸锅中蒸熟；香菇洗净，切末。\n2 将蒸熟后的南瓜压泥，与糯米粉、藕粉及食用油充分揉匀，放置一旁备用。\n3 起油锅，将香菇炒香，再放入素肉酱、酱油及白糖拌炒均匀，盛盘备用。\n4 将揉好的南瓜糯米团分成大小均匀的若干份，成包子皮后包入馅料，放入蒸锅蒸10分钟即可食用。"}, "莲子红枣糙米粥": {"ingredients": "糙米70克\n莲子20克\n红枣5颗\n白糖5克\n银耳150克\n枸杞30克\n鲜莲子100克\n黑糖15克", "steps": "1 莲子洗净后去心浸水；红枣洗净后备用；糙米洗净后泡水。\n2 取一锅，加入适量水与糙米、莲子一起熬煮，沸腾后转小火继续熬煮半小时。\n3 待米粒煮开之后，加入红枣、白糖搅拌均匀，再熬煮15分钟即可食用。\n1 将购买回来的鲜莲子去心后洗净；银耳洗净，切小块；枸杞洗净，泡水。\n2 起一锅水，加入银耳一起熬煮至沸腾，再下莲子继续用中火熬煮20分钟。\n3 待莲子煮熟后，放入枸杞及黑糖搅拌均匀，等枸杞煮至膨胀后，即可盛盘食用。"}, "原味优酪乳250毫升 麦片30克 黑芝麻15克": {"ingredients": "杏仁100克\n花生25克\n鲜奶75毫升\n白糖10克", "steps": "1 取大碗，将优酪乳盛盘；将麦片、黑芝麻分别装在小碗中备用。\n2 取一锅，倒入黑芝麻不停翻炒干煎，待香味传出后，即可关火备用。\n3 往盛装优酪乳的大碗里放入麦片搅拌均匀，最后在上面均匀地撒上炒香的黑芝麻即可。\n1 杏仁、花生分别去膜、洗净，泡水5小时后沥干备用；芝麻预先干锅炒香备用。\n2 将泡过的杏仁、花生与鲜奶、300毫升水放入果汁机内搅打，滤除细渣。\n3 取一锅，倒入做法2的食材，小火煮至沸腾，再加入白糖拌匀，过程中需不停搅拌，以免烧焦。\n4 待白糖完全溶解之后即可装碗。"}, "核桃蜂蜜豆浆": {"ingredients": "豆浆300毫升\n核桃80克\n蜂蜜30克\n梨100克\n核桃50克\n冰糖20克\n生粉10克", "steps": "1 取一锅，放入核桃干，煎出香味后便关火盛盘。\n2 取研钵，将核桃放入，捣碎成末。\n3 将豆浆、核桃碎倒入小碗中混合均匀。\n4 再倒入蜂蜜，搅拌均匀即可食用。\n1 梨洗净后去皮，切小块；生粉以少许温开水调开。\n2 取一锅，放入适量清水、核桃及冰糖一起熬煮，沸腾后放入梨继续熬煮。\n3 待梨呈现透明状，再沿着锅边均匀地淋上水淀粉即可起锅食用。"}, "鲜奶糯米桂圆粥": {"ingredients": "薏米100克，鲜百合20克，红枣4颗。\n糯米50克，桂圆4颗，鲜牛奶250毫升，红糖适量。\n1 干香菇泡发后洗净，切去蒂部，划出花刀；平菇洗净切去根部；猴头菌和草菇洗净后切开；白菜心掰开成单片。", "steps": "2 锅内放入清水或素高汤、葱段，大火烧开。\n3 再放入香菇、草菇、平菇、猴头菌、白菜心，大火烧开，转小火煲20分钟，加盐调味即可。\n1 将薏米淘洗干净，放入清水中浸泡4小时。\n2 鲜百合洗净，掰成片。\n3 红枣洗净，备用。\n4 将泡好的薏米和清水一同放入锅内，用大火煮开后，转小火煮1小时。\n51小时后，把鲜百合和红枣放入锅内，继续煮30分钟即可。\n1 糯米、桂圆洗好后，清水浸泡1小时。\n2 将糯米、桂圆和泡米水放入锅中，加适量水，大火煮沸后换小火煮20分钟。\n3 然后放入鲜牛奶，小火煮 10 分钟；最后放入红糖即可。\n## 产后第2天", "notes": "桂圆补气养神，糯米有补虚、补血、健脾暖胃、止汗等作用，红糖有暖胃的效果，这道粥品对产后新妈妈的身体很有益处。"}, "枸杞红枣粥": {"ingredients": "莴苣100克，豆浆200毫升，姜片、葱段、盐各适量。\n枸杞子10克，红枣5颗，大米50克，红糖适量。", "notes": "枸杞子、红枣和红糖都有补养身体、滋润气血的功效，对有气血不足、脾胃虚弱、失眠、恶露不净等症状的产后妈妈来说，是极佳补品。"}, "豆浆莴苣汤": {"steps": "1 将枸杞子洗净，除去杂质。\n2 红枣洗净，除去核；将大米淘洗干净。\n3 将枸杞子、红枣和大米放入锅中，加水 600 毫升，用大火烧沸。\n4 再用小火煮 30 分钟，加入红糖调匀即可。\n1 将莴苣茎洗净去皮，切成 4 厘米长、1 厘米宽的条；莴苣叶切成段。\n2 将锅置火上，倒入油烧至六成热时放姜片、葱段稍煸炒出香味。\n3 放入莴苣条、盐，大火炒至断生。\n4 去姜片、葱段，将莴苣叶放入，并倒入豆浆，大火煮至熟透即可。", "notes": "豆浆营养丰富，易于消化吸收，可以滋阴润燥，补虚增乳。妈妈进补顺利，宝宝发育就会更好。"}, "珍珠三鲜汤（jinpai）": {"ingredients": "鸡胸肉100克，鸡蛋1个，胡萝卜丁、嫩豌豆、西红柿丁各50克，盐、水淀粉各适量。\n1 将羊肉切丝，并用酱油、盐、葱丝、姜丝和香油拌匀腌一会儿。\n2 锅中烧开适量水，下入细面条，待水将开时，将鸡蛋打破整个卧入汤中并转小火烧开。", "notes": "鸡肉的脂肪含量少，铁、蛋白质和维生素的含量却很高，容易消化，有益五脏；胡萝卜中特别的营养素—— $ \\beta $-胡萝卜素，对补血极为有益。"}, "剖宫产关键点": {"ingredients": "猪瘦肉100克，黄花菜10克，豆腐150克，盐适量。", "steps": "1 西蓝花切小朵洗净，放入沸水中烫1分钟。\n2 鹌鹑蛋煮熟剥皮；鲜香菇去蒂洗净；火腿切成小丁；西红柿洗净，切块，备用。\n3 鲜香菇、火腿丁放入锅中，加清水大火煮沸，转小火再煮 10 分钟。\n4 把鹌鹑蛋、西蓝花、西红柿放入锅中，再次煮沸，加盐调味。\n1 红小豆、黑米、大米分别洗净后，用清水浸泡2小时；莲子去心。\n2 将浸泡好的红小豆、黑米、大米，以及莲子、花生放入锅中，加入足够量的水，用大火煮开。\n3 转小火再煮至红小豆开花，黑米、大米熟透后即可。\nPart2 产后第1周"}, "鲢鱼丝瓜汤": {"ingredients": "鲢鱼1条，丝瓜200克，葱段、姜片、白糖、盐、料酒各适量。\n## 产后第5天\n每天1根香蕉", "notes": "丝瓜具有通经络、行血经的功效；鲢鱼有温中益气的作用。此汤两物相配，具有补中益气、生血通乳的作用。"}, "干贝冬瓜汤": {"ingredients": "冬瓜150克，干贝50克，盐、料酒各适量。", "notes": "冬瓜的营养价值很高，特别是维生素C的含量是鸡肉、牛肉的3倍；干贝有稳定情绪的作用；吃些天然食物来对抗抑郁，对妈妈和宝宝来说都是安全的。\n苹果含丰富的锌，锌是构成核酸及蛋白质不可或缺的元素，多吃苹果可以促进大脑发育，增强记忆力。"}, "葡萄干苹果粥（288）": {"ingredients": "白饭150克\n苹果100克\n葡萄干20克\n蜂蜜5克", "steps": "1 苹果洗净后切片、去籽。\n2 锅中加水煮开，放入白饭和苹果，煮沸后稍微搅拌，改中小火。\n3 葡萄干放入碗中，倒入滚烫的粥，待粥的温度冷却到 $ 40^{\\circ} $C以下，便可将蜂蜜放入粥中，拌匀即可食用。"}, "葡萄干苹果粥（jinpai）": {"ingredients": "大米50克，苹果1个，葡萄干20克，蜂蜜适量。", "steps": "1 冬瓜削皮，去子，洗净后切成片备用；干贝洗净，浸泡30分钟，去掉老肉。\n2 干贝放入瓷碗内，加入料酒、清水，清水以没过干贝为宜，隔水用大火蒸 30 分钟。\n3 干贝晾凉后撕成丝；冬瓜片、干贝丝放入锅内，加水煮15分钟。\n4 出锅时加入适量盐即可。\n1 大米洗净沥干，备用。\n2 苹果洗净去皮，切成小方丁，要立即放入清水锅中，以免氧化后变成黑色。\n3 锅内放入大米，与苹果一同煮沸，\n改用小火煮 40 分钟。\n4 食用时加入蜂蜜、葡萄干，搅拌均匀即可。"}, "冬笋雪菜黄花鱼汤": {"ingredients": "黄花鱼1条，冬笋、雪菜各30克，葱段、姜片、盐、料酒各适量。", "notes": "黄花鱼有健脾和胃、益气填精之功效，对产后抑郁症有良好的抗击作用。良好的精神状态是保证母乳质量的前提。"}, "鱼头海带豆腐汤（288）": {"ingredients": "鲈鱼头1个 嫩豆腐150克\n海带50克 料酒5毫升 葱段10克\n生姜片3片 香菜10克 盐5克\n醋5毫升 色拉油5毫升", "steps": "1 鱼头去鳃、洗净沥干，从中剖半；豆腐切厚片；海带泡发。\n2 大火烧热油锅，将鱼头煎至表面略微焦黄，接着爆香姜片和葱段，再倒入500毫升清水和醋，以大火煮沸再转小火慢炖。\n3 待汤呈乳白色，加入嫩豆腐、海带及料酒继续炖煮。\n4 煮至豆腐熟透后，最后加入香菜和盐拌匀即可。"}, "鱼头海带豆腐汤（jinpai）": {"ingredients": "胖头鱼鱼头200克，海带、豆腐各100克，鲜香菇5朵，葱段、姜片、盐、料酒各适量。\n## 产后第6天", "notes": "胖头鱼富含磷脂和可改善记忆力的脑垂体后叶素，特别是其头部的脑髓中含量很高。"}, "蛤蜊豆腐汤（288）": {"ingredients": "蛤蜊150克 豆腐100克 腊肉片20克 葱段\n10克 生姜片3片 米酒15毫升 食用油5毫升\n盐5克 白胡椒5克", "steps": "1 蛤蜊用冷水淘洗几次，放入盐水中静置2小时，吐沙备用；豆腐切块。\n2 热油锅，放入葱段和生姜片爆香，再放入腊肉片炒香，最后下豆腐块、米酒和500毫升热水，以大火煮开。\n3 再放入蛤蜊，盖上锅盖，大火续煮2分钟。\n4 最后再放入盐和白胡椒调匀即可。"}, "蛤蜊豆腐汤（jinpai）": {"ingredients": "鲜虾仁30克，猪肉50克，胡萝卜15克，盐、香菜、香油、葱、姜、馄饨皮各适量。\n蛤蜊200克，豆腐100克，葱花、姜片、盐、香油各适量。", "steps": "1 将鲜虾仁、猪肉、胡萝卜、葱、姜放在一起剁碎，加入油、盐拌匀。\n2 把做成的馅料分成 8~10 份，包入馄饨皮中。\n3 将包好的馄饨放在沸水中煮熟。\n4 将馄饨盛入碗中，再加盐、香菜、葱末、香油调味即可。\n1 在清水中滴入少许的香油，将蛤蜊放入，让蛤蜊彻底吐净泥沙，冲洗干净，备用。\n2 豆腐切成 1 厘米见方的小丁。\n3 锅中放水、盐和姜片煮沸，把蛤蜊和豆腐丁一同放入。\n4 转中火继续煮，待蛤蜊张开壳，豆腐熟透后即可关火，撒上葱花。\n## Part3\n## 产后第2周", "notes": "蛤蜊含有蛋白质、脂肪、铁、钙、磷、碘等，可以帮助新妈妈抗压舒眠。"}, "冰糖五彩玉米羹（288）": {"ingredients": "玉米粒50克 鸡蛋1个 山药30克\n豌豆30克 枸杞5克 冰糖5克\n生粉5克 葱花适量 芝麻油5毫升", "steps": "1 山药洗净后去皮、切丁；豌豆洗净备用；生粉加少许水调合。\n2 在锅中加入100毫升清水，接着放入玉米粒、山药、豌豆以及冰糖，煮至山药熟透。\n3 加入水淀粉，使汁变浓，再加入枸杞拌匀，打入鸡蛋，放入葱花、芝麻油，拌匀即可。"}, "冰糖五彩玉米羹（jinpai）": {"ingredients": "嫩玉米粒100克，鸡蛋2个，豌豆30克，菠萝20克，冰糖、水淀粉各适量。", "steps": "1 玉米棒剥取玉米粒；胡萝卜切小丁；香菇泡后切小丁；去壳的虾切丁。\n2 将猪肉和胡萝卜一起剁碎；放入香菇丁、虾丁、玉米粒，搅拌均匀；再加入盐、泡香菇水制成肉馅。\n3 饺子皮包上肉馅，下入开水锅中煮熟即可。\n1 将嫩玉米粒蒸熟；菠萝洗净，切丁；豌豆洗净。\n2 锅中加入适量水，放入菠萝丁、豌豆、玉米粒、冰糖，同煮 5 分钟，用水淀粉勾芡，使汁变浓。\n3 将鸡蛋打散，入沸水锅内成蛋花，烧开后即可食用。\n## 产后第9天", "notes": "玉米中含有丰富的营养元素和膳食纤维，有健脾开胃功效，可以帮助产后妈妈缓解便秘。"}, "西红柿炒鸡蛋": {"ingredients": "西红柿1个，鸡蛋2个，白糖、盐各适量。", "steps": "1 将大米洗净，浸泡 3 小时；莲子、黑芝麻均洗净。\n2 将大米、莲子、黑芝麻放入豆浆机中，加水至上下水位线之间，按“米糊”键，加工好后倒出，即可。\n1 西红柿洗净去蒂后，切成块；鸡蛋打入碗内，加入适量盐搅匀，用热油炒散盛出。\n2 将油放入锅内，热后放入西红柿和炒散的鸡蛋，搅炒均匀，加入白糖、盐翻炒几下即可。", "notes": "鸡蛋营养全面，西红柿富含矿物质和维生素，西红柿炒鸡蛋可开胃健食，非常适合产后新妈妈食用。"}, "豆腐馅饼": {"ingredients": "豆腐1块，面粉1碗，白菜半棵，姜末、葱末、盐各适量。", "notes": "豆腐含有丰富的植物蛋白和钙，容易消化，热量也低，其温和滋润的功效能逐渐唤起新妈妈的食欲。"}, "明虾炖豆腐": {"ingredients": "虾、豆腐各100克，葱花、姜片、盐各适量。", "notes": "虾营养丰富，肉质松软，易消化，对产后身体虚弱的妈妈是极好的进补食物。虾的通乳作用较强，对产后乳汁分泌不畅的妈妈尤为适宜。"}, "三 丝木耳": {"ingredients": "猪瘦肉丝100克，木耳、甜椒丝、鸡肉丝各20克，姜丝、蛋清、盐、黄酒、水淀粉、香油各适量。", "steps": "1 将虾线挑出，去掉虾须，洗净；豆腐切成小块。\n2 锅内放水置火上烧沸，将虾和豆腐块放入烫一下，盛出备用。\n3 锅中放入虾、豆腐块和姜片，煮沸后撇去浮沫，转小火炖至虾肉熟透，最后放入盐调味，撒上葱花即可。\n1 将木耳放入温水中泡开。\n2 猪瘦肉丝和鸡肉丝分别加盐、黄酒、水淀粉和蛋清拌匀。\n3 爆香姜丝，放入猪瘦肉丝和鸡肉丝翻炒。\n4 炒至肉丝变色时，放入木耳、甜椒丝和少量水，加盐调味。\n5 最后用水淀粉勾芡，淋上香油即可。", "notes": "猪肉和鸡肉都是高蛋白食物，吸收率很高，蛋白质是乳汁的重要成分，三丝木耳便有补虚增乳的作用。"}, "荷兰豆烧鲫鱼": {"ingredients": "木瓜20克，牛肉100克，盐适量。\n荷兰豆30克，鲫鱼1条，黄酒、酱油、白糖、姜片、葱段、盐各适量。", "steps": "1 将大米淘洗干净，加入鲜牛奶、水焖成饭，加白糖拌匀。\n2 将番茄沙司、苹果丁、菠萝丁、蜜枣丁、葡萄干、青梅丁、碎核桃仁放入锅内，加水和白糖烧沸，加水淀粉，制成什锦沙司，浇在米饭上即可。\n1 木瓜剖开，去皮去子，切成小块。\n2 牛肉洗净，切成小块，放入沸水中除去血水，捞出。\n3 将木瓜、牛肉加水用大火烧沸，\n再用小火炖至牛肉熟烂后，加盐\n调味即可。\n1 将鲫鱼处理干净。\n2 将荷兰豆择去两端及筋，切成段，备用。\n3 在锅中放入适量的油，烧热后，爆香姜片和葱段。\n4 将鲫鱼放入锅中煎至金黄色。\n5 加入黄酒、酱油、白糖、荷兰豆段和适量的水，将鲫鱼烧熟，最后用盐调味即可。\n## 产后第13天\n不要总卧床", "notes": "鲫鱼有健脾利湿、和中开胃、活血通络的功效，对产后妈妈有很好的滋补作用。"}, "剖宫产关键点（jinpai）": {"ingredients": "五花肉50克，大米30克，鸡蛋1个（取蛋清），姜末、葱花、盐、黄酒、淀粉各适量。", "steps": "1 将蛏子洗净，放入水中泡 2 小时。\n2 蛏子入沸水中略烫一下，捞出剥去外壳。\n3 把白萝卜削去外皮，切成细丝。\n4 锅内放油烧热，放入葱段、蒜末、姜片炒香后，倒入清水、料酒。\n5 将剥好的蛏子肉、萝卜丝一同放入锅内炖煮，汤煮熟后，放入盐即可。\n1 将大米洗净备用。\n2 五花肉洗净，剁成肉泥，加入葱花、姜末、盐、黄酒、蛋清和淀粉，同一方向搅拌均匀。\n3 锅内放入大米和适量清水，大火烧沸。\n4 熬至粥将熟时，将肉泥挤成丸子状，放入粥内，熬至肉熟即可。\n## 产后第14天\n## 顺产关键点\n可出去走走"}, "红小豆花生乳鸽汤": {"ingredients": "红小豆、花生仁、桂圆肉各30克，乳鸽1只，盐适量。", "notes": "此汤营养丰富，不仅可以帮助哺乳妈妈分泌乳汁，还能促进妈妈的伤口愈合，预防贫血。"}, "口蘑腰片": {"ingredients": "猪腰100克，茭白50克，口蘑30克，葱花、姜片、黄酒、盐、淀粉、香油各适量。", "notes": "猪腰具有补肾强身的作用，它还具有较高的含铁量，极容易被人体吸收，有利于产后补血。"}, "南瓜饼": {"ingredients": "羊肝100克，荠菜50克，火腿10克，姜片、盐、水淀粉各适量。营养功效：南瓜营养丰富，维生素E含量较高，还有润肺益气、缓解便秘的作用，有利于新妈妈健康。\n糯米粉100克，南瓜60克，白糖、红豆沙各适量。", "steps": "1 猪腰撕去外皮膜，切成片，去掉腰臊，切花刀，洗净。\n2 沥干水分后加黄酒、盐、淀粉拌匀；茭白、口蘑洗净，切片，备用。\n1 羊肝洗净，切片；荠菜洗净、切段；火腿切片。\n3 爆香姜片，放入猪腰翻炒，再放入茭白、口蘑，加入黄酒、盐。\n4 放入适量水，待水沸后淋上香油，撒上葱花即可。\n2 锅内加水，待水烧开时，放入羊肝片，快速焯烫后，捞出冲洗干净。\n3另起油锅，放入姜片、荠菜段，用中火炒至断生，加入火腿片、羊肝片，调入盐炒至入味，然后用水淀粉勾芡即可。\n1 南瓜去子，洗净，包上保鲜膜，用微波炉加热 10 分钟。\n2 挖出南瓜肉，加糯米粉、白糖，和成面团。\n3 将红豆沙搓成小圆球，包入豆沙馅成饼胚，上锅蒸 10 分钟即可。\n## Part4\n## 产后第3周"}, "西红柿面疙瘩": {"ingredients": "面粉100克，西红柿2个，鸡蛋2个，盐适量。", "notes": "西红柿含有丰富的维生素C和铁，鸡蛋中蛋白质、钙的含量十分丰富。两者搭配清淡可口，在滋补的同时，可解油腻、养胃肠。"}, "鳗鱼饭": {"ingredients": "熟米饭半碗，鳗鱼1条，竹笋2根，油菜2棵，盐、酱油、白糖、高汤各适量。", "steps": "1 面粉中边加水边用筷子搅拌成絮状，静置10分钟；鸡蛋打散；西红柿洗净，切小块。\n2 锅中放油，倒入鸡蛋液炒散，加入适量水，将鸡蛋煮开，至汤发白时倒入西红柿块。\n3 再将面粉慢慢倒入西红柿鸡蛋汤中煮 3 分钟后，放盐即可。\n1 鳗鱼洗净，放入盐、酱油腌制半小时；竹笋、油菜洗净，竹笋切片。\n2把腌制好的鳗鱼放入烤箱里，温度调到 $ 180^{\\circ}\\mathrm{C} $，烤熟。\n3 油锅烧热，放入笋片、油菜略炒，放入烤熟的鳗鱼，加入高汤、酱油、盐、白糖，待锅内的汤几乎收干了即可出锅，浇在米饭上即可。", "notes": "鳗鱼具有补虚强身的作用，适于产后虚弱的新妈妈食用，同时还能促进泌乳，并提升乳汁质量。"}, "肉末炒菠菜": {"ingredients": "猪瘦肉50克，菠菜200克，盐、白糖、水淀粉各适量。", "notes": "菠菜含相当丰富的铁质和胡萝卜素，能增强抵抗传染病的能力；猪肉能够为哺乳妈妈提供血红素铁和促进铁吸收的半膀氨酸，改善缺铁性贫血症状。"}, "鸭血豆腐": {"ingredients": "干银耳15克，红枣2颗，冰糖适量。\n鸭血50克，豆腐100克，高汤、胡椒粉、醋、盐、水淀粉各适量。\n1 将猪瘦肉剁成末；菠菜洗净，切段。\n2 锅内倒入适量的水烧开，放入菠菜焯烫至八成熟，捞起沥干水，备用。", "steps": "3另起油锅，将猪瘦肉末用小火翻炒，再加入菠菜段，放盐和白糖调味。\n1干银耳用温水泡发；红枣洗净，去核，备用。\n4 用水淀粉勾芡即可。\n3 然后改用小火，加入适量冰糖，煮开即可。\n1 将鸭血和豆腐切成细条状，备用。\n2 将高汤放入锅中煮沸。\n3 将鸭血和豆腐放入高汤中炖熟。\n4 最后加上胡椒粉、醋、盐调味，用水淀粉勾芡即可。\n## 产后第16天\n不宜屏气搬重物\n不宜快速进食", "notes": "豆腐可以为哺乳妈妈提供钙质，强化骨质；鸭血能满足哺乳妈妈对铁质的需要。鸭血豆腐的酸辣口感不仅能满足妈妈的食欲，还能促进钙质的吸收。"}, "黄花菜糙米粥": {"ingredients": "干黄花菜20克，糙米30克，猪肉末、盐、香油各适量。", "notes": "黄花菜糙米粥可以改善产后妈妈肝血亏虚所致的健忘失眠、头目眩晕、小便不利、水肿、乳汁分泌不足等症状。"}, "炒红薯泥": {"ingredients": "红薯1个，核桃仁碎，花生仁碎，熟瓜子、玫瑰汁、芝麻、蜂蜜、蜜枣丁、红糖水各适量。", "notes": "红薯中富含多种维生素，核桃仁、花生、瓜子中DHA含量极高，此菜营养通过乳汁被宝宝吸收，可促进宝宝大脑发育。"}, "西红柿菠菜蛋花汤": {"ingredients": "西红柿100克，菠菜50克，鸡蛋1个，葱花、盐、香油各适量。", "notes": "西红柿不仅有抗氧化的作用，还有提升免疫力的功效。菠菜具有补铁补血的作用，新妈妈常吃，可使身体变得强壮。"}, "紫菜包饭": {"ingredients": "糯米150克，鸡蛋1个，紫菜1张，火腿、黄瓜、沙拉酱、米醋各适量。\n1红薯去皮后上锅蒸熟，然后制成碎泥；核桃仁、花生仁压碎。\n2 锅中放适量油，烧热后将红薯泥倒入翻炒；倒入红糖水继续翻炒。\n3 再将玫瑰汁、芝麻、蜂蜜、花生仁碎、核桃仁碎、熟瓜子、蜜枣丁放入，继续翻炒均匀即可。", "steps": "1 将西红柿洗净后切片；菠菜洗净后切成 4 厘米长的段，备用。\n2 鸡蛋打散，备用。\n3 锅中油热后，放入西红柿片煸出汤汁，加入适量水烧开。\n4 放入菠菜段、蛋液、盐，再次煮 3 分钟。\n5 出锅时撒上葱花，滴入香
