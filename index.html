骚部分全部去掉，然后把猪腰切成梳子片，用活水冲洗干净；\n3. 在锅里烧水，然后把腰花烫15秒之后清洗干净备用；\n4. 将山药和胡萝卜分别去皮，然后切成滚刀块备用；\n5. 把山药和胡萝卜放入杜仲汤里煮熟，放入少许盐调味，然后再把猪腰片放入煮3分钟后，淋上麻油，即可出锅。"}, "干贝冬瓜鸭子汤": {"ingredients": "草鸭，干贝，冬瓜", "steps": "1. 把鸭子剁成小块，放葱姜和黄酒出水备用；\n2. 冬瓜去皮切成麻将块备用；\n3. 干贝提前2小时泡好，清洗干净；\n4. 往锅里放水和生姜，然后把鸭子倒入煮，水开之后把干贝先放入，以小火煮40分钟，再把冬瓜倒入煮10分钟，之后把上面一层油撇掉，放少许盐调味即可。"}, "莲藕玉米猪蹄汤": {"ingredients": "玉米，猪蹄，莲藕，枸杞", "steps": "1. 玉米洗净切段，然后再对半切开备用；\n2. 莲藕去皮洗净，切滚刀块，枸杞洗净泡开；\n3. 猪蹄洗净斩小块，加入黄酒和生姜片出水，然后捞出备用；\n4. 锅内放入适量的清水，放入猪蹄和玉米块，大火烧开转小火炖30分钟，然后把莲藕放入再炖煮30分钟，加入枸杞，即可调味出锅。"}, "无花果老鹅肉汤": {"steps": "1. 老鹅清洗干净切块，加入黄酒和生姜片出水备用；\n2. 虫草花、枸杞、红枣和无花果清洗干净备用；\n3. 往锅里放适量的水，加入姜片和少许黄酒，然后再把出好水的老鹅块放入，开大火烧开；\n4. 水烧开之后，把清洗干净的虫草花、无花果、枸杞和红枣一起都放入，以小火慢慢炖40分钟；\n5. 待鹅肉酥烂，加少许盐调味，拂去上面的油即可装盘。\n## PART 02 纯手工甜品"}, "椰丝双色球": {"ingredients": "糯米粉，紫薯，南瓜，椰丝", "steps": "1. 把紫薯和南瓜分别去皮，分别打成汁；\n2. 把紫薯泥和南瓜泥分别用糯米粉拌成两种颜色的糯米团；\n3. 把豆沙搓成小团；\n4. 将两种颜色的糯米团分别做成圆子，然后把豆沙团裹入；\n5. 往锅里放水，水开后把做好的糯米团子放入锅内烹煮，待圆子浮起将其捞出，滚上几层椰丝即可。"}, "雪梨牛奶炖桃胶": {"ingredients": "雪梨，桃胶，牛奶，枸杞", "steps": "1. 把雪梨刨皮，然后把核挖干净在蒸箱里蒸20分钟备用；\n2. 提前 12 小时将桃胶泡开，把杂质挑干净后再清洗，然后加入适量冰糖，上蒸箱蒸 30 分钟后端出，加入适量牛奶拌匀；\n3. 把拌匀的桃胶灌入雪梨，用事先泡好的枸杞点缀即可。"}, "迷你南瓜炖雪蛤": {"ingredients": "迷你南瓜，雪蛤，枸杞", "steps": "1. 将迷你南瓜清洗干净，然后把盖子切下，挖空内里，将其边缘雕刻成锯齿状，上蒸笼蒸10分钟；\n2. 提前两天将雪蛤泡好，清洗干净，然后上蒸笼蒸20分钟后拿出，与蜂蜜调和；\n3. 把调和好的雪蛤放入迷你南瓜内，用事先泡好的枸杞点缀即可。"}, "牛奶芡实火龙果": {"ingredients": "新鲜芡实，红心火龙果，牛奶制作方法：\n1. 水烧开后，将新鲜芡实煮5分钟即捞出；\n2. 将红心火龙果去皮，切成和芡实差不多大的丁；\n3. 将牛奶加热到  $ 50^{\\circ}C $;\n4. 把新鲜芡实和火龙果用热牛奶拌匀即可。"}, "蓝莓土豆泥": {"ingredients": "土豆，蓝莓酱，红心火龙果，酸奶，蜂蜜", "steps": "1. 将土豆去皮蒸透，加入酸奶和蜂蜜，把土豆捏碎，做成图中的样子；\n2. 用热水把蓝莓酱调开，切忌调得太稀；\n3. 把火龙果切成小粒：\n4. 把调好的蓝莓酱浇在土豆上面，再把火龙果粒撒上去点缀，最后撒上一点酸奶即可。"}, "金瓜炖雪莲子": {"ingredients": "小金瓜，雪莲子，蜂蜜，牛奶", "steps": "1. 提前一天将雪莲子泡好，清洗干净后放蒸箱蒸30分钟，并把蒸好的雪莲子用蜂蜜和牛奶拌匀；\n2. 将金瓜去皮，切成小块，在开水里煮熟；\n3. 以金瓜垫底，把拌好的雪莲子盖在上面用事先泡好的枸杞点缀即可。"}, "特色驴打滚": {"ingredients": "黄豆，糯米粉，豆沙", "steps": "1. 将黄豆清洗干净，在烤箱里烤20分钟（上面温度180，下面温度200），拿出来冷却之后用料理机把它磨成粉；\n2. 在糯米粉中加入适量生粉（按照糯米粉500克，生粉100克的比例操作），用 $ 50^{\\circ}C $的水，把它拌匀；\n3. 把豆沙搓成小圆子；\n4. 用拌好的糯米粉做成一个个小圆子，然后再把豆沙团裹进去，放热水里煮，等到小圆子浮起来后捞出，待冷却后滚上黄豆粉。"}, "中式“费列罗”": {"ingredients": "腰果，核桃，紫薯，蜂蜜", "steps": "1. 将紫薯去皮后蒸熟，加少许蜂蜜，趁热捏成紫薯泥；\n2. 把腰果、核桃分别在烤箱烤熟，然后用刀背拍碎备用；\n3. 把紫薯泥捏成一个个小圆子，然后滚上坚果碎即可点缀装盘。"}, "特色雪媚娘": {"ingredients": "糯米粉，鹰栗粉，鲜奶，火龙果，草莓酱", "steps": "1. 用糯米粉和鹰栗粉按1:1的比例用冷水调和，然后放蒸箱蒸熟，冷却；\n2. 将火龙果切成丁，把剩下的糯米粉用不粘锅慢慢炒熟备用；\n3. 将鲜奶用机器搅拌后备用；\n4. 把切好的火龙果丁和打好的鲜奶按照1:1的比例拌匀备用；\n5. 把冷却后的熟粉刮出，搓成条、切成小块，撒上炒熟的糯米粉，用擀面杖擀成皮子，然后把鲜奶和火龙果一起包入，反扣放入模型纸中，上面用草莓酱点缀即可。"}, "木瓜炖燕盏": {"ingredients": "木瓜，燕盏，牛奶，冰糖，枸杞", "steps": "1. 提前一天用矿泉水将蒸盏泡好，捡去细燕毛，加少许冰糖，放蒸箱蒸30分钟，拿出后加入牛奶拌匀；\n2. 将木瓜一切二，把籽挖干净，然后将木瓜刻成图中样子，在蒸箱里蒸6分钟；\n3. 把蒸好拌匀的燕窝直接放在木瓜中，用枸杞点缀即可。"}, "酒酿板栗南瓜": {"ingredients": "板栗，日本南瓜，酒酿", "steps": "1. 将板栗去皮去衣，将其煮熟；\n2. 将南瓜去皮去籽，切成小块备用；\n3. 往锅里放水，把板栗和南瓜一起煮熟，然后加入少许酒酿调味即可。"}, "双色芋圆": {"ingredients": "魔芋粉，紫薯，南瓜，蜂蜜", "steps": "1. 将紫薯和南瓜分别刨皮蒸熟，然后用料理机分别把它们磨成泥；\n2. 用魔芋粉分别与紫薯泥和南瓜泥拌匀，搓成小条，用刀切成小粒；\n3. 往锅里放水，水开后，把双色魔芋圆子一起放如烹煮，直至浮起，加少许蜂蜜调味即可。"}, "酒酿白芸豆": {"ingredients": "白芸豆，酒酿，枸杞", "steps": "1. 提前一天把白芸豆泡好，使其胀开；\n2. 在锅中放水，然后把白芸豆放入煮 30 分钟左右；\n3. 待白芸豆熟后，加少许糖和酒酿，加入枸杞，再一起煮2分钟即可出锅。"}, "金瓜藏宝": {"ingredients": "迷你南瓜，日本老南瓜，虾仁，西蓝花，青豆，蜂蜜", "steps": "1. 将迷你南瓜去皮后一切二，把籽刮干净，放蒸箱蒸10分钟，至熟透即可；\n2. 将日本老南瓜去皮蒸透，然后用料理机加少许蜂蜜把它磨成泥；\n3. 把虾仁和青豆一起出水，稍微放点盐调味；\n4. 把调好味的虾仁和青豆盖在迷你南瓜里面，然后用鲍鱼袋扎起来，把水分挤干，放在一个深盘里面；\n5. 把蜂蜜南瓜汁按图上所示淋上去；\n6. 用西蓝花点缀即可。"}, "小西米布丁": {"ingredients": "小西米，牛奶，鸡蛋，布丁粉，凝胶粉，火龙果粒，薄荷叶", "steps": "1. 把西米用开水煮10分钟，然后焖10分钟后清洗干净备用；\n4. 用一个托盘把烧好的布丁汁倒入托\n3. 将4个生蛋黄和适量的布丁粉搅匀，慢慢加牛奶，然后把凝胶水烧开，把布丁汁慢慢倒入后再次烧开即可；\n2. 用冰水把凝胶粉泡开：\n盘内，冷却；\n5. 把牛奶烧热；\n6. 将成固体状布丁切块放入点心碗里，然后把热牛奶倒入，撒上热的小西米和一些火龙果粒，用薄荷叶点缀即可。"}, "太极南瓜泥": {"ingredients": "南瓜，菠菜，蜂蜜", "steps": "1. 将南瓜去皮去籽后蒸熟，用料理机加适量蜂蜜，磨成泥状；\n2. 把菠菜烫熟，然后加少许开水，磨成泥；\n3. 把南瓜装入碗中，按照图中所示，再把菠菜汁按太极形状装入即可。"}, "红枣炖银耳": {"ingredients": "红枣，银耳，莲心，冰糖，鹌鹑蛋，枸杞", "steps": "1. 提前 30 分钟把红枣和莲心泡好；\n2. 将银耳用  $ 40^{\\circ} $C 温水泡 40 分钟后，去除黄根清洗干净；\n4. 往锅里放水，把银耳莲心和红枣一起煮到粘稠为止；\n3. 鹌鹑蛋事先煮熟，去壳备用；\n5. 加入冰糖和洗净的枸杞，再次以小火煮到冰糖化开即可。"}, "杨枝甘露": {"ingredients": "西柚，芒果，椰奶，牛奶，火龙果，小西米", "steps": "1. 把西柚剥成一粒一粒备用：\n2. 把火龙果切成粒状备用：\n3. 把芒果去皮去核后，加入椰奶和牛奶，用料理机打成汁；\n4. 将小西米用开水煮 10 分钟，然后再焖 10 分钟，之后清洗干净备用；\n5. 把煮好的小西米放入芒果汁。然后在上面撒上西柚粒和火龙果粒即可。"}, "小西米紫薯球": {"ingredients": "紫薯，糯米粉，小西米，蜂蜜制作方法：\n1. 将紫薯去皮蒸熟后，和糯米粉，加少许蜂蜜拌匀（按紫薯与糯米粉2:1的比例）；\n2. 把拌好的紫薯泥做成小圆子：\n3. 用水稍微泡一下小西米，然后马上裹在紫薯圆子表面；\n4. 上蒸箱蒸 15 分钟即可点缀装盘。"}, "芒果小布丁": {"ingredients": "芒果味布丁粉，芒果，凝胶粉，鸡蛋，椰奶，牛奶", "steps": "1. 把 5 个鸡蛋黄打出来，慢慢加牛奶和椰奶，与布丁粉搅匀；\n2. 将凝胶粉与冰水调匀；\n3. 往锅里放少许水，然后把调好的布丁和凝胶水一起倒入烧开；\n4. 把烧开的布丁装在容器里，自然冷却2小时，切记不要放冰箱；\n5. 将芒果切成小块，放在冷却好的布丁上点缀即可。"}, "迷你南瓜炖桃胶": {"ingredients": "迷你南瓜，桃胶，冰糖，牛奶，枸杞制作方法：\n1. 将桃胶提前 24 小时泡好，挑净杂质清洗于净，加入适量冰糖，在蒸箱里蒸 1 小时；\n2. 将迷你南瓜掏空，按照图中所示，将盖子上和瓜身分别刻成锯齿形状，再放蒸箱蒸10分钟；\n3. 将蒸好的桃胶加牛奶拌匀装在迷你南瓜内，用泡好的枸杞点缀即可。"}, "蔓越莓山药泥": {"ingredients": "山药，蜂蜜，蔓越莓干，酸奶，蓝莓酱", "steps": "1. 山药去皮，清洗干净，蒸熟，然后加入蜂蜜和酸奶趁热一起捣碎，拌均匀备用；\n2. 用爱心模具把山药泥做成图中模样\n3. 将蓝莓酱用热水调开拌匀，然后倒入器皿里；\n4. 把爱心山药泥放入器皿内，上面撒上少许蔓越莓干，用薄荷叶点缀即可。"}, "冬瓜红豆汤": {"ingredients": "冬瓜，红豆\n1. 冬瓜清洗干净后去皮，切块；红豆淘洗干净，浸泡6小时后备用；", "steps": "2. 锅中放适量水烧开，倒入红豆煮熟；\n3. 将冬瓜块放入锅中，开盖，以中火煮至冬瓜熟而不烂，若喜欢咸□，加少许盐调味即可；若偏好甜□，加少许糖调味即可。"}, "木瓜牛奶小西米": {"ingredients": "木瓜，小西米，牛奶", "steps": "1. 将小西米用大火煮 10 分钟，然后再焖 10 分钟，拿出来清洗干净备用；\n2. 将木瓜去皮去籽，切成粒状；\n3. 往锅里放水，然后把木瓜粒煮熟，再加入牛奶，然后把西米倒入拌匀即可。\n## PART 03 月子餐菜品"}, "橙篮鸡米粒": {"ingredients": "甜橙，鸡胸肉，熟松仁，彩椒粒", "steps": "1. 把甜橙按照图中所示挖空，将果肉掏尽；\n2. 将鸡胸肉切成粒状，然后用蛋液加入少量的生粉上浆；\n3. 往锅里放油，然后把鸡米粒稍微拉下油备用；\n4. 在锅中放少许水，用盐调味，然后把鸡米粒和彩椒粒一起放入，煸炒，勾芡，并撒上松仁装入橙篮盘即可。"}, "上汤娃娃菜": {"ingredients": "娃娃菜，鸡蛋，胡萝卜", "steps": "2. 往锅里放水烧开，把娃娃菜倒入煮熟装盘；"}, "清蒸鲈鱼（jinpai）": {"ingredients": "鲈鱼1条，姜丝、葱丝、盐、料酒、酱油各适量。", "steps": "1 将干黄花菜泡软，洗净，用沸水煮透捞起；糙米淘洗干净，备用。\n2 将糙米放入锅中，加清水烧开，转小火熬煮，待米粒煮开花时放入猪瘦肉末、黄花菜。\n3 最后放入盐调味，淋上香油即可。\n1 将鲈鱼去除内脏，收拾干净，洗净，擦干鲈鱼身上多余水分，放入蒸盘中。\n2 将姜丝、葱丝放入鱼盘中，加入盐、酱油、料酒。\n3 大火烧开蒸锅中的水，放入鱼盘，大火蒸 8~10 分钟，鱼熟后立即取出即可。", "notes": "鲈鱼富含蛋白质和多种矿物质，不仅有很好的补益作用，催乳效果也不错。"}, "清蒸鲈鱼（yueshi）": {"ingredients": "鲈鱼，生姜片，胡萝卜片", "steps": "1. 把鲈鱼清洗干净，一剖为二；\n2. 把胡萝卜片和生姜插在鱼肉中间，上蒸笼蒸8分钟后端出；\n3. 把盘里的水倒出部分后浇一点生抽即可。"}, "爱心南瓜虾茸球": {"ingredients": "日本南瓜，青虾仁\n1. 把日本南瓜去皮，然后用爱心模具把它刻成像图中这样的爱心；\n2. 把虾仁剁成泥，上浆调味，做成小圆子状的虾茸球；\n3. 把虾茸球放在南瓜上蒸8分钟，然后淋上彩荧，按图中摆盘即可。"}, "麻油爆猪肝": {"ingredients": "猪肝，彩椒，生姜\n1. 将彩椒切片备用；\n2. 将猪肝切片，切忌太厚或太薄，然后在活水里冲洗3分钟，沥干水分，裹上一层生粉；\n3. 往锅里放水，水开后把猪肝倒入出水，至断血水，将猪肝捞出；\n4. 往锅里放油，然后放生姜入锅煸炒，加黄酒、适量红糖和生抽调味，然后把彩椒和猪肝一同放入爆炒，最后勾芡，淋上麻油，即可装盘。"}, "肉糜饼炖蛋": {"ingredients": "肉糜，鸡蛋\n黑鱼，玉米粒，青豆，\n红圆椒，鸡蛋", "steps": "1. 在肉糜中加一个鸡蛋，拌匀；\n2. 加少许盐和生粉调味，然后装在一个凹盆里面，中间留一个蛋的位置；\n3. 另取一枚鸡蛋，把鸡蛋敲在肉糜中凹的位置上，上蒸笼蒸10分钟端出，淋上彩荧即可。\n1. 把黑鱼清洗干净，去头，去尾，去龙骨，去皮，再把它切成粒，用少许盐加蛋清和生粉上浆；\n2. 将红圆椒切粒；\n3. 往锅里放水，加入红椒粒、青豆、玉米粒、煮熟捞出备用；\n4. 往锅里放水，等水开后将上浆好的黑鱼粒放入水中煮开，拂去泡沫，再捞起来备用；\n5. 往锅里放少许水，加少许盐和鸡汁调味，把出好水的玉米粒、红椒粒、青豆和黑鱼粒一起倒入翻炒，淋上几滴油再勾芡即可出锅装盘。"}, "黄瓜炒牛百叶": {"ingredients": "黄瓜，牛百叶，彩椒丝", "steps": "1. 逆着牛百叶的条纹切丝，冲洗干净备用；\n2. 黄瓜刨皮去籽切丝；\n3. 在锅中烧水，水开后把牛百叶和黄瓜丝同时倒入，马上再捞出；\n4. 往锅里加少许水调味，然后把黄瓜丝、彩椒丝和牛百叶一起倒入煸炒即可。\n注：这个菜品不需要勾芡，且要注意火候、避免炒得太老。"}, "特色百叶包": {"ingredients": "薄百叶，肉糜，鸡蛋，小葱", "steps": "1. 把肉糜用鸡蛋、姜末和少许盐调味；\n2. 把薄百叶摊开，每一张薄百叶切成6张，然后把调好味的肉糜包进去，再用小葱把它扎起来；\n3. 把扎好的百叶包上蒸笼蒸10分钟，拿出后淋上彩荧即可。"}, "三 鲜烩鱼片": {"ingredients": "黑木耳，黄瓜片，胡萝卜，青鱼中段，鸡蛋", "steps": "1. 将青鱼中段去皮去骨，切成片，用鸡蛋清、少许盐和生粉上浆液；\n2. 黄瓜、胡萝卜分别刨皮切片，然后加入黑木耳一起出水；\n3. 往锅里放水，等水开后把鱼片一片片放入煮熟，然后捞起来备用；\n4. 往锅里放少许水，加盐调味，然后再把出好水的胡萝卜片、黑木耳、黄瓜片、青鱼片一同倒入烹烩，待水开后勾芡，淋上麻油，即可出锅。"}, "胡萝卜芹菜炒肉丝": {"ingredients": "胡萝卜，芹菜，梅条肉，鸡蛋", "steps": "1. 胡萝卜刨皮切丝备用：\n2. 在梅条肉上撒少许盐调味，加鸡蛋和生粉上浆；\n3. 芹菜去根去叶，清洗干净，然后切成段；\n4. 胡萝卜和芹菜出水备用：\n5. 肉丝稍微拉下油，然后把胡萝卜丝和芹菜一起煸炒，加少许盐调味，勾芡即可出锅。"}, "三 鲜日本豆腐": {"ingredients": "日本豆腐，虾仁，胡萝卜丁，青豆", "steps": "1. 将日本豆腐，切成厚片：\n2. 将胡萝卜切丁；\n3. 将日本豆腐、胡萝卜丁、青豆和虾仁一起出水；\n4. 往锅里放水，加少许盐，把出好水的豆腐、胡萝卜丁、青豆和虾仁一同倒入烹烂，最后勾芡淋油装盘。"}, "蛤蜊炖蛋": {"ingredients": "蛤蜊，鸡蛋（2个）", "steps": "1. 一边将蛤蜊清洗干净，一边烧水，水开后把蛤蜊倒入出水；\n2. 将鸡蛋打碎，用盐调味，然后把出好水的蛤蜊一个个竖起来放在蛋液里，上蒸箱蒸7分钟，淋上彩荧即可。"}, "山药木耳炒肉片": {"ingredients": "铁棍山药，里脊肉，木耳，鸡蛋\n芹菜，里脊肉、彩椒", "steps": "1. 将铁棍山药刨皮，切成菱形片，泡在水里备用；\n2. 将里脊肉切片，用鸡蛋和少许盐、生粉上浆；\n3. 往锅里放水，待水开后，把山药和木耳倒入煮至七分熟；\n4. 将肉片出水备用：\n5. 往锅里放少许水，用盐调味，然后把出好水的山药和肉片及木耳一同倒入翻炒，最后勾芡即可。\n1. 把芹菜、彩椒洗净，切成小段；\n2. 把里脊肉切丝，并上浆；\n3. 将芹菜、彩椒出水备用；\n4. 往锅里放油，把肉丝稍微煸一下，然后将芹菜、彩椒倒入翻炒几下，调味，再稍微翻炒几下，勾芡出锅即可。"}, "银芽炒鸡丝": {"ingredients": "鸡胸肉，绿豆芽，彩椒丝\n2. 将绿豆芽去根去头，留中间部位；\n1. 把鸡胸肉切丝并上浆：", "steps": "3. 往锅里放水，待水开后把鸡丝先出水，之后将绿豆芽和彩椒再一起出水备用；\n4. 往锅里放少许水调味，然后把出好水的鸡丝、银芽和彩椒丝一起倒入翻炒几下，勾芡，淋上麻油即可。"}, "彩椒炒童子鸡": {"ingredients": "彩椒，童子鸡", "steps": "1. 将童子鸡清洗干净，斩小块；\n2. 把彩椒切片备用；\n3. 往锅里放油，把姜片煸炒一下，然后再把童子鸡块倒入，加黄酒一起煸炒3分钟，再加水焖10分钟，把彩椒也加入后翻炒几下，勾芡装盘即可。"}, "珍珠糯米丸子": {"ingredients": "圆头白糯米，五花肉糜，鸡蛋", "steps": "1. 把白糯米洗干净，提前30分钟泡好，然后滤干水分备用；\n3. 把搅拌均匀的肉糜做成圆子，滚上糯米，蒸20分钟即可出锅，点缀装盘即可。\n2. 五花猪肉糜加鸡蛋、姜末一起上浆调味，然后撒上生粉，再次搅拌均匀；"}, "花榔菜双拼": {"ingredients": "有机花菜，西蓝花", "steps": "1. 把有机花菜和西蓝花分别改刀，然后清洗干净。\n2. 把西蓝花和花菜一起出水，使其达到大成熟；\n3. 往锅里放少许水调味，然后把出好水的花菜和西蓝花一起煸炒至熟；\n4. 按照图中摆盘方式装盘即可。"}, "长角豆炒肉丝": {"ingredients": "长角豆，里脊肉，彩椒粒，鸡蛋", "steps": "1. 里脊肉切丝，然后加入蛋液和少许盐上浆，再撒上生粉拌匀；\n2. 将长角豆切成 4cm 状，再切一点彩椒条和姜末；\n3. 往锅里放油，烧到四成热，把长角豆在油里过熟后捞出备用；\n4. 往锅里加少许油，把姜末和彩椒条加上黄酒一起煸炒至熟，再把长角豆倒入翻炒，调味后勾芡出锅装盘即可。"}, "土豆炖牛腩": {"ingredients": "土豆，牛腩，胡萝卜\n1. 将牛腩肉切块，出水备用；\n2. 把土豆和胡萝卜分别切滚刀块；\n3. 把土豆块炸成金黄色备用：\n4. 往锅里放油，加姜片和牛腩一起煸炒，然后加水，没过牛腩即可，加糖，加少许生抽，待水开后，把胡萝卜倒入，以小火焖40分钟；\n5. 把事先炸好的土豆块倒入再焖5分钟，稍微收一下芡汁，即可装盘。"}, "青豆木耳炒蛋": {"ingredients": "青豆，黑木耳，鸡蛋\n中百叶，胡萝卜，小青菜，青虾仁，鸡汁\n3. 小青菜清洗干净备用：\n5. 往锅里加适量水，放入出好水的虾仁、胡萝卜丝、百叶丝，并加少许盐、鸡汁和白胡椒粉调味，小火再煮3分钟即可装盘；\n6. 最后再把清洗好的菜心倒入开水中加少许盐和几滴油煮3~5分钟捞出！按图中所示摆盘即可。\n1. 中百叶和胡萝卜分别切成细丝备用；\n2. 青虾仁6粒，剖背清洗干净，然后出水备用；", "steps": "2. 把鸡蛋打碎，在油里翻炒；\n3. 把青豆和黑木耳一起放入，加少许盐翻炒几下，然后装盘。\n1. 把青豆和切小块的黑木耳一起出水备用；\n4. 往锅里放水，把胡萝卜丝和百叶丝一起放入，出水煮透，然后再倒出；"}, "秋 葵 酿 肉": {"ingredients": "秋葵，五花肉糜，鸡蛋\n1. 把五花肉糜用鸡蛋和少许盐加生粉一起拌匀；\n2. 把秋葵一剖二，然后把上过浆的肉糜按图中所示塞入；\n3. 蒸箱上汽之后蒸8分钟端出，淋上彩芡即可。\n菠萝，鸡胸肉，彩椒，鸡蛋，番茄酱，新的橙汁\n1. 将菠萝去皮切成小片，然后用淡盐水泡着备用；\n3. 彩椒切片备用；", "steps": "2. 将鸡胸肉切片，用鸡蛋、面粉、生粉加少许食盐和少许泡打粉，拌均匀即可；\n4. 往锅里放油，至七成热时把鸡片一片片放入，炸透到金黄色为止；\n5. 往锅里放少许油，先把番茄酱煸透，然后加入新的橙汁和少许水烧浓，最后把鸡片、菠萝片和彩椒片倒入翻炒即可。"}, "杏鲍菇炒牛柳": {"ingredients": "杏鲍菇，牛里脊肉，鸡蛋，彩椒丝", "steps": "1. 把杏鲍菇清洗干净后切小条：\n3. 往锅里加油，差不多四成热之后把牛柳拉一下油，然后等油锅达到六成热之后，再把杏鲍菇拉下油；\n2. 把牛里脊肉切成牛柳，比杏鲍菇微小一点，然后用鸡蛋、生粉和少许老抽上浆；\n4. 往锅里放少许油，加入少许生姜丝煸炒，加少许水和生抽、白糖，然后再把拉好油的牛柳和杏鲍菇一同倒入翻炒，最后勾芡，以彩椒丝点缀，淋上麻油即可出锅。"}, "彩椒炒肚片": {"ingredients": "彩椒，猪肚", "steps": "1. 将彩椒切片备用；\n2. 把猪肚用面粉和白醋一起揉捏，然后再清洗干净，加黄酒和葱姜煮熟，再把煮熟的猪肚片切成小片；\n3. 往锅里加水，把彩椒和猪肚一起出水；\n4. 往锅里放入山茶油和生姜片炒一下，然后加少许水和少许盐调味，再把彩椒和肚片倒入锅里煸炒，勾芡后即可出锅。"}, "青菜虎皮炒木耳": {"ingredients": "青菜，虎皮，黑木耳，胡萝卜", "steps": "1. 青菜剥去老叶清洗干净，然后青菜头削尖并剖开；\n2. 胡萝卜切成小条，然后塞入青菜嘴备用；\n3. 用冷水将虎皮泡开，然后再撕成小块备用；\n4. 黑木耳提前泡开，并清洗干净备用；\n5. 往锅里放少许水，加入少许盐和几滴油，然后把青菜煮熟倒出，再次翻炒并加入少许糖和盐调味，按盘中所示摆放整齐；\n6. 黑木耳和虎皮一起过水，然后倒出来加入少许油和盐调味翻炒出锅；\n7. 把炒好的虎皮、木耳按图中所示盖在青菜上即可。"}, "莴笋炒猪皮丝": {"ingredients": "莴笋，干猪皮，彩椒", "steps": "1. 干猪皮提前4小时用冷水泡好，然后再切丝；\n2. 把彩椒切丝，莴笋刨皮切丝；\n3. 往锅里放水，把猪皮丝先煮透，然后再把莴笋丝和彩椒丝一起倒入，煮至水开马上倒出；\n4. 往锅里放少许水，加适量的盐调味，再把出好水的猪皮丝、莴笋丝和彩椒丝一起倒入翻炒，勾芡后即可装盘。"}, "一 品虾扯蛋": {"ingredients": "基围虾，鹌鹑蛋，黄瓜", "steps": "1. 把基围虾煮熟，然后拿出来去头，剩下的身体，把壳去掉，尾巴留住，然后一剖二，按图所示贴在调羹上即可；\n2. 把鹌鹑蛋打开敲在调羹里，上蒸笼蒸3分钟；\n3. 黄瓜切片垫底，用不锈钢的调羹一个个把虾扯蛋挖出来，放在黄瓜片上。然后淋上彩荧即可。"}, "香菇酿肉": {"ingredients": "新鲜香菇，肉糜，生姜，鸡蛋", "steps": "1. 把新鲜香菇去根煮熟，然后吸干水分；\n2. 把肉糜和姜末加入一个鸡蛋一起入味，然后放些生粉，搅拌均匀；\n3. 把拌好的肉酱按图所示酿在香菇上面，然后上蒸笼蒸12分钟拿出，淋上彩茂摆盘即可。"}, "牡丹素蟹粉": {"ingredients": "土豆，胡萝卜，鸡蛋\n老豆腐，基围虾，目鱼", "steps": "1. 将土豆和胡萝卜分别清洗干净，刨皮之后上蒸箱蒸熟；\n2. 把蒸熟的胡萝卜和土豆分别用刀拍成泥状；\n3. 把生姜切成细末备用：\n4. 鸡蛋打碎备用：\n5. 往锅里放少许油，把鸡蛋炒碎后加入姜末一起炒，再把土豆泥和胡萝卜一同倒入翻炒，最后加少许盐和米醋调味，继续翻炒几下装盘，用胡萝卜花点缀即可。"}, "海鲜老豆腐": {"steps": "1. 把老豆腐切成片，然后用菜籽油两面煎黄备用；\n2. 新鲜基围虾挑筋，然后把长的虾须修剪干净，煮熟备用；\n3. 目鱼清洗干净，打花刀出水备用；\n4. 往锅里放油滑锅，加入姜片煸炒，然后再加适量的水，把老豆腐、基围虾同时入锅煮5分钟，加适量的盐调味，即可出锅（注：此菜不需要勾芡）。"}, "锦绣鱼丝": {"ingredients": "青鱼中段，彩椒，鸡蛋", "steps": "1. 将青鱼清洗干净，去皮去骨，然后把鱼肉切成丝；\n2. 把鱼丝稍微清洗一下，滤干水分，加入蛋清、少许盐和生粉上浆；\n3. 把彩椒切丝备用：\n4. 往锅里放油烧到  $ 40^{\\circ} $C，把鱼丝稍微拉一下油；\n5. 往锅里放少许水，加入彩椒丝和鱼丝一起翻炒两下，然后用少许盐调味即可。"}, "本帮扣三丝": {"ingredients": "胡萝卜，香菇，鸡肉，香干，青菜叶", "steps": "1. 将鸡肉煮熟之后用手撕成细丝，将香干出水后切成细丝，把胡萝卜、香菇也分别切成细丝；\n2. 在每个饭碗底下垫一个打过十字花刀的香菇，然后分别把鸡丝、胡萝卜丝、香菇丝、香干丝扣入碗内，加入少许盐调味，放蒸箱蒸30分钟；\n3. 把蒸好的扣三丝倒扣过来，放入盘中，然后用青菜叶点缀即可。"}, "三 鲜烩蹄筋": {"ingredients": "蹄筋，黑木耳，胡萝卜，黄瓜", "steps": "2. 将黑木耳提前泡好，清洗干净，撕成小块；\n1. 把蹄筋清洗干净，切成段，出好水备用；\n3. 把黄瓜和胡萝卜分别刨皮，切成小段，分别出水之后备用；\n4. 往锅里放少许油，用姜片煸一下，然后加水，把胡萝卜、黑木耳、蹄筋和黄瓜一起放入烧开，然后2分钟之后加少许盐调味，勾芡装盘即可。"}, "西芹炒牛舌": {"ingredients": "西芹，牛舌，彩椒\n1. 把牛舌清洗干净，然后用黄酒、生姜事先煮熟，凉透后，把牛舌切成片备用；\n2. 把彩椒切片备用：", "steps": "3. 将西芹刨皮后切成菱形片，出水备用；\n4. 往锅里放油，然后将姜片爆炒，再把西芹、彩椒和牛舌倒入，加少许水和盐调味，翻炒勾芡即可出锅。"}, "姜汁爆腰花": {"ingredients": "猪腰，生姜，彩椒片", "steps": "1. 将猪腰一剖二，然后把上面的一层皮去掉，再把猪腰内部的白色腰骚全部去掉；\n2. 把猪腰切成梳子片状，在活水里冲净血水；\n3. 往锅里放水，把猪腰放入出水，然后把上面的泡沫全部撇掉倒出，之后再次清洗；\n4. 往锅里放油和生姜丝一起煸炒，然后加入彩椒片、水、生抽、胡椒粉和少许红糖调味，最后把猪腰倒入翻炒勾芡，淋上麻油即可装盘。"}, "金汤藕节": {"ingredients": "竹荪，虾仁，日本南瓜，西芹，小葱，鸡汁\n2. 将虾仁和西芹切碎成粒，然后放少许盐和生粉拌匀；\n1. 把日本南瓜去皮去籽后蒸熟，磨成南瓜汁；", "steps": "3. 把小葱用开水烫一下，放旁边备用；\n4. 将竹荪两头切好，另一头用小葱扎起来，把拌好的虾仁和西芹灌入竹荪，然后按图中所示，扎成像藕节一样的形状；\n5. 把扎好的竹荪藕节放在盘里，加入少许盐蒸6分钟；\n6. 往南瓜汁中加少许鸡汁稍微热一下，浇上即可。"}, "三 鲜海蜇血": {"ingredients": "海蛰血，黑木耳，彩椒", "steps": "1. 把海蛰血稍微清洗一下，然后和黑木耳一起出水；\n2. 往锅里放少许油和姜片煸炒，然后加水，再把海蛰血和黑木耳倒入，用大火煮2分钟，待汤汁白后稍微收汁装盘即可。"}, "清蒸河鳗": {"ingredients": "河鳗", "steps": "1. 将河鳗清洗干净后在  $ 60^{\\circ} $C 的水里烫一下，用抹布把河鳗身上的粘液全部擦洗干净；\n2. 把河鳗切成斜刀片，用黄酒和少许盐、生姜腌制10分钟；\n3. 把腌制好的河鳗片按图中所示蒸6分钟即可出锅；\n4. 把蒸河鳗的汤汁倒出，加上少许生抽后将汤汁淋于鱼肉上即可。"}, "香菇烩西蓝花": {"ingredients": "西蓝花，香菇", "steps": "1. 把西蓝花先切成小朵，清洗后再放点盐泡在水里，15分钟左右后捞起备用；\n2. 把香菇清洗之后在正面改十字花刀，然后在水里煮熟待用；\n3. 往锅里放水，把西蓝花煮到大成熟捞出，然后再炒熟，围成图中的样式；\n4. 用蚝油、生抽、白糖把香菇烧透，然后勾芡，淋上麻油在西蓝花中间即可。"}, "茄夹酿肉": {"ingredients": "粗的紫茄子，五花肉糜，鸡蛋\n1. 五花肉糜用鸡蛋、少许盐和少许生粉上浆，拌匀备用；", "steps": "2. 将茄子一剖为二，切成连刀片，一头断一头不断（如图所示），再把上好浆的肉糜塞入茄片之间即可；\n3. 把塞好肉糜的茄子放蒸箱蒸10分钟，拿出后淋上彩荧即可。"}, "原味三黄鸡": {"ingredients": "三黄鸡", "steps": "1. 将三黄鸡去内脏，清洗干净；\n2. 烧一锅水，水面高度需浸没三黄鸡鸡身，待水开后，把葱、姜、黄酒和适量的盐加入调味；\n3. 把三黄鸡放进热水里煮，待水再次烧开，调至小火煮10分钟，再把火关掉焖20分钟即可；\n4. 将煮好的鸡放在托盘里，稍微冷却5分钟，然后斩块装盘，淋上彩荧即可。"}, "彩椒炒藕片": {"ingredients": "彩椒片，藕中节", "steps": "1. 将藕中节刨皮，切成薄片，浸泡在水里备用；\n2. 往锅里放水，稍加白醋，把藕和彩椒片倒入出水；\n3. 往锅里放少许水，用盐调味，然后把藕片和彩椒片一起倒入，翻炒勾芡即可。"}, "糖醋黄鱼中段": {"ingredients": "黄鱼中段，彩椒", "steps": "1. 把黄鱼中段清洗干净，然后在锅里用油煎至两面黄；\n2. 彩椒切小粒，出水；\n3. 往锅里放少许油和生姜片，然后加水、生抽和少许老抽一起调味；\n4. 把黄鱼中段放入锅中焖 10 分钟，调至大火收汁，勾芡后淋上麻油，撒上彩椒粒，即可出锅。"}, "香菇彩椒炒鸡块": {"ingredients": "鸡，香菇，胡萝卜，彩椒", "steps": "1. 将鸡清洗干净后斩小块；彩椒切片备用；\n3. 往锅里放油，把姜片放入，加入鸡块，并加黄酒一起煸炒，然后加少许水，再把香菇倒入，一起焖6分钟左右；\n2. 将胡萝卜切滚刀块，香菇和彩椒分别切小块；\n4. 把彩椒片倒入一起翻炒，勾芡后淋上麻油即可。"}, "金菇扣鹅掌": {"ingredients": "鹅掌，金针菇", "steps": "1. 鹅掌清洗干净，用老抽稍微拌一下，往锅里放油加热到 $ 70^{\\circ}C $的油温，把鹅掌倒入炸一下，然后赶紧用冷水泡发3小时；\n2. 往锅里放姜片煸炒，加水，加黄酒，再把泡发好的鹅掌放入，水能够没掉鹅掌即可，大火烧开，然后改文火焖30分钟。等鹅掌焖到很酥时勾芡出锅；3. 往锅里放水，加少许食盐，然后把清洗干净的金针菇放入煮熟再捞出，最后铺在鹅掌旁边点缀即可。"}, "虫草炖老鹅": {"ingredients": "虫草花，老鹅", "steps": "1. 把老鹅清洗干净，斩小块，然后出水；\n2. 往锅里放油、生姜煸炒，然后把老鹅倒入，加酒再次煸炒，再加适量的水；\n3. 待水开后，由大火改成小火炖30分钟，然后把洗净的虫草花倒入再炖10分钟调味，收汁、装盘即可。"}, "茄汁鱼排": {"ingredients": "青鱼，鸡蛋，面包粉，番茄酱", "steps": "1. 把青鱼清洗干净，去头去尾去皮去龙骨，然后切片；\n2. 把鱼片用全蛋（蛋黄与蛋清搅拌成的蛋液）、少许盐和生粉上浆，然后再拍上面包粉；\n3. 往锅里加油，至七成热，把鱼片放入，炸熟至金黄；\n4. 把炸好的鱼片改刀装盘，浇上番茄酱即可。"}, "小鲍鱼炖蛋": {"ingredients": "小鲍鱼，鸡蛋（1个）", "steps": "1. 把小鲍鱼清洗干净，切好花刀备用；\n2. 将鸡蛋打入碗中，用 100 克的水和鸡蛋一起打碎，然后蒸 8 分钟即可；\n3. 把小鲍鱼出水，然后稍微放一点生抽、糖调味，上蒸笼蒸5分钟，拿出后再用蒸鲍鱼的原味汁勾芡，浇在小鲍鱼上；\n4. 把浇好芡的小鲍鱼放在炖好的蛋羹上，用西蓝花点缀即可。"}, "西蓝花烩蛏子": {"ingredients": "西蓝花，蛏子，彩椒", "steps": "1. 把蛏子出水之后，剥出蛏子肉备用：\n2. 把西蓝花切小块，彩椒切小条；\n3. 往锅里放水，把西蓝花出好水之后稍微炒一下，然后起锅装盘；\n4. 将蛏子肉和彩椒一起出水；\n5. 把锅烧热，放生姜片煸炒一下，然后加水调味，把蛏子肉和彩椒一起倒入煸炒，勾芡出锅，然后盖在西蓝花上面即可。"}, "油爆河虾": {"ingredients": "河虾\n2. 往锅里放油，七成油温时，把虾在油里爆一下捞出；", "steps": "3. 往锅里放少许水和姜末，然后淋上生抽和少许糖调匀，再把河虾倒入煸炒几下，淋上麻油即可。"}, "三 鲜烩小肉丸": {"ingredients": "肉糜，黑木耳，大白菜，胡萝卜，青菜，鹌鹑蛋，鸡蛋", "steps": "1. 将肉糜用鸡蛋、生粉和少许盐拌匀待用；\n2. 将黑木耳提前泡好，清洗干净，切成小块；\n3. 把胡萝卜、大白菜清洗干净，切片；\n4. 在锅里烧水，待水开后，把肉挤成一个个小肉丸放入烹煮，直到肉丸浮起为止；\n5. 把胡萝卜、黑木耳、大白菜、鹌鹑蛋、青菜一起出水；\n6. 往锅里放水，加少许盐调味，把出好水的各类配菜和肉丸一起倒入，小火慢炖3分钟即可。"}, "黄瓜酿鱼丸": {"ingredients": "青鱼中段，黄瓜", "steps": "1. 把青鱼去骨去皮，剁成泥状，然后调味，用蛋清和生粉上浆；\n2. 把黄瓜刨皮切小段，一头挖空；\n3. 把鱼泥挤成小圆子，放在黄瓜挖空的一头，上蒸笼蒸8分钟即可出锅，淋上彩荧。"}, "三 鲜烩鱼圆": {"ingredients": "青鱼中段，黑木耳，黄瓜，胡萝卜，鸡蛋", "steps": "1. 将青鱼中段清洗干净，去皮去骨，然后加入适量的蛋清、生粉、少许面粉和少许盐打碎成泥备用；\n2. 黄瓜、胡萝卜清洗干净刨皮切片，然后加入黑木耳出水备用；\n3. 往锅里放水，等水开后把鱼泥用调羹一个个挖入，等到鱼圆浮起来后即可捞出；\n4. 往锅里加适量的水和盐调味，然后把鱼圆、黑木耳、黄瓜片、胡萝卜片倒入一起翻炒，勾芡，即可出锅装盘。"}, "麻油金针菇": {"ingredients": "金针菇，胡萝卜丝", "steps": "1. 将金针菇根部去掉，洗净后和胡萝卜丝一起出水；\n2. 往锅里放少许油，然后把出过水的金针菇和胡萝卜丝倒入一起翻炒，调味并淋麻油出锅。"}, "黄花菜炒肉丝": {"ingredients": "黄花菜，里脊肉，彩椒", "steps": "1. 将黄花菜在水里泡好洗净，把根切去；\n2. 将里脊肉切丝，并上好浆，同时将彩椒切丝；\n3. 将里脊肉滑油待用：\n4. 往锅里放水，将黄花菜和彩椒丝出水；\n5. 把锅烧热后放少许油，翻炒黄花菜和彩椒丝，然后再把肉丝放入一起翻炒并勾芡，淋上麻油装盘即可。"}, "灯笼茄子": {"ingredients": "粗的紫茄子，肉糜\n3. 把拌匀的肉糜塞在茄子里（按图所示），然后在七成热的油锅里炸透；\n4. 往锅里放少许油和姜末，将剩下的肉糜放入一起煸炒，加少许水、生抽和白糖调味，然后把茄子放入烧开，再焖10分钟即可收汁勾芡。", "steps": "1. 把茄子清洗干净，一剖为二，切成连刀片；\n2. 将肉糜用少许盐和生粉、生姜末拌匀；"}, "河鳗大烤": {"ingredients": "河鳗，叉烧酱，芝麻制作方法：\n1. 将河鳗清洗干净，用  $ 60^{\\circ} $C 的水稍微烫一下，再把河鳗身上的粘液用抹布全部擦洗干净；\n3. 加入黄酒、姜片、少许盐和叉烧酱一起腌制20分钟；\n2. 将河鳗从背上开刀，然后再把龙骨去掉，用刀背在河鳗背上轻轻敲打一遍；\n4. 将烤箱预热，然后上面 $ 180^{\\circ}C $，下面 $ 180^{\\circ}C $，把腌制过的河鳗放入烤15分钟，之后在河鳗上刷一层蜂蜜，撒上芝麻，再继续烤10分钟；\n5. 把烤好的河鳗取出，改刀装盘即可。"}, "木瓜彩椒炒虾仁": {"ingredients": "木瓜，青虾仁，彩椒，白果", "steps": "1. 取半个木瓜，掏空籽粒，蒸5分钟备用；\n2. 将青虾仁、白果剖背冲洗干净备用，免上浆；\n3. 将彩椒切成菱形片备用；\n4. 把青虾仁、白果和彩椒出水，然后捞出；\n5. 在炒锅内放一点水调味，然后将虾仁和彩椒倒入翻炒两下，即可勾芡，装入事先备好的木瓜里。"}, "小银鱼煎蛋": {"ingredients": "小银鱼，鸡蛋（2个），胡萝卜丝，菠菜叶\n2. 将鸡蛋打碎，把出好水的小银鱼放到鸡蛋里，加胡萝卜丝、菠菜丝、少许盐，一起搅匀备用；\n1. 将小银鱼清洗干净，稍微出下水；菠菜清洗干净切丝"}, "松子桂鱼": {"ingredients": "桂鱼，松子，新的橙汁制作方法：\n1. 把桂鱼清洗干净，一剖为二，把龙骨去掉，把肚档上的边骨去掉，再把桂鱼肉按照纹条的方法切开，用生粉、鸡蛋和少许盐上浆；\n2. 将油锅加热到七成热，然后把上好浆的桂鱼拍上干粉，直接放入油锅里炸至金黄色即可；\n3. 往锅里放少许油，加入番茄酱煸炒，然后加入水和新的橙汁，放少许糖调和之后勾薄芡，浇在炸好的桂鱼上，再撒上松子即可。", "steps": "4. 将煎蛋出锅切块，装盘即可。\n3. 往锅里放油滑锅，然后再把油倒出，将鸡蛋液倒入锅里慢慢煎，然后翻锅，直至两面呈金黄为止；"}, "橙汁鸡柳": {"ingredients": "鸡胸肉，新的橙汁，鸡蛋，少许泡打粉，面粉，生粉，芝麻", "steps": "1. 把鸡胸肉切成小条鸡柳，然后用鸡蛋、少许盐腌制一下，再将泡打粉和适量的面粉及生粉一起放入，均匀搅拌；\n2. 将油锅加热到  $ 60^{\\circ} $C 左右，关火，然后把鸡柳一根一根放入，炸至金黄色捞出；\n3. 往锅里加适量水，再加适量橙汁，待汁烧开后稍微勾芡，再把鸡柳倒入翻炒几下装盘，后撒上芝麻点缀。"}, "香菇虾仁烩豆腐": {"ingredients": "香菇，盒装豆腐，虾仁，\n红圆椒，青圆椒", "steps": "1. 盒装豆腐切成麻将块；\n2. 将红圆椒，青圆椒和香菇分别切成丁，然后出水备用；\n3. 虾仁开背去虾线，清洗干净并出水备用；\n4. 往锅里放少许油，加入适量的姜末煸炒，然后加入青圆椒、红圆椒和虾仁，放少许黄酒和水，再加入切好的豆腐，大火烧开，小火焖2分钟即可出锅装盘。"}, "清炖狮子头": {"ingredients": "五花肉糜，山药，青菜1棵，虫草花，枸杞", "steps": "1. 把山药切成末，然后和五花肉糜一起用鸡蛋、盐、黄酒、姜末拌匀，撒上少许生粉再次拌匀；\n2. 在锅里烧水，待水开后把肉圆做成图中所示形状，放入开水中煮2分钟，等肉圆定型之后，捞起来放入碗中；\n3. 放 3 根虫草花，3 粒枸杞和姜片一起放锅里，然后加上煮肉圆的水，上笼蒸 30 分钟拿出来；\n4. 将青菜清洗干净，在水中煮熟，然后放在肉圆汤里面即可。"}, "玉子豆腐酿肉": {"ingredients": "玉子豆腐（2条），肉糜制作方法：\n1. 把肉糜用姜末和盐、黄酒、鸡蛋调味，再放点生粉拌均匀；\n2. 在锅里烧水，待水开后把拌好的肉糜挤成一个个丸状下水煮，至肉圆浮上水面即捞出；\n3. 将玉子豆腐切段，中间稍微挖掉一点留出凹面，把做好的小肉圆一个个放在玉子豆腐上面，上蒸笼蒸3分钟，取出淋上彩费即可。"}, "千 层包菜卷": {"ingredients": "卷心菜，肉糜，胡萝卜，鸡蛋", "steps": "1. 把卷心菜的根部削掉一点，然后再放入开水里烹煮，待卷心菜的叶一张张散开，再将其捞起冲凉备用；\n2. 将肉糜用鸡蛋、姜末、盐、生粉调味之后，用卷心菜把肉糜包起来，然后用胡萝卜丝扎一下即可；\n3. 把扎好的千层包，上蒸笼蒸12分钟拿出，淋上彩荧即可。"}, "黄瓜炒鳝背": {"ingredients": "黄瓜，鳝背肉，胡萝卜", "steps": "1. 将黄瓜刨皮去籽，切斜刀片备用；\n2. 将胡萝卜刨皮清洗干净，切片备用；\n3. 鳝背切片备用；\n4. 往锅里放油，等到油温至四成热时，把鳝背稍微拉下油；\n5. 把黄瓜和胡萝卜片一起出水，往锅里放少许油，然后加入一点点姜末煸炒，再加少许水和盐调味，最后把黄瓜片、胡萝卜片和鳝背片一起倒入翻炒，勾芡后即可出锅。"}, "彩椒炒牛筋": {"ingredients": "牛筋，彩椒\n3. 把煮熟的牛筋冲凉水后切小段；\n4. 往锅里放少许水，加生抽、白糖和姜片，再把牛筋倒入，小火焖10分钟左右，再把彩椒倒入翻炒，淋上麻油即可出锅（注：此菜不需要勾芡）。"}, "三 色目鱼花": {"ingredients": "目鱼，彩椒", "steps": "1. 将新鲜目鱼去皮去内脏后清洗干净，然后改成花刀在开水里烫一下即可卷起；\n2. 彩椒切小条备用；\n3. 把烫好的目鱼卷再次清洗一遍；\n4. 往锅里放少许油和生姜丝煸炒，然后加少许水，用盐和胡椒粉调味，再把目鱼花和彩椒一起倒入煸炒几下，勾芡后淋上少许麻油即可出锅。"}, "松仁酱仔排": {"ingredients": "猪肋排，松子，叉烧酱", "steps": "1. 将猪肋排清洗干净，斩成四寸长，然后在七成热的油锅里炸一下（防止肉烧烂之后脱落）；\n2. 往锅里放油，用生姜片煸炒，\n加水和叉烧酱、白糖、生抽，然后再把排骨放入，大火烧开，小火焖30分钟即可烧汁出锅；\n3. 按图中的摆盘方式摆盘，然后撒上松子即可。"}, "伃鸡百叶炖鹌鹑蛋": {"ingredients": "童子鸡，百叶，鹌鹑蛋，虫草花", "steps": "1. 将童子鸡去内脏清洗干净，剁成小块；\n2. 将百叶切块；\n3. 鹌鹑蛋煮熟之后剥皮备用；\n4. 把锅烧热，放油，先将姜片煸炒，再把童子鸡倒入煸炒，放适量水，然后把百叶和鹌鹑蛋、虫草花一起放入，煮20分钟左右，即可收汁装盘。"}, "香煎橙汁银鳕鱼": {"ingredients": "银鳕鱼，新的橙汁，鸡蛋", "steps": "1. 将银鳕鱼清洗干净，切成片，放少许蛋清，然后在上面撒一点干生粉（生粉千万别太厚）；\n2. 往平底锅里放油，然后把银鳕鱼放入锅内，两面煎透装盘；\n3. 往锅里放少许水，然后把新的橙汁倒入，加少许糖调开勾芡，最后将汁水浇在银鳕鱼上即可。"}, "藕带炒白果": {"ingredients": "藕带，彩椒粒，速冻白果", "steps": "1. 将藕带冲洗干净：\n2. 把藕带、彩椒粒和白果一起出水；\n3. 往锅里放少许水，加盐调味，然后再把藕带、白果、彩椒粒放入翻炒几下，勾芡即可出锅。"}, "清蒸小鲍鱼": {"ingredients": "小鲍鱼，粉丝，鸡蛋，鲍鱼汁", "steps": "1. 把小鲍鱼挖出，清洗干净，并用牙刷把旁边的黑垢全部洗刷一遍；\n2. 提前5分钟用温开水把粉丝泡好；\n4. 把泡好的粉丝装进鲍鱼壳里，然后再把小鲍鱼盖在上面，放入蒸箱蒸5分钟即可；\n3. 小鲍鱼用黄酒和细盐、生姜腌制 10 分钟左右备用；\n5. 鸡蛋煮熟备用：\n6. 往锅里放入少许水，加上鲍鱼汁，放少许糖调味并勾芡，均匀淋在鲍鱼汁上面，然后再用鸡蛋点缀即可。"}, "莴笋炒北极贝": {"ingredients": "北极贝，莴笋", "steps": "1. 将北极贝一剖二，清洗干净之后切丝，同时将莴笋刨皮切丝；\n2. 往锅里放水，待水开后，将莴笋丝和北极贝同时出水；\n3. 往锅里放少许水，加少许姜丝调味，再把出好水的北极贝和莴笋一起倒入翻炒几下即可装盘。"}, "西蓝花炒牛筋": {"ingredients": "西蓝花，牛筋", "steps": "1. 将西蓝花清洗干净，切块，然后放在淡盐水里浸泡15分钟；\n2. 将牛筋清洗干净，加葱、姜和黄酒一起煮熟；\n3. 将煮熟的牛筋用冷水冲凉，然后切成小块；\n4. 把西蓝花用盐开水烫到八成熟，然后按图中所示摆盘；\n5. 往锅里放少许油，用姜片煸炒，然后加水，加少许生抽和糖调味，把牛筋放在锅里煸炒勾芡，最后把烧好的牛筋装在西蓝花当中即可。"}, "芦笋炒虾蛄": {"ingredients": "芦笋，皮皮虾，鸡蛋\n1. 将芦笋去皮切成小段，出水备用；\n2. 将皮皮虾两边剪掉，把虾肉剥出来清洗干净，再用少许盐和蛋清、生粉一起上浆；\n3. 把用皮皮虾刨好的虾蛄稍微过下油倒出；\n4. 往锅里加少许油，加生姜片，然后加少许水，用盐和胡椒粉调味，再把虾蛄和芦笋倒入一起翻炒，勾芡后即可出锅，按图所示装盘。"}, "酒酿昂刺鱼": {"ingredients": "昂刺鱼，香菇末，胡萝卜末，肉糜\n猪肋排，排骨酱，冰糖", "steps": "1. 将昂刺鱼清洗干净，往锅里放油和生姜爆炒，把昂刺鱼两面煎一下；\n2. 往锅里放少许油，然后把肉糜、香菇末和胡萝卜末一起倒入，加黄酒煸炒，再把昂刺鱼倒入，放适量水焖15分钟，再把酒酿加入焖5分钟即可；\n3. 勾苁，大翻锅装盘。\n1. 将猪肋排斩成4厘米左右的小段，然后冲净血水；\n2. 往锅里放水，加入适量的黄酒和生姜片，等水开后把排骨出水，断血水为止；\n3. 锅烧热滑油然后放入差片偏炒，再倒入排骨，加水，以淹没排骨为止，再加入适量的冰糖；4. 大火烧开，加适量老抽，然后改用文火焖30分钟，即可收汁装盘。"}, "目鱼大烤": {"ingredients": "目鱼，叉烧酱", "steps": "1. 将目鱼去皮去内脏，清洗干净，然后在目鱼背上直刀切上浅浅的竖纹后出水；\n2. 往锅里放少许油，加姜片煸炒，然后加水，水需浸没目鱼；\n3. 加少许叉烧酱、生抽、白糖，\n把目鱼放入煮开，再以小火焖\n20分钟，即可改刀装盘。"}, "金 汤 肥 牛": {"ingredients": "肥牛卷，金针菇，南瓜汁", "steps": "1. 将金针菇去根，出水，放盘里垫底；\n2. 往锅里放水，待水开后把肥牛倒入出水，待水一开，立马把肥牛捞起来放在金针菇上面，以免肥牛口感不够嫩；\n3. 把南瓜汁倒入锅里，用少许盐和高汤调味，待南瓜汁烧开之后勾薄芡，然后淋在肥牛上即可。"}, "芙蓉大明虾": {"ingredients": "鸡蛋（2个），大明虾，彩椒小菱形片", "steps": "1. 把蛋清加湿淀粉打碎备用；\n3. 大明虾去头去尾后将头尾留着备用，把虾肉剥出来打片；\n2. 往锅里倒油，当油温达到四成热，把蛋清倒入拉油成芙蓉，再把拉好油的芙蓉放在冷水里面泡洗干净；\n4. 用蛋清和生粉将虾肉稍微上浆。在锅里烧水，把蛋清和虾肉一起放入出水，再把它捞起；\n5. 往锅里加少许水调味，把蛋清、彩椒小菱形片和虾肉一起倒入翻炒，勾芡装盘，以虾头尾点缀即可。"}, "菌菇百叶卷": {"ingredients": "薄百叶，金针菇，胡萝卜，葱", "steps": "1. 把薄百叶切成长 5cm、宽 8cm 备用；\n2. 把胡萝卜刨皮切成丝备用：\n3. 金针菇清洗干净，将前面老头稍微去掉一些；\n4. 把小葱用开水烫好备用：\n5. 按图所示，把切好的百叶摊开，然后将金针菇和胡萝卜丝卷入，最后用葱扎起来，在蒸箱里蒸8分钟；\n6. 将菜品端出摆盘，淋上彩荧即可。"}, "杏鲍菇扣鹅肫": {"ingredients": "杏鲍菇，鹅肫", "steps": "1. 将杏鲍菇清洗干净，放糖、老抽、生抽、生姜一起卤40分钟；\n2. 将鹅肫清洗干净，放黄酒、盐少许、葱和姜一起卤20分钟，把卤熟的鹅肫切片备用；\n3. 用一个饭碗将鹅肫和杏鲍菇一片片按图样扣起来，然后把当中填满，上蒸笼蒸20分钟，再倒扣出来即可。"}, "古法东坡肉": {"ingredients": "冬瓜，肉糜，干香菇\n1. 将冬瓜去皮去籽，切成长方块打花刀；\n2. 把冬瓜在七成热的油温里炸一下备用；\n4. 往锅里放油，把肉糜、姜末和香菇末一起倒入，加黄酒煸炒，放少许生抽和糖调味，之后加少许水烧开；\n3. 将香菇提前泡好，蒸熟，然后再切成和姜末一样粗细的细末备用；\n5. 把烧开的肉糜浇在冬瓜上面蒸 15 分钟，然后取出蒸好的冬瓜，把剩余的汁水倒入锅里勾芡，然后浇在冬瓜上面即可。"}, "虎皮凤爪": {"ingredients": "凤爪\n目鱼，彩椒", "steps": "1. 鸡脚剪掉指甲，然后放少许老抽拌一下，油温七成热炸透；\n2. 把炸透的凤爪放在冷水里浸泡两个30分钟，等到凤爪的皮发起来为止；\n3. 往锅里放入生姜片煸炒，然后再把凤爪倒入加水，以淹没凤爪为宜！加少量的糖和生抽；\n4. 大火烧开，然后改成中小火焖10分钟左右收汁即可（注：此菜不需要勾芡）。\n1. 目鱼清洗干净打花刀，然后再把它切成小条；\n2. 放一点干生粉用力捏几下，把目鱼再次清洗干净；\n3. 彩椒也切成小条状；\n5. 往锅里放少许油，加入姜丝一起煸炒，然后加少许水和盐、白胡椒粉调味，再把目鱼条和彩椒一起倒入翻炒勾芡，出锅装盘即可。\n4. 然后把清洗干净的目鱼条和彩椒加少许黄酒一起出水；"}, "黑椒牛仔骨": {"ingredients": "牛仔骨，鸡蛋\n1. 将牛仔骨上浆，加入黑胡椒粉、鸡蛋、少许老抽和少许生粉拌匀；", "steps": "2. 往锅里放油，加热到五成热，把牛仔骨放入拉油，慢慢捂熟后捞出。\n3. 往锅里放少许油，加入黑胡椒汁，放少许糖和生抽调味，然后把牛仔骨倒入翻几下，稍微勾芡，即可出锅。"}, "清炒鳝丝": {"ingredients": "鳝丝", "steps": "1. 将鳝丝清洗干净，切小段；\n2. 往锅里放水，然后加入黄酒，把鳝丝出水；\n3. 往锅里放少许油，加姜丝一起煸炒，然后再把鳝丝倒入，加黄酒、胡椒粉、少许水、少许糖和生抽一起煸炒，最后勾芡，淋上麻油装盘即可。\n月子膳食\n营养餐"}, "特色走油肉": {"ingredients": "五花肉，白糯米", "steps": "1. 将五花肉出水，然后冲洗干净，抹上一层老抽，在七成热的油锅里炸至金黄色；\n2. 往锅里放水，加少许老抽和生抽、糖，然后再把五花肉放入，以小火焖40分钟，待到冷却之后把它切成片；\n3. 将白糯米提前4小时泡好，然后上蒸箱蒸40分钟。\n4. 把蒸过的糯米饭拿出来，放入卤五花肉的汤汁，加糖一起拌匀，垫底；\n5. 把切好的五花肉盖在糯米饭上，进蒸箱再蒸15分钟，将卤五花肉的汁烧开，勾芡淋上即可。"}, "火龙果牛肉粒": {"ingredients": "火龙果，牛里脊肉，彩椒粒，腰果，鸡蛋\n3. 往锅里放油，然后加热至五成热，把牛里脊肉倒入拉油，熟后再沥出；\n1. 将火龙果一副为二，然后把果肉挖出来，果壳备用；", "steps": "2. 将牛里脊肉清洗干净，切粒，放鸡蛋、生粉和老抽一起上浆；\n4. 往锅里放少许油，加入姜末一起煸炒，然后加入黄酒、水、少许老抽、少许砂糖调味，最后把彩椒粒和牛肉粒一起倒入翻炒，撒上腰果，淋上麻油，按照图中所示装在火龙果里即可。"}, "白灼基围虾": {"ingredients": "基围虾\n对虾，肉糜，香菇，鲍汁", "steps": "1. 将基围虾清洗干净，把须剪掉；\n2. 往锅里放水和姜片，加少许盐，然后把剪好须的基围虾放入烹煮，煮到虾身蜷起、虾头虾尾相连即可。"}, "红烧肉烤蛋": {"steps": "1. 将五花肉清洗干净后切麻将块，然后出水，水开后把水面上的泡沫撇去，待五花肉块断血水后即可捞出；\n2. 往锅里放水，将鹌鹑蛋放少许盐煮开、煮熟，然后剥皮备用；\n3. 锅烧热后，把生姜片放入锅里翻炒，再把出好水的肉全部倒入锅内，用黄酒煸炒15分钟左右，再加水没过肉，把去好皮的鹌鹑蛋也倒入，用少许老抽、生抽和冰糖调味，待水开后改小火慢焖40分钟，然后收汁即可装盘出锅。"}, "鲍汁烩辽参": {"ingredients": "辽参，胡萝卜，鹌鹑蛋，西蓝花，鲍鱼汁", "steps": "1. 提前用纯净水将干辽参浸泡48小时，然后放在 $ 80^{\\circ}C $的热水里密封起来再捂12小时，促使海参泡发完全；\n2. 把泡发好的辽参剖腹清洗干净；\n3. 用生姜、黄酒、鲍鱼汁、生抽、白糖加少许水调成卤汁，然后将辽参放进卤汁里，蒸20分钟取出；\n4. 将胡萝卜、鹌鹑蛋、西蓝花分别煮熟备用；\n5. 把卤汁倒入锅里勾芡，按图中所示摆盘即可。"}, "日式烤秋刀鱼": {"ingredients": "秋刀鱼", "steps": "1. 将秋刀鱼清洗干净，然后用盐、黄酒、姜片腌制20分钟；\n2. 烤箱调至上面温度  $ 180^{\\circ}C $，下面温度  $ 180^{\\circ}C $，将秋刀鱼放入烤箱烤 18 分钟后取出，然后改刀，点缀装盘。"}, "特色猪脚姜": {"ingredients": "猪脚，生姜，鸡蛋，冰片糖，红糖，山西老陈醋", "steps": "1. 将猪脚清洗干净，把上面的细毛刮净，然后出水，再次清洗干净；\n2. 将生姜切片（生姜可以稍微多一点），往锅里放油，然后把生姜片煸炒，直到姜片两面都煎黄，调至小火，把山西老陈醋倒入，加红糖和冰片糖一起小火慢熬；\n3. 把清洗好的猪脚倒入锅中，以浸没猪脚"}, "三 鲜鱼夹": {"ingredients": "青鱼，五花肉糜，鸡蛋", "steps": "1. 将青鱼清洗干净，去头去尾去龙骨，将鱼肉切成蝴蝶片；\n2. 用蛋清、盐和生粉将鱼片上浆；\n3. 用姜末、鸡蛋、生粉和少许盐将肉糜上浆，把蝴蝶鱼片反铺在砧板上，把肉糜塞入鱼片底部，裹成饺子状；\n4. 放蒸箱蒸8分钟即可，然后淋上彩芡装盘。"}, "爱心豆腐": {"ingredients": "盒装豆腐，虾仁，鸡蛋", "steps": "1. 将整块豆腐用爱心模具制成一个个“爱心”；\n2. 用挖球器在爱心豆腐上面挖掉一点，制成凹面（以让之后虾仁可以平稳放在上面）；\n3. 将虾仁用鸡蛋清、生粉加少许盐调味，然后将上浆好的虾仁一个个摆在豆腐上面；\n4. 将爱心豆腐在蒸箱里蒸2分钟，取出后把一个个虾仁置于其上，淋上彩荧即可。"}, "特色地三鲜": {"ingredients": "土豆，茄子，长豆角，青椒，海鲜酱", "steps": "1. 将土豆和茄子、青椒分别切条；\n2. 将长豆角切小段：\n3. 往锅里放油，加热至七成热，把土豆、长豆角和茄子分别炸透；\n4. 往锅里放少许水，加海鲜酱、糖、生抽、青椒一起调味，然后把炸好的土豆、长豆角和茄子倒入锅内一起翻炒，勾芡即可出锅。"}, "香米扣肉": {"ingredients": "圆头糯米，五花肉", "steps": "1. 将圆头糯米提前 4 小时泡好，然后上蒸箱蒸透；\n2. 把五花肉切成麻将块，然后再出水；\n3. 往锅里加油，放入姜片，再把五花肉倒入翻炒，然后加黄酒、白糖、生抽和少许老抽调味；\n4. 待水开之后，改小火焖40分钟即可，以大火收汁后备用；\n5. 把蒸好的糯米饭加少许糖和少许老抽，加淋一点扣肉汁拌匀，然后按图中所示装盘即可。"}, "白玉香米船": {"ingredients": "鸡蛋，白糯米", "steps": "1. 将卤好的鸡蛋一剖为二，把蛋黄去掉，蛋白备用；\n2. 将白糯米提前 4 小时先泡好，沥干水分，上蒸笼蒸透，再用少许老抽和白糖调味；\n3. 把调好味的糯米饭裹在蛋白中间（原为蛋黄的位置），淋上勾芡装盘。"}, "红烧带鱼": {"ingredients": "带鱼", "steps": "1. 将带鱼清洗干净，切段，然后在油里煎至两面黄；\n2. 往锅里放少许油和姜片，然后把煎好的带鱼放入，加黄酒、水、生抽和少许老抽调味，以小火焖10分钟左右，然后以大火收汁勾芡，即可出锅。"}, "秋葵肉糜球": {"ingredients": "五花肉糜，山药，秋葵，鸡蛋", "steps": "1. 将山药刨皮后剁成碎末，加入五花肉糜，加少许盐、生粉和鸡蛋一起拌匀；\n2. 将秋葵直刀切片，如图中所示；\n3. 把拌好的肉糜做成一个个小肉球，然后再把秋葵一片片贴上去，上蒸笼蒸12分钟，取出后淋上彩荧即可。"}, "秘制烤鸭脯肉": {"ingredients": "鸭脯肉，芝麻，黄瓜，樱桃\n小萝卜，蜂蜜", "steps": "1. 将整块鸭脯肉去皮，然后用生姜、黄酒、少许生抽和少许老抽腌制2小时；\n2. 黄瓜切片，樱桃小萝卜切成小蘑菇状备用；\n3. 烤箱预热，上面  $ 180^{\\circ}C $，下面  $ 200^{\\circ}C $;\n4. 把腌制好的鸭脯肉放入烤15分钟，然后拿出刷一层蜂蜜，撒上芝麻；\n5. 把烤箱温度上面调到200℃，下面180℃，然后再把鸭脯肉放入烤8分钟；\n6. 按图中所示改刀装盘即可。"}, "彩椒炒杂粮": {"ingredients": "罐装红腰豆，玉米粒，胡萝卜，彩椒\n1. 将彩椒、胡萝卜切粒；\n2. 把红腰豆倒出，和玉米粒、彩椒粒一起出水至熟；\n3. 往锅里放水，用少许盐调味，然后把出好水的彩椒粒、红腰豆和玉米粒一同倒入翻炒；\n4. 勾苁，淋上麻油，即可出锅。"}, "板栗烧黄鳝": {"ingredients": "黄鳝，板栗", "steps": "1. 将黄鳝剖肚去肠，清洗干净；\n2. 把黄鳝背改一下花刀，再切成一段一段；\n4. 往锅里放少许油，用姜片煸炒，然\n3. 往锅里放水，加入少许黄酒，待水开后把黄鳝倒入，并马上捞起，把黄鳝表面的粘液清洗干净；\n后把黄鳝倒入，加黄酒一起煸炒，再加水，加少许老抽和适量糖，待水开后再焖15分钟，把板栗倒入一起再焖5分钟即可收汁，勾芡装盘。"}, "干烧大明虾": {"ingredients": "大明虾，酒酿，肉糜，香菇，彩椒", "steps": "1. 把大明虾背部破开，将虾线去掉，然后在 $ 70^{\\circ}C $的油温里炸一下，捞起备用；\n2. 把香菇和彩椒剁成粒状：\n3. 往锅里放油，加入少许姜末，然后把肉糜倒入，加适量黄酒一起炒透；\n4. 将彩椒末、香菇末和酒酿一起倒入锅中焖10分钟，然后改大火收汁勾芡，最后将烧汁浇于虾上。"}, "秋葵爆澳带": {"ingredients": "秋葵，彩椒，澳带，鸡蛋，黑胡椒汁", "steps": "1. 将秋葵和彩椒清洗干净，切斜刀片；\n2. 将澳带化冰后切圆片，然后把水分吸干，用蛋清和生粉上浆；\n3. 把秋葵和彩椒一起出水备用，然后加少许盐调味翻炒即可；\n4. 将澳带用五成热的油稍微拉一下油，然后把黑胡椒汁加少许糖和水勾芡备用；\n5. 用秋葵垫底，把拉好油的澳带铺在上面，然后淋上事先烧好的黑胡椒汁即可。"}, "芝士烤小青龙": {"ingredients": "小青龙，芝士，黄油", "steps": "1. 把小青龙对半剖开，去鳃、沙囊、肠子，洗净备用；\n2. 加入黄油和芝士调味后抹在龙虾上；\n3. 进烤箱加热到  $ 200^{\\circ}C $，根据虾的大小烤多 15~20 分钟，至虾壳全变红即可。"}, "西蓝花烩鹌鹑蛋": {"ingredients": "鹌鹑蛋，西蓝花", "steps": "1. 将西蓝花切小块以后用淡盐水泡15分钟，然后清洗干净；\n2. 将鹌鹑蛋煮熟之后去壳，然后在七成热的油锅炸一下；\n3. 往锅里放水，加少许生抽和老抽、白糖调味，把鹌鹑蛋放入烧开，然后再以小火焖15分钟后收汁勾芡；\n4. 把清洗好的西蓝花放水里烫到七成熟，往锅里放少许水和少许盐调味，然后再把西蓝花倒入翻炒勾芡；\n5. 按照图中所示，先把西蓝花围一圈，然后把烧好的鹌鹑蛋堆在上面即可。"}, "姜丝海参": {"ingredients": "水发海参，彩椒", "steps": "1. 将海参清洗干净，然后切条；\n2. 往锅里放水，把海参出水至熟；\n3. 往锅里加少许油，然后加入姜丝和彩椒一起煸炒，放少许水、少许盐和姜汁调味，然后把海参倒入焖3分钟，收汁勾芡即可。"}, "百 叶包鸡汤鹌鹑蛋": {"ingredients": "薄百叶，鸡胸肉，鹌鹑蛋，鸡蛋制作方法：\n1. 将鸡胸肉清洗干净，然后加蛋清、少许盐和生粉，在料理机里一起打碎成鸡肉茸；\n2. 将薄百叶切成长方形，然后把鸡肉茸包进去，上蒸笼蒸5分钟定型即可；\n3. 往锅里放水，把鹌鹑蛋煮熟去壳；\n4. 往锅里放适量水，加入姜片和胡椒粉，然后把鹌鹑蛋、百叶包一起小火焖20分钟，加少许盐调味即可。"}, "杂粮炖小鲍鱼": {"ingredients": "小鲍鱼，红豆，野米，薏米仁，鹌鹑蛋，花生，黄南瓜，鲍鱼汁、鸡汁制作方法：\n1. 先将所有杂粮清洗干净，浸泡2小时，然后上蒸笼蒸熟；\n2. 将黄南瓜蒸熟打成泥：\n3. 将小鲍鱼清洗干净，改花刀后在锅里出水，用少许鲍鱼汁调味煮熟；\n4. 把鹌鹑蛋煮熟之后去壳备用；\n5. 把所有杂粮倒入锅里，用少许南瓜泥调色，加少许鸡汁，然后把鲍鱼放入一起焖2分钟，按图中所示摆盘。"}, "番茄炖鱼片": {"ingredients": "番茄，黑木耳，青鱼中段，鸡蛋", "steps": "1. 将青鱼中段清洗干净，去骨去皮切片，用蛋清加少许盐和生粉上浆；\n3. 在锅里烧水，待水开后，将鱼片一片片放入煮熟，捞起来备用；\n2. 将番茄在开水锅里煮一下，把皮去掉，然后切成粒；\n4. 往锅里放少许油，加入姜末和番茄丁一起煸炒，再加入少许水，然后把鱼片和黑木耳放入一起烧开，用少许盐调味，再焖3分钟即可出锅。"}, "生炒甲鱼": {"ingredients": "甲鱼，彩椒，黄瓜", "steps": "1. 将甲鱼杀好之后去内脏，在 $ 70^{\\circ}C $的水里稍微烫一下，把上面的一层衣清洗干净；\n2. 黄瓜去皮，切片，彩椒切片备用；\n3. 将甲鱼斩小块，往锅里放少许油，加入生姜片煸炒，然后再把甲鱼、黄瓜片和彩椒片倒入，加少许黄酒，一起翻炒，再加水，加少许盐调味，最后收汁装盘。\n## PART 04 十大 月子餐禁忌\n伤筋动骨100天，产后新妈妈应禁食生冷、坚硬和过于刺激的食物。所有东西都必须烧熟、煮透、煮烂，禁止食用冰箱里刚刚拿出来的水果、牛奶和饮品类的食物，浓茶、咖啡和烈酒千万别碰。"}, "花生红枣小米粥": {"ingredients": "小米50克，花生仁30克，红枣4颗。", "steps": "①小米、花生仁分别用清水洗净，浸泡30分钟，备用。②红枣洗净，备用。③小米、花生仁、红枣一同放入砂锅中，加清水以大火煮沸，转小火将小米、花生仁、红枣煮至完全熟透即可。"}, "黑芝麻花生粥（288）": {"ingredients": "黑芝麻20克\n花生20克\n白米150克\n冰糖10克", "steps": "1 白米洗净后备用。\n2 取研钵，将黑芝麻倒入捣碎，使米粥在熬煮过程中更容易入味。\n3 在研钵中，倒入花生一同捣碎。\n4 起一锅水，加入白米熬煮，待米粒煮开后加入冰糖搅拌均匀。\n5 将黑芝麻及花生碎放入一起熬煮，待米粥呈现稠状即可起锅食用。", "notes": "芝麻的脂肪虽多，但脂肪酸的比例优良，其多元不饱和脂肪酸约占45%，单元不饱和脂肪酸约占40%，饱和脂肪酸只占10%，因此反而有利血脂的调控。"}, "黑芝麻花生粥（366）": {"ingredients": "大米50克，花生仁30克，黑芝麻10克，蜂蜜适量。", "steps": "①大米洗净，用清水浸泡30分钟，备用；黑芝麻炒香。②将大米、花生仁一同放入锅内，加清水用大火煮沸后，转小火煮至大米熟透。③出锅晾温后加入蜂蜜调味，撒上炒熟的黑芝麻即可。\n黑芝麻花生粥1碗\n西红柿鸡蛋羹1份\n红糖水1杯\n## 营养好搭配"}, "小米鸡蛋红糖粥": {"ingredients": "小米 50 克，鸡蛋 2 个，红糖适量。", "steps": "①小米洗净，锅中加足清水，烧开后加入小米，待煮沸后改成小火熬煮，直至米烂。②粥里打入鸡蛋，搅散，略煮，出锅前放入红糖即可。\n# 如果你是剖宫产\n因为种种特殊原因需要剖宫产的孕妈妈，一定要摒除心理负担，手术前保持愉快、平静的心情，避免过分的紧张和焦虑，同时在饮食上也要讲究科学、健康。\n## 剖宫产前的饮食原则\n剖宫产的孕妈妈一般都会提前住院，手术前要做一系列检查，以明确孕妈妈和胎宝宝的健康状况，与此同时，在饮食上也要十分讲究。"}, "白萝卜海带汤": {"ingredients": "鲜海带50克，白萝卜100克，盐适量。", "steps": "①海带洗净切成丝；白萝卜洗净去皮切丝。②将海带丝、白萝卜丝一同放入锅中，加适量清水，大火煮沸后转小火煮至海带熟透。③出锅时加盐调味即可。"}, "山药白萝卜粥": {"ingredients": "大米50克，山药、白萝卜各20克。", "steps": "①将山药、白萝卜去皮，洗净，切成小块；大米洗净。②将大米、白萝卜、山药一同放入锅中，加入适量清水，用大火烧沸，再改用小火煮至米粥熟即可。"}, "月子养生水": {"ingredients": "3 瓶米酒。", "steps": "①3瓶米酒倒入锅中，大火煮沸后转小火，熬至剩下1瓶米酒的量。②将熬煮好的米酒盛出，在做饭烧菜和炖汤的时候适量加入即可。\n新妈妈适当进食白萝卜，可促进肠胃蠕动，加快排气。\n分娩\n产后\n第2周"}, "牛奶红枣粥（jinpai）": {"ingredients": "大米50克，牛奶250毫升，红枣2颗。", "notes": "牛奶营养丰富，含有丰富的蛋白质、维生素和矿物质，特别是含有较多的钙，红枣可补血补虚，对产后初期的新妈妈来说，是一道既营养又美味的粥品。"}, "牛奶红枣粥（366）": {"ingredients": "大米50克，牛奶250毫升，红枣3颗。", "steps": "①红枣洗净，取出枣核备用。②大米洗净，浸泡30分钟。③锅内加入清水，放入大米，大火煮沸后转小火煮30分钟，至大米绵软。④加入牛奶和红枣，小火慢煮至牛奶烧开，粥浓稠即可。\n牛奶红枣粥1碗\n+\n蒸南瓜2块\n+\n玉米面发糕1块\n## 营养好搭配"}, "乌鸡糯米粥": {"ingredients": "乌鸡腿100克，糯米50克，葱丝、盐各适量。", "steps": "①乌鸡腿洗净，切块，放入开水锅中汆烫，捞出洗净并沥干。②乌鸡腿放入汤锅中，加适量水，大火煮开后转小火炖煮20分钟。③加入糯米同煮，大火再次煮沸后，转小火煮至糯米软烂。④加入葱丝、盐，盖上锅盖儿焖一下即可。\n营养师建议：糯米可换成大米或将糯米、大米混合熬煮。\n营养配餐：香油猪肝汤1碗、红糖水1杯。\n饮食宜忌：乌鸡补虚，产后初期可适量吃些。"}, "香油猪肝汤": {"ingredients": "猪肝50克，芝麻香油10克，米酒50毫升，老姜片30克。", "steps": "①猪肝洗净沥干，切片。 ②锅内倒芝麻香油，小火煎至油热后加入老姜片略煎。 ③将猪肝片放入锅内大火快速煸炒5分钟，倒入米酒。 ④米酒煮开后，立即取出猪肝。 ⑤米酒用小火煮至完全没有酒味，再将猪肝放回锅中即可食用。\n香油猪肝汤1碗\n煮鸡蛋1个\n黑芝麻米糊1份\n## 营养好搭配"}, "生化汤": {"ingredients": "当归24克，川芎9克，去皮尖的桃仁6克，黑姜、炙甘草各2克，料酒适量。\n①将当归、桃仁、川芎、黑姜、炙甘草和水以1:10的比例一起煎煮，调入适量料酒。②所有原料用小火煮30分钟，取汁去渣，温热服用。", "steps": "营养师建议：一定要遵医嘱服用。\n营养配餐：西红柿面片汤1份、蒸苹果半个。\n饮食宜忌：服用宫缩药期间不宜食用。"}, "鲈鱼豆腐汤": {"ingredients": "去骨鲈鱼1条，豆腐、香菇各20克，姜片、葱花、盐各适量。", "steps": "①将去骨鲈鱼洗净，切块；豆腐切块；香菇洗净，去蒂，切十字刀。②将姜片放入锅中，加清水烧开，加入豆腐块、去骨鲈鱼块、香菇，炖煮至熟，撒上葱花，加盐调味即可。\n鲈鱼豆腐汤 1碗\n+\n南瓜饼 1块\n+\n山楂 2颗\n## 营养好搭配\n## 剖宫产妈妈\n1. 剖宫产妈妈术后6小时内应禁食，待术后6小时后，可以喝些开水，刺激肠道蠕动，等到排气后，才可进食。\n2. 产后第1天，剖宫产妈妈能明显感觉到伤口的疼痛，剧烈的疼痛会影响食欲。当天的饮食应选择流质食物，如热汤、稀粥等。\n3. 新妈妈产后第1天不适合喝猪蹄汤、排骨汤等比较油腻的汤，应喝清淡的蔬菜汤，以开胃排毒。\n4. 剖宫产妈妈要忍着伤口的疼痛，适量翻身、下床活动，促进消化功能的恢复，也有利于防止内脏器官的粘连。"}, "什菌一品煲（jinpai）": {"ingredients": "干香菇30克，猴头菌、草菇、平菇、白菜心各50克，素高汤、葱段、盐各适量。", "notes": "这款素的什菌汤味道香浓，有利于放松因疼痛而变得异常敏感和紧绷的神经，具有很好的开胃作用，很适合产后虚弱、食欲不佳的新妈妈食用。"}, "什菌一品煲（366）": {"ingredients": "面条100克，西红柿、菠菜各50克，鸡蛋1个，盐适量。\n猴头菌、草菇、平菇、白菜心各50克，\n香菇30克，葱段、盐各适量。", "steps": "①西红柿洗净，切块；鸡蛋打匀成蛋液；菠菜洗净，切段。 ②油锅烧热，倒入蛋液炒至成形。 ③锅内留余油，放入西红柿块煸出汤汁，加入清水，烧开后把面条放入，煮至完全熟透。 ④将菠菜段放入锅内，大火再次煮开，出锅时加盐调味。\n这款什菌汤可开胃，很适合产后虚弱、食欲不佳的新妈妈食用。\n①香菇洗净，切十字花刀；平菇洗净，切去根部；猴头菌和草菇洗净后切开；白菜心掰成小棵。②锅内放入清水、葱段，大火烧开。③再放入香菇、草菇、平菇、猴头菌、白菜心，转小火煲10分钟，加盐调味即可。\n西红柿菠菜面1份\n+\n蒸苹果半个\n+\n什锦西蓝花1份\n## 营养好搭配\n什菌一品煲1份\n芝麻烧饼1个\n蒸木瓜半个\n## 营养好搭配\n此粥益气、补虚损、开肠胃，是产后新妈妈极佳的补品。\n芪归炖鸡汤\n## 原料\n此汤有益气活血之效，有利于产后子宫复旧及恶露排出。\n①枸杞洗净；红枣洗净，去核；大米淘洗干净。②将枸杞、红枣和大米放入锅中，加适量清水，用大火烧沸。③再用小火煮30分钟，加入红糖调匀即可。\n益母草木耳汤\n## 做法\n枸杞 10 克，红枣 1 颗，大米 30 克，\n红糖适量。\n## 原料\n公鸡1只，黄芪50克，当归10克，盐适量。\n## 做法\n①将公鸡处理干净，洗净切块；黄芪去粗皮，与当归分别洗净。②砂锅加清水后放入鸡块，烧开后撇去浮沫，加黄芪、当归，用小火炖2小时，加入盐，稍炖即可。\n益母草生新血祛瘀血，与木耳同食具有养阴清热的功效。\n## 原料\n益母草、枸杞各10克，木耳20克，冰糖适量。\n## 做法\n①益母草洗净后用纱布包好，扎紧口；木耳泡发，去蒂洗净，撕成片；枸杞洗净。②锅置火上，放入清水、益母草药包、木耳片、枸杞，中火煎煮30分钟。③出锅前取出益母草药包，放入冰糖调味。\n# 产后第2天 食谱推荐\n## 顺产妈妈\n1. 新妈妈在产后体力虚弱，的确需要好好休息，但是长期卧床不活动也有许多坏处，如无特殊情况，顺产妈妈在产后24小时就可起床下地活动了。\n2. 需要控制盐的摄入量，但是也不能忌盐。"}, "燕麦南瓜粥": {"ingredients": "燕麦 30 克，大米 50 克，南瓜 40 克。", "steps": "①南瓜洗净削皮，切块；大米洗净，清水浸泡半小时。②将大米放入锅中，加适量水，大火煮沸后换小火煮20分钟；然后放入南瓜块，小火煮10分钟；再加入燕麦，继续用小火煮10分钟即可。\n燕麦南瓜粥1碗\n+\n豆包1个\n+\n牛奶1杯\n## 营养好搭配"}, "面条汤卧蛋（jinpai）": {"ingredients": "细面条100克，羊肉50克，鸡蛋1个，葱丝、姜丝、酱油、香油、盐、菠菜叶各适量。", "notes": "面条是北方新妈妈坐月子必备的食物，放入鸡蛋和羊肉、菠菜，其清淡鲜美的味道，会唤起新妈妈的食欲，也能快速补充体力。"}, "面条汤卧蛋（366）": {"ingredients": "面条100克，羊肉50克，鸡蛋1个，\n菠菜段、葱花、姜丝、香油、盐各适量。", "steps": "①羊肉切丝，并用盐、葱花、姜丝和香油拌匀腌制。②水烧开，下入面条，待水将开时，将鸡蛋卧入汤中并转小火。③待鸡蛋熟、面条断生时，加入羊肉丝和菠菜段煮熟即可。\n营养师建议：如果不喜欢羊肉的味道，可以将羊肉换成虾仁或鸡丁。\n营养配餐：香油猪肝汤1份、菠萝汁1杯。饮食宜忌：一次不宜食用太多羊肉。"}, "肉末蒸蛋": {"ingredients": "鸡蛋2个，猪肉50克，葱末、水淀粉、酱油、盐各适量。", "steps": "①将鸡蛋搅散，放入盐和适量清水搅匀，上笼蒸熟。②选用三成肥、七成瘦的猪肉剁成末儿。③锅放火上，放入油烧热，放入肉末，炒至松散出油时，加入葱末、酱油及水，用水淀粉勾芡后，浇在蒸好的鸡蛋羹上即可。\n肉末蒸蛋1份\n+\n花卷1个\n+\n小米粥1碗\n## 营养好搭配"}, "小米桂圆粥（288）": {"ingredients": "小米150克\n桂圆肉40克\n黑糖20克", "steps": "1 小米洗净，用水浸泡1小时以上；桂圆肉用手剥成小瓣，备用。\n2 取电锅，内锅中放入小米和1000毫升的水，外锅倒入300毫升的水，按下开关，蒸至开关跳起，再焖10分钟，即为小米粥。\n3 热锅，倒入煮好的小米粥，放入桂圆肉和黑糖，以小火熬煮至桂圆散发出香气即完成。"}, "小米桂圆粥（366）": {"ingredients": "小米50克，桂圆肉20克，红糖适量。", "steps": "①小米、桂圆肉洗好后，清水浸泡1小时。②将小米、桂圆和泡米水放入锅中，加适量水，大火煮沸后换小火煮30分钟。③最后放入红糖搅拌均匀即可。\n营养师建议：可加入白菜、菠菜，补充维生素。\n营养配餐：花卷1个、清炒菜花1份。\n饮食宜忌：大便干燥者不宜食用。"}, "酒酿鱼汤": {"ingredients": "黄花鱼1条，米酒、姜片、香油各适量。", "steps": "①黄花鱼去鳞、去鳃、去内脏，洗净，切块。②香油倒入锅内，用大火烧热，放入姜片，转小火，煎至姜片两面皱缩。③改大火，加入黄花鱼和米酒煮开，盖上盖儿后转小火，稍煮即可。\n酒酿鱼汤1碗\n+\n煮鸡蛋1个\n+\n素菜包1个\n## 营养好搭配\n## 剖宫产妈妈\n1. 剖宫产妈妈要加强腰肾功能的恢复，多吃羊肉、山药、豆类、蔬菜和坚果等食物。\n2. 多注意休息，不要长时间抱宝宝，一次喂奶时间不要太长，避免久坐。\n3. 因为分娩方式不同，剖宫产妈妈体内的泌乳素要比顺产妇分泌得晚，所以乳汁分泌会相对慢一些，剖宫产妈妈不必焦虑，只要多让宝宝频繁吸吮，乳汁就会顺利产出，满足宝宝的需求。"}, "山药粥（jinpai）": {"ingredients": "大米50克，山药30克，白糖适量。", "notes": "山药可以健脾胃，产后患有胃肠疾病的新妈妈宜多食。产后常食山药粥还具有补气的作用，气虚的新妈妈可经常食用。\n按时排便\n紫菜中丰富的胆碱成分，有增强记忆的作用，还有很好的利尿作用。此汤品清淡可口，符合新妈妈饮食要清淡的原则。\n关注阴道出血量"}, "山药粥（366）": {"ingredients": "大米 30 克，山药 20 克，白糖适量。", "steps": "①大米洗净，用清水浸泡；山药洗净，削皮后切块。②锅内加入清水，将山药块放入锅中，加入大米，同煮成粥。③待大米绵软，加白糖稍煮即可。\n山药粥1碗\n+\n煮鸡蛋1个\n+\n清炒西葫芦1份\n## 营养好搭配"}, "芋头排骨汤（jinpai）": {"ingredients": "牛肉150克，芹菜2棵，酱油、水淀粉、白糖、盐、葱末、姜丝各适量。营养功效：猪排骨中含有丰富的磷酸钙、骨胶原、骨黏蛋白等，可为妈妈提供大量优质钙。\n排骨150克，芋头100克，葱段、姜片、盐各适量。", "steps": "## 产后第10天\n适量运动\n预防感冒咳嗽\n不宜睡软床\n睡觉忌盖过厚\n心情保持舒畅\n定时开窗通风"}, "芋头排骨汤（366）": {"ingredients": "排骨150克，芋头100克，葱段、姜片、盐各适量。", "steps": "①芋头去皮洗净，切块，上锅隔水蒸15分钟；排骨洗净，切段，放入热水中汆烫。②排骨段、姜片、葱段放入锅中，加清水，用大火煮沸，转中火焖煮。③拣出姜片、葱段，小火慢煮，再加入芋头块同煮至熟，加盐调味即可。\n营养师建议：芋头可换成莲藕或玉米。\n营养配餐：千层饼1块、酸奶1杯。\n饮食宜忌：胃肠功能不佳者每次不宜吃过多芋头。"}, "海带豆腐汤": {"ingredients": "1 胡萝卜洗净切丝；豆腐洗净切块；木耳泡发洗净，撕小片；青菜洗净。\n2 肉末加入蛋清后揉成小丸子，在开水中余熟。\n3 面条放入鸡汤中煮熟，放入木耳、青菜、胡萝卜丝、豆腐块和小丸子及盐、香油、葱花煮熟即可。\n面条100克，肉末50克，鸡蛋清1个，木耳、青菜、豆腐、胡萝卜各20克，香油、盐、鸡汤、葱花各适量。海带豆腐汤营养丰富，可帮助新妈妈排毒。\n豆腐100克，海带50克，盐、香油各适量。\n①将豆腐洗净，切成块；海带洗净，切成条。②锅中加入适量清水，放入海带条后用大火煮沸，煮沸后改用中火将海带条煮软。③放入豆腐块，用盐调味，把豆腐煮熟，加入香油即可。"}, "当归生姜羊肉煲": {"ingredients": "羊肉200克，当归2克，姜片30克，葱段、盐、料酒各适量。", "steps": "①羊肉洗净、切块，用热水汆烫，去掉血沫。②当归洗净，在热水中浸泡30分钟，切薄片，浸泡的水不要倒掉。③羊肉块放入锅内，加入姜片、当归片、料酒、葱段和泡过当归的水，炖至羊肉熟烂，加盐调味即可。\n什锦面丰富的食材、清淡的口味，非常合新妈妈的胃口。\n# 产后第3天 食谱推荐\n## 顺产妈妈\n1. 顺产妈妈一般产后当天就开始分泌乳汁了，此时新妈妈要补充足量的蛋白质、碳水化合物、脂肪和水，还要增加丰富的矿物质和维生素，提高乳汁质量，满足宝宝身体发育需要。\n2. 进食月子餐的时候，最好是连肉、菜带汤一起食用。"}, "平菇小米粥（jinpai）": {"ingredients": "米饭200克，猪肝半个，瘦肉50克，胡萝卜半根，洋葱半头，蒜末、水淀粉、盐、白糖、酱油各适量。\n大米、小米各50克，平菇30克，盐适量。\n牛肉 100 克，木耳 30 克，胡萝卜 50 克，菠菜段、香油、酱油、白糖、盐各适量。</td><td style='text-align: center; word-wrap: break-word;'>黑芝麻花生粥\n黑芝麻、花生、大米各 50 克，冰糖适量。</td><td style='text-align: center; word-wrap: break-word;'>胡萝卜牛蒡排骨汤\n排骨 200 克，牛蒡、胡萝卜各 50 克，盐适量。</td></tr><tr><td style='text-align: center; word-wrap: break-word;'>做法：\n1 将牛肉、木耳、胡萝卜均切丝。\n2 用香油、酱油、白糖将牛肉丝腌 30 分钟。\n3 将牛肉放入锅中炒至八成熟后取出。\n4 将木耳、胡萝卜放入锅中翻炒片刻，再放入菠菜段，最后加入牛肉丝烩炒，放盐调味即可。</td><td style='text-align: center; word-wrap: break-word;'>做法：\n1 大米洗净，用清水浸泡 30 分钟，备用。\n2 黑芝麻炒香，碾碎。\n3 将大米、黑芝麻、花生一同放入锅内，加清水用大火煮沸后，转小火再煮至大米熟透。\n4 出锅时加入冰糖调味即可。</td><td style='text-align: center; word-wrap: break-word;'>做法：\n1 排骨洗净，切段备用；牛蒡清理干净，切段备用；胡萝卜洗净，切块备用。\n2 把所有食材一起放入锅中，加清水大火煮开后，转小火再炖 1 小时；出锅时加盐调味即可。</td></tr></table>\n## 产后第4周", "steps": "1 将瘦肉、猪肝洗净，切成片，调入少许酱油、白糖、盐、水淀粉腌10分钟。\n2 将洋葱、胡萝卜洗净，均切成片后用开水烫熟。\n3 锅置火上，放油，下蒜末煸香，放入猪肝、瘦肉略炒；依次放入洋葱片、胡萝卜和盐、酱油，放水煮开，加水淀粉，淋在米饭上即可。\n1 平菇洗净，焯烫后切片；大米、小米分别洗净。\n2 将大米、小米放入锅中，加适量清水大火烧沸，改小火熬煮。\n3 水再沸时放入平菇，下盐调味，再煮 5 分钟即可。\n<table border=1 style='margin: auto; word-wrap: break-word;'><tr><td style='text-align: center; word-wrap: break-word;'>三丝牛肉", "notes": "大米滋阴养胃，可提高人体免疫力；小米滋阴养血；平菇可改善人体新陈代谢，增强体质。\n牛肉含有丰富的维生素 $ B_{6} $，可以增强新妈妈的免疫力。\n黑芝麻中的维生素E具有抗氧化的功能，能够抵抗自由基，保护红血球，降低贫血概率。\n牛蒡含有一种非常特殊的养分——牛蒡苷，有助筋骨发达、增强体力的作用。"}, "平菇小米粥（366）": {"ingredients": "大米、小米各50克，平菇30克，盐适量。", "steps": "①平菇洗净，焯烫后撕成条；大米、小米分别洗净。②将大米、小米放入锅中，加适量清水大火烧沸，改小火熬煮。③待米煮烂时放入平菇条，稍煮片刻，加盐调味即可。\n平菇小米粥 1碗\n+\n馅饼 1个\n+\n香菇肉片 1份\n## 营养好搭配"}, "猪排炖黄豆芽汤": {"ingredients": "猪排 150 克，黄豆芽 50 克，葱段、姜片、盐、料酒各适量。", "steps": "①将猪排洗净后，切成段，放入沸水中汆去血沫。②锅内放入热水，将猪排段、料酒、葱段、姜片一同放入锅内，小火炖1小时。③之后放入黄豆芽，用大火煮沸，再用小火炖15分钟，放入适量盐调味即可。\n营养师建议：加入豆腐同食味道也很好。营养配餐：千层饼1份、酸奶1杯。\n饮食宜忌：黄豆芽最好不要隔夜存放，选用当天新鲜的。"}, "红薯粥（jinpai）": {"ingredients": "新鲜红薯100克，大米50克。\n3 待鸡蛋熟、细面条断生时，加入羊肉丝和菠菜叶略煮即可。", "steps": "1 鸡胸肉洗净后剁成肉泥；鸡蛋取蛋清备用。\n2 把蛋清、鸡肉泥、水淀粉放在一起搅拌。\n3 将嫩豌豆、胡萝卜丁、西红柿丁放入锅中，加清水，待煮沸后改成小火慢炖至豌豆绵软。\n4用筷子把鸡肉拨进锅内，拨成珍珠大小的丸子，待拨完后用大火将汤再次煮沸，出锅前放盐调味。\n1 将红薯洗净，带皮切成块。\n2 大米洗净，用清水浸泡 30 分钟。\n3 将泡好的大米和红薯块放入锅内，大火煮沸后，转小火继续煮，煮成浓稠的粥即可。\n## 产后第4天", "notes": "红薯可益气通乳、润肠通便。红薯中含有大量维生素A，可以预防宝宝由于维生素A缺乏所导致的眼部疾病。红薯不但营养丰富，还是低脂肪、低热量食物，有利于产后瘦身。"}, "红薯粥（366）": {"ingredients": "红薯 50 克，大米 30 克。", "steps": "①将红薯洗净、去皮，切成块。②大米洗净，用清水浸泡30分钟。③将泡好的大米和红薯块放入锅内，大火煮沸后，转小火继续煮。④煮至粥稠即可。\n红薯粥1碗\n+\n清炒苋菜1份\n+\n馒头1个"}, "葡萄干苹果粥": {"ingredients": "①大米洗净，用清水浸泡30分钟；苹果洗净去皮，切成小方丁。②锅内放入大米，与苹果丁一同煮至滚沸，用勺子稍微搅拌一会儿，改用小火熬煮40分钟。③食用时晾温，加入蜂蜜、葡萄干搅匀即可。\n糯米粉100克，南瓜60克，白糖、红豆沙各适量。", "steps": "营养师建议：苹果切丁后立即放在清水里，以免氧化后变色。\n营养配餐：凉拌芹菜1份、煮鸡蛋1个。\n饮食宜忌：对蜂蜜过敏的新妈妈可以换成冰糖。\n南瓜饼\n南瓜能帮助新妈妈排毒并缓解便秘。\n①南瓜去子，洗净，切块，微波炉加热10分钟后挖出南瓜肉，加糯米粉、白糖；和成面团。②将适量红豆沙包入面团中制成饼坯，上锅蒸10分钟即可。\n南瓜饼2块\n+\n西红柿蛋花汤1碗\n+\n山药粥1碗\n营养好搭配\n## 剖宫产妈妈\n1. 剖宫产妈妈多吃些鱼、蔬菜类的汤和饮品，不要着急吃油腻的排骨汤，汤水补得太丰富，会导致乳房内出现硬块。\n2. 不宜依靠服用营养素来代替饭菜，吃多样化的食物才是正确的。\n3. 新妈妈产后前3天刷牙最好采用指漱。指漱就是把食指洗净，或在食指上缠上纱布，然后 $ \\underset{\\cdot}{把} $牙膏挤于手指上充当刷头，像正常刷牙一样在牙齿上来回、上下擦拭，用温水漱口，最后再用手指按压牙龈数遍。"}, "西红柿面片汤": {"ingredients": "西红柿 100 克，面片 50 克，高汤、盐、香油、香菜各适量。", "steps": "①西红柿用热水烫过去皮，切块。\n②炒香西红柿块，炒成泥状后加入高汤烧开，加入面片。③再煮3分钟后，加盐、香油、香菜调味即可。\n西红柿面片汤1碗\n+\n牛肉饼1块\n+\n蒸香蕉1根\n## 营养好搭配"}, "当归鲫鱼汤": {"ingredients": "当归10克，鲫鱼1条，盐适量。", "steps": "①鲫鱼处理好后洗净，切块，在鱼块上涂抹盐后腌一会儿；当归洗净，热水浸泡，切片。②鲫鱼块与当归片一同放入锅内，加入泡过当归的水，炖煮至熟即可。\n营养师建议：也可用公鸡代替鲫鱼。\n营养配餐：馅饼1个、木耳炒鸡蛋1份。\n饮食宜忌：此汤每周食用1次即可，不要过量。"}, "阿胶核桃仁红枣羹": {"ingredients": "阿胶 10 克，核桃仁 15 克，红枣 3 颗。", "steps": "①核桃仁去皮，掰小块；红枣洗净，去核；阿胶砸成块，10克阿胶需加入20毫升的水一同放入瓷碗中，隔水蒸化。②红枣、核桃仁块放入另一只砂锅内加清水慢煮。③将蒸化后的阿胶放入锅内，与红枣、核桃仁略煮即可。\n## 营养好搭配"}, "蔬菜豆皮卷（jinpai）": {"ingredients": "豆皮1张，绿豆芽30克，胡萝卜20克，紫甘蓝40克，豆干50克，盐、香油各适量。", "notes": "此菜含有丰富的维生素 $ B_{1} $、维生素 $ B_{2} $、维生素C、 $ \\beta $-胡萝卜素及多种矿物质，有助于产后新妈妈开胃祛火。"}, "蔬菜豆皮卷（366）": {"ingredients": "豆皮1张，绿豆芽、胡萝卜、紫甘蓝各30克，豆干50克，盐、香油各适量。\n丝瓜100克，金针菇20克，水淀粉、盐各适量。", "steps": "①紫甘蓝、胡萝卜、豆干分别洗净，均切丝；绿豆芽洗净。②将除豆皮外的所有食材用开水焯熟，加盐和香油拌匀。③拌好的原料均匀地放在豆皮上，卷起，入蒸锅蒸熟，放凉后切成小卷即可。\n营养师建议：可加白菜、生菜等，以充分补充维生素。\n营养配餐：干贝冬瓜汤1碗、红豆黑米粥1碗。\n饮食宜忌：不宜过量食用。\n丝瓜金针菇\n丝瓜富含维生素 $ B_{1} $，能增强食欲，缓解疲劳，还能清热通便。\n①丝瓜洗净，去皮，切段，加少许盐腌一下。②金针菇洗净，放入开水中烫一下，迅速捞出并沥干水分。③油锅烧热，放入丝瓜段，快速翻炒几下，放入金针菇同炒，加盐调味。④出锅前加水淀粉勾芡，翻炒均匀即可。\n丝瓜金针菇1碗\n+\n煮鸡蛋1个\n+\n肉丸粥1碗\n## 营养好搭配\n# 产后第4天 食谱推荐\n## 顺产妈妈\n1. 新妈妈产后体内的雌激素会突然降低，很容易产生抑郁的心理，此时应该多吃些鱼肉，鱼肉含有特殊的脂肪酸，有抗抑郁作用。\n2. 骨头汤不宜长时间熬煮，40分钟至1小时就可以了。"}, "香菇红糖玉米粥": {"ingredients": "冬笋、雪菜各20克，黄花鱼1条，葱段、姜片、盐、料酒各适量。", "steps": "此粥能够促进新妈妈的新陈代谢，\n还有助于排出体内瘀血。\n冬笋雪菜黄鱼汤1碗\n米饭1碗\n生菜明虾1份\n## 营养好搭配\n## 原料\n## 做法\n香菇、玉米粒各50克，大米100克，红糖适量。\n①香菇洗净，切丁；玉米粒洗净；大米洗净，浸泡30分钟。②锅置火上，放入大米和适量水，大火烧沸后改小火。③放入香菇丁、玉米粒、红糖继续熬煮，煮至粥黏稠即可。\n香菇红糖玉米粥1碗\n+\n南瓜饼1个\n+\n凉拌菜1份\n## 营养好搭配\n西红柿烧豆腐\n豆腐馅饼\n此菜是身体虚弱、口味欠佳的产后新妈妈不可错过的健康美食。\n干贝冬瓜汤\n## 原料\n豆腐营养丰富，且易消化、热量低，很适合新妈妈食用。\n冬瓜营养价值高，干贝有稳定情绪的作用，有助于新妈妈抗抑郁。\n①西红柿洗净，切块；豆腐切成长方块。②炒锅中放入油，烧热后放入西红柿块炒2分钟。③再放入豆腐块，加入盐和白糖，略炒即可。\n## 做法\n西红柿100克，豆腐50克，盐、白糖各适量。\n## 原料\n面粉100克，豆腐80克，白菜50克，\n姜末、葱末、盐各适量。\n## 做法\n①豆腐、白菜切碎后加入姜末、葱末、盐调成馅。②面粉加水调成面团，擀成面皮，加入馅，做成馅饼。③平底锅烧热，倒入适量油，将馅饼煎至两面金黄即可。\n## 原料\n冬瓜100克，干贝50克，姜片、盐、料酒各适量。\n## 做法\n①将冬瓜去皮、去瓤，洗净，切片。②将干贝洗净，浸泡30分钟，去掉老肉。③干贝放入瓷碗内，加入料酒、水、姜片，隔水用大火蒸30分钟。④冬瓜片、干贝放入锅内，加水煮15分钟。⑤出锅前加盐调味即可。\n营养配餐：西红柿炒鸡蛋1份、花卷1个。\n饮食宜忌：干贝不能与香肠同食。\n## 剖宫产妈妈\n1. 剖宫产妈妈的伤口一天天愈合，这期间要避免发生感染，多吃富含维生素C和维生素E的食物，加快伤口的愈合。\n2. 剖宫产妈妈的伤口需要按时间换敷料，注意检查有无渗血或红肿。\n3. 年轻的剖宫产妈妈多少有点“娇气”，术后麻醉药作用消退时，会感觉到伤口出现疼痛，并逐渐强烈。此时，新妈妈最好不要再用止痛药物，因为它会影响肠蠕动功能的恢复，也不利于哺乳。为了宝宝，新妈妈忍一忍，这种疼痛很快就会过去的。"}, "鱼头海带豆腐汤": {"ingredients": "鱼头1个，海带、豆腐各100克，葱段、姜片、盐、料酒各适量。", "steps": "①鱼头去鳃，切开洗净；豆腐切块；海带切长段。②鱼头、葱段、姜片、料酒放入锅内，加适量清水，开大火煮沸。③改小火炖至鱼头快熟时，放入豆腐块和海带段，炖至熟透，放适量盐调味即可。\n鱼头海带豆腐汤1碗\n清炒荷兰豆1份\n包子1个\n## 营养好搭配"}, "虾仁馄饨": {"ingredients": "虾仁、猪肉各50克，胡萝卜30克，\n馄饨皮10张，盐、葱花、香油、葱段、姜片、香菜叶各适量。", "steps": "①将虾仁、猪肉、胡萝卜、葱段、姜片放在一起剁碎，加入香油、盐拌匀。②把做成的馅料分成10份，包入馄饨皮中。③馄饨煮熟，盛入碗中，再加盐、葱花、香油、香菜叶调味即可。\n营养师建议：对虾过敏的新妈妈可用豆腐来代替。\n营养配餐：凉拌芹菜1份、煮鸡蛋1个。\n饮食宜忌：海鲜过敏者应避免食用。"}, "南瓜牛腩饭": {"ingredients": "南瓜200克，牛肉100克，米饭1碗，胡萝卜50克，高汤、盐各适量。", "steps": "1牛肉、南瓜、胡萝卜分别洗净切丁。\n2牛肉丁放入锅中，用高汤煮至八成熟，加入南瓜丁、胡萝卜丁、盐，煮至全部熟软，浇在米饭上即可。\n南瓜牛腩饭1碗\n拌豆芽1份\n蛋花汤1碗\n## 营养好搭配"}, "豆浆莴笋汤": {"ingredients": "莴笋100克，豆浆200毫升，姜片、葱段、盐各适量。", "steps": "①将莴笋去皮洗净，切条。②油锅烧热，放姜片、葱段，煸炒出香味，放入莴笋条，大火翻炒一下。③拣去姜片、葱段，倒入豆浆，加盐煮熟即可。\n营养师建议：可将豆浆换成牛奶。\n营养配餐：什锦面1份、蒸苹果半个。\n饮食宜忌：不能添加蜂蜜食用。"}, "香蕉百合银耳汤（jinpai）": {"ingredients": "干银耳10克，鲜百合50克，香蕉1根，冰糖10克。", "notes": "香蕉对失眠或情绪紧张有一定的疗效，因为香蕉富含色氨酸和维生素 $ B_{6} $，它们是合成血清素的重要成分，具有安抚神经的效果。"}, "香蕉百合银耳汤（366）": {"ingredients": "银耳20克，鲜百合50克，香蕉30克，冰糖适量。", "steps": "①将银耳泡发2小时，择去老根，撕成小朵，放碗中，以1:4的比例加入清水，入蒸锅蒸30分钟。2鲜百合剥开洗净，去老根；香蕉切片。3将蒸好的银耳与鲜百合、香蕉片放入锅中，加清水，用中火煮，出锅时加入冰糖，待冰糖化开即可。\n香蕉百合银耳汤1碗\n+\n虾皮小油菜1份\n+\n素菜包1个\n## 营养好搭配\n# 产后第5天 食谱推荐\n## 顺产妈妈\n1. 新妈妈照顾宝宝耗费了很多精力，睡眠质量会下降，应适量选择有助于调节神经功能的食物，如蛤蜊、虾、红枣、核桃、苹果、紫菜、豌豆、牛奶等。\n2. 新妈妈要建立新的有规律的生活节奏，定时休息与进餐。"}, "蛤蜊豆腐汤": {"ingredients": "蛤蜊200克，豆腐100克，香油、姜片、盐各适量。", "steps": "①在清水中滴入少许的香油，将蛤蜊放入，让蛤蜊彻底吐净泥沙，冲洗干净；豆腐切丁。②锅中放水、盐和姜片煮沸，把蛤蜊和豆腐丁一同放入。③转中火煮至蛤蜊张开壳，豆腐熟透后即可。\n蛤蜊豆腐汤 1碗\n+\n肉片炒蘑菇 1份\n+\n米饭 1碗\n## 营养好搭配"}, "荔枝红枣粥": {"ingredients": "鲜荔枝30克，红枣2颗，大米100克。", "steps": "①大米淘洗干净，清水浸泡30分钟；鲜荔枝去壳、去核，取肉，洗净；红枣洗净。②将大米与荔枝肉、红枣同放锅内，加清水，用大火煮沸，然后转小火煮至米烂粥稠即可。\n营养师建议：粥中还可加入小米和燕麦同煮。\n营养配餐：海米紫菜汤1碗、菜心炒猪肝1份。\n饮食宜忌：荔枝不可过多食用。"}, "胡萝卜小米粥（jinpai）": {"ingredients": "胡萝卜半根，小米100克。", "notes": "小米是色氨酸含量很高的食物，具有安神助眠的作用。睡前半小时适量进食小米粥，能使新妈妈更好地入睡。"}, "胡萝卜小米粥（366）": {"ingredients": "小米、胡萝卜各50克。", "steps": "①小米淘洗干净；胡萝卜洗净，切丁。\n②将小米和胡萝卜丁放入锅中，加适量清水，大火煮沸，转小火煮至胡萝卜绵软、小米开花即可。\n胡萝卜小米粥1碗\n煮鸡蛋1个\n清炒苋菜1份\n## 营养好搭配"}, "紫菜鸡蛋汤（jinpai）": {"ingredients": "鸡蛋1个，紫菜10克，虾皮、葱花、盐、香油各适量。", "steps": "1 将大米洗净，用清水浸泡 30 分钟。\n2 将山药洗净，削皮后切成块。\n3 锅内加入清水，将山药放入锅中，加入大米，同煮成粥。\n4 待大米绵软，再加白糖煮片刻即可。\n1 先将紫菜切（撕）成片状；鸡蛋打匀成蛋液，在蛋液里放一点盐，搅匀，备用。\n2 锅里倒入清水，待水煮沸后放入虾皮略煮，再倒入鸡蛋液，搅拌成蛋花；放入紫菜，用中火再继续煮3分钟。\n3 出锅前放入盐调味，撒上葱花，淋入香油即可。\n## 产后第3天\n自行排尿"}, "紫菜鸡蛋汤（366）": {"ingredients": "鸡蛋1个，紫菜10克，虾皮、香菜、盐、香油各适量。", "steps": "①将紫菜撕成片状；鸡蛋打匀成蛋液，加盐后搅匀。②锅里倒入清水，水沸后放入虾皮略煮，再倒入鸡蛋液，搅拌成蛋花，放入紫菜片，用中火煮3分钟。③出锅前放入盐，撒上香菜，淋入香油即可。\n营养师建议：汤中可加些白菜或油菜。\n营养配餐：豆腐丝1碗、猪肉饼1块。\n饮食宜忌：患有甲亢的新妈妈不宜过多食用。"}, "木瓜牛奶露": {"ingredients": "木瓜100克，牛奶250毫升，冰糖适量。", "steps": "①木瓜洗净，去皮、去子，切成块。\n②木瓜块放入锅内，加适量的水，水没过木瓜即可，大火熬煮至木瓜熟烂。③放入牛奶和冰糖，与木瓜一起调匀，再煮至汤微沸即可。\n木瓜牛奶露1碗\n蛋炒饭1碗\n干煸肉末四季豆1份\n## 剖宫产妈妈\n1. 剖宫产妈妈失血过多，血虚肝郁，也容易出现睡眠障碍，可以每晚睡前补充1杯牛奶或是1碗小米粥，帮助顺利入睡。\n2. 新妈妈不宜用豆制品来替代牛奶。\n3. 为了更好地保护剖宫产伤口，新妈妈可以选择大一号的高腰内裤或平脚内裤，它们会让你的伤口感觉更舒服，而且最好每天更换一次。这是因为剖宫产产后抵抗力下降，若不注意卫生极易引起感染。"}, "银鱼苋菜汤": {"ingredients": "## 营养好搭配\n银鱼30克，苋菜100克，蒜末、姜末、盐各适量。\n①银鱼洗净、沥干水分；苋菜洗净，切成3厘米长的段。②油锅烧热，将蒜末和姜末爆香后，放入银鱼快速翻炒半分钟，再加入苋菜段，炒至微软。③锅内加入清水，大火煮5分钟，出锅前放入盐调味即可。\n银鱼苋菜汤1碗\n芝麻烧饼1个\n蒸木瓜半个\n## 营养好搭配\n南方新妈妈坐月子的一道当家补品，有通乳下奶功效。\n西红柿能提升免疫力，可开胃排毒，增强抗病能力。\n虾皮鸡蛋羹\n虾皮能提高新妈妈的食欲，增强体质。\n## 原料\n红豆 50 克，糯米酒 200 毫升，鸡蛋 1 个，红糖适量。\n## 做法\n①红豆洗净，用清水浸泡1小时；鸡蛋打散成蛋液。②将浸泡好的红豆和清水一同放入锅内，用小火将红豆煮烂。③糯米酒倒入煮烂的红豆汤内，烧开。④倒入鸡蛋液，待鸡蛋凝固熟透后，加入适量红糖即可。\n## 原料\n西红柿100克，菠菜50克，鸡蛋1个，盐、香油各适量。\n## 做法\n①将西红柿洗净切片；菠菜洗净切段；鸡蛋打散。②锅中热油后，放入西红柿片煸出汤汁，加适量水烧开。③放入菠菜段、蛋液、盐，再煮3分钟，出锅时滴入香油即可。\n## 原料\n鸡蛋1个，青菜30克，虾皮5克，\n香油、盐各适量。\n## 做法\n①青菜洗净，切碎；虾皮洗净，沥干水。②鸡蛋打散，加温水打匀，加入青菜碎、虾皮、盐搅匀。③蒸锅隔水蒸15分钟左右，出锅时滴入香油即可。\n# 产后第6天 食谱推荐\n## 顺产妈妈\n1. 新妈妈觉得浑身没劲，这时要增加食物的多样性，变化烹饪方式，争取多摄入一些高蛋白、高热量、低脂肪有利于吸收的食物。\n2. 新妈妈如果厌食，家人要多加爱护，营造愉悦的进餐环境。", "steps": "鸡胸肉100克，玉米粒50克，鸡蛋1个，盐适量。\n1 将玉米粒洗净；鸡胸肉洗净，切成小丁；鸡蛋打散。2 把玉米粒、鸡肉丁放入锅中，加适量清水大火煮开，撇出浮沫，加盖转中火再煮 30 分钟。3 将蛋液沿着锅边倒入，一边倒入一边搅动。4 大火烧开将蛋液煮熟，放盐调味即可。\n银鱼富含蛋白质、钙、磷，可滋阴补虚劳，还可让宝宝的头发更浓密。\n鸡蓉玉米羹1碗\n+\n三明治1个\n+\n虾皮豆腐1份"}, "冰糖五彩玉米羹": {"ingredients": "玉米粒100克，豌豆30克，鸡蛋2个，菠萝20克，枸杞15克，冰糖、水淀粉各适量。", "steps": "①将玉米粒、豌豆、枸杞分别洗净；菠萝洗净，切丁。②锅中加入适量水，将玉米粒倒入，煮熟烂，放入菠萝丁、豌豆、枸杞、冰糖，同煮5分钟，用水淀粉勾芡，使汁变浓。③将鸡蛋打碎，撒入锅内成蛋花，烧开后即可食用。"}, "当归红枣牛筋花生汤": {"ingredients": "牛蹄筋100克，花生30克，红枣5颗，当归5克，盐适量。", "steps": "①牛蹄筋去掉肉皮，浸泡后洗净，切成细条；花生、红枣洗净。②当归洗净，放进热水中浸泡30分钟，取出切薄片。③砂锅加清水，放入所有食材，炖至牛蹄筋烂熟，加盐调味即可。\n营养师建议：牛蹄筋不易熟烂，可以用高压锅煮制。\n营养配餐：清炒芥蓝1份、黑芝麻米饭1碗。\n饮食宜忌：一次食用不宜过多。"}, "西蓝花鹌鹑蛋汤（jinpai）": {"ingredients": "西蓝花100克，鹌鹑蛋4个，鲜香菇5朵，火腿、西红柿各50克，盐适量。", "notes": "鹌鹑蛋是一种很好的滋补品，可补五脏、通经活血、强身健脑、补益气血。\n黑米有滋阴补肾、补胃暖肝、明目活血的功效，还可以帮助产后妈妈治疗头晕目眩、贫血等症。"}, "西蓝花鹌鹑蛋汤（366）": {"ingredients": "香菇2朵，西蓝花150克，圣女果2个，鹌鹑蛋2个，高汤、盐各适量。", "steps": "①西蓝花洗净，切小朵；鹌鹑蛋煮熟，剥皮待用；香菇洗净，划出花刀；圣女果洗净。②锅中加适量高汤烧开，放入所有食材，同煮至熟，加盐调味即可。\n西蓝花鹌鹑蛋汤1碗\n+\n南瓜饼1块\n+\n蒸香蕉1根\n## 营养好搭配"}, "三 文鱼粥": {"ingredients": "三文鱼、大米各50克，盐适量。", "steps": "①三文鱼洗净，剁成鱼泥；大米洗净，浸泡30分钟。②锅置火上，放入大米和适量水，大火烧沸后改小火，熬煮成粥。③待粥煮熟时，放入鱼泥，加盐调味，略煮片刻即可。\n营养师建议：可做成三文鱼意大利面。营养配餐：香菇油菜1份、葱花饼1块。饮食宜忌：三文鱼一定要煮熟透。"}, "四 物炖鸡汤": {"ingredients": "乌鸡1只，当归、白芍、熟地各10克，川芎6克，盐、姜片、葱段、绍酒各适量。", "steps": "①将乌鸡处理好，洗净，入沸水中氽烫，再入清水洗净。②当归、川芎、白芍：熟地洗净，分别切片，做成药包。③锅置火上，放入乌鸡和药包，汤沸后，撇去浮沫，再加姜片、葱段、绍酒，小火炖至鸡肉和骨架变软，加盐调味，除去药包即可。\n四物炖鸡汤1碗\n+\n清炒鸡毛菜1份\n+\n馒头1个\n## 营养好搭配\n## 剖宫产妈妈\n1. 宝宝体重开始增加，哺乳妈妈也需要补充更丰富的营养来供给宝宝，可以增加些肉类、甜点等，注意粗细搭配，品种多样。\n2. 新妈妈在产前没有吃过的食物应谨慎选择，以免出现食物过敏情况。\n3. 剖宫产后新妈妈应避免食用深色素的食物，以免瘢痕颜色加深。应该多吃些水果、瘦肉等富含维生素C、维生素E的食物，有淡化色素、减淡瘢痕的作用。\n4. 香油中富含不饱和脂肪酸，能促使子宫收缩和恶露排出，还有软便作用，可预防新妈妈便秘。"}, "香菇山药鸡": {"ingredients": "山药100克，鸡腿150克，干香菇6朵，料酒、酱油、白糖、盐各适量。", "steps": "①山药洗净，去皮，切厚片；干香菇用温水泡软，去蒂，切块。②将鸡腿洗净，剁块，汆烫，去血水后冲净。③鸡腿块、香菇放入锅内，放入料酒、酱油、白糖、盐和适量水同煮。④开锅后转小火，10分钟后放入山药片，煮至汤汁稍干即可。\n香菇山药鸡1份\n+\n清炒空心菜1份\n+\n花卷1个\n## 营养好搭配"}, "鲜滑鱼片粥（288）": {"ingredients": "白米饭150克 鲈鱼片100克 豆皮\n40克 盐5克 姜丝10克 葱花10\n克 胡椒粉5克 芝麻油5毫升", "steps": "1 豆皮用热水烫软后冲洗净，再切片。\n2 姜丝放入沸水中，再加入白米饭。\n3 煮至米粒软化时，放入鱼片、豆皮、盐、葱花、芝麻油，煨煮至食材熟透。\n4 起锅后，加入胡椒粉调味即可。"}, "鲜滑鱼片粥（366）": {"ingredients": "草鱼净肉100克，大米30克，猪骨50克，腐竹15克，淀粉、盐、姜丝各适量。", "steps": "①猪骨、大米、腐竹分别洗净，放入砂锅，加水用大火烧开，然后用小火慢熬，放入盐调味，拣出猪骨。②将草鱼净肉切成片，用盐、淀粉、姜丝拌匀，倒入滚开的粥内即可。\n营养师建议：根据新妈妈的口味，草鱼换成其他的淡水鱼也可以。\n营养配餐：芝麻烧饼1个、香菇油菜1份。\n饮食宜忌：宜将猪骨敲碎，更有利于营养物质渗出。"}, "西葫芦饼": {"ingredients": "西葫芦 250 克，面粉 150 克，鸡蛋 2 个，盐适量。", "steps": "①鸡蛋打散，加盐调味；西葫芦洗净，切丝。②将西葫芦丝和面粉放入蛋液中，搅拌均匀做成面糊。如果面糊稀了就加适量面粉，如果稠了就加蛋液。③油锅烧热，倒入面糊，煎至两面金黄即可。\n西葫芦饼2块\n甜椒鸡丁1份\n核桃2个\n## 营养好搭配"}, "莲藕炖牛腩": {"ingredients": "脑100克，红豆30克，", "steps": "①牛腩洗净，切块；莲藕洗净，去皮，切块；红豆洗净，用清水浸泡30分钟。②牛腩块放入热水中略煮一下，取出后再过冷水，洗净，沥干。③将牛腩块、莲藕块、红豆、姜片放入砂锅内，加清水用大火煮开。④转小火慢煲牛腩至熟烂，拣去姜片，加盐调味即可。\n营养师建议：可以用白萝卜、西红柿或土豆代替莲藕。\n营养配餐：小蛋糕1个、凉拌黄瓜1份。\n饮食宜忌：宜用砂锅，莲藕遇铁会变黑。"}, "香油芹菜": {"ingredients": "芹菜100克，当归2片，枸杞、盐、香油各适量。", "steps": "①当归加水熬煮5分钟，滤渣取汁备用。 ②芹菜择洗干净，切段，在沸水中焯过；枸杞用凉开水浸洗10分钟。 ③芹菜用盐和当归水腌片刻，再放入少量香油，腌制入味后盛盘，撒上枸杞即可。\n香油芹菜1份\n+\n山楂糕1份\n+\n黑芝麻米糊1碗\n## 营养好搭配\n# 产后第7天 食谱推荐\n## 顺产妈妈\n1. 新妈妈早餐要吃好，不能因为夜里起来喂奶、早晨起得晚就不吃早餐，而且这时的早餐要比平时更营养，不要破坏饮食规律。\n2. 在食用肉类、动物肝脏、蛋类、奶类及鱼类食物时应烧熟煮透，以免引起腹泻等后果。"}, "莲子猪肚汤": {"ingredients": "猪肚 150 克，莲子 30 克，淀粉、姜片、盐、料酒各适量。", "steps": "①莲子洗净去心，用清水浸泡30分钟；猪肚用淀粉和盐反复揉搓，用水冲洗干净。②将猪肚放在沸水中煮一会儿，切成段。③将猪肚段、莲子、姜片、料酒一同放入锅内，加清水煮沸，撇去浮沫。④转小火继续炖1小时，加盐调味。\n莲子猪肚汤1碗\n+\n香菇油菜1份\n+\n米饭1碗\n## 营养好搭配"}, "蒜香空心菜": {"ingredients": "空心菜200克，蒜末、白糖、盐、香油各适量。", "steps": "①将空心菜洗净，切成段。②水烧开，放入空心菜，烫熟后捞出沥干。③将蒜末、白糖、盐和少量水调匀后，浇入热香油，拌成调味汁，将调味汁和空心菜段拌匀即可。\n营养师建议：空心菜焯水的时间不宜太长，以免营养流失。\n营养配餐：木樨肉1份、花生黑米粥1碗。饮食宜忌：蒜末不宜久放，否则会有异味。"}, "红枣板栗粥": {"ingredients": "板栗5个，红枣6颗，大米100克。", "steps": "①板栗煮熟后去皮；红枣洗净，去核。\n②大米洗净，用清水浸泡30分钟。\n③将大米、煮熟后的板栗、红枣放入锅中，加清水煮沸后，转小火煮至大米熟透即可。\n红枣板栗粥1碗\n+\n肉片炒蘑菇1份\n+\n素菜包1个\n## 营养好搭配"}, "糖醋莲藕": {"ingredients": "莲藕200克，葱末、白糖、醋、料酒、香油、盐各适量。", "steps": "①莲藕去节，去皮，切成薄片，用水冲洗干净。②油锅烧热，放入葱末略煸，倒入藕片翻炒，放入料酒、盐、白糖、醋，继续翻炒。③藕片熟透后，淋入香油即可。\n营养师建议：莲藕和大米熬粥喝也不错。营养配餐：当归生姜牛肉煲1份、南瓜玉米馒头1个。\n饮食宜忌：藕性凉，不宜生食。"}, "芒果西米露": {"ingredients": "西米100克，芒果50克，牛奶200毫升，蜂蜜适量。", "steps": "①锅中加水煮沸，放入西米，中大火煮10分钟后，关火闷15分钟，取出冲凉。·②锅中换水煮沸，放入冲凉的西米，中大火煮5分钟后，关火再闷15分钟。③芒果洗净去皮，切丁，放入碗中，再放入蜂蜜、西米、牛奶，搅拌均匀即可。\n芒果西米露1碗\n+\n什锦面1份\n+\n腰果6颗\n## 营养好搭配\n## 剖宫产妈妈\n1. 剖宫产妈妈如果感觉伤口很痒，伤口周围皮肤红红的，这种情况可能是瘢痕体质或者手术缝合线过敏造成的，应该请医生检查伤口的愈合情况。\n2. 饭后不宜马上吃水果或甜食，否则，影响消化吸收。\n3. 剖宫产术后拆线时间根据伤口不同而定，如果新妈妈身体没有异常，横切口的新妈妈一般术后5天拆线，纵切口的新妈妈术后7天拆线。但如果是比较胖的新妈妈，腹压会比较高，就要延长拆线时间了，具体时间应遵从医生建议，以免拆线过早，引起伤口裂开。"}, "三 丝黄花羹": {"ingredients": "干黄花菜20克，香菇2朵，冬笋、胡萝卜各25克，盐、白糖各适量。", "steps": "①将干黄花菜浸入温水中泡软，洗净，沥干；香菇、冬笋、胡萝卜均洗净，切丝。②油烧至七成热，放入所有食材快速煸炒。③加入适量清水、盐、白糖，用小火煮至黄花菜入味，完全熟透。\n三丝黄花羹1碗\n+\n清蒸鲈鱼1份\n+\n米饭1碗\n## 营养好搭配"}, "三 丁豆腐羹": {"ingredients": "豆腐100克，鸡胸肉50克，西红柿20克，豌豆、盐、香油各适量。", "steps": "①将豆腐切成块，在沸水中煮1分钟。②鸡胸肉洗净，西红柿洗净去皮，都切成小丁。③将所有食材放入锅中，大火煮沸后，转小火煮20分钟。④出锅时加入盐，淋上香油即可。\n营养师建议：可以加些海带同煮。\n营养配餐：煮鸡蛋1个、牛奶1杯。\n饮食宜忌：脾胃虚寒的新妈妈不宜吃太多豆腐。"}, "腐竹玉米猪肝汤": {"ingredients": "腐竹、玉米粒各20克，猪肝50克，盐适量。", "steps": "①腐竹泡发，洗净，切段。②猪肝洗净，稍烫一下后冲洗干净，切薄片，用少许盐腌制。③将腐竹段、玉米粒放入锅中，大火煮沸后，转小火慢炖1小时。④放入猪肝片，大火煮10分钟，出锅前放盐调味。\n腐竹玉米猪肝汤1碗\n+\n西芹百合1份\n+\n花卷1个\n## 营养好搭配"}, "香菇油菜（jinpai）": {"ingredients": "香菇5朵，油菜100克，盐、白糖、葱花、姜末、香油、高汤、水淀粉各适量。", "steps": "1 将糙米清洗后加水浸泡约1小时；将糙米、虾仁洗净一同放入锅中。\n2 加入 2 碗水，用中火煮 15 分钟成粥状。\n1 红小豆洗净，浸泡一夜，再将浸泡的水去掉，用清水冲几遍。\n3 丝瓜洗净，放入已煮好的粥内，煮六七分钟，加少许盐调味即可。\n2 锅中放入适量水，再放入红小豆，煮至八成熟。\n3 把煮好的红小豆和汤一起倒入淘洗干净的大米中，蒸熟即可。\n1 油菜洗净，从中间对半切开，再下沸水锅中焯透。\n2 香菇泡发后，去杂质，一切两半，备用。\n3 在锅中将葱花、姜末爆香，加入白糖、香菇、油菜煸炒，再加入少许高汤和盐，用水淀粉勾芡，淋上香油即可。\n## 产后第41天", "notes": "此菜含有蛋白质、维生素和钙、磷、铁等矿物质以及丰富的膳食纤维。"}, "香菇油菜（366）": {"ingredients": "干香菇6朵，油菜250克，盐适量。\n莴笋100克，猪肉50克，蒜末、料酒、酱油、盐各适量。", "steps": "①油菜洗净，切段，梗、叶分开放置。\n②干香菇用温开水泡开，洗净后去蒂。③油锅烧热，放入香菇和泡香菇的水炒至香菇将熟。④放入油菜梗炒软，放入油菜叶、盐炒熟即可。\n营养师建议：油菜宜大火快炒，这样可以减少营养成分流失。\n营养配餐：土豆炖牛腩1份、鸡蛋面1碗。\n饮食宜忌：熟油菜过夜后不宜再吃。\n莴笋肉片\n莴笋能增进食欲、利尿通乳、防治贫血，还可以提高睡眠质量。\n①莴笋去皮洗净，切菱形片；猪肉切片待用。②锅中倒油烧热，放蒜末炒香，倒入肉片大火煸炒发白，加点料酒和酱油继续翻炒1分钟。③倒入莴笋片，大火翻炒2分钟，出锅时加盐调味即可。\n莴笋肉片1份\n+\n菠菜蛋花汤1碗\n+\n米饭1碗\n## 营养好搭配\n产后第2周：补血补钙"}, "阿胶核桃仁红枣粥": {"ingredients": "大米100克，阿胶、核桃仁各10克，红枣4颗。", "steps": "①核桃仁掰小块；红枣洗净；大米煮成粥。②阿胶砸成碎块，放入瓷碗中，加入10毫升水，蒸化。③红枣、核桃仁块放入另一只砂锅内加清水用小火慢煮20分钟。④将阿胶和大米粥放入锅内，与红枣、核桃仁再同煮5分钟即可。\n阿胶核桃仁红枣粥1碗\n+\n煮鸡蛋1个\n+\n苹果1个\n## 营养好搭配"}, "羊肉汤": {"ingredients": "羊肉100克，胡萝卜50克，姜片、盐、葱花各适量。", "steps": "①将羊肉洗净，切块，胡萝卜洗净，切花朵小片。②将胡萝卜片、羊肉块放入锅内并加入适量清水大火烧开。③加入姜片改用小火炖1小时左右，等到肉熟烂，加入盐和葱花调味即可。\n营养师建议：将羊肉汤稍稍炖得久一些，\n膻味就没了，只有浓浓的鲜香。\n营养配餐：清炒苦瓜1份、米饭1碗。\n饮食宜忌：宜连汤带肉吃。"}, "虾皮烧豆腐": {"ingredients": "豆腐150克，虾皮20克，酱油、盐、白糖、葱花、姜末、水淀粉各适量。\n①豆腐切片，焯水；虾皮洗净。②炒锅内放入姜末和虾皮爆香，倒入豆腐片，加入酱油、白糖、盐、适量水，烧沸，最后用水淀粉勾芡，撒上葱花即可。", "steps": "虾皮烧豆腐1份\n包子1个\n紫菜汤1碗\n## 营养好搭配"}, "糖醋白菜（288）": {"ingredients": "白菜300克\n胡萝卜50克\n白糖5克\n盐10克\n酱油15毫升\n醋5毫升\n生粉5克", "steps": "1 白菜、胡萝卜均洗净后切成斜片。\n2 将白糖、醋、盐、酱油、生粉混和，做成糖醋汁备用。\n3 油锅烧热，先煸白菜，再放入胡萝卜，待食材熟烂后将糖醋汁倒入，翻炒均匀即可。"}, "糖醋白菜（366）": {"ingredients": "白菜帮200克，胡萝卜100克，淀粉、白糖、醋、酱油各适量。", "steps": "①将白菜帮、胡萝卜洗净，斜刀切片。②将淀粉、白糖、醋、酱油搅拌均匀，当作糖醋汁，备用。③油锅烧热，放入胡萝卜片煸炒，然后放入白菜片，炒至熟烂。④倒入糖醋汁，翻炒几下即可。\n营养师建议：白菜不宜用煮、焯、浸烫后挤汁的烹调方法，以避免营养成分的大量流失。\n营养配餐：紫菜汤1碗、蛋卷2个。\n饮食宜忌：不能食用腐烂的白菜。"}, "黑芝麻米糊（jinpai）": {"ingredients": "大米20克，莲子10克，黑芝麻15克，水适量。", "notes": "莲子有养心益肾的功效；黑芝麻的含钙量是牛奶的4倍，缺钙的新妈妈可以经常食用。"}, "黑芝麻米糊（366）": {"ingredients": "大米20克，莲子10克，黑芝麻15克。", "steps": "①将大米洗净，浸泡3小时；莲子、黑芝麻均洗净。②少量黑芝麻炒熟；将大米、莲子、其余黑芝麻放入豆浆机中，加水至上下水位线之间，按“米糊”键，加工好后倒出，撒上炒熟的黑芝麻即可。\n黑芝麻米糊1份\n饼干2块\n腰果5颗\n## 营养好搭配\n## 剖宫产妈妈\n1. 产后第8天，剖宫产妈妈的伤口开始慢慢长肉，新妈妈有时会感觉非常痒，切记不可抓挠。\n2. 铜能维持神经系统的正常功能，有助于代谢，可以吃些动物肝脏、猪肉、油菜等含铜较高的食物。\n3. 新妈妈不宜饮用咖啡和碳酸饮料。咖啡会使人体的中枢神经系统兴奋。虽然没有证据表明它对宝宝有害，但也同样会引起宝宝神经系统兴奋，它含有的咖啡因成分会通过乳汁导致宝宝烦躁不安。碳酸饮料则会使哺乳妈妈体内的钙流失。"}, "猪肝粥": {"ingredients": "猪肝20克，大米、菠菜各30克。", "steps": "①猪肝洗净，切片；大米淘洗干净。\n②将菠菜洗净，切段，用开水焯烫。\n③大米、菠菜段放入锅中，小火煮至七成熟。④放入猪肝片，煮至熟透即可。\n猪肝粥1碗\n+\n莲藕炖牛腩1份\n+\n馒头1个\n## 营养好搭配"}, "排骨面": {"ingredients": "排骨250克，面条80克，葱段、姜片、盐各适量。", "steps": "①排骨洗净，剁成长段。②油锅烧热，放入葱段、姜片炒香。③放入排骨段，加盐煸炒至变色，加水，大火煮沸。④另起锅，加水煮沸，放入面条，煮熟后捞出，倒入排骨和汤汁即可。\n营养师建议：可以加莲藕块一起煮。\n营养配餐：蒜香空心菜1份、香蕉1根。\n饮食宜忌：盐不宜多放，宜口味清淡。"}, "鸡肉扒油菜": {"ingredients": "鸡肉150克，油菜200克，牛奶、水淀粉、料酒、葱末、盐各适量。", "steps": "①将油菜洗净，切成长段。②鸡肉洗净，切成长块，放入开水中汆烫，捞出。③油锅烧热，放入葱末炒香，然后放鸡肉块、油菜段翻炒。④放入牛奶、料酒、盐，大火烧开，用水淀粉勾芡即可。\n鸡肉扒油菜1份\n+\n枸杞黑芝麻糊1碗\n+\n素菜包1个\n## 营养好搭配"}, "银耳羹": {"ingredients": "银耳50克，樱桃、草莓、核桃仁、冰糖、水淀粉各适量。", "steps": "①银耳泡发，洗净，撕小朵；樱桃、草莓洗净，草莓切两半；核桃仁洗净。\n②银耳加水，大火烧开，转小火煮半小时，放入冰糖，稍煮片刻。③放入樱桃、草莓、核桃仁，煮开后用水淀粉勾芡，关火，晾温即可食用。\n营养师建议：可以加红枣一起煮。\n营养配餐：红烧豆腐1份、米饭1碗。\n饮食宜忌：切忌食用隔夜银耳。"}, "芥菜干贝汤": {"ingredients": "芥菜250克，干贝50克，鸡汤、香油、盐各适量。", "steps": "①芥菜洗净，切段；干贝用温水浸泡1小时。②干贝洗净，加水煮软，拆开干贝肉。③锅中加鸡汤、芥菜段、干贝肉大火熬煮，煮熟后加香油、盐调味即可。\n芥菜干贝汤1碗\n炒猪腰1份\n花卷1个\n## 营养好搭配"}, "豌豆小米粥": {"ingredients": "木瓜20克，牛肉100克，盐适量。豌豆含大量优质蛋白，能提高新妈妈机体抗病能力和康复能力。", "steps": "豌豆 30 克，小米 50 克，红糖适量。\n①将木瓜洗净，去皮去子，切成块。\n②牛肉洗净，切块，再放入沸水中除去浮沫，捞出。③将木瓜块、牛肉块加水用大火烧沸，再用小火炖至牛肉烂熟后，加盐调味即可。\n①将豌豆、小米用清水洗净，备用。\n②锅中放入清水，放入小米，烧沸。\n③改用小火，煮沸20分钟，放入豌豆。\n④熬至豌豆、小米熟烂浓稠，加入红糖调味即可。\n木瓜煲牛肉1碗\n芝麻拌菠菜1份\n米饭1碗\n## 营养好搭配\n豌豆小米粥1碗\n+\n菠菜炒鸡蛋1份\n+\n花卷1个\n## 营养好搭配\n椰味红薯粥\n黄豆猪蹄汤\n红薯富含多种维生素和膳食纤维，能帮助新妈妈排毒美容。\n## 原料\n## 做法\n①大米淘洗干净；红薯洗净，去皮，切块。②花生仁泡透，加适量水煮烂，然后放入红薯块、大米，一同煮烂。③将椰汁倒入红薯粥里，加白糖搅拌均匀即可。\n肉丸粥\n椰汁250毫升，红薯100克，花生仁、大米各50克，白糖适量。\n此汤有补血催乳、养颜补钙、益气和中、生滋润燥的功效。\n## 原料\n黄豆100克，猪蹄1只，葱段、姜片、盐、料酒各适量。\n## 做法\n①黄豆洗净，用水泡1小时。②猪蹄用沸水汆烫后拔净毛，剁成段。③砂锅中加入水、猪蹄段、黄豆、葱段、姜片、料酒，大火煮沸后撇去浮沫，然后转小火炖至猪蹄熟烂，拣去姜片、葱段加盐调味即可。\n此粥健脾开胃，补虚养身，还可以改善新妈妈皮肤干燥的问题。\n## 原料\n五花肉50克，大米30克，蛋清、姜末、葱花、盐、料酒、淀粉各适量。\n## 做法\n①大米洗净；五花肉洗净，剁成肉泥，加入葱花、姜末、盐、料酒、蛋清、淀粉，拌匀。②锅内放入大米和清水，大火烧沸。③熬至粥将熟时，将肉泥挤成丸子状，放入粥内，熬至肉熟，撒上葱花即可。\n营养师建议：大米可替换成糯米，更有益健康。\n营养配餐：豆皮蔬菜卷1份、肉片汤1碗。\n饮食宜忌：花生仁宜带肉皮食用。\n饮食宜忌：胃肠消化不好者不宜吃太多。\n## 剖宫产妈妈\n1. 剖宫产妈妈要调节情绪，不要过分担心，身体恢复不是一朝一夕的事情，多吃些有助于排出瘀血、增强免疫力的食物。\n2. 喝醋有助于瘦身，但新妈妈不宜过量食醋，以免损伤牙齿，留下隐患。\n3. 新妈妈此时的饮食不宜大补，滋补过量不但无益，反而易让新妈妈患肥胖症，从而引发多种疾病。产后肥胖还可造成乳汁中脂肪含量增多，因此导致宝宝肥胖或者腹泻。"}, "抓炒腰花（jinpai）": {"ingredients": "猪腰100克，青椒50克，醋、水淀粉、盐、葱末、姜末、香油各适量。", "notes": "产后很多新妈妈会有腰酸背痛的症状，此时适量吃些猪腰，可以“以形补形”，还能促使子宫收缩恢复良好。"}, "抓炒腰花（366）": {"ingredients": "猪腰100克，青椒50克，醋、水淀粉、盐、葱末、姜末、香油各适量。", "steps": "①猪腰剖开，去掉筋膜，切片，打花刀，用水淀粉上浆；青椒洗净，切片。\n②油锅烧热，将腰片逐片下锅，小火炒2分钟，出锅控油。③用醋、盐、葱末、姜末、水淀粉调成碗汁。④起油锅，倒入碗汁、腰片、青椒片炒熟，淋入香油即可。\n抓炒腰花1份\n+\n海带焖饭1碗\n+\n猕猴桃汁1杯\n## 营养好搭配"}, "奶油白菜（jinpai）": {"ingredients": "芹菜60克，香菇50克，醋、盐、水淀粉各适量。\n白菜100克，牛奶120毫升，盐、高汤、水淀粉各适量。", "steps": "1 油菜洗净，沥干水分。\n2 油锅烧热，放入蒜瓣爆出香味。\n3 油菜下锅炒至三成熟，在菜根部撒少许盐。\n4 炒匀至六成熟，加少许白糖，淋入水淀粉勾芡即成。\n1 芹菜去叶、根，洗净，剖开，切成4厘米长的段；香菇洗净，切片。\n2醋、水淀粉混合后装在碗里，加水约50毫升兑成芡汁备用。\n3 油锅烧热后，倒入芹菜煸炒2分钟，放入香菇片迅速炒匀，再加入盐稍炒，淋入芡汁，快速翻炒几下起锅即可。\n1 白菜切小段，将牛奶倒入水淀粉中搅匀。\n2 油锅烧热，倒入白菜，再加些高汤，烧至七成熟。\n3 放入盐，倒入调好的牛奶汁，再烧开即可。\n## 产后第30天\n不过量食醋\n注意控制体重\n不宜吃巧克力\n不宜只吃1种主食\n外出要防晒", "notes": "此菜口味清淡，营养丰富，可以帮助口味重的新妈妈降低对盐的摄入。"}, "奶油白菜（366）": {"ingredients": "白菜100克，牛奶120毫升，盐、高汤、水淀粉各适量。", "steps": "①白菜切小段；将牛奶倒入水淀粉中搅匀成汁。②油锅烧热，倒入白菜段翻炒，再加些高汤，烧至七八成熟。③放入盐，倒入调好的牛奶汁，再烧开即可。\n营养师建议：可加点枸杞。\n营养配餐：鸡蛋羹1份、莴笋瘦肉粥1碗。\n饮食宜忌：白菜不宜隔夜食用。"}, "南瓜油菜粥（jinpai）": {"ingredients": "大米100克，南瓜80克，油菜2棵，盐适量。\n熟米饭1碗，鸡蛋2个，胡萝卜半根，菠菜、葱末、盐各适量。</td><td style='text-align: center; word-wrap: break-word;'>鸡丁炒豌豆\n鸡胸肉80克，豌豆50克，胡萝卜半根，葱段、香油、淀粉、盐各适量。</td><td style='text-align: center; word-wrap: break-word;'>西米猕猴桃粥\n西米50克，猕猴桃100克，白糖适量。</td></tr><tr><td style='text-align: center; word-wrap: break-word;'>做法：\n1 胡萝卜洗净，切丁；菠菜洗净，切碎；鸡蛋打成蛋液。\n2 锅中倒油，放鸡蛋液炒散，盛出备用。\n3 锅中再倒油，放葱末煸香，加入熟米饭、胡萝卜丁、菠菜碎、鸡蛋翻炒2分钟，最后加盐调味即可。</td><td style='text-align: center; word-wrap: break-word;'>做法：\n1 胡萝卜去皮，洗净，切成小丁；鸡胸肉洗净，切成小丁，用淀粉上浆，备用。\n2 锅内加香油烧热，放入葱段煸出香味，然后下鸡胸肉丁炒至变色，加入豌豆、胡萝卜丁，用大火快炒至熟，加盐调味即可。</td><td style='text-align: center; word-wrap: break-word;'>做法：\n1 西米淘洗干净，用冷水浸泡回软后捞出，沥干水分。\n2 猕猴桃冲洗干净，去皮取辄，切块。\n3 取锅加入约500毫升冷水，放入西米，先用大火烧沸，再改用小火煮半小时。\n4 加入猕猴桃块，再煮15分钟，加入白糖即可。</td></tr></table>\n## 产后第12天\n食物助伤口愈合", "steps": "1 将西红柿洗净，用开水烫一下，去皮，切片，备用；将鸡蛋打入碗中，用筷子充分搅拌，使鸡蛋起泡。\n2 锅中放油，油开后放入葱花和鸡蛋液，让蛋液凝成蛋花，盛出；将西红柿倒入锅中炒烂，再将蛋花倒入，翻炒几下，加盐搅匀，盛出。\n3 将面条放入沸水中煮熟，后捞入碗中，浇上西红柿鸡蛋卤拌吃。\n1 南瓜洗净，去皮，去瓤，洗净切成小丁；油菜洗净，切丝。\n2 大米淘洗干净，入清水中浸泡 30 分钟。\n3 锅中放入浸泡好的大米、南瓜丁、油菜丝，加适量水，加盖煮约 20 分钟至粥熟米烂。\n4 最后加盐调味即可。\n<table border=1 style='margin: auto; word-wrap: break-word;'><tr><td style='text-align: center; word-wrap: break-word;'>胡萝卜菠菜鸡蛋饭", "notes": "新妈妈眼睛很脆弱，南瓜富含维生素A，能帮助新妈妈眼睛尽快恢复产前状态，此粥味道可口，容易消化，还可预防新妈妈便秘。\n胡萝卜菠菜鸡蛋饭富含蛋白质、胡萝卜素、铁、钙等营养素，有利于新妈妈身体的恢复和乳汁质量的提高。\n豌豆不仅有催乳、滋养皮肤的功效，适当食用还对心血管十分有益。鸡胸肉含有大量维生素，非常适合产后滋补身体。\n西米白净滑糯，营养丰富，做成粥后口感爽滑，能够帮助妈妈提升食欲。"}, "南瓜油菜粥（366）": {"steps": "①将南瓜去皮，去瓤，洗净，切成小丁；油菜洗净，切丝；大米淘洗干净。\n2 锅中放大米、南瓜丁，加适量水煮熟，最后加油菜丝、盐调味即可。\n南瓜油菜粥1碗\n西红柿炒菜花1份\n千层饼1块"}, "菠菜粉丝（jinpai）": {"ingredients": "菠菜150克，粉丝50克，姜末、葱花、盐、香油各适量。", "steps": "1 茄子去蒂洗净切段，用小刀挖去茄子段中间部分。\n2 在肉馅中放入盐、蛋清，拌匀后，\n放入挖空的茄墩儿内，撒上香菇\n末、香菜末，蒸熟后放入盘内。\n3 油锅烧热，加入白糖、盐，再加少许水烧开，用水淀粉勾芡，淋在蒸好的茄墩儿上即可。\n1 菠菜择洗干净，粉丝洗净，分别用开水焯一下，捞出，沥水。\n2 油锅烧热，用葱花、姜末炝锅，放入菠菜、粉丝，加盐稍炒出锅，淋上香油即可。", "notes": "菠菜不仅可以帮助新妈妈补钙，缓解缺钙性腰酸背痛，而且还可以促进胃肠蠕动，缓解产后便秘。"}, "菠菜粉丝（366）": {"ingredients": "菠菜150克，粉丝50克，姜末、葱花、盐、香油各适量。", "steps": "①菠菜择洗干净，粉丝泡软，分别用开水焯烫一下，捞出，沥净水。②油锅烧热，用葱花、姜末炝锅，将菠菜、粉丝下锅，加盐稍炒出锅，淋上香油即可。\n菠菜粉丝1份\n冬瓜排骨汤1碗\n馒头1个\n## 营养好搭配\n# 产后第10天食谱推荐\n## 哺乳妈妈\n1. 愉快的心情、规律的生活、健康的饮食都有利于乳汁的分泌，哺乳妈妈可以吃些催乳的食物，如虾仁、鲫鱼等。\n2. 禁食大麦及其制品，如大麦芽、麦芽糖等具有回乳作用的食物。"}, "木瓜鲈鱼汤": {"ingredients": "木瓜150克，鲈鱼1条，姜片、盐各适量。", "steps": "①鲈鱼处理好，洗净切块；木瓜洗净，去皮、去瓤，切块。②在油锅中爆香姜片，放入鲈鱼，煎至两面呈金黄色。③另起锅，放入木瓜块爆炒5分钟，加入清水，放入鲈鱼块，大火烧沸后转小火煲20分钟，出锅时加盐调味即可。\n木瓜鲈鱼汤1碗\n青椒肉丝1份\n馒头1个\n## 营养好搭配"}, "鸭血豆腐汤": {"ingredients": "鸭血50克，豆腐100克，香菜末、高汤、水淀粉、醋、盐各适量。", "steps": "①鸭血、豆腐在淡盐水中泡一下，切条，放入煮开的高汤中炖熟。②加醋、盐调味，搅拌均匀。③用水淀粉勾薄芡，撒上香菜末即可。\n营养师建议：可以适当加入粉丝。\n营养配餐：鸡丁烧鲜贝1份、米饭1碗。\n饮食宜忌：特别适宜贫血的新妈妈食用。"}, "木瓜花生排骨汤": {"ingredients": "排骨200克，木瓜100克，花生仁、香菜叶、盐各适量。", "steps": "1 木瓜去皮、去瓤，洗净，切条；花生仁用清水浸泡1小时。2 排骨切块，放沸水中汆烫。3 锅中放适量清水，放入花生仁、排骨块煮沸，转小火煲至肉熟。3 放入木瓜条煮熟，加盐调味，撒上香菜叶即可。\n木瓜花生排骨汤 1碗\n+\n家常豆腐 1份\n+\n米饭 1碗\n## 营养好搭配"}, "枸杞红枣蒸鲫鱼": {"ingredients": "鲫鱼1条，红枣2颗，葱姜汁、枸杞、料酒、盐、高汤、醋各适量。", "steps": "①鲫鱼处理好，洗净，汆烫后用温水冲洗。②在鲫鱼腹中放2颗红枣，将鲫鱼放入鱼盘内，倒入枸杞、料酒、醋、高汤、葱姜汁、盐。③把鱼盘放入蒸锅内蒸20分钟即可。\n营养师建议：不加其他食材，清蒸鲫鱼本身就鲜美无比。\n营养配餐：红烧豆腐1份、馒头1个。\n饮食宜忌：做此菜时不宜放太多盐。"}, "牛肉卤面（jinpai）": {"ingredients": "面条100克，牛肉50克，胡萝卜、红椒、竹笋各20克，酱油、水淀粉、盐、香油各适量。", "steps": "1 荠菜去叶择洗干净，切成段，备用。\n2魔芋洗净，切成条，用热水煮2分钟，去味，沥干，备用。\n3 将魔芋、荠菜、姜丝放入锅内，加清水用大火煮沸，转中火煮至荠菜熟软。\n4 出锅前加盐调味即可。\n1 猪腰剖开，去掉腰心，剞斜花刀，改刀成长3厘米、宽1.5厘米的抹刀片，用水淀粉上浆；青椒洗净，去蒂去子，切片。\n2 锅中放油，将腰片逐片下锅；改小火炒 2 分钟，出锅控油；用醋、盐、葱末、姜末、水淀粉调成碗汁。\n3 起油锅，倒入碗汁、腰花、青椒片，\n颠炒几下，淋入香油。\n1 将牛肉、胡萝卜、红椒、竹笋洗净，切小丁。\n2 面条煮熟，过水后盛入汤碗中。\n3 锅中放油烧热，放牛肉煸炒，再放胡萝卜、红椒、竹笋翻炒，加入酱油、盐、水淀粉，浇在面条上，最后再淋几滴香油即可。\n## 产后第25天\n饿了就吃", "notes": "此道面食滋补胃肠，能促进新妈妈的身体恢复，还有补血的效果，适合整个月子期食用。"}, "牛肉卤面（366）": {"ingredients": "面条100克，牛肉50克，胡萝卜、红椒、竹笋各20克，酱油、水淀粉、盐、香油各适量。", "steps": "①将牛肉、胡萝卜、红椒、竹笋洗净，切丁。 ②面条煮熟，过水后盛入碗中。 ③油锅烧热，放牛肉煸炒，再放胡萝卜丁、红椒丁、竹笋丁翻炒，加入酱油、盐、水淀粉炒熟，浇在面条上，淋入香油即可。\n牛肉卤面1碗\n蛋卷1个\n葡萄干15粒\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈若患有比较严重的慢性疾病，如心脏病、肾脏病以及糖尿病等，都不太适合给宝宝进行哺乳。\n2. 新妈妈在产后喝红糖水的时间，以7~10天为宜，过多饮用不利于身体恢复。\n3. 牙齿的主要成分是钙盐，钙盐怕酸性的食物腐蚀，所以新妈妈在月子期间，不宜多吃酸性食物，如石榴、杨梅、酸枣、醋等。另外，也不要吃过于寒凉的食物，否则会刺激牙龈，引起牙齿敏感，以后吃凉的、酸的食物容易牙疼。"}, "牛奶粥（288）": {"ingredients": "鲜牛奶200毫升\n白米粥（去汤）200克\n黑糖20克", "steps": "1 取汤锅，倒入白米粥、鲜牛奶，以小火熬煮至微微煮沸、冒泡。\n2 再加入黑糖，搅拌均匀即可。"}, "牛奶粥（366）": {"ingredients": "大米 50 克，牛奶 250 毫升。", "steps": "①大米洗净，浸泡。②锅内加入清水，放入淘洗好的大米，大火煮沸后，转小火熬30分钟至大米绵软。③加入牛奶，小火慢煮至牛奶烧开、粥浓稠即可。\n牛奶粥 1碗\n+\n面包 1个\n+\n黄花瘦肉汤 1碗\n## 营养好搭配"}, "火龙果酸奶汁": {"ingredients": "火龙果1个，酸奶120毫升。", "steps": "①火龙果去皮切块。②将酸奶倒入搅拌机中，再加入火龙果拌匀即可。\n营养师建议：大部分水果都可与酸奶混合成汁。\n营养配餐：清蒸鲈鱼1份、南瓜饼1块。\n饮食宜忌：患糖尿病的新妈妈应注意控制摄入量。"}, "海带焖饭": {"ingredients": "大米100克，海带30克，彩椒丝、盐各适量。", "steps": "①将大米淘洗干净；海带泡发，洗净泥沙，切条。②将锅中放入大米和适量水，用大火烧沸后放入海带条，不断翻搅，烧煮10分钟左右，待米粒张开，水快干时，加盐调味。③最后盖上锅盖，用小火焖熟，盛出，加彩椒丝点缀即可。\n海带焖饭1碗\n+\n西红柿土豆牛肉汤1碗\n+\n核桃2个\n## 营养好搭配"}, "空心菜排骨汤": {"ingredients": "排骨200克，空心菜100克，海米10克，香油、盐各适量。", "steps": "①排骨洗净，斩成块，用沸水汆烫去血沫。②空心菜去根，洗净，切段；海米用水浸泡。③煲内加适量水，放入排骨块、海米，大火煮沸后，转中火煮1小时。④放入空心菜段、香油、盐，煮5分钟即可。\n营养师建议：空心菜可换成白萝卜。\n营养配餐：黑米粥1碗、桃1个。\n饮食宜忌：食用猪肉后不宜大量饮茶。"}, "荷兰豆鲫鱼汤": {"ingredients": "荷兰豆30克，鲫鱼1条，料酒、酱油、白糖、姜片、葱段、盐各适量。", "steps": "①将鲫鱼处理好，洗净；荷兰豆择去两端及筋，切段。②油锅烧热后，爆香姜片、葱段，放入鲫鱼煎至金黄色。③加入料酒、酱油、白糖、荷兰豆段和适量的水，将鲫鱼烧熟，最后用盐调味即可。\n荷兰豆鲫鱼汤1碗\n虾仁西蓝花1份\n小米饭1碗\n## 营养好搭配\n# 产后第11天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈在催乳的同时，不要忘了预防贫血，增强抗病的能力。此时，要避免吃一些辛辣的食物，如大蒜、辣椒、茴香等。\n2. 香蕉对失眠或情绪紧张有缓解作用，新妈妈可以在睡前吃根香蕉。"}, "黄花菜粥": {"ingredients": "干黄花菜10克，糯米30克，猪瘦肉末、盐、香油、葱花各适量。", "steps": "①将干黄花菜洗净，用温水泡开后切段；糯米淘洗干净。②将糯米放入锅中，加清水烧开，转小火熬煮，待米粒煮开花时放入猪瘦肉末、黄花菜段。③将熟时放入香油、盐调味，撒上葱花即可。\n黄花菜粥1碗\n+\n豆沙包1个\n+\n苹果1个\n## 营养好搭配"}, "什锦果汁饭（jinpai）": {"ingredients": "大米1碗，鲜牛奶250毫升，苹果丁、菠萝丁、蜜枣丁、葡萄干、青梅丁、碎核桃仁、白糖、番茄沙司、水淀粉各适量。", "notes": "有利于提升乳汁质量，对宝宝成长十分有利，同时，软糯的奶香果汁饭对新妈妈胃肠调理大有裨益。"}, "什锦果汁饭（366）": {"ingredients": "大米50克，牛奶250毫升，苹果丁、蜜枣丁、葡萄干、青梅丁、碎核桃仁各15克，白糖、水淀粉各适量。", "steps": "①大米洗净，加入牛奶、水焖成饭，加白糖拌匀，盛入盘中。②苹果丁、蜜枣丁、葡萄干、青梅丁、碎核桃仁放入锅内，加清水和白糖烧沸，加水淀粉稍煮，大火收汁后浇在米饭上即可。\n营养师建议：根据季节选择时令水果。\n营养配餐：鸡蓉玉米羹1份、丝瓜金针菇1份。\n饮食宜忌：有糖尿病的新妈妈要控制蜜枣丁、葡萄干和白糖的用量。"}, "冬瓜羊肉汤": {"steps": "1. 将羊肉切成块，在沸水中汆烫透。\n2. 冬瓜去皮、去瓤后洗净切块。3. 在锅中加清水，烧开后放入羊肉块、葱段、姜片，炖至八成熟时，放入冬瓜块，炖至烂熟时，拣去姜片、葱段，加盐调味，撒上葱花，淋上香油即可。\n冬瓜羊肉汤1碗\n+\n醋熘白菜1份\n+\n米饭1碗\n## 营养好搭配"}, "玉米香菇虾肉饺（jinpai）": {"ingredients": "饺子皮20个，猪肉150克，香菇3朵，虾5只，玉米棒半个，胡萝卜1/4根，盐、泡香菇水各适量。\n睡觉勿吹风", "notes": "虾肉软烂易消化吸收，可滋阴、强体、养胃，同时，虾肉中放入丰富的动、植物食材还能大大刺激新妈妈的食欲。\n头发要干净清爽\n不要睡凉席"}, "玉米香菇虾肉饺（366）": {"ingredients": "饺子皮13个，猪肉150克，干香菇3朵，虾、玉米粒各30克，盐适量。", "steps": "①干香菇泡发后切丁；虾去皮取肉，切丁。②猪肉剁碎，放入香菇丁、虾肉丁和玉米粒，搅拌均匀；再加入盐、泡香菇水制成肉馅。③饺子皮包上肉馅，包好全部饺子，下锅煮熟即可。\n营养师建议：鲜肉水饺、白菜水饺、荠菜猪肉饺、香菇鸡蛋饺等都适合新妈妈食用。\n营养配餐：凉拌菜1份、苹果汁1杯。\n饮食宜忌：虾宜选用新鲜活虾。"}, "黄花菜鲫鱼汤（jinpai）": {"ingredients": "鲫鱼1条，干黄花菜15克，盐、姜片各适量。", "steps": "2 干黄花菜用温水泡开，用凉水冲洗；把鲫鱼用水冲洗一下，稍稍沥干。\n1 鲫鱼洗净，去掉鱼肚子里面的黑膜，用姜片和盐稍微腌制片刻。\n3 将鲫鱼放入油锅中煎至两面发黄，倒入适量开水，放入姜片、黄花菜，用大火稍煮。\n4 放入盐，再用小火炖至黄花菜熟透即可。", "notes": "此汤有养气益血、补虚通乳的作用，是帮助气虚体质的新妈妈分泌乳汁、清火解毒的佳品。"}, "黄花菜鲫鱼汤（366）": {"ingredients": "鲫鱼1条，干黄花菜15克，盐、姜片和香菜叶各适量。", "steps": "①将鲫鱼处理好，洗净，用盐稍微腌制片刻。②干黄花菜用温水泡开，用凉水冲洗。③鲫鱼放入油锅中煎至两面发黄，倒入适量开水，放入姜片、黄花菜，用大火稍煮。④放入盐，用小火炖至黄花菜熟透放香菜叶点缀即可。\n黄花菜鲫鱼汤 1碗\n拍黄瓜 1份\n平菇小米粥 1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈进补要格外用心和注意，除了要增加全面的营养、补充体力外，还可适当增加帮助回乳的食物。\n2. 非哺乳妈妈进补的食物热量要相应低一些，以免影响新妈妈产后身材的恢复。\n3. 产后新妈妈洗脸最好用温水。对油性皮肤者来说，温水能使皮肤的毛细血管扩张、毛孔张开，促进代谢物排出，利于清洁皮肤；干性皮肤的人用温水可使其避免过冷或过热对皮肤造成刺激。"}, "黄芪枸杞鸡汤": {"ingredients": "鸡肉200克，黄芪、枸杞各10克，红枣5颗，姜片、盐、米酒各适量。", "steps": "①将黄芪、枸杞、姜片洗净。②鸡肉切块，放入沸水中汆烫，捞出洗净。③将鸡块、红枣、黄芪、枸杞、姜片一起放入锅内，加适量清水。④大火煮开后转小火焖炖1小时，出锅前加盐、米酒调味即可。\n黄芪枸杞鸡汤1碗\n奶油白菜1份\n米饭1碗\n## 营养好搭配"}, "虾皮芹菜粥": {"ingredients": "虾皮20克，芹菜50克，燕麦仁150克，盐适量。", "steps": "①虾皮、芹菜分别洗净，芹菜切丁；燕麦仁洗净，浸泡。②锅置火上，放入燕麦仁和适量清水，大火烧沸后改小火，放入虾皮。③待粥煮熟时，放入芹菜丁，略煮片刻后加盐调味。\n营养师建议：海参或牛肉代替虾皮煮粥，也很有营养。\n营养配餐：煮鸡蛋1个、花卷1个。\n饮食宜忌：胃肠功能不佳者应少食。"}, "韭菜炒绿豆芽": {"ingredients": "绿豆芽50克，韭菜100克，盐、葱丝、姜丝各适量。", "steps": "①绿豆芽洗净，沥干；韭菜洗净，切段。②油锅烧热放葱丝、姜丝炝锅，随即倒入绿豆芽，翻炒几下，再倒入韭菜段略炒，放入盐即可。\n韭菜炒绿豆芽1碗\n芋头排骨汤1碗\n小米粥1碗\n## 营养好搭配"}, "猪肝炒油菜": {"ingredients": "油菜150克，猪肝50克，盐、酱油各适量。", "steps": "①猪肝洗净，切片，用盐和酱油腌制10分钟；油菜洗净切段，茎、叶分别放置。②油锅烧热，放入猪肝快炒后盛出。③锅中留底油，先放油菜茎，后放油菜叶，炒至半熟时放入猪肝，加适量盐，大火炒熟即可。\n营养师建议：猪肝补铁，但也不宜多吃。营养配餐：豆浆莴笋汤1碗、虾米粥1碗。饮食宜忌：猪肝一次摄入不宜超过50克。"}, "雪菜肉丝面（288）": {"ingredients": "瘦肉100克 雪菜60克 笋子30克\n姜末15克 葱花15克 细面1份\n米酒10毫升 食用油10毫升 盐10克", "steps": "1 笋子切丝；雪菜去除头部并切末；面条加盐汆烫后，盛盘备用。\n2 起油锅，爆香姜末与葱花，加入肉丝拌炒，炒至肉丝略有熟色，便可以加入笋丝、雪菜拌炒。\n3 沿着锅边倒入米酒呛香后，拌炒均匀，加盐调味。\n4 在锅里倒入适量水一起熬煮，水位需盖过食材，沸腾后即可起锅。\n5 在氽烫好的面条上，均匀地淋上汤料即可。"}, "雪菜肉丝面（366）": {"ingredients": "面条100克，猪肉丝、雪菜各50克，盐、葱花、姜末各适量。", "steps": "①雪菜洗净，切碎末；猪肉丝洗净，加盐拌匀。 ②油锅烧热，下葱花、姜末、猪肉丝煸炒，再放入雪菜末翻炒至熟，放盐调味。 ③面条煮熟，挑入碗内，把炒好的雪菜肉丝均匀地覆盖在面条上即可。\n雪菜肉丝面1碗\n+\n清炒丝瓜1份\n+\n火龙果汁1杯\n## 营养好搭配\n# 产后第12天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈要吃通乳补血的食物，黄花菜、牛肉、豆浆、红枣都是不错的选择，要分辨食物的作用，不要吃回乳食物。\n2. 哺乳妈妈可以多吃豆制品，补充优质蛋白，促进宝宝大脑发育。"}, "鸡汤面疙瘩": {"ingredients": "面粉100克，鸡汤、蛋清、葱花、盐、料酒各适量。", "steps": "①面粉加蛋清和适量清水调成面糊。\n②锅中加清水，烧沸后用不锈钢漏勺将面糊过滤，淋在沸水中，煮5分钟，捞出装在碗里。③油锅烧热，放入葱花爆香，放入鸡汤、料酒、盐烧沸后，倒入盛有面疙瘩的碗中即可。\n鸡汤面疙瘩1碗\n拌海带丝1份\n苹果1个\n## 营养好搭配"}, "牛肉粉丝汤": {"ingredients": "牛肉100克，粉丝50克，小虾30克、盐、料酒、淀粉、香菜叶、香油各适量。", "steps": "①粉丝放入水中，泡发。②牛肉切块，加淀粉、料酒、盐拌匀；小虾处理好洗净。③锅中加适量清水，烧沸，放入牛肉块、小虾，略煮。④放入水发好的粉丝，中火煮5分钟。⑤放入盐调味后，盛入碗中，淋上香油，放香菜叶点缀即可。\n营养师建议：放入虾同煮，通乳作用更好。营养配餐：酿黄瓜1份、芝麻烧饼1个。饮食宜忌：粉丝含铝，不宜吃太多。"}, "豌豆炖鱼头（jinpai）": {"ingredients": "豌豆50克，香菇3朵，鳙鱼头200克，料酒、盐、姜汁、葱段各适量。", "steps": "1鳙鱼头洗净；豌豆、香菇分别泡发，洗净。\n2 油锅烧热，放入葱段、鳙鱼头翻炒，加入料酒、清水、姜汁、盐，待锅开后倒入豌豆、香菇，小火炖至豌豆变软，即可出锅。", "notes": "营养丰富，可补充优质蛋白，有助于乳汁分泌，适合哺乳妈妈食用。\n## Part9"}, "豌豆炖鱼头（366）": {"steps": "①胖头鱼鱼头洗净；豌豆、蘑菇分别洗净。②将油锅烧热后放入葱末、鱼头翻炒，然后放入料酒、清水、姜汁、盐。③烧沸后放入豌豆、蘑菇，小火煮熟即可。\n豌豆炖鱼头1份\n+\n香菇油菜1份\n+\n米饭1碗\n## 营养好搭配"}, "黄花菜豆腐瘦肉汤": {"ingredients": "猪瘦肉100克，干黄花菜10克，豆腐150克，盐适量。", "steps": "①干黄花菜用水浸软、洗净。②猪瘦肉洗净，切小块；将豆腐切成大块。③将黄花菜和猪瘦肉块一起放入锅中，加入适量水，大火煮沸后，改用小火煲1小时。④放入豆腐块，煲10分钟，加盐调味即可。\n营养师建议：黄花菜炖鲫鱼味道也不错。营养配餐：糖醋萝卜1份、熟板栗3颗。饮食宜忌：黄花菜最好用温水进行多次浸泡之后再烹调。"}, "香蕉草莓牛奶羹": {"ingredients": "牛奶250毫升，香蕉50克，草莓30克。", "steps": "①草莓去蒂洗净，切成两半；香蕉剥去外皮，放入碗中碾成泥。②将牛奶、香蕉泥放入锅内，用小火慢煮5分钟，并不停搅拌。③出锅时加入草莓即可。\n香蕉草莓牛奶羹1碗\n+\n彩椒牛肉丝1份\n+\n花卷1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈在回乳同时要适当进补，可选择低脂、低热量，而且滋补功能强的食物，如鲈鱼、鸡蛋、猪瘦肉等。\n2. 新妈妈若是患有感冒，就要少接触宝宝。\n3. 酸奶不能加热喝，因为活性乳酸菌很容易被烫死，使酸奶的营养流失。另外，不宜空腹喝酸奶，乳酸菌很容易被胃酸杀死，其营养价值和保健作用就会大大减弱，而且不利于肠胃保健。在饭后两小时饮用酸奶最好。"}, "香菇炒菜花": {"ingredients": "黄豆芽、韭菜、粉丝、熏豆干、猪肉各50克，鸡蛋2个，葱段、姜片、酱油、盐各适量。\n菜花富含多种维生素，而且属于低脂食物。\n菜花250克，干香菇2朵，高汤、盐、葱丝、姜丝、香油各适量。", "steps": "①菜花洗净后掰成小朵，用热水焯一下；干香菇泡发后去蒂、洗净，切丁。\n②葱丝、姜丝放入油锅爆香，加入高汤和盐，烧沸后放入香菇丁和菜花。\n③小火煮5分钟后，淋香油即可。"}, "麦芽粥": {"ingredients": "大米50克，生麦芽、炒麦芽各30克，\n红糖适量。", "steps": "①大米洗净，用清水浸泡30分钟。\n②将生麦芽与炒麦芽放入锅内，加清水大火煎煮。\n③将大米放入锅中与麦芽一起煮。\n④煮到大米完全熟烂时，加入红糖即可。\n麦芽粥1碗 + 凉拌菜1份 + 煮鸡蛋1个\n## 营养好搭配"}, "核桃仁爆鸡丁": {"ingredients": "鸡肉100克，核桃仁30克，松子仁、枸杞各10克，鸡蛋1个，盐、水淀粉、鸡汤各适量。", "steps": "①鸡肉洗净切丁，用蛋清、水淀粉抓匀；油锅烧热，将鸡肉丁略炒盛出。\n②另起油锅，将核桃仁、松子仁炒熟；将盐、鸡汤调成汁。\n③锅置火上，放调料汁，倒入鸡丁、核桃仁、松子仁、枸杞炒熟即可。\n营养师建议：核桃虽好，但每日食用最好不超过2个。\n营养配餐：银鱼苋菜汤1碗、玉米饼1块。\n饮食宜忌：不宜为追求口感而过咸。"}, "里脊肉炒芦笋": {"ingredients": "猪里脊肉150克，芦笋100克，蒜末、木耳、水淀粉、盐各适量。", "steps": "①芦笋洗净切段；木耳泡发，洗净，撕成小朵；猪里脊肉洗净，切成条状。\n②油锅烧热，放入蒜末炒香，然后放入猪里脊条、芦笋段、木耳翻炒均匀。\n③加盐炒熟，用水淀粉勾芡即可。\n里脊肉炒芦笋1份\n+\n蚝油菜花1份\n+\n海带焖饭1碗\n## 营养好搭配\n# 产后第13天食谱推荐\n## 哺乳妈妈\n1. 随着宝宝食量的增加，新妈妈如果觉得奶水分泌不是很理想，可适量增加催乳的食物。\n2. 粗粮虽好也不能多食，每天以不超过200克为宜。"}, "桂圆花生乳鸽汤": {"ingredients": "花生仁、桂圆肉各30克，乳鸽1只，葱段、姜片、盐各适量。", "steps": "①花生仁、桂圆肉洗净，浸泡。②乳鸽洗净，斩块，在沸水中汆一下，去除浮沫。③在砂锅中放入适量清水，烧沸后放入葱段、姜片、乳鸽块、花生仁、桂圆肉，用大火煮沸后，改用小火煲，等熟透后加盐调味即可。\n桂圆花生乳鸽汤 1碗\n+\n什锦面 1份\n+\n芹菜黄瓜汁 1杯\n## 营养好搭配"}, "西红柿猪骨粥": {"ingredients": "西红柿 150 克，猪骨 200 克，大米 50 克，盐适量。", "steps": "①猪骨剁碎；西红柿洗净，切块；大米洗净，浸泡。②锅置火上，放入猪骨碎和适量清水，大火烧沸后改小火，熬煮1个小时。③放入大米、西红柿块，继续熬煮成粥。待粥熟时，加盐即可。\n营养师建议：可将西红柿换成菜心。\n营养配餐：抓炒腰花1份、苹果1个。\n饮食宜忌：西红柿不要熬煮太久，否则会破坏其营养。"}, "银耳山药米糊": {"ingredients": "银耳10克，山药150克，小米50克，\n葡萄干5克。", "steps": "①山药洗净切片，银耳泡发，小米洗净浸泡1小时。②所有材料放入豆浆机，加适量清水，按“米糊”键。③米糊盛出后加入葡萄干即可。"}, "羊肝炒荠菜": {"ingredients": "羊肝100克，荠菜50克，火腿10克，姜片、盐、水淀粉各适量。", "steps": "①羊肝洗干净，切片，汆烫后沥干水；\n荠菜洗净，切段；火腿切片。②起油锅，\n放入姜片、荠菜段，炒至断生，加入\n火腿片、羊肝片炒熟，调入盐，再用水淀粉勾芡即可。"}, "西红柿鸡蛋羹": {"ingredients": "鸡蛋2个，西红柿100克，葱花、盐各适量。", "steps": "①西红柿用沸水烫一下，去皮，切成丁。②将鸡蛋打散，加盐搅拌，再加入适量温水和西红柿丁拌匀。③放入锅中，用中火隔水蒸，取出时，撒上葱花即可。\n产后体虚的新妈妈适当进食银耳山药米糊，不仅能保湿护肤，还能健脾益胃助消化。\n## 非哺乳妈妈\n1. 非哺乳妈妈在回乳时，不要忘记增加全面的营养，补充体力，尽快使新妈妈身体恢复。\n2. 产后新妈妈会觉得自己身体有些“虚胖”，可以吃红豆消水肿。\n3. 有些爱美的新妈妈选择游泳的方式，来减少孕期积累的全身脂肪，这是不可取的。因为产后不久下水游泳，会大大增加产后新妈妈得风湿病的可能，而且在子宫没有完全恢复时游泳，容易造成细菌感染或慢性盆腔炎。"}, "花生红豆汤": {"ingredients": "红豆 50 克，花生仁 20 克。", "steps": "①红豆与花生仁洗净，用清水泡2小时。②泡好的红豆与花生仁连同清水一并放入锅内，开大火煮沸。③煮沸后改用小火煲1小时即可。\n花生红豆汤1碗\n+\n面包1个\n+\n橙子1个\n## 营养好搭配"}, "清汤牛肉面": {"ingredients": "牛肉50克，面条100克，葱花、姜丝、酱油、冰糖、盐各适量。", "steps": "①将葱花、姜丝、盐、冰糖、酱油放入沸水中，用大火煮4分钟，制成汤汁。②牛肉放入汤汁中，用中火将牛肉煮熟，然后将牛肉取出切块。③将面条放入汤汁中，大火煮沸后，盛入碗中，放入牛肉块、葱花即可。\n营养师建议：可加入西红柿或青菜。\n营养配餐：酸奶1杯、清炒豆芽1份。\n饮食宜忌：牛肉煮熟再切块，肉质更鲜嫩。"}, "桂花板栗小米粥": {"steps": "①板栗洗净，加水煮熟，去壳压成泥；小米淘洗干净，浸泡3小时。②将小米放入锅中，加水适量，小火煮熟成粥，加入板栗泥，撒上糖桂花，食用时搅拌均匀即可。\n桂花板栗小米粥1碗\n宫保素三丁1份\n西葫芦饼1个\n## 营养好搭配"}, "芹菜茼蒿汁": {"ingredients": "芹菜3棵，茼蒿4棵。", "steps": "①芹菜用开水焯烫约5分钟后，取出切碎，捣后绞汁。②再将茼蒿洗净切碎，捣烂取汁。③将芹菜汁和茼蒿汁混合，每次饮20毫升，可用温水调服。\n营养师建议：可以将茼蒿换成苹果，可增进新妈妈的食欲。\n营养配餐：鸡蓉玉米羹1碗、馅饼1个。\n饮食宜忌：每周喝1次即可，不可多食。"}, "冰糖五彩粥": {"ingredients": "大米50克，玉米粒100克，鸡蛋2个，豌豆30克，枸杞15克，冰糖适量。", "steps": "①将大米、豌豆洗净；玉米粒蒸熟。\n②大米加水和蒸熟的玉米粒熬成粥，放入豌豆、枸杞、冰糖，同煮5分钟。\n③将鸡蛋打散，撒入锅中成蛋花，烧开即可。\n冰糖五彩粥1碗\n猪肉苦瓜丝1份\n油菜蘑菇汤1碗\n## 营养好搭配\n# 产后第14天食谱推荐\n## 哺乳妈妈\n1. 恢复元气需要长时间调养，新妈妈进补不能掉以轻心，每天宜按时定量进餐，补充全面的营养，满足宝宝的需求。\n2. 新妈妈宜吃猪蹄美肤又催乳。"}, "猪蹄肉片汤": {"ingredients": "猪蹄1只，咸肉片、冬笋片、木耳、香油、米酒、姜片、盐各适量。", "steps": "①木耳泡发；猪蹄洗净切块，用沸水略煮去腥。②香油倒锅中，放姜片、猪蹄炒至外皮变色。③将炒好的猪蹄与咸肉片、冬笋片、木耳放高压锅内，加米酒同煮。④待猪蹄熟，加香油、盐调味即可。\n猪蹄肉片汤 1碗\n炝炒圆白菜 1份\n米饭 1碗\n## 营养好搭配"}, "莲子薏米煲鸭汤": {"ingredients": "鸭肉150克，莲子10克，薏米20克，葱段、姜片、白糖、盐各适量。\n油菜心100克，香菇30克，鸡油、盐、香油各适量。\n①将油菜心洗净，从根部剖开，切段；香菇洗净，切花刀。②将鸡油烧至八成熟，放入油菜心煸炒，之后加入适量水，放入香菇、盐，用大火煮几分钟，最后淋上香油即可。", "steps": "①把鸭肉切成块，放入开水中汆一下，捞出后放入锅中。②在锅中依次放入葱段、姜片、莲子、薏米，再加入白糖，倒入适量开水，用大火煲熟。③待汤煲好后，加盐调味。\n营养师建议：可用茶树菇与鸭肉同煲。\n营养配餐：肉末炒菠菜1份、千层饼1块。\n饮食宜忌：最好把鸭肉皮下脂肪去掉后烹制。\n油菜富含维生素，香菇富含钙质和多种氨基酸，两者煮汤味美可口。\n油菜蘑菇汤1碗\n+\n抓炒腰花1份\n+\n米饭1碗\n## 营养好搭配"}, "薏米红枣百合汤": {"ingredients": "薏米100克，鲜百合20克，红枣4颗。", "steps": "①薏米淘洗干净，浸泡；鲜百合洗净，掰成片；红枣洗净。②将薏米和清水一同放入锅内，大火煮开后转小火煮1小时。③将鲜百合片和红枣放入锅内，继续煮30分钟即可。\n营养师建议：红枣可换成红豆或绿豆。\n营养配餐：鹌鹑蛋2个、包子1个。\n饮食宜忌：薏米应尽量煮得软烂一些，易消化吸收。"}, "银耳鹌鹑蛋汤": {"ingredients": "银耳30克，鹌鹑蛋100克，冰糖适量。", "steps": "①银耳泡发，去蒂，放入碗中，加适量水，放入蒸笼蒸透。②鹌鹑蛋洗净，加适量水煮熟，去壳。③锅中加水，放入银耳，煮开后放入冰糖、鹌鹑蛋，稍煮即可。\n银耳鹌鹑蛋汤1碗\n+\n三明治1个\n+\n香蕉1根\n## 营养好搭配\n## 非哺乳妈妈\n1. 不能哺乳可能导致新妈妈情绪低落，非哺乳妈妈此时要注意休息，饮食上多选用一些可镇静安神的食物，如黑芝麻、海带、鱼肉等。\n2. 核桃能健脑益智，新妈妈嚼一些核桃仁，还能缓解疲劳和压力。\n3. 以前由于条件有限，新妈妈坐月子时要吃动物油，也就是俗称的“荤油”来下奶，可是现在应少吃荤油，因为荤油含脂肪较多，不利于新妈妈肠胃恢复，应该用植物油来烹调食物，有利于新妈妈产后恢复身体。"}, "陈皮海带粥": {"ingredients": "海带、大米各50克，陈皮、白糖各适量。", "steps": "①海带泡发，洗净，切成碎末；陈皮洗净，切条。②大米淘洗干净，放入锅中，加适量水煮沸。③放入陈皮、海带，不停地搅动，用小火煮至粥熟，加白糖调味即可。\n陈皮海带粥1碗\n百合炒肉1份\n南瓜饼1块\n## 营养好搭配"}, "香菇炒腰花": {"ingredients": "猪腰100克，茭白50克，香菇3朵，葱花、姜片、料酒、盐、淀粉、香油各适量。", "steps": "①猪腰去外膜，对剖，去掉腰臊，切花刀，洗净，沥干水分后加料酒、盐、淀粉拌匀；茭白、香菇洗净，切片。\n②油锅爆香姜片，放入猪腰翻炒，再放入茭白片、香菇片，加盐。③放入适量水，待沸后淋上香油，撒上葱花即可。\n营养师建议：适量料酒可消除猪腰腥味。营养配餐：凉拌土豆丝1份、馒头1个。饮食宜忌：茭白不宜过多食用。"}, "胡萝卜牛蒡排骨汤": {"ingredients": "排骨100克，牛蒡、胡萝卜各30克，盐适量。\n①排骨洗净，斩段，汆去浮沫，用清水冲洗干净。②胡萝卜洗净，去皮，切块；牛蒡刷去表面的黑色外皮，切成小段。③把所有材料放入锅中，加适量清水，大火煮开，转小火再炖1小时，出锅前加盐调味即可。", "steps": "胡萝卜牛蒡排骨汤1碗\n+\n什锦面1份\n+\n芒果西米露1碗\n## 营养好搭配"}, "橙香鱼排（jinpai）": {"ingredients": "面粉200克，牛肉馅1碗，鸡蛋1个，葱末、姜末、盐、香油和水淀粉各适量。"}, "橙香鱼排（366）": {"ingredients": "鲷鱼1条，橙子30克，红椒、冬笋各20克，盐、水淀粉各适量。", "steps": "①鲷鱼收拾干净，切大块；冬笋、红椒洗净、切丁；橙子取出肉粒切丁。\n②油锅烧热，鲷鱼块裹适量水淀粉入锅炸至金黄色，沥油备用。③另起一锅，加水烧开，放入橙肉丁、红椒丁、冬笋丁，加盐调味，用水淀粉勾芡，浇在鲷鱼块上即可。\n营养师建议：鲷鱼换成草鱼也可。\n营养配餐：糖醋白菜1份、花卷1个。\n饮食宜忌：一般人群均可食用。"}, "黑芝麻圆白菜": {"ingredients": "圆白菜200克，黑芝麻30克，盐适量。", "steps": "①圆白菜洗净，切粗丝。②用小火将黑芝麻不断翻炒，炒出香味时出锅。③油锅烧热，放入圆白菜丝，翻炒几下，加盐调味。④炒至圆白菜丝熟透发软时，出锅盛盘，撒上黑芝麻，食用时搅拌均匀即可。\n芝麻圆白菜1碗\n+\n蛤蜊豆腐汤1碗\n+\n米饭1碗\n## 营养好搭配\n分娩\n产后\n第1周\n产后\n第2周\nPart4\n产后第3周：下奶催奶"}, "猪蹄通草汤（288）": {"ingredients": "猪蹄1个\n通草6克\n白芷5克\n当归5克\n葱白10克\n盐5克\n猪排骨200克\n蒜头20克\n葱段20克\n姜片20克\n洋葱50克\n五香粉少许\n食用油5毫升\n蚝油15克\n米酒30毫升\n番茄酱15克\n冰糖5克\n水淀粉5毫升", "steps": "1 猪蹄洗净、去毛，汆烫去血水后过冷水洗净，沥干备用。\n2 将所有的药材洗净，连同猪蹄、葱白放入开水中煮沸，再转小火慢炖2小时。\n3 捞去汤上过多的油脂，加盐调味即可。\n1 将排骨洗净，剁大块；洋葱切大块。\n2 起油锅，将排骨表面煎至上色以封住肉汁。\n3 将洋葱与整颗蒜头、葱段一起入油锅，炒出香味后捞起。\n4 在锅中放入排骨、洋葱和做法3中的食材，再加入姜片、蚝油、番茄酱、冰糖、米酒、水淀粉和少许五香粉，再倒水淹过材料，煮滚后转小火焖煮至熟软。\n5 取出排骨装盘，将锅内剩余的汤汁淋在上面即可。"}, "猪蹄通草汤（366）": {"ingredients": "猪蹄150克，通草5克，花生仁20克，盐、料酒各适量。", "steps": "①猪蹄洗净切成块；花生仁用水泡透；通草洗净切段。②锅内加入适量水，烧开，放猪蹄，汆去血沫，捞出。③油锅烧热，放入猪蹄块，淋入料酒爆炒片刻，加入清水、通草段、花生仁，用中火煮至汤色变白，加盐调味。\n猪蹄通草汤1碗\n+\n什锦果汁饭1份\n+\n鱼香茄子1份\n## 营养好搭配"}, "黄瓜腰果虾仁": {"ingredients": "黄瓜、虾仁各50克，腰果6颗，胡萝卜丁、葱末、盐、香油各适量。", "steps": "①黄瓜洗净，切成小丁。②油锅烧热，将腰果炸熟，装盘备用；虾仁用开水汆烫，捞出沥水。③锅内留底油，放葱末煸出香味，倒入黄瓜丁、腰果、虾仁、胡萝卜丁同炒至熟，加盐，淋香油即可。\n营养师建议：黄瓜也可用西蓝花代替。营养配餐：莲藕排骨汤1碗、米饭1碗。饮食宜忌：腰果适量放一些即可。"}, "菠菜猪肝汤": {"ingredients": "菠菜150克，猪肝片50克，盐、姜丝各适量。", "steps": "①菠菜择洗干净，切段；猪肝片放入沸水汆烫去血水，捞出。②锅置火上，倒油烧热，放猪肝片、姜丝快速翻炒，加水。待水开时，放入菠菜段，稍煮片刻，用盐调味即可。\n菠菜猪肝汤1碗\n+\n面包1个\n+\n核桃2个\n## 营养好搭配"}, "茭白炖排骨": {"ingredients": "茭白30克，排骨100克，干香菇、白萝卜各20克，姜片、盐各适量。", "steps": "①茭白剥去绿色外衣，洗净，切块；排骨洗净切小段，汆烫后沥干；干香菇泡发洗净，切花刀；白萝卜洗净，切块。②锅中放水煮开，放入排骨段、白萝卜块、香菇和姜片，大火煮20分钟，再放入茭白块，转小火煲半小时，加盐即可。\n营养师建议：也可用肉丝炒茭白。\n营养配餐：鲢鱼小米粥1碗、猪肉白菜包1个。\n饮食宜忌：排骨应尽量选择瘦一些的。"}, "莴笋粥": {"ingredients": "莴笋、大米各50克，猪肉100克，\n酱油、盐、香油各适量。", "steps": "①莴笋去皮洗净，切细丝；大米淘洗干净；猪肉洗净，切成末，放入碗内，加适量酱油、盐，腌10分钟。②锅中放入大米，加适量清水，大火煮沸，加入莴笋丝、猪肉末，改小火煮至米烂时，加盐、香油搅匀即可。\n莴笋粥1碗\n芝麻烧饼1个\n丝瓜金针菇1份\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈的回乳食谱应该多样化，如麦芽粥里可以增加些营养丰富的杏仁、核桃、牛奶等，促进新妈妈的食欲，帮助身体恢复。\n2. 虽然不哺乳，新妈妈也不要吃油炸食物，会影响产后身体恢复。\n3. 月子里的饮食应以稀软为主，不仅有利于营养的吸收，对牙齿也有好处。过硬的食物不宜吃太多，如炒花生、炒蚕豆、炒黄豆、炒腰果，这些食物需要用力咀嚼，对牙齿不好，也不利于消化吸收。"}, "红枣人参汤（jinpai）": {"ingredients": "红枣3颗，人参10克。", "steps": "1 将人参和红枣分别洗净。\n2 炖盅内加适量水，放入红枣和人参。\n3 大火将水烧沸后，改用小火炖煮 1 小时。将汤凉至温热时喝。", "notes": "此汤可补气养血，想要回乳的新妈妈每天饮用1小杯，可使乳汁慢慢减少，顺利完成回乳。\n新妈妈产后不要太早吃人参，否则恶露难以排出。"}, "红枣人参汤（366）": {"ingredients": "红枣6颗，人参3克。", "steps": "1 红枣去核洗净；人参洗净，切成薄片。2 锅置火上，加适量清水，用大火煮沸，放入红枣、人参片，盖上锅盖煮 2 个小时即可。\n红枣人参汤1碗\n+\n煮鸡蛋1个\n+\n鲜肉包1个\n## 营养好搭配"}, "豆角烧葶荠": {"ingredients": "牛肉50克，豆角、荸荠各30克，葱汁、盐、水淀粉、高汤各适量。", "steps": "1 将荸荠去皮洗净，切片；豆角洗净切段；牛肉切片，用葱汁和盐、水淀粉腌制。2 油锅烧热，下牛肉片用小火炒至变色，放豆角段炒匀，再加高汤烧至微熟。3 放入荸荠片，炒匀至熟，加盐即可。\n营养师建议：荸荠炒鸡丁或者荸荠炒虾仁也不错。\n营养配餐：黑豆煲瘦肉1份、牛奶馒头1个。\n饮食宜忌：豆角一定要炒熟。"}, "小米鳝鱼粥": {"ingredients": "小米30克，鳝鱼肉50克，胡萝卜、姜末、盐各适量。", "steps": "1. 将小米洗净：鳝鱼肉切成段；胡萝卜切成小丁。2. 在砂锅中加入适量清水，烧沸后放入小米，用小火煲20分钟。3. 放入姜末、鳝鱼肉段、胡萝卜丁煲15分钟，熟透后，放入盐调味即可。\n小米鳝鱼粥1碗\n素菜包1个\n苹果1个\n## 营养好搭配\n如意蛋卷\n此菜品营养均衡，能提升食欲，适合新妈妈食用。\n## 原料\n草鱼净肉100克，蒜薹50克，鸡蛋1个，紫菜、黑芝麻、盐、水淀粉各适量。\n## 做法\n1 将草鱼净肉剁成肉蓉，加入盐、水淀粉，搅拌至上劲。2 蒜薹洗净切长段，焯烫；鸡蛋打散，加入黑芝麻，入油锅制成蛋皮。3 蛋皮上铺上紫菜，将鱼肉蓉铺在紫菜上；蒜薹各放一边，卷起来，在中间汇合；汇合处抹少许水淀粉粘上，上蒸锅蒸熟即可。\n营养师建议：蒜薹有种辛辣味，可用胡萝卜或春笋代替。\n营养配餐：红豆银耳汤1碗、鸡肉扒油菜1份。\n饮食宜忌：消化不好者少食蒜薹。\n豇豆焖米饭\n豇豆能提供优质蛋白质、碳水化合物及多种维生素和微量元素。\n## 原料\n米饭 200 克，豇豆 100 克，盐适量。\n## 做法\n1 豇豆、大米洗净。2 把豇豆切粒，放在油锅里略炒。3 将豇豆粒、大米放在电饭锅里，再加入比焖米饭时稍少一点的水，焖熟即可，可根据自己口味适当加盐调味。\n豇豆焖米饭1份\n+\n板栗鸡汤1碗\n+\n清炒芥蓝1份\n## 营养好搭配\n## 产后第16天食谱推荐\n## 哺乳妈妈\n1. 为了宝宝的健康成长，哺乳妈妈应该尽量做到不挑食，常吃下奶、补血食物，另外，也要加强补钙，羊骨、鱼汤、黑豆等都不错。\n2. 饮食中的水分要多一些, 如多喝汤、牛奶、粥等。"}, "香菇豆腐塔（jinpai）": {"ingredients": "面粉、肉泥各100克，干贝20克，白糖、琼脂冻、姜末、盐各适量。营养功效：豆腐富含易被人体吸收的钙，还是优质蛋白质的良好来源。而且豆腐容易消化，符合本周新妈妈适宜食用豆腐的饮食需求。\n豆腐50克，香菜10克，香菇20克，盐适量。", "steps": "1 莲藕洗净切成片；核桃仁打碎，备用。\n2 将打碎的核桃仁、莲藕片放入锅内，加清水用小火慢煮至莲藕绵软。\n1 将面粉加适量清水和盐，揉成面团，稍饧，制成圆皮；琼脂冻切成小丁。\n3 出锅时加适量红糖调味即可。\n2 干贝用温水泡发、撕碎，然后将肉泥、干贝、姜末、盐、白糖加适量植物油调制成馅。\n1 豆腐洗净，切成四方小块，中心挖空备用。\n3 取圆皮包入馅料和琼脂冻丁，捏成月牙形，煮熟即可。\n2 香菇和香菜一起剁碎，加入适量盐拌匀成馅料。\n3 将馅料填入豆腐中心，摆盘蒸熟即可。\n## 产后第23天\n少吃高蛋白食物\n多吃蔬菜\n适当增加运动"}, "香菇豆腐塔（366）": {"ingredients": "豆腐300克，香菇3朵，香菜、酱油、白糖、香油、水淀粉各适量。", "steps": "①将豆腐切成四方小块，中心挖空；香菇洗净，剁碎；香菜剁碎。②香菇和香菜用白糖及水淀粉拌匀即为馅料；将馅料放入豆腐中心，摆在碟上蒸熟，淋上香油、酱油，用香菜叶点缀即可食用。\n香菇豆腐塔1份\n南瓜牛腩饭1碗\n葡萄10颗\n## 营养好搭配"}, "奶汁百合鲫鱼汤": {"ingredients": "鲫鱼1条，牛奶150毫升，木瓜20克，鲜百合15克，盐、姜末各适量。", "steps": "①将鲫鱼处理干净；木瓜去皮、去瓤，洗净，切片；鲜百合洗净，掰小片。②油锅烧热，将鲫鱼两面略煎。③加水，大火烧开，放姜末，小火慢炖。④当汤汁呈奶白色时放木瓜片、百合片、牛奶稍煮，出锅前放盐调味即可。\n营养师建议：不喜欢木瓜味道也可不放。营养配餐：莲藕拌黄花菜1份、花卷1个。饮食宜忌：百合易伤肺气，不宜多食。"}, "黑豆煲瘦肉": {"ingredients": "黑豆30克，猪瘦肉100克，香菜叶、盐、姜片各适量。", "steps": "1 黑豆洗净，泡发。2 猪瘦肉洗净切成厚块，在沸水中氽去血水。3 在锅中放入适量清水，放入猪瘦肉块和黑豆、姜片，煲熟后，放入盐调味，撒上香菜叶即可。\n黑豆煲瘦肉 | 碗\n+\n海米油菜心 | 份\n+\n米饭 | 碗\n## 营养好搭配"}, "茭白炒肉丝": {"ingredients": "茭白300克，肉丝100克，葱花、高汤、水淀粉、盐各适量。", "steps": "1 将茭白削皮，切成片。2 用高汤、水淀粉调成芡汁。3 油锅烧热，烧至五成热时，放入肉丝、茭白片炒一下，加盐，烹入芡汁，炒熟后撒葱花即可。\n营养师建议：茭白以春夏季的质量最佳。营养配餐：鸡血豆腐汤1碗、馒头1个。饮食宜忌：茭白性寒，不宜过多食用。"}, "羊骨小米粥（jinpai）": {"ingredients": "羊骨块50克，小米30克，陈皮、姜丝、苹果块各适量。", "notes": "羊骨中含有磷酸钙、碳酸钙、钾、铁、骨胶原、骨类黏蛋白、磷脂等营养成分，对产后妈妈腰膝酸软、筋骨酸疼、骨质疏松等有一定的食疗效果。"}, "羊骨小米粥（366）": {"ingredients": "羊骨50克，小米30克，陈皮丝、姜丝、苹果块各适量。", "steps": "①小米洗净，浸泡一会儿；羊骨洗净，捣碎。2在锅中放入适量清水，将羊骨、陈皮丝、姜丝、苹果块放入锅中，用大火烧沸。③放入小米文火熬煮，待小米熟透即可。\n羊骨小米粥1碗\n+\n鲜肉包1个\n+\n煮鸡蛋1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈的精神状态有了很好的改善，但子宫及各脏器尚未完全复位，所以不要吃太多高脂肪、高蛋白质的食物，宜补气、补血。\n2. 新妈妈宜适量吃板栗补肾。\n3. 鸡蛋有很高的营养价值，富含蛋白质、氨基酸和卵磷脂，是产后新妈妈滋补身体的好食材，但过多食用会加重胃、肠、肝、肾等脏器的负担，所以并非越多越好。新妈妈每天摄入蛋白质100克左右就可以了，因此每天吃一两个鸡蛋就足够了。"}, "板栗黄焖鸡（jinpai）": {"ingredients": "鸡肉150克，板栗100克，水淀粉、黄酒、白糖、葱段、姜块、香油、酱油、盐各适量。", "steps": "1 芹菜洗净，切段。\n2 将猪肝洗净，除去筋膜，切成片，放入碗中，加葱花、姜末、水淀粉，搅拌均匀。\n3 在油锅中将葱花、姜末爆香后投入猪肝片，翻炒一会儿加入芹菜，继续翻炒片刻；加入高汤、盐、酱油，以小火煮沸，用水淀粉勾芡，淋入香油，撒上香菜碎即可。\n1 将板栗用刀切成两半，放到锅里煮熟后捞出，去壳；鸡肉切块。\n2 油锅烧热，将葱段爆香，再加鸡块煸炒至外皮变色后，加适量清水及盐、姜块、酱油、白糖、黄酒，用中火煮。\n3 煮沸后，用小火焖至鸡肉将要酥烂时，将板栗放下去一起焖。\n4 待鸡肉和板栗都酥透后，用水淀粉勾芡，淋上香油即可。", "notes": "板栗黄焖鸡补而不腻，\n还能通过板栗的活血止血之效，\n促进子宫恢复。"}, "板栗黄焖鸡（366）": {"ingredients": "鸡腿150克，板栗100克，水淀粉、料酒、白糖、葱段、姜块、香油、酱油、盐各适量。", "steps": "①将板栗切成两半，煮熟后去壳；鸡腿切块。②油锅烧热，将葱段爆香，再加鸡腿块煸炒至外皮变色，加适量清水及盐、姜块、酱油、白糖、料酒，用中火煮。③煮沸后，用小火焖至鸡肉将要酥烂时，放入板栗，最后用水淀粉勾芡，淋上香油即可。\n板栗黄焖鸡1份\n豆腐丝1份\n麦芽粥1碗\n## 营养好搭配"}, "山药奶肉羹": {"ingredients": "羊瘦肉150克，山药50克，牛奶120毫升，盐、姜片各适量。", "steps": "①羊瘦肉洗净，切片；山药去皮，洗净，切片。②将羊瘦肉片、山药片、姜片放入锅内，加入适量清水，小火炖煮至肉烂，出锅前加入牛奶、盐，稍煮即可。\n营养师建议：可加入香菇。\n营养配餐：茭白炒肉丝1份、土豆饼1块。\n饮食宜忌：适宜秋冬季坐月子的新妈妈食用。"}, "花椒红糖饮（jinpai）": {"ingredients": "花椒 12 克，红糖适量。", "steps": "1 将花椒清洗干净，沥干水分；锅中加适量水，放入花椒，待水烧开后，转小火继续加热20分钟。\n2 在花椒水中调入适量红糖，搅拌均匀即可饮用。", "notes": "此饮料可帮新妈妈回乳，不喜欢花椒味道的新妈妈，可多加些红糖。花椒属热性，夏天食用，容易引起便秘，回乳时每天饮用花椒红糖饮1次即可。"}, "花椒红糖饮（366）": {"ingredients": "花椒 15 克，红糖适量。", "steps": "①将花椒先放在清水中泡1小时。\n②锅置火上，倒入花椒水再大火煮10分钟。③出锅时加入红糖即可。\n花椒红糖饮1碗\n煎鸡蛋1个\n馅饼1个\n## 营养好搭配"}, "白斩鸡（jinpai）": {"ingredients": "三黄鸡1只，葱末、姜末、蒜末、香油、醋、盐、白糖各适量。", "steps": "1 将紫甘蓝、胡萝卜洗净，切丝备用；绿豆芽洗净；豆干洗净，切丝。\n2 将所有准备好的食材用开水焯熟，然后加少许盐和香油拌匀。\n3 将拌好的原料均匀地放在豆皮上，卷起，用小火煎至表皮金黄。\n4 待放凉后切成小卷，摆入盘中即可食用。\n1 鸡处理洗净，把鸡的嘴巴从翅膀下穿过去，放入热水锅中，用小火焖30分钟，利用水的热度把鸡浸透、泡熟。\n2 葱末、蒜末、姜末同放到小碗里，再加白糖、盐、醋、香油，用浸过鸡的高汤将其调匀。\n3 接着把鸡拿出来剁小块，放入盘中，把调好的汁浇到鸡肉上即可，也可边蘸边食。\n## 产后第42天\n恶露或月经干净后再做B超\n身体未恢复禁止性生活\n晚餐不宜过饱\n做些简单家务\n重视产后检查\n伤口愈合好再同房\n## 顺产关键点", "notes": "此道菜品保留了鸡肉的原汁原味，蘸食的方法会带给新妈妈不一样的口感，既补充了营养，又享受了美味。"}, "白斩鸡（366）": {"ingredients": "三黄鸡1只，葱末、姜末、蒜末、香油、醋、盐、白糖各适量。", "steps": "①三黄鸡洗净，放入热水锅中，小火焖30分钟，利用水的热度把三黄鸡浸透、泡熟。②把所有调料放到碗里，用浸过三黄鸡的高汤调匀。③三黄鸡拿出来剁块，放入盘中，将调好的汁浇到鸡肉上即可。\n营养师建议：三黄鸡可与冬瓜或土豆同炖。营养配餐：清炒蚕豆1份、米饭1碗。饮食宜忌：此菜有益于新妈妈恢复伤口。"}, "松仁玉米": {"ingredients": "玉米粒100克，豌豆、松仁各30克，胡萝卜丁、葱花、盐、白糖、水淀粉各适量。", "steps": "①豌豆、松仁洗净。2油锅烧热，放入葱花煸香，然后下胡萝卜丁翻炒，再下豌豆、玉米粒翻炒至熟，加盐、白糖调味，加松仁，出锅前用水淀粉勾芡即可。\n松仁玉米1碗\n+\n海带炖肉片1份\n+\n牛肉卤面1份\n## 营养好搭配\n# 产后第17天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈在进行补血、催乳的同时，还需加强全面的营养，如多吃含维生素的蔬菜、含钙量高的肉类和汤类。\n2. 不宜喝味增汤，长期食用容易导致宝宝缺锌，出现厌食症状。"}, "海带炖肉片": {"ingredients": "海带、猪瘦肉各100克，枸杞5克，黄豆50克，盐、姜片各适量。", "steps": "①将海带、黄豆分别泡发，洗净，海带切条；枸杞洗净；猪瘦肉洗净，切片。②锅内加水煮沸后，放入海带烫一下。③取炖盅，加入海带条、猪瘦肉片、枸杞、黄豆、姜片，加入盐、适量清水，炖90分钟即可。\n海带炖肉片1份\n猪肝炒油菜1份\n米饭1碗\n## 营养好搭配"}, "蒓菜鲤鱼汤": {"ingredients": "鲤鱼1条，莼菜100克，盐、料酒、香油各适量。", "steps": "①将莼菜择洗干净；鲤鱼处理干净。\n②将鲤鱼、莼菜放入锅内，加清水煮沸，去浮沫，加料酒，转小火煮20分钟。\n③出锅前加入盐调味，淋入香油即可。\n营养师建议：可加入山楂。\n营养配餐：胡萝卜肉片1份、牛肉饼1块。\n饮食宜忌：有慢性疾病者慎食。"}, "爆鳝鱼面": {"ingredients": "鳝鱼200克，菠菜20克，面条100克，盐、酱油、葱段、姜片、高汤、水淀粉各适量。", "steps": "1 将鳝鱼收拾好，洗净，切丝；菠菜洗净、切段；面条煮熟。2 油锅中放入姜片、葱段、鳝鱼丝，加菠菜段、翻炒片刻。3 加高汤、酱油、盐，烧沸入味后用水淀粉勾芡，浇在面条上即可。\n爆鳝鱼面1碗\n+\n菠菜粉丝1份\n+\n奶香带鱼1份\n## 营养好搭配"}, "百 合葦芥粥": {"ingredients": "百合10克，荸荠30克，糯米、大米各30克，枸杞、冰糖各适量。", "steps": "①百合洗净，用水泡发；荸荠去皮，洗净，切片；糯米、大米分别洗净，浸泡。 $ ^{②} $锅置火上，放入糯米、大米和适量清水，大火烧沸后改小火熬煮至粥熟。 $ ^{③} $放入荸荠片、百合、枸杞和冰糖煮熟即可。\n营养师建议：粥熬稠些，可以当主食。营养配餐：煮鸡蛋1个、彩椒鸡丝1份。饮食宜忌：用冰糖调味时不可放过量。"}, "花生鸡爪汤": {"ingredients": "鸡爪50克，花生20克，姜片、盐各适量。", "steps": "1鸡爪剪去爪尖，洗净；花生用温水浸泡30分钟。2锅中加适量水，大火煮沸后，放入鸡爪、花生、姜片，煮至熟透。3加盐调味，转小火稍焖煮即可。\n花生鸡爪汤1碗\n奶油白菜1份\n米饭1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈选择低脂、低热量、滋补功能强的食物进补是必要的，但要少食花生、猪蹄、鲫鱼等促进乳汁分泌的食物。\n2. 晚餐不要吃得太饱，以免消化不良，影响睡眠质量。\n3. 新妈妈的房间温度最好保持在20~25℃，室内空气的相对湿度以保持在55%~65%为宜。尤其是冬季，应特别注意居室内的空气不能过于干燥，可在室内使用加湿器或放盆水，以提高空气湿度。"}, "海参木耳烧豆腐": {"ingredients": "泡发海参、豆腐各50克，木耳10克，\n芦笋、胡萝卜、葱末、姜末、盐各适量。", "steps": "① 泡发海参去内脏、洗净；木耳泡发后切碎；胡萝卜、芦笋、豆腐洗净切丁。\n② 海参、芦笋丁分别氽熟，捞出。\n③ 油锅烧热，爆香葱末、姜末，放入胡萝卜丁、海参和木耳碎，加入适量水。\n④ 烧沸后倒入豆腐丁、芦笋丁，加盐调味即可。\n海参木耳烧豆腐1份\n鸭肉冬瓜汤1碗\n南瓜饼1个\n## 营养好搭配"}, "银耳鸡汤": {"ingredients": "银耳 20 克，鸡汤、盐、白糖各适量。", "steps": "①将银耳用温水浸泡20分钟，泡发后去蒂，洗净，撕小朵。②将银耳放入砂锅中，加入适量清水，用小火炖30分钟左右。③待银耳炖透后放入鸡汤，等烧沸后，加入盐、白糖调味即可。\n营养师建议：银耳可以换成红枣。\n营养配餐：清炒莴笋1份、鲜肉包1个。\n饮食宜忌：煮熟的银耳不宜久放。"}, "麦芽鸡汤（jinpai）": {"ingredients": "老母鸡肉300克，炒麦芽60克，高汤、盐、胡椒粉、葱段、姜片各适量。", "steps": "1 先将老母鸡肉洗净，切成 3 厘米见方的块，备用。\n2 油锅烧热，放入葱段、姜片、鸡块煸炒几下，加入高汤、炒麦芽，小火炖一两个小时，加胡椒粉、盐调味即可。", "notes": "老母鸡与炒麦芽搭配不但有回乳作用，还是补虚佳品，适合需要回乳的新妈妈食用。\n花椒属于热性香料，气味芳香，可除各种肉类的腥膻臭气，能促进唾液分泌，增加食"}, "麦芽鸡汤（366）": {"ingredients": "鸡肉100克，生麦芽、炒麦芽各20克，高汤、盐、葱段、姜片各适量。", "steps": "①鸡肉切块备用；将生麦芽、炒麦芽用纱布包好。②锅中放油，烧热后放入葱段、姜片、鸡块煸炒。③放入高汤、麦芽包，小火炖90分钟，加盐即可。"}, "西红柿牛肉粥": {"ingredients": "西红柿100克，牛肉、大米各50克，盐适量。", "steps": "①西红柿开十字伤口，略烫后去皮，切碎；牛肉洗净，剁成肉末；大米洗净，浸泡。②锅置火上，水烧开，倒入牛肉末，水开后撇去浮沫，再倒入西红柿碎及大米。③大火煮开后转小火，至粥熟后，加盐调味即可。"}, "百 合炒肉": {"ingredients": "鲜百合80克，猪里脊肉150克，鸡蛋清、盐、葱花、水淀粉各适量。", "steps": "①猪里脊肉洗净，切片；鲜百合洗净。\n②将百合、肉片用盐、蛋清抓匀，加水淀粉搅拌均匀。③油锅烧热，放入备好的肉片、百合，翻炒至熟，加盐调味，撒上葱花即可。\n西红柿牛肉粥不仅味道鲜美，而且营养充足，适宜新妈妈食用。\n# 产后第18天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈因哺喂宝宝难免会觉得疲劳，可以喝一些缓解疲劳的粥类，多吃水果，放松心情，照顾好自己。\n2. 哺乳妈妈偶尔出现奶水少的情况时先不要着急，通过一两天的调理，一般就会恢复正常。"}, "木瓜排骨汤": {"ingredients": "猪肋排150克，木瓜50克，蜜枣2颗，花生仁、料酒、盐各适量。", "steps": "1 将猪肋排切成小块，用开水汆烫；蜜枣、花生仁洗净；木瓜洗净，取肉切块。2 在锅中加适量清水，烧沸后加入肋排块、木瓜块、蜜枣、花生仁、料酒和盐，用大火烧沸后转用小火煮熟即可。\n木瓜排骨汤 1碗\n+\n什锦黄豆 1份\n+\n米饭 1碗\n## 营养好搭配"}, "奶香带鱼": {"ingredients": "带鱼1条，牛奶150毫升，熟黑芝麻、料酒、盐、酱油、淀粉、香油各适量。", "steps": "①带鱼去内脏，洗净，切块，用料酒、盐腌10分钟，拌上淀粉。②油锅烧热，将带鱼块放入锅中，煎至金黄色捞出。③锅内加水，放入牛奶，待汤汁烧开时，放酱油、盐。④大火烧沸，淋上香油，用淀粉勾芡，浇在带鱼上，最后撒上熟黑芝麻即可。\n营养师建议：带鱼银鳞有营养，不要过度刮拭。\n营养配餐：紫菜蛋汤1碗、米饭1碗。\n饮食宜忌：有湿疹者慎食。"}, "红枣鸡丝糯米饭": {"ingredients": "红枣8颗，鸡肉100克，糯米50克。", "steps": "1 鸡肉洗净，切丝，汆烫；糯米洗净，浸泡2小时。2 将糯米、鸡肉丝、红枣放入锅中，加适量清水，蒸熟成饭即可。\n红枣鸡丝糯米饭1碗\n+\n明虾炖豆腐1份\n+\n葡萄柚2瓣\n## 营养好搭配"}, "海鲜炒饭": {"ingredients": "米饭1碗，鸡蛋2个，墨鱼1只，虾仁2只，葱末、水淀粉、盐各适量。\n①鸡蛋分开蛋清和蛋黄：墨鱼去膜切丁，和虾仁同洗，加水淀粉和部分蛋清拌匀；蛋黄煎成蛋皮，切丝备用。2油锅烧热，煸香葱末，加入剩余蛋清略炒，放入虾仁、墨鱼丁拌炒，加入米饭、蛋丝、盐炒匀，盛入盘中即可。", "steps": "营养师建议：偏素食者可加入蔬菜。\n营养配餐：焖鸡块1份、凉拌菜1份。\n饮食宜忌：海鲜过敏者应避免食用墨鱼、虾仁等，可将海鲜替换为胡萝卜和火腿。"}, "牛肉饼": {"ingredients": "牛肉末250克，鸡蛋1个，葱末、姜末、料酒、盐、香油各适量。", "steps": "①牛肉末中加入葱末、姜末、料酒、盐、香油，搅拌均匀，打入鸡蛋调匀成馅。②将肉馅摊平呈饼状，用少许油煎熟，或上屉蒸熟，也可以用微波炉大火加热5~10分钟至熟。\n牛肉饼3块\n西红柿炒菜花1份\n枸杞山药粥1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈注意粗细粮搭配，不吃含有过多热量的食物，并控制好进食量。\n2. 新妈妈宜吃核桃补脑，还可预防产后脱发。\n3.产后新妈妈的身体正处于恢复期，月子期的贴身衣物在清洗时，最好用手洗。洗衣机中的洗衣槽容易积累灰尘、细菌，洗衣时容易沾在衣物上，产后新妈妈抵抗力差，会大大增加细菌侵袭的概率。小宝宝的衣物也最好手洗，并要注意一定漂洗干净。"}, "核桃红枣粥（jinpai）": {"ingredients": "核桃仁20克，红枣2颗，大米30克，冰糖适量。", "notes": "核桃含B族维生素、维生素C等，能通经脉、黑须发。此粥具有滋阴润肺、补脑益智、润肠通便的功效。"}, "核桃红枣粥（366）": {"ingredients": "核桃仁20克，红枣5颗，大米30克，冰糖适量。", "steps": "①将大米洗净；红枣去核洗净；核桃仁洗净。 ②将大米、红枣、核桃仁放入锅中，加适量清水，用大火烧沸后改用小火，等大米成粥后，加入冰糖搅匀即可。\n核桃红枣粥1碗\n+\n煮鸡蛋1个\n+\n鲜肉包1个\n## 营养好搭配"}, "鸡蛋软煎饼": {"ingredients": "鸡蛋1个，面粉100克，淀粉、葱花、盐各适量。", "steps": "①将面粉、淀粉加盐，倒入凉水搅拌成糊；葱花、鸡蛋打入糊中，搅散。\n②平底锅刷油，锅热后转小火，倒入1勺面糊，均匀摊开，一面凝固后翻面，待两面金黄时出锅即可。\n营养师建议：面糊中可放入胡萝卜丝或菠菜末。\n营养配餐：绿豆百合粥1碗、酸奶1杯。\n饮食宜忌：鸡蛋放1个即可。"}, "鲤鱼粥": {"ingredients": "鲤鱼1条，大米30克，姜末、葱段、料酒、盐、香油各适量。", "steps": "①鲤鱼剖洗干净后用小火煮汤，加入姜末、葱段和料酒，煮熟后去骨刺，留汤及鱼肉备用。②大米洗净，放入锅中用大火煮，待粥黏稠时，加入鱼汤、鱼肉与盐调匀，稍煮片刻。③食用时加入香油即可。\n鲤鱼粥1碗\n+\n糖醋萝卜1份\n+\n花卷1个\n## 营养好搭配"}, "白萝卜蛏子汤（jinpai）": {"ingredients": "白萝卜50克，蛏子100克，葱段、姜片、蒜末、盐、料酒各适量。\n忌盆浴\n勿湿发睡觉", "notes": "这道汤可以有效增强妈妈的食欲，蛏子内的钙含量很高，也是帮助妈妈补钙的好食物。妈妈吃得好，宝宝才会更健康。"}, "白萝卜蛏子汤（366）": {"ingredients": "白萝卜50克，蛏子100克，葱花、姜片、蒜末、盐、料酒各适量。\n①蛏子洗净，清水浸泡后入沸水中略烫，捞出剥去外壳；白萝卜削皮，切丝。②锅内放油烧热，放入蒜末、姜片炒香后，倒入清水、料酒。③剥好的蛏子肉、白萝卜丝一同放入锅内炖煮，煮熟后加盐，撒入葱花即可。", "steps": "营养师建议：可将蛏子换成蛤蜊。\n营养配餐：西红柿炖牛腩1份、米饭1碗。\n饮食宜忌：胃肠功能不佳者不宜食用。"}, "蜜汁山药条": {"ingredients": "山药50克，芝麻10克，蜂蜜、冰糖各适量。", "steps": "①芝麻炒熟备用；山药洗净去皮，切条。②山药条放入沸水中烫熟，捞出码盘。③炒锅中加水，放
