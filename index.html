入冰糖，小火煮至冰糖融化，倒入蜂蜜，熬至开锅冒泡，最后将蜜汁浇在山药上，撒上芝麻即可。\n蜜汁山药条1份\n+\n面包1个\n+\n熟板栗3颗\n## 营养好搭配\n# 产后第19天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈每日水分消耗很大，除了直接饮水补充，还应多食骨汤、鸡汤、鱼汤以及粥类、牛奶、豆浆等补充足够的水分。\n2. 产后气血两亏的新妈妈，坚持用红枣煲汤，能够补血安神。"}, "鯛鱼豆腐羹": {"ingredients": "鲷鱼1条，豆腐100克，胡萝卜50克，葱花、盐、水淀粉各适量。", "steps": "①鲷鱼处理后切块，入开水汆烫捞出，用清水洗净；豆腐洗净，切块；胡萝卜洗净，切丁。2锅内加水，烧开，放入鲷鱼块、豆腐块、胡萝卜丁，小火煮10分钟，放入盐，用水淀粉勾芡后盛入碗中，撒上葱花即可。\n鲷鱼豆腐羹1碗\n+\n香菇青菜1份\n+\n馒头1个\n## 营养好搭配"}, "王不留行猪蹄汤": {"ingredients": "猪蹄1个，王不留行10克，盐适量。", "steps": "①王不留行用纱布包裹；猪蹄洗净，切块。②王不留行纱包和洗净的猪蹄块一起放进锅内，加水煮烂。③出锅前取出纱包，加盐即可。\n营养师建议：可放入枸杞。\n营养配餐：豌豆黄1块、红豆黑米粥1碗。\n饮食宜忌：宜用月子水炖煮。"}, "红枣黑豆炖鲤鱼": {"steps": "①鲤鱼去鳞、去内脏，洗干净，用盐、姜片腌制待用。②把黑豆放入锅中，用小火炒至豆衣裂开，取出。③鲤鱼、黑豆、红枣、姜片一起放入炖盅内，加入适量沸水，用中火隔水炖1小时，放入适量盐调味即可。\n## 营养好搭配"}, "鲢鱼小米粥（zibu）": {"ingredients": "鲢鱼肉适量，丝瓜仁10克，小米半杯。\n白菜半棵（切片），干贝6粒，蒜瓣适量，葱末少许。\n盐、料酒、水淀粉各适量。\n土鸡1只，猪蹄500克，山药100克，姜5克。\n盐1小匙，油适量。", "steps": "② 小米淘洗干净，与适量水一同放锅中煮成粥。（图②）\n① 备齐所需材料。鲢鱼处理干净，切条备用。（图①）\n③ 待粥煮沸，放入鱼肉条及丝瓜仁再煮，至鱼熟米软即可。（图③）\n白菜口感软香，干贝口感滑嫩，二者搭配，成菜味道极佳。\n① 备齐所需材料。干贝洗净后用温水浸泡30分钟，取出后加料酒蒸软，凉后撕成条，铺在碗底。（图①）\n② 将蒜瓣炸至金黄，放在干贝丝上。白菜片加盐炒软后放入装有干贝丝和蒜瓣的碗中。\n③大碗用大火蒸20分钟，取出，碗内的汤汁倒入炒锅中，将大碗倒扣在盘中。将炒锅中汤汁煮沸，加盐、水淀粉搅匀，淋在干贝白菜上，撒葱末即可。（图②、图③）\n这道汤品没有过多的调味料，口感清爽可口。\n① 土鸡和猪蹄均洗净，剁成块；姜去皮，切片；山药去皮，切滚刀块。（图①）\n② 油锅烧热，下入鸡块、猪蹄块、姜片翻炒3分钟左右，炒至稍出香味且肉质收紧时，加入热水，加水量以没过材料2厘米为佳，炖煮2小时。（图②、图③）\n③ 山药块加入锅中，盖上盖子再煮10分钟，调入盐即可。（图④）", "notes": "——土鸡中含有丰富的蛋白质，蛋白质可以促进人体的生长发育。猪蹄中含有的胶原蛋白，有通乳的作用。山药可滋阴、补气。这道汤品可以促进新妈妈身体新陈代谢，也可以帮助缺乳的新妈妈下乳。"}, "鲢鱼小米粥（366）": {"ingredients": "鲢鱼1条，丝瓜仁10克，小米60克。", "steps": "①鲢鱼去内脏去鳞，洗净，切成块；丝瓜仁、小米洗净，小米浸泡2小时。②锅置火上，放入小米和适量水，大火烧沸后改小火，熬煮成粥。③待粥煮熟时，放入鱼块，再次烧沸后放入丝瓜仁，略煮即可。\n营养师建议：鲢鱼也可炖豆腐。\n营养配餐：里脊肉炒芦笋1份、草莓汁1杯。\n饮食宜忌：过敏者应避免食用。"}, "松仁爆鸡丁": {"ingredients": "鸡胸肉200克，鸡蛋1个，松仁20克，姜末、盐、白糖、料酒各适量。", "steps": "①将鸡蛋打成蛋液；鸡胸肉切丁，加盐、料酒、蛋液拌匀。②将鸡丁、松仁分别炒熟。③另起锅，入姜末，倒入鸡丁、松仁，加盐、白糖，翻炒均匀即可。\n松仁爆鸡丁1份\n+\n鸭血豆腐汤1碗\n+\n玉米香菇虾肉饺1份\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈可以吃些清淡的食物，但饮食也要全面营养，不能挑食、偏食。如果身体恢复良好，可以正常吃一日三餐，而不用加餐，这样更利于产后瘦身。\n2. 宜吃补血、益智的食物，如紫米、木耳、黑豆、核桃等。\n3.产后新妈妈可通过心理减压法来摆脱忧郁、抑郁的困扰。新妈妈要学会自我调整，自我克制，并试着从可爱的宝宝身上寻找快乐。多吃水果和蔬菜，身体健康可使情绪稳定。尽可能地多活动，但避免进行重体力运动。另外，不要过度担忧，应学会放松。"}, "核桃仁枸杞紫米粥": {"ingredients": "紫米、核桃仁、大米各50克，枸杞10克。", "steps": "①将紫米、大米洗净，浸泡30分钟；核桃仁拍碎；枸杞拣去杂质，洗净。\n②紫米、大米放入锅中，加适量清水，大火煮沸，转小火继续煮30分钟。\n③放入核桃碎与枸杞，继续煮15分钟即可。\n核桃仁枸杞紫米粥1碗\n+\n煮鸡蛋1个\n+\n鲜肉包1个\n## 营养好搭配"}, "胡萝卜菠菜鸡蛋饭": {"ingredients": "米饭1碗，鸡蛋2个，胡萝卜、菠菜各20克，葱末、盐各适量。\n熟鸡腿150克，青椒、红椒各1个，姜末、蒜末、白糖、蚝油、盐各适量。", "steps": "①胡萝卜洗净，切丁；菠菜洗净，切碎；鸡蛋打成蛋液。②油锅烧热，放鸡蛋液炒散，盛出。③另起油锅，放葱末煸香，加入米饭、胡萝卜丁、菠菜碎、鸡蛋翻炒，最后加盐调味。\n营养师建议：蔬菜可换成应季的。\n营养配餐：板栗黄焖鸡1份、海带汤1碗。\n饮食宜忌：鸡蛋不要超过2个。\n鸡肉味甘性平，可益气，补虚劳，能帮助新妈妈增强抵抗力。\n1 熟鸡腿撕成小条。2 青椒、红椒洗净，去子，切成细条。3 油锅烧热，放入姜末和蒜末炒香，然后放入青椒条、红椒条翻炒。4 放入鸡肉条，翻炒片刻后，加入盐、白糖、蚝油，大火翻炒均匀即可出锅。\n彩椒鸡丝1份\n猪肝汤1碗\n豇豆焖米饭1碗"}, "西蓝花炒猪腰（jinpai）": {"ingredients": "猪腰100克，西蓝花200克，葱段、姜片、黄酒、酱油、盐、白糖、水淀粉、香油各适量。", "notes": "猪腰富含动物蛋白质、铁、锌，西蓝花含维生素C丰富，有利于铁的吸收，预防产后贫血。"}, "西蓝花炒猪腰（366）": {"ingredients": "猪腰100克，西蓝花200克，葱段、姜片、料酒、酱油、盐、白糖、水淀粉、香油各适量。\n鸡蛋2个，木耳10克，葱花、香菜叶、盐、香油各适量。", "steps": "①将猪腰去腥臊部分，在料酒中浸泡后捞出切花刀；西蓝花切块，焯水。\n②油锅烧热，将葱段、姜片爆香后放入猪腰，加酱油、盐、白糖煸炒，放入西蓝花块一同煸炒，再加水淀粉勾芡，以香油调味。\n营养师建议：芹菜、木耳都可炒猪腰。\n营养配餐：百合炒肉1份、素馅饼1个。\n饮食宜忌：血脂、胆固醇偏高的新妈妈不宜食用猪腰。\n木耳炒鸡蛋\n木耳含蛋白质、维生素和矿物质，有益气强智、补血活血等功效。\n①木耳泡发，洗净，沥水；将鸡蛋打入碗内，备用。②油锅烧热，将蛋液倒入，炒熟后，出锅备用。③烧油锅，将木耳放入锅内炒几下，再放入鸡蛋，加入盐、葱花、香油调味，撒上香菜叶即可。\n木耳炒鸡蛋1份\n+\n海参烧豆腐1份\n+\n花卷1个\n营养好搭配\n# 产后第20天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈在进补的同时，要多食用一些富含膳食纤维或者可以排毒的食物，以免发生便秘，如冬瓜、菌类、红薯、蜂蜜等。\n2. 哺乳妈妈最好不要化妆。"}, "冬瓜陈皮汤": {"ingredients": "冬瓜 200 克，陈皮 5 克，干香菇 1 朵，香油、盐各适量。", "steps": "①将冬瓜去皮，洗净，切块；陈皮用温水浸泡5分钟，洗净，切丝。②干香菇用温水泡发，去蒂洗净，切花刀。③冬瓜块、陈皮丝和香菇放入砂锅中，加入适量清水，大火煮沸转小火煲1小时，加盐调味，淋入香油即可。\n冬瓜陈皮汤1碗\n五彩虾仁1份\n平菇小米粥1碗\n## 营养好搭配"}, "香菇荞麦粥": {"ingredients": "大米50克，荞麦40克，干香菇2朵。", "steps": "①将干香菇浸入水中，泡开，切成丝。\n②大米和荞麦淘洗干净，放入锅中，加适量水，用大火煮。③煮沸后放入香菇丝，转小火，慢慢熬制成粥即可。\n营养师建议：可用荞麦面做成面条，也可蒸馒头或花卷。\n营养配餐：鸡蛋1个、葱花饼1个。\n饮食宜忌：胃肠功能不佳的新妈妈应少食。"}, "清蒸茄丝": {"steps": "①猪肉洗净，切丝，放入开水中汆烫一下。②茄子洗净，切成细丝，放入水中浸泡10分钟，捞出，挤干水分。③将茄丝、肉丝、酱油、白糖、姜丝、盐一同放入锅中，拌匀，隔水蒸12分钟，然后倒入少许香油，继续小火蒸3分钟，出锅撒上葱花即可。\n清蒸茄丝1份\n+\n海鲜炒饭1碗\n+\n紫菜鸡蛋汤1碗\n## 营养好搭配"}, "乌鸡白凤汤": {"ingredients": "乌鸡1只，白凤尾菇50克，料酒、葱段、姜片、盐各适量。", "steps": "①将乌鸡除去内脏，洗净，斩块；白凤尾菇洗净，撕片。②将姜片放入锅中，加入清水煮沸，放入乌鸡块，加入料酒、葱段，用小火焖煮至酥软。③放入白凤尾菇片，煮沸几分钟，加入盐调味即可。\n营养师建议：白凤尾菇可用香菇代替。\n营养配餐：清炒油菜1份、米饭1碗。\n饮食宜忌：适合体虚血亏的新妈妈食用。"}, "红薯小米粥": {"ingredients": "小米50克，红薯30克，白糖适量。", "steps": "①红薯洗净，去皮，切成小块。②小米淘洗干净，和红薯块一同放入锅中，加适量水，小火熬煮成粥。③食用时加白糖调味即可。\n红薯小米粥1碗\n+\n土豆饼1块\n+\n牛奶1杯\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈在进补时，不妨吃些开胃健脾、助消化的食物，可以缓解高蛋白、高脂肪食物的油腻。\n2. 鸡蛋不宜与豆浆、白糖一起食用，会影响蛋白质吸收。\n3. 对坐月子的新妈妈来说，热水洗脚既保健又解乏。每晚舒舒服服地用热水泡泡脚，对恢复体力，促进血液循环，缓解肌肉和神经疲劳大有好处。在洗脚的同时，不妨按摩足趾和足心，效果会更好。"}, "星级月嫂有话说": {"ingredients": "去皮蚕豆300克，红椒、葱、盐各适量。", "steps": "①将红椒切丁；葱切末；蚕豆洗净。\n②油锅烧至八成热时，放入葱末炝锅，再放入蚕豆、彩椒丁，大火翻炒，加水焖煮，水量与蚕豆持平。③蚕豆熟透后，加盐调味即可。\n清炒蚕豆1份\n萝卜丝鲫鱼汤1碗\n米饭1碗\n## 营养好搭配"}, "西红柿疙瘩汤": {"ingredients": "西红柿、鸡蛋各1个，面粉50克，盐适量。", "steps": "①面粉边加水边用筷子搅拌成颗粒状；鸡蛋打散；西红柿洗净，切块。\n②油锅烧热，倒入鸡蛋液炒散，加入适量水，将鸡蛋煮开，倒入西红柿块。\n③再将面粉颗粒慢慢倒入西红柿鸡蛋汤中煮3分钟，加盐调味即可。\n营养师建议：可以加入肉丁。\n营养配餐：彩椒鸡丝1份、千层饼1块。\n饮食宜忌：不要食用青色未熟的西红柿。"}, "萝卜丝烧带鱼": {"ingredients": "带鱼1条，白萝卜50克，料酒、盐、白糖、水淀粉、葱花、姜末各适量。", "steps": "①带鱼去内脏，洗净切段，加盐、料酒、水淀粉腌制。2白萝卜洗净切丝，焯水。3将带鱼段放入油锅，炸至金黄色，捞出。4另起油锅，放入姜末爆香，放入带鱼块、白萝卜丝，加水烧开，放白糖、盐调味，撒上葱花即可。\n萝卜丝烧带鱼1份\n+\n菠菜炒鸡蛋1份\n+\n米饭1碗\n## 营养好搭配"}, "红薯百合粥": {"ingredients": "红薯100克，鲜百合、青豆各20克，大米50克，冰糖适量。", "steps": "①红薯去皮，切块；青豆、鲜百合分别洗净，鲜百合掰小瓣；大米洗净，浸泡。②锅置火上，放入大米和适量水，大火烧沸后改小火，放入青豆、红薯块。③待粥煮至八成熟时，放入鲜百合片，待粥完全熟糯后，放入冰糖即可。\n营养师建议：可用山药或玉米代替红薯。营养配餐：清炒茭白1份、西蓝花炒猪腰1份。\n饮食宜忌：红薯一定要蒸熟煮透，否则吃后会有不适感。"}, "鲜肉小馄饨": {"ingredients": "鸡蛋1个，猪肉末150克，馄饨皮、紫菜、虾米、葱花、姜末、盐、白糖、生抽、蚝油、香油各适量。", "steps": "①将猪肉末、鸡蛋、盐、白糖、生抽、蚝油、葱花、姜末混合，拌匀做成馅。\n②肉馅放入馄饨皮中包好。③锅中倒适量清水，放入紫菜和虾米煮沸，再放入馄饨煮熟，淋上香油即可。\n鲜肉小馄饨1碗\n+\n盐水鸡肝1份\n+\n烧饼1个\n## 营养好搭配\n# 产后第21天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈要注意补钙，适当吃些虾皮、排骨等，但一定要少吃盐，否则会抑制钙吸收，血压高的新妈妈更要少吃盐。\n2. 根据宝宝吃奶量，新妈妈每天可少食多餐，吃五六餐。"}, "鲜虾粥": {"ingredients": "鲜虾50克，大米30克，芹菜碎、香菜叶、香油、盐各适量。", "steps": "①大米洗净，放入锅中加适量水开始煮粥。②鲜虾去除皮和虾线，洗净。③粥煮熟时，把芹菜碎、鲜虾放入锅中，放盐，搅拌。④煮5分钟左右，再将香菜叶放入锅中，淋入香油，煮沸即可。\n鲜虾粥 1碗\n煮鸡蛋 1个\n卷饼 1个\n## 营养好搭配"}, "丝瓜蛋汤（jinpai）": {"ingredients": "鸡蛋1个，丝瓜50克，盐适量。", "notes": "丝瓜蛋汤色泽鲜艳，味道鲜美，含有蛋白质、钙、锌、维生素C等多种营养素。对月子期间的新妈妈有很好的进补和催乳功效。"}, "丝瓜蛋汤（366）": {"ingredients": "丝瓜50克，鸡蛋1个，盐、香菜叶、香油各适量。", "steps": "①将鸡蛋打散，加适量香油搅拌均匀。②丝瓜洗净，去皮，切成滚刀块。③锅置火上，加入适量清水，水开后加入丝瓜块，倒入鸡蛋，起锅加盐调味，撒上香菜叶即可。\n营养师建议：加些虾皮可补钙。\n营养配餐：猪肝炒菠菜1份、米饭1碗。\n饮食宜忌：胃肠功能不佳者应少食。"}, "蚝油草菇": {"ingredients": "草菇200克，葱、姜、蚝油、老抽、盐各适量。", "steps": "①草菇洗净，切成两半。②葱、姜切丝，备用。③油锅烧热，放入葱丝、姜丝爆香。④放入切好的草菇，加蚝油、老抽、盐，翻炒均匀，炒熟即可。\n蚝油草菇1份\n+\n三鲜冬瓜汤1碗\n+\n牛奶馒头1个\n## 营养好搭配"}, "奶油葵花子粥": {"ingredients": "大米、南瓜各50克，葵花子15克，\n淡奶油适量。", "steps": "①南瓜洗净，切小块；葵花子洗净；大米洗净并浸泡30分钟。②锅置火上，放入大米和适量水，大火烧沸后改小火，熬煮成粥。③待粥快煮熟时，放入南瓜块、葵花子。④待粥熟时，放入淡奶油，搅拌均匀即可。\n营养师建议：可加入核桃、板栗等。\n营养配餐：菠菜粉丝1份、豆沙包1个。\n饮食宜忌：淡奶油用量要适当，不宜过多。"}, "莲藕排骨汤": {"ingredients": "猪排骨150克，莲藕100克，葱花、姜片、盐各适量。", "steps": "①将排骨斩段，洗净，放入沸水中汆烫，撇去血沫，捞出沥干；莲藕切片。②排骨段放入锅中，加姜片，放入适量水，大火烧开，煮15分钟。③放入藕片，改用小火，炖熟后，放入盐、葱花即可。\n莲藕排骨汤1碗\n+\n清炒海带丝1份\n+\n烧饼1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈的乳房可能还有少量乳汁渗出，没有关系，只要少吃助泌乳的食物，慢慢地乳汁会越来越少。\n2. 天气暖和时，到户外走走，能使新妈妈拥有好心情，有利于身体恢复。\n3. 新妈妈最好不吃甜食和零食。经常进食糖类，会腐蚀牙釉质，对牙齿造成损害，且容易长胖；经过高温油炸过的零食含有较多的盐和糖，并加有大量的食用色素，同样会损害身体健康。另外，吃过东西后也要及时漱口、刷牙，保持口腔清洁。"}, "奶香麦片粥（jinpai）": {"ingredients": "大米30克，鲜牛奶250毫升，麦片、高汤、白糖各适量。", "steps": "1 红小豆、花生仁、桂圆肉洗净，浸泡。\n2乳鸽宰杀后洗净，斩块，在沸水中烫一下，去除血水。\n3 在砂锅中放入适量清水，烧沸后放入乳鸽肉、红小豆、花生仁、桂圆肉，用大火煮沸后，改用小火煲，等熟透后加盐调味即可。\n1 将大米洗净，加入适量水浸泡 30 分钟后捞出，控水。\n2 在锅中加入高汤，放入大米，大火煮沸后转小火煮至米粒软烂黏稠。\n3 将稠粥放入饭锅中，加入鲜牛奶，煮沸后加入麦片、白糖拌匀，盛入碗中即可。", "notes": "麦片含有丰富的膳食纤维，能够促进肠道消化、吸收营养物质；还能帮助新妈妈进行糖、脂肪、蛋白质的代谢，并令人有饱腹感，减少热量过多摄入。"}, "奶香麦片粥（366）": {"ingredients": "大米30克，牛奶250毫升，麦片、高汤、白糖各适量。", "steps": "①大米洗净，加入适量水浸泡30分钟，之后捞出控水。②在锅中加入高汤，放入大米，大火煮沸后转小火煮至米粒软烂黏稠。③加入牛奶，煮沸后加入麦片、白糖，拌匀，盛入碗中即可。\n奶香麦片粥1碗\n+\n面包1个\n+\n煮鸡蛋1个\n## 营养好搭配"}, "鳝丝打卤面": {"ingredients": "面条100克，鳝鱼丝60克，葱末、姜末、酱油、白糖、盐、高汤各适量。", "steps": "①鳝鱼丝放入开水中略氽，捞出沥干；面条在开水锅中煮熟。②油锅烧热，放鳝鱼丝，炸至鳝鱼丝发硬时捞出。③锅中留底油，放入姜末、酱油、白糖、盐、高汤制成卤汁，倒入鳝鱼丝，上下翻动，使卤汁均匀地挂在鳝鱼丝上，出锅后浇在煮好的面条上，撒上葱末即可。\n营养师建议：鳝丝也可做成粥。\n营养配餐：白斩鸡1份、猕猴桃1个。\n饮食宜忌：调味品应尽量少放。"}, "麦芽山楂饮": {"ingredients": "麦芽 10 克，山楂、白糖各适量。", "steps": "①先将山楂切片，然后与麦芽分别放入锅中炒焦。②将炒麦芽、炒山楂放入锅中，加水煮15分钟，取汁，加入白糖即可。\n麦芽山楂饮1碗\n猪肉白菜蒸饺1份\n糖醋黄瓜1份\n拌豆腐干\n## 营养好搭配\n豆腐干富含蛋白质、脂肪、碳水化合物和钙、磷、铁等矿物质。\n## 原料\n豆腐干200克，葱末、香菜段、酱油、香油、盐各适量。\n## 做法\n①将豆腐干切丝，备用。②将豆腐干丝放在热水中焯一下，捞出。③放入葱末、香菜段、酱油、香油、盐，搅拌均匀即可。\n营养师建议：加入黄瓜丝、胡萝卜丝，可补充多种维生素。\n营养配餐：橙香鱼排1份、牛肉汤面1碗。\n饮食宜忌：酱油宜少放。"}, "三 鲜冬瓜汤（jinpai）": {"ingredients": "冬瓜、冬笋各30克，西红柿1个，鲜香菇5朵，油菜1棵、盐适量。", "steps": "1 将牛肉洗净切成薄片，加水、淀粉抓拌均匀，下入七八成热的清水锅中，焯熟捞出，沥水。\n2 将青椒去蒂、去子，洗净，切成片。\n3 油锅烧热后下入牛肉片，迅速翻炒至肉变色时，将葱末、姜末放入略炒几下，再倒入青椒炒匀，加入盐调味即可。\n1 冬瓜去皮去子后，洗净，切成片；鲜香菇去蒂，洗净，切成丝；冬笋切成片；西红柿洗净切成片；油菜洗净掰成段。\n2 将所有原料一同放入锅中，加清水煮沸；转小火再煮至冬瓜、冬笋熟透。\n3 出锅前放盐调味即可。", "notes": "冬笋含有多种维生素和氨基酸，不仅可以增强新妈妈的体质，而且可以预防新妈妈产后便秘。"}, "三 鲜冬瓜汤（366）": {"ingredients": "冬瓜、冬笋各30克，西红柿20克，香菇3朵，油菜、盐各适量。", "steps": "①冬瓜洗净，切片；香菇去蒂，洗净，切丝；冬笋切片；西红柿洗净切片；油菜洗净掰成段。②将所有原料放入锅中，加清水煮沸；转小火再煮至冬瓜片、冬笋片熟透。③出锅前放盐调味即可。\n三鲜冬瓜汤1碗\n松仁玉米1份\n牛肉饼1块\n## 营养好搭配"}, "星级月嫂有话说（366）": {"ingredients": "猪肝50克，黄瓜100克，香菜末、盐、醋、香油各适量。", "steps": "1 猪肝洗净，煮熟，切成薄片；黄瓜洗净，切片。2 将黄瓜片摆在盘内垫底，放上猪肝片、醋、盐、香油，撒上香菜末，食用时拌匀即可。\n猪肝拌黄瓜1份\n萝卜虾泥馄饨1碗\n猕猴桃酸奶1杯\n## 营养好搭配"}, "牛蒡粥": {"ingredients": "牛蒡、猪瘦肉各30克，大米100克，盐适量。", "steps": "①牛蒡去皮，洗净切片；猪瘦肉洗净，切条；大米洗净，浸泡。②锅置火上，放入大米和适量清水，大火烧沸后改小火，放入牛蒡片和猪瘦肉条，小火熬煮40分钟，待粥黏稠时，加盐即可。\n营养师建议：可加入胡萝卜、玉米。\n营养配餐：香葱鸡蛋饼1块、橙汁1杯。\n饮食宜忌：初次吃牛蒡应少量食用。"}, "豌豆猪肝汤": {"ingredients": "豌豆150克，猪肝100克，姜片、盐各适量。", "steps": "①将猪肝洗净，切成片；豌豆在凉水中浸泡。②锅中加水烧沸后放入猪肝片、豌豆、姜片，一起煮半小时。③待熟后，加盐调味即可。\n豌豆猪肝汤1碗\n+\n奶香带鱼1份\n+\n海鲜炒饭1碗"}, "什锦西蓝花": {"ingredients": "西蓝花150克、菜花200克，胡萝卜100克，白糖、醋、香油、盐各适量。", "steps": "①西蓝花、菜花洗净，掰成小朵；胡萝卜洗净，去皮，切片。②全部蔬菜放入开水中焯熟，盛盘，晾凉。③加白糖、醋、香油、盐，搅拌均匀即可。\n什锦西蓝花1碗\n+\n肉末香菇鲫鱼1份\n+\n花生麦片粥1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈产后瘦身计划渐渐提上了日程，牛肉、鸡蛋、鸡肉等食物可以帮助新妈妈增强体力，增加肌肉力量，为新妈妈运动提供源源不断的动力。\n2. 香菇能促进人体新陈代谢，宜吃香菇增强免疫力。\n3. 非哺乳妈妈的进补要格外用心，除了要增加全面的营养补充体力外，还可适当增加帮助新妈妈回乳的食物。补充的热量也要相应低一些，以便于新妈妈产后身材的恢复。回奶期间应避免进食猪蹄、花生、黄豆、鲫鱼等促进乳汁分泌的食物。"}, "牛肉炒菠菜": {"ingredients": "牛肉150克，菠菜100克，葱花、姜末、盐、白糖、酱油、淀粉各适量。", "steps": "①菠菜洗净切长段；牛肉沿横纹切薄片，将姜末、盐、白糖、酱油、淀粉加适量水调匀，放入牛肉片中拌匀备用。\n2 将菠菜段放入锅中，加盐煸炒片刻，盛入盘中备用。\n3 将牛肉放入炒至变色，取出盛于菠菜上，撒上葱花即可。\n牛肉炒菠菜1份\n西红柿蛋汤1碗\n小米饭1碗\n## 营养好搭配"}, "南瓜香菇包": {"ingredients": "南瓜 150 克，糯米粉 100 克，藕粉 20 克，香菇 3 朵，酱油、白糖各适量。", "steps": "①将南瓜去皮，煮熟后压碎，加入糯米粉和用温开水拌匀的藕粉，揉匀；香菇洗净、切碎。②油锅烧热，下香菇碎炒香，加入酱油、白糖制成馅料。③将揉好的南瓜糯米团分成若干份，擀成包子皮，包入馅料，放入蒸锅内蒸熟。\n营养师建议：南瓜可换成红薯。\n营养配餐：芹菜牛肉丝1份、火龙果1个。\n饮食宜忌：消化不好者尽量少吃。"}, "小鸡炖蘑菇": {"ingredients": "童子鸡200克，干香菇4朵，葱段、姜片、彩椒丝、香菜叶、酱油、料酒、盐、白糖各适量。", "steps": "①童子鸡洗净，剁成小块；干香菇用温水泡开，洗净，一半切片，一半切花刀。②鸡块放入油锅中翻炒，至鸡肉变色放入葱段、姜片、盐、酱油、白糖、料酒，加入适量清水。③水沸后放入香菇，中火炖熟，用彩椒丝、香菜叶点缀即可。\n小鸡炖蘑菇1碗\n+\n清炒油麦菜1份\n+\n馒头1个\n## 营养好搭配"}, "春笋蒸蛋": {"ingredients": "鸡蛋1个，春笋尖20克，葱花、酱油、盐、香油各适量。", "steps": "①将鸡蛋充分打匀，春笋尖切成细末。②笋末加到蛋液中，再加温开水到八分满，调入盐，搅拌均匀。③调好的蛋液上蒸锅蒸熟，出锅后加酱油、香油、葱花调味。\n营养师建议：春笋可换成香椿、荠菜。\n营养配餐：卷饼1块、熟板栗5颗。\n饮食宜忌：每日春笋食用不宜超过50克。"}, "雪梨大米豆浆": {"ingredients": "黑豆40克，大米30克，雪梨1个，蜂蜜适量。", "steps": "①将黑豆用水浸泡10~12小时，捞出洗净。②大米淘洗干净；雪梨去皮、去蒂、去核，切碎。③将除蜂蜜外所有材料放入豆浆机中，加水至上下水位线之间，启动豆浆机。④制作完成后，过滤，晾至温热后加蜂蜜调味即可。\n雪梨大米豆浆1杯\n猪肉白菜水饺1份\n草莓8颗\n## 营养好搭配\n# 产后第23天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈因为要照顾宝宝，还要保证乳汁营养，所以需要吃各种能增强体力的食物，如海参、鳝鱼、猪肉、干贝等。\n2. 新妈妈可以多吃些红色蔬菜，如西红柿、胡萝卜、红豆、红枣等，有助于补血活血。"}, "葱烧海参": {"ingredients": "葱段 120 克，水发海参 200 克，高汤 250 毫升，熟猪油、料酒、酱油、水淀粉、盐各适量。", "steps": "①将海参去内脏，洗净汆烫；用熟猪油把葱段炸黄，捞出，留底油。②海参下锅稍炒，加入高汤、酱油、盐和料酒，烧至汤汁只剩1/3，用水淀粉勾芡，加入炸好的葱段稍烧即可。\n葱烧海参1份\n+\n菠菜蛋汤1碗\n+\n红薯面馒头1个\n## 营养好搭配"}, "鱔鱼粉丝煲": {"ingredients": "鳝鱼1条，粉丝40克，白萝卜20克，姜片、高汤、盐各适量。", "steps": "①鳝鱼处理后洗净，取肉切丝，放沸水中汆出血水，捞出；粉丝用温水泡发；白萝卜洗净，切丝。②姜片、白萝卜丝放入锅中，用大火炒香。③加入高汤、鳝鱼段，用大火烧至八成熟，加入粉丝，熟后加盐即可。\n营养师建议：可以加入菌类食材。营养配餐：蒸饺1份、猕猴桃1个。饮食宜忌：鳝鱼一定要煮熟透。"}, "口蘑炒豌豆": {"steps": "①口蘑洗净，切成小丁；豌豆洗净。\n②油锅烧热，放入口蘑丁和豌豆翻炒。③加适量高汤煮熟，用水淀粉勾薄芡，加盐调味即可。\n口蘑炒豌豆1份\n+\n肉末炒苋菜1份\n+\n什锦饭1份\n营养好搭配"}, "干贝灌汤饺": {"ingredients": "面粉、猪肉末各100克，干贝20克，白糖、琼脂冻、姜末、盐各适量。\n西红柿 200 克，鸡蛋 2 个，葱丝、盐各适量。", "steps": "①将面粉加适量清水和盐，揉成面团，稍饧，制成圆皮；琼脂冻切成小丁。②干贝用温水泡发、撕碎，然后将猪肉末、干贝碎、姜末、盐、白糖一同调制成馅料。③取圆皮包入馅料和琼脂冻丁，捏成月牙形，煮熟即可。\n营养师建议：干贝可与蘑菇做成汤。营养配餐：醋熘白菜1份、草莓5颗。饮食宜忌：有皮肤病者慎食。\n西红柿炒鸡蛋\n此菜做法简单，营养丰富，可帮助新妈妈增强免疫力。\n①将西红柿洗净，切块；鸡蛋打散。\n②将油锅烧至八成热，倒入蛋液炒熟盛盘。\n③另起油锅烧至七成热，下葱丝炝锅，然后倒入西红柿，加盐，倒入炒好的鸡蛋，炒匀即可。\n西红柿炒鸡蛋1份\n+\n木瓜排骨汤1碗\n+\n米饭1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈的饮食要做到荤素搭配，避免偏食，以免导致某些营养素缺乏，让体质下降。\n2. 可以多吃些富含蛋白质及钙、铁、磷等矿物质丰富的食物。\n3. 不同的季节对产后新妈妈进补是有所影响的，调理进补也应该随之稍作变化。一般传统的坐月子饮食，性质温热，适用于冬季；春秋时节，姜和酒都可用一些；若是盛夏炎热之际，尽量不用酒来烹调食物。"}, "萝卜虾泥馄饨": {"ingredients": "馄饨皮15个，白萝卜、胡萝卜各60克，虾仁、香菇各50克，鸡蛋1个，盐、香油、葱末、姜末各适量。", "steps": "①白萝卜、胡萝卜洗净，剁碎；香菇和虾仁泡好后剁碎；鸡蛋打成蛋液。\n②油锅烧热，放葱末、姜末，下入胡萝卜碎煸炒至八分熟，盛出备用；蛋液入锅炒散，备用。\n③把上述材料混合，加盐和香油，调成馅儿，包成馄饨，煮熟，出锅撒上葱末即可。\n萝卜虾泥馄饨1碗\n+\n什锦西蓝花1份\n+\n香蕉1根\n## 营养好搭配"}, "牛肉萝卜汤（jinpai）": {"ingredients": "牛肉、白萝卜各100克，香菜碎、酱油、香油、盐、葱末、姜末各适量。", "notes": "牛肉富含蛋白质，可以补中益气、滋养脾胃、强健筋骨。白萝卜能增强机体免疫力，并能抑制癌细胞的生长，对防癌、抗癌有重要作用。"}, "牛肉萝卜汤（366）": {"ingredients": "牛肉、白萝卜各100克，香菜末、香油、盐、葱末、姜末各适量。", "steps": "①牛肉洗净切块，放入碗内，加盐、香油、葱末、姜末腌入味；白萝卜洗净切片。②锅中放开水，放入白萝卜片，煮沸后放入牛肉块，稍煮。③等牛肉块煮熟后加盐调味，撒上香菜末即可。\n营养师建议：小火慢炖更有营养。\n营养配餐：清炒白菜1份、馅饼1个。\n饮食宜忌：很适合冬季坐月子进补之用。"}, "桂圆芡实粥": {"ingredients": "油菜200克，豆腐100克，干香菇、冬笋各50克，葱末、姜末、盐各适量。\n桂圆、芡实各15克，糯米30克，酸枣仁10克，蜂蜜适量。", "steps": "①油菜洗净，切细丝。 ②豆腐洗净，切丁；干香菇浸泡，切丁；冬笋去皮，切丁。 ③油锅烧热，将葱末、姜末爆香后放入香菇丁、冬笋丁翻炒。 ④加水煮沸，放入豆腐丁、油菜丝，再次煮沸，出锅前加盐即可。\n①糯米、芡实分别洗净，放入锅中，加入桂圆和适量水，大火烧沸。②改用小火煮25分钟，再加入酸枣仁煮熟，盛出晾温后调入蜂蜜即可。"}, "鲍汁西蓝花": {"ingredients": "西蓝花 200 克，鲜百合 20 克，虾仁、鲍鱼汁适量。", "steps": "①西蓝花洗净，切小块，入沸水锅中焯烫至七成熟，盛出晾凉；鲜百合、虾仁分别洗净，鲜百合撕片。②油锅烧热，倒入鲜百合片、虾仁翻炒，再加入鲍鱼汁和适量水，炒2分钟起锅，将鲍鱼汁浇在西蓝花上即可。\n鲍汁西蓝花味道鲜美，脆嫩爽口，新妈妈吃得美味又健康。\n# 产后第24天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈可以适当加餐，加餐食物宜选用坚果、牛奶、糕点、水果等，加餐量以不影响一日三餐的进食量为宜。\n2. 新妈妈宜适量吃枸杞增强身体免疫力。"}, "红豆排骨汤": {"ingredients": "排骨100克，红豆20克，陈皮、盐适量。", "steps": "①将排骨洗净剁成块，用沸水汆烫后，捞出沥干；红豆洗净，提前泡水4小时。②将排骨块、红豆、陈皮放入锅中，倒适量水，大火煮开后转小火，再炖煮1小时。③最后加盐调味即可。\n红豆排骨汤 1碗\n+\n清炒小白菜 1份\n+\n米饭 1碗\n## 营养好搭配"}, "姜枣枸杞乌鸡汤": {"ingredients": "乌鸡1只，红枣2颗，枸杞、盐、料酒、姜片各适量。\n鸡蛋2个，香蕉100克，核桃仁30克，番茄酱适量。", "steps": "①乌鸡去内脏，洗净；红枣、枸杞分别洗净。②乌鸡放进温水里加入料酒用大火煮，待水沸后捞出乌鸡，洗去浮沫。③红枣、枸杞、姜片和乌鸡一起放入锅内，加水大火煮开后改小火炖至熟烂，出锅时加盐即可。\n营养师建议：乌鸡虽滋补，但是多食易生痰助火，应控制摄入量。\n营养配餐：黄瓜炒鸡蛋1份、南瓜饼1块。饮食宜忌：不要放入太多姜。\n风味蛋卷\n蛋卷能提升新妈妈的食欲，可以作为加餐食用。\n1. 香蕉去皮，竖着从中间切开，将核桃仁摆在切面上；鸡蛋磕入碗中，打散。2. 平底锅加热，油五成热时，倒入蛋液铺在锅底。3. 蛋液凝固后，将香蕉和核桃仁放在鸡蛋饼上。4. 铲起鸡蛋饼，将香蕉包起来，煎2分钟，装盘晾凉切段，淋上番茄酱即可。\n风味蛋卷1碗\n+\n腰果5颗\n+\n牛奶1杯\n## 营养好搭配"}, "翡翠豆腐羹": {"ingredients": "猪瘦肉丁40克，小白菜、豆腐各50克，鸡汤、葱末、水淀粉、盐各适量。", "steps": "①将小白菜洗净，剁碎；豆腐切丁。\n②油锅烧热，煸香葱末，放入猪瘦肉丁略炒；倒入小白菜碎、豆腐丁，再加鸡汤烧开。③加盐调味，用水淀粉勾芡，待汤汁黏稠即可。\n营养师建议：瘦肉可换成虾仁。\n营养配餐：豌豆猪肝汤1碗、猪肉饼1个。\n饮食宜忌：痛风的新妈妈不宜多食豆腐。"}, "鸭肉粥": {"ingredients": "大米30克，鸭肉30克，葱段、姜丝、盐、料酒各适量。", "steps": "①将鸭肉洗净后，锅中放入清水和葱段、料酒，用中火将鸭肉煮30分钟，取出鸭肉，切丝。②将大米洗净，加入煮鸭的高汤，用小火煮30分钟。③再加入鸭肉丝、姜丝同煮20分钟，出锅时放盐调味即可。\n鸭肉粥1碗\n+\n香菇猪肉包1个\n+\n芒果汁1杯\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈的肠胃恢复得差不多了，但也应注意保养，每餐最好按照一定的顺序进食：汤→蔬菜→饭→肉，饭后30分钟再进食水果。\n2. 新妈妈宜吃牛肉补气健脾。\n3. 月子中的主食，要经常变换花样。比如：小米可开胃健脾、补血健脑、助安眠，适合产后食欲缺乏、失眠的新妈妈；大米可活血化瘀，可用于防治产后恶露不净、瘀滞腹痛；糯米适用于产后体虚的新妈妈。主食多样化才能满足新妈妈的营养需要，进而达到强身健体的目的。"}, "土豆烧牛肉": {"ingredients": "牛肉100克，土豆20克，姜片、酱油、料酒、白糖、淀粉、盐各适量。", "steps": "①将牛肉洗净后切成块，用酱油、淀粉、料酒腌制。②土豆块洗净后切成块。③姜片爆香，放入牛肉翻炒，倒入酱油，放入白糖，加适量清水，用中火烧开。④放入土豆块，待牛肉熟烂，加盐调味即可。\n土豆烧牛肉1份\n+\n黄瓜海鲜汤1碗\n+\n五谷饭1碗\n## 营养好搭配"}, "红枣板栗粥（366）": {"ingredients": "大米 100 克，红枣 2 颗，板栗 2 颗。", "steps": "①板栗煮熟后去壳；红枣洗净去核；大米洗净，用清水浸泡。②将大米、煮熟的板栗、红枣放入锅中，加清水煮沸。③转小火煮至大米熟透即可。\n营养师建议：生吃板栗可缓解口腔溃疡症状。\n营养配餐：鸡蛋1个、炝黄瓜1份。\n饮食宜忌：有糖尿病者不可多吃板栗。"}, "荠菜魔芋汤（jinpai）": {"ingredients": "荠菜150克，魔芋100克，盐、姜丝各适量。", "notes": "魔芋中特有的束水凝胶纤维，可以使肠道保持一定的充盈度，促进肠道的蠕动，加快排便速度，是天然的肠道清道夫，也是产后瘦身食谱中不可缺少的食物。"}, "荠菜魔芋汤（366）": {"ingredients": "1 荠菜去老叶洗净，切成段。2 魔芋丝用热水煮2分钟，去味，沥干，备用。3 将魔芋丝、荠菜、姜丝放入锅内，加清水用大火煮沸，转中火煮至荠菜熟软。4 出锅时加盐调味，红椒丝点缀即可。", "steps": "荠菜魔芋汤1碗\n+\n小炒肉1份\n+\n玉米面发糕1块\n## 营养好搭配\n鳗鱼饭适合于产后虚弱的新妈妈食用，有美容养颜、延缓衰老之功效。\n## 原料\n鳗鱼1条，竹笋2根，油菜2棵，米饭1碗，盐、酱油、高汤各适量。\n## 做法\n①鳗鱼洗净，加盐、酱油腌制；竹笋、油菜洗净，分别切片、切段。②把腌制好的鳗鱼放入烤箱里，温度调到 $ 180^{\\circ}C $，烤熟。③油锅烧热，放入竹笋、油菜略炒，放入烤熟的鳗鱼，加入高汤、酱油，待汤快收干时出锅，浇在米饭上。\n营养师建议：鳗鱼补虚养血，新妈妈可经常食用。\n营养配餐：香菇豆腐汤1碗、核桃2颗。\n饮食宜忌：海鲜过敏者尽量避免食用。"}, "莲藕炖牛腩（366）": {"ingredients": "牛腩、莲藕各100克，红豆20克，姜末、盐各适量。", "steps": "①牛腩洗净，切大块，放入热水中略煮一下，取出后洗净，沥干。②莲藕洗净，切成大块；红豆洗净，并用清水浸泡30分钟。③将牛腩块、莲藕块、红豆、姜末放入锅中，加适量清水用大火煮沸。④转小火慢煲2小时，出锅前加盐调味即可。\n莲藕炖牛腩1碗\n清炒笋片1份\n牛奶馒头1个\n## 营养好搭配\n# 产后第25天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈在饮食上注意多吃促进泌乳的食物，在生活上要注意乳房的清洁卫生，预防乳腺炎的发生。\n2. 新妈妈不宜经常外出用餐。"}, "茴香烘蛋": {"ingredients": "茴香300克，鸡蛋2个，生抽、白糖、盐各适量。", "steps": "①将茴香洗净，切碎，放入碗中。2打入鸡蛋，加生抽、白糖、盐搅拌均匀。\n③将搅拌均匀的茴香蛋液倒入平底锅中，小火烘至两面金黄。④盛出装盘，切块即可。\n茴香烘蛋1份\n+\n牛肉炒菠菜1份\n+\n豆腐瘦肉汤1碗\n## 营养好搭配"}, "珍珠三鲜汤": {"ingredients": "鸡胸肉100克，胡萝卜、西红柿、豌豆各50克，鸡蛋1个，盐、水淀粉各适量。", "steps": "①胡萝卜、西红柿分别洗净切丁；鸡胸肉洗净剁成肉泥。②蛋清、鸡胸肉泥、水淀粉混合搅拌。③胡萝卜丁、西红柿丁、豌豆放入锅中，加清水煮沸。④用小汤匙把鸡胸肉泥从碗边拨进锅内，拨成丸子，用大火将汤再次煮沸；出锅前放盐即可。\n营养师建议：可将鸡肉换成虾仁。\n营养配餐：丝瓜金针菇1份、花卷1个。\n饮食宜忌：胡萝卜要煮熟，以免消化不良。"}, "香菇玉米粥（jinpai）": {"ingredients": "大米、玉米粒各30克，香菇3朵，猪瘦肉、淀粉、盐各适量。", "notes": "香菇具有增强免疫力、补充体力的功效，玉米甜香可口，含有丰富的膳食纤维。"}, "香菇玉米粥（366）": {"ingredients": "大米、玉米粒各30克，干香菇3朵，\n猪瘦肉、淀粉、盐各适量。", "steps": "1 猪瘦肉洗净切粒，拌入淀粉；玉米粒洗净；大米洗净。2 干香菇用温水泡软，去蒂，切小块备用。3 在锅中加入适量清水，用大火煮开后将猪瘦肉粒、玉米粒、大米、香菇块放入锅中继续煮，最后加盐调味即可。\n香菇玉米粥1碗\n+\n牛肉馅饼1个\n+\n苹果汁1杯\n## 营养好搭配\n此粥富含多种营养物质，能催乳，适宜新妈妈早餐食用。"}, "豌豆排骨粥": {"ingredients": "大米100克，豌豆、猪排骨各50克，盐适量。", "steps": "①豌豆洗净：猪排骨洗净，剁成小块。\n②锅置火上，放入猪排骨、豌豆、适量清水，煮至猪排骨熟烂，加盐调味。\n③大米洗净，煮成粥。④将煮熟的豌豆、猪排骨块一起放入米粥中炖煮至沸。\n营养师建议：可将豌豆换成芋头。\n营养配餐：西芹百合1份、玉米面发糕1块。\n饮食宜忌：排骨要剁成小块，以便入味。"}, "肉末豆腐羹（jinpai）": {"ingredients": "豆腐100克，肉末50克，水发黄花菜15克，酱油、盐、水淀粉、葱花、高汤各适量。\n1 猪瘦肉洗净切粒，拌入淀粉；玉米粒洗净；大米洗净后拌入植物油。\n2 香菇用冷水泡软，去蒂，切片，再拌入植物油备用。", "steps": "3 在锅中加入适量清水，用大火煮开后将猪瘦肉、玉米粒、大米、香菇一同放入锅中，用小火煮熟，最后加盐调味即可。\n1 将豆腐切成小丁，用开水烫一下，捞出用凉水过凉备用。\n2 黄花菜择洗干净，切成小段。\n3 将高汤倒入锅内，加入肉末、黄花菜段、豆腐丁、酱油、盐，煮沸至豆腐中间起蜂窝、浮于汤面时，淋上水淀粉，撒上葱花即可。", "notes": "此菜营养丰富，是获得优质蛋白质、B族维生素和矿物质、磷脂的良好来源。木耳、黄花菜有很好的健脑益智作用。"}, "肉末豆腐羹（366）": {"ingredients": "豆腐100克，肉末50克，干黄花菜5克，酱油、盐、水淀粉、葱花、高汤各适量。", "steps": "①豆腐切成小丁，用开水烫一下，捞出，过凉水。②干黄花菜泡发，择洗干净，切成小段。③将高汤倒入锅内，加入肉末、黄花菜段、豆腐丁、酱油、盐，煮沸后，淋上水淀粉，撒上葱花即可。\n肉末豆腐羹1碗\n+\n鲍汁西蓝花1份\n+\n风味蛋卷1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈在补虚的同时仍然要进行补血，花生、红枣、胡萝卜、虾仁都应食用，同时还要适当吃水果，补充全面的营养。\n2. 睡前按摩太阳穴半分钟，有助于睡眠。\n3. 有些在夏天坐月子的新妈妈，为了身体舒爽会用不太热的水冲凉。这种一时贪凉的举动，往往会带来许多后患。产后触冷会使气血凝滞，导致日后身体疼痛或月经不调。所以洗澡的水应该与体温接近， $ 37^{\\circ}\\mathrm{C} $左右为宜。"}, "红薯花生汤": {"ingredients": "红薯1个，牛奶250毫升，花生、红枣各适量。", "steps": "①花生、红枣洗净，浸泡30分钟；红薯洗净去皮，切块。②锅中放入花生、红薯块、红枣，加水至没过食材2厘米。③小火烧至红薯变软，关火。④盛出煮好的汤，倒入牛奶即可。\n红薯花生汤1碗\n+\n菠菜瘦肉粥1碗\n+\n豆沙包1个\n## 营养好搭配"}, "牛蒡燕麦粥": {"ingredients": "牛蒡、胡萝卜各30克，燕麦米80克，芹菜、盐、香油各适量。", "steps": "①牛蒡、胡萝卜分别去皮洗净，切丁；芹菜洗净，切末；燕麦米洗净。②锅置火上，放入燕麦和水，大火烧沸；放入牛蒡丁和胡萝卜丁，再次烧沸后改小火，煮成粥。③粥熟后，放入芹菜末稍煮，加盐调味，淋上香油即可。\n营养师建议：牛蒡可与红枣、莲子熬粥。营养配餐：土豆烧牛肉1份、葡萄汁1杯。饮食宜忌：患高血压的新妈妈尤其适合食用此粥。"}, "罐焖牛肉": {"ingredients": "牛肉500克，芹菜100克，胡萝卜100克，宽粉50克，葱末、姜片、料酒、老抽、盐各适量。", "steps": "①牛肉洗净，切块，用开水汆一下；芹菜洗净，切段；胡萝卜洗净，切片。\n②油锅烧热，放入牛肉块、葱末、姜片翻炒；加料酒、老抽、水，大火烧开。\n③转入砂锅，小火炖至肉烂；放入芹菜段、胡萝卜片、宽粉、盐煮熟即可。\n罐焖牛肉1碗\n+\n木耳炒鸡蛋1份\n+\n紫薯馒头1个\n## 营养好搭配"}, "桂花紫山药": {"ingredients": "山药50克，紫甘蓝40克，糖桂花适量。", "steps": "①山药洗净，上蒸锅蒸熟，晾凉后去皮，斜着切块；紫甘蓝洗净，切碎，加适量水用榨汁机榨成汁。②将山药在紫甘蓝汁里浸泡至上色均匀后摆盘，浇上糖桂花即可。\n营养师建议：山药可以压成泥后食用。\n营养配餐：南瓜肉汤1碗、白菜饺子1份。\n饮食宜忌：一般人群均可食用。"}, "芦笋炒虾球": {"ingredients": "虾仁200克，芦笋、木耳各50克，姜丝、蒜片、水淀粉、料酒、盐各适量。", "steps": "①将木耳泡发，洗净；虾仁用盐、料酒抓匀，腌10分钟。②芦笋去皮，切段，和虾仁一起放入开水中氽一下。③油锅烧热，放入姜丝、蒜片爆香，倒入芦笋段、木耳、虾仁翻炒，出锅前淋少许水淀粉即可。\n芦笋炒虾球1份\n猪肝炒油菜1份\n千层饼1块\n## 营养好搭配\n# 产后第26天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈的饮食应营养全面，鸡、鸭、鱼、肉、水果、蔬菜都可以吃，但要注意食物的烹调方法。\n2. 新妈妈不要吃含有防腐剂的食物，尽量少吃性热的水果，如榴莲、荔枝等。"}, "木耳猪血汤": {"ingredients": "猪血100克，木耳10克，盐适量。", "steps": "①将猪血洗净，切块；木耳水发后撕成小块。②将猪血与木耳同放锅中，加适量水，用大火加热烧开。③用小火炖到猪血块浮起，加盐调味即可。\n木耳猪血汤1碗\n米饭1碗\n芹菜炒牛肉1份\n## 营养好搭配"}, "黄花菜鸡汤": {"ingredients": "鸡肉100克，干黄花菜30克，盐、茶油、姜片各适量。", "steps": "①干黄花菜用温水浸泡30分钟，去蒂；鸡肉洗净，切丝。②茶油放入锅中烧热，放鸡丝、姜片一起炒，八成熟时将黄花菜和适量清水放入锅中，小火炖至熟烂，放盐调味即可。\n营养师建议：最好吃干黄花菜而不是新鲜的。营养配餐：西红柿炒鸡蛋1份、花卷1个。饮食宜忌：黄花菜不宜单独炒食。"}, "虾仁豆腐": {"steps": "1. 将豆腐切成小方丁，放入沸水中焯一下，捞出沥干。2. 将虾仁洗净，加盐、淀粉，用蛋液上浆。3. 将姜末、淀粉、香油放入小碗中，调成芡汁。4. 油锅烧热，放入虾仁翻炒，熟后放入豆腐丁，倒入调好的芡汁，迅速翻炒熟即可。\n虾仁豆腐 $ ^{1} $份\n+\n鸡丝糯米饭 $ ^{1} $份\n+\n香蕉 $ ^{1} $根\n## 营养好搭配"}, "红曲鳗鱼汤": {"ingredients": "鳗鱼100克，当归5克，枸杞5克，\n红曲酱15克，姜片、香油各适量。", "steps": "①当归、枸杞用清水煎煮10分钟，滤渣取汁；鳗鱼处理好后洗净切块。\n②将锅内放香油加热，放入姜片炒至香味溢出，加入鳗鱼块、红曲酱略煎一下，再加入清水拌炒。③最后加入当归枸杞汁，转小火，熬煮6分钟即可。\n营养师建议：夏、冬两季的鳗鱼最为肥美可口。\n营养配餐：木瓜炖排骨1份、发面饼1块。饮食宜忌：感冒发热的新妈妈忌食。"}, "红枣蒸鹌鹑": {"ingredients": "鹌鹑1只，红枣5颗，姜片、葱段、盐、淀粉、料酒各适量。", "steps": "①将鹌鹑处理好，洗净；红枣洗净，去核。②将鹌鹑与红枣、姜片、葱段、盐、料酒、淀粉拌匀，放入蒸碗里加适量清水。③将蒸碗放入蒸锅中蒸熟即可。\n红枣蒸鹌鹑1份\n+\n清炒油麦菜1份\n+\n素菜包1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈可以吃些富含膳食纤维的食物，以防止便秘，从而加速排毒，使身体更加轻盈。\n2. 夏季不要吃冷饮，感觉太热时可以吃些常温的西红柿、黄瓜等。\n3. 夏天多蚊虫，新妈妈和宝宝在睡觉时可以使用蚊帐，但要慎用蚊香。蚊香中的特殊化学成分会通过消化道、呼吸道进入人体，并具有一定毒性，对新妈妈和宝宝十分不利。同时要注意保持房间通风和清洁卫生，减少细菌感染。"}, "西芹百合": {"ingredients": "西芹含有较多的膳食纤维，可预防便秘，也有利于心血管健康。\n西芹100克，鲜百合50克，水淀粉、盐各适量。", "steps": "①将西芹择去筋，洗净，切成较薄的段；鲜百合洗净，掰成片。②油锅烧热，下西芹炒至五成熟。③加鲜百合、盐炒熟，用水淀粉勾薄芡即可。\n西芹百合1碗\n+\n土豆炖排骨1份\n+\n牛奶馒头1个\n## 营养好搭配"}, "猪肚粥": {"ingredients": "猪肚 100 克，大米 50 克，盐、葱花各适量。", "steps": "①猪肚处理干净脏污，洗净，切成丝，放入沸水中汆烫。②大米洗净，与猪肚一起放入锅内，加清水适量，置于火上。③煮沸后，转用小火煮至猪肚软烂，米粥黏稠，加入盐调味，撒上葱花即可。\n营养师建议：猪肚可与板栗、山药煲汤。营养配餐：煮鸡蛋1个、葱花饼1块。饮食宜忌：猪肚不适宜贮存，应随买随吃。"}, "玉米西红柿羹": {"ingredients": "玉米粒100克，西红柿80克，香菜末、高汤、盐各适量。", "steps": "①西红柿洗净后用热水烫一下，去外皮，切丁；玉米粒洗净，沥干水分。\n②锅中加适量高汤煮开，下入玉米粒、西红柿丁，加盐调味，煮5分钟，撒入香菜末即可。"}, "韭菜馅饼（jinpai）": {"ingredients": "韭菜400克，面粉500克，肉馅100克，鸡蛋3个，海米、宽粉、姜末、料酒、盐各适量。", "steps": "1 油锅烧热，放入打散的鸡蛋，炒成碎末状。\n2 宽粉加适量水煮烂，备用；韭菜洗净，切碎。\n3 将所有原料放在盆中，搅拌均匀成馅料。\n4 温水和面，擀成比包子皮稍大一些的薄皮。\n5 包好馅料，放入油锅中，小火煎至两面金黄即可。", "notes": "韭菜能让体虚的非哺乳妈妈身体暖暖的。\n韭菜有回乳的作用，非哺乳妈妈可吃一些。"}, "韭菜馅饼（366）": {"steps": "①面粉加凉开水，搅拌成絮状，揉成面团，盖上湿布饧发；韭菜洗净，切碎末；鸡蛋炒散，加韭菜碎末、盐、香油拌成馅。②面团做成圆形面皮，包上馅料，制成饼坯。③油锅烧热，放入馅饼，小火两面煎熟即可。"}, "鸡蛋时蔬沙拉": {"ingredients": "鸡蛋2个，西红柿100克，洋葱、苹果各50克，生菜、沙拉酱各适量。", "steps": "①鸡蛋放入冷水锅中，大火烧开后，继续煮10分钟；鸡蛋煮好后，剥去蛋壳，对半切开。②西红柿、洋葱洗净，切片；生菜洗净，撕片；苹果洗净，切块。③所有材料放入碗中，倒入沙拉酱，搅拌均匀即可。\n鸡蛋时蔬沙拉色泽鲜艳，可增强食欲。\n# 产后第27天食谱推荐\n## 哺乳妈妈\n1. 哺乳妈妈现在还不到减肥的时候，需要进一步加强体质，所以应继续保持定时定量进餐，全面补充营养。\n2. 新妈妈不宜过量食用调味品。"}, "清炖鲫鱼（jinpai）": {"ingredients": "鲫鱼1条，大白菜100克，豆腐50克，冬笋、水发木耳、姜片、料酒、盐各适量。\n1 将牛肉洗净后切成块，用酱油、淀粉、料酒腌制。\n2 土豆、胡萝卜洗净后切成块。\n3 姜片在锅中爆香，放入牛肉翻炒，倒入酱油，调入白糖，加适量清水，用中火烧开。", "steps": "4 放入土豆块、胡萝卜块，待牛肉熟烂，加盐调味即可。\n1 鲫鱼去鳞及内脏，洗净后，放入锅中加油煎炸至微黄，放入料酒、姜片，加适量清水煮开。\n2 大白菜洗净切块，豆腐切成小块。\n3 将大白菜、豆腐块、冬笋、木耳放入鲫鱼汤中，中火煮熟后，加盐调味即可。\n## 产后第34天", "notes": "大白菜和木耳富含多种营养成分，有养血活血的作用；豆腐中含有大量的钙及卵磷脂。"}, "清炖鲫鱼（366）": {"ingredients": "鲫鱼1条，白菜100克，豆腐50克，火腿片、冬笋片、木耳、姜片、盐、香菜叶各适量。", "steps": "①将鲫鱼处理干净后，放入锅中煎至微黄，放入姜片，加适量清水煮开。\n②白菜洗净切块；豆腐切成小块；木耳泡发。\n③将白菜块、豆腐块、火腿片、冬笋片、木耳放入鲫鱼汤中，中火煮熟后，加盐调味，撒上香菜叶即可。\n清炖鲫鱼1份\n+\n香菇油菜1份\n+\n米饭1碗\n## 营养好搭配"}, "山药扁豆糕": {"ingredients": "山药扁豆糕可作为加餐食用，能够缓解新妈妈水肿，调理肠胃。\n山药、扁豆各250克，陈皮、淀粉、彩椒丝各适量。\n银耳20克，樱桃、大米各30克，糖桂花、冰糖各适量。", "steps": "①山药洗净，煮熟去皮，捣烂；陈皮切丝。②将扁豆切碎，与山药泥和陈皮丝一同加入搅拌机中打成泥。③山药扁豆泥装入盘中，加少许水和淀粉搅拌均匀，放在蒸锅中蒸熟，晾凉后切块，加彩椒丝点缀即可。\n营养师建议：这些食材也可做成粥。营养配餐：红烧牛肉1份、苹果1个。饮食宜忌：大便秘结者应少食山药。\n银耳保肝滋阴，樱桃补气养血，煮粥能养颜补虚。\n①将银耳用冷水浸泡，洗净，撕成片；樱桃去柄，洗净。②大米洗净，用冷水浸泡半小时，捞出，沥干。③锅中加适量清水，放入大米，待米粒软烂时，加入银耳，再煮10分钟，放入樱桃、冰糖，煮沸后加糖桂花即可。\n银耳樱桃粥1碗\n+\n煮鸡蛋1个\n+\n鲜肉包1个\n## 营养好搭配"}, "黄豆莲藕排骨汤": {"ingredients": "黄豆、莲藕各50克，排骨250克，香菜末、盐、高汤、醋、姜片各适量。", "steps": "①排骨洗净、切段；莲藕去皮，洗净切块；黄豆洗净，泡2小时。②油锅烧热，倒入排骨段翻炒，放入高汤、姜片、黄豆、盐、醋、藕块。③开锅后移入砂锅中，炖至肉骨分离，出锅时撒入香菜末即可。\n营养师建议：排骨可换成羊排。\n营养配餐：虾仁豆腐1份、花卷1个。\n饮食宜忌：宜撇去排骨汤表层的油脂。"}, "紫薯山药球": {"ingredients": "紫薯150克，山药100克，炼奶适量。", "steps": "①紫薯、山药分别洗净，去皮，蒸烂后压成泥。②在山药泥中混入紫薯泥并加适量蒸紫薯的水，然后拌入炼奶混合均匀，揉成球状即可。\n紫薯山药球1份\n冬瓜猪骨汤1碗\n草莓5颗\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈不能暴饮暴食，否则会使刚刚恢复的肠胃变得不舒服。\n2. 经常吃肉的新妈妈，可以在饭后半小时后吃些菠萝助消化。\n3. 第4周与前3周相比，滋补的高汤都比较油腻，此时要注意肠胃的保健，不要让肠胃受到过多的刺激，避免出现腹痛或者是腹泻。注意三餐合理搭配营养，让肠胃舒服最关键。早餐多吃五谷杂粮，午饭可以多喝些汤，晚餐要加强蛋白质的补充，加餐则可以选择杂粮粥、牛奶、鸡蛋和水果等。"}, "西红柿山药粥": {"ingredients": "西红柿、山药各100克，大米50克，盐适量。", "steps": "①山药洗净，切片；西红柿洗净，略烫去皮，切块；大米洗净，用清水浸泡30分钟。②将大米、山药片放入锅中，加适量水，用大火烧沸。③之后用小火煮至呈粥状，加入西红柿块，煮10分钟，加盐调味即可。\n西红柿山药粥1碗\n+\n清炒藕片1份\n+\n如意蛋卷1份\n## 营养好搭配"}, "银耳桂圆汤": {"ingredients": "银耳1朵，桂圆肉15克，冰糖适量。", "steps": "①银耳泡发，去蒂，撕小朵；桂圆肉洗净。②将银耳、桂圆肉放入砂锅中，加适量清水，中火煲45分钟。③放入冰糖，小火煮至冰糖溶化即可。\n营养师建议：银耳可炖煮略久一些。营养配餐：豆沙包1个、葡萄10颗。饮食宜忌：桂圆不可过多食用。"}, "猪骨菠菜汤": {"ingredients": "猪骨150克，菠菜50克，盐、火腿条各适量。", "steps": "①将猪骨斩段，放入沸水中汆一下，捞出沥水；菠菜洗净，切成段。②将猪骨放入锅内，加适量清水，熬成浓汤。③锅中放入菠菜段、火腿条，煮熟后加盐调味即可。\n猪骨菠菜汤1碗\n+\n海参木耳烧豆腐1份\n+\n花卷1个"}, "彩椒炒腐竹": {"ingredients": "青椒、红椒各50克，腐竹200克，葱末、盐、香油、水淀粉各适量。", "steps": "①青椒、红椒洗净，切菱形片；腐竹泡水后斜刀切成段。②油锅烧热，放入葱末煸香，再放入青椒片、红椒片、腐竹段翻炒。③用水淀粉勾芡，出锅时加盐调味，再淋上香油即可。\n彩椒炒腐竹1份\n+\n罐焖牛肉1份\n+\n小米饭1碗\n## 营养好搭配\n## 产后第28天食谱推荐\n## 哺乳妈妈\n1. 新妈妈单独照顾宝宝的时候，要避免制作一些程序比较复杂而且耗时间的汤品，否则会减少照顾宝宝的时间，要尽量两者兼顾。\n2. 新妈妈上火了可以吃些绿豆、芹菜等清火食物。"}, "清蒸大虾": {"ingredients": "鲜虾9只，葱花、姜、高汤、醋、酱油、香油各适量。", "steps": "①鲜虾洗净，去须、择除虾线；姜洗净，一半切片，一半切末。②将鲜虾摆在盘内，加入葱花、姜片和高汤，上笼蒸10分钟左右。③拣去姜片、葱花；用醋、酱油、姜末和香油兑成汁，供蘸食。\n清蒸大虾1份\n+\n木耳猪血汤1碗\n+\n米饭1碗\n## 营养好搭配"}, "绿豆薏米粥": {"ingredients": "绿豆、薏米各50克，红枣2颗，白糖适量。", "steps": "①将薏米及绿豆洗净后用清水浸泡1夜。②将浸泡的水倒掉，绿豆、薏米和红枣放入锅内，加入清水，用大火烧开后改用小火煮至熟透。③加入适量白糖调味即可。\n营养师建议：可放入核桃或燕麦。\n营养配餐：糖醋藕片1份、虾仁豆腐1份。\n饮食宜忌：此粥可利尿除湿，适宜水肿的新妈妈食用。"}, "米饭蛋饼": {"ingredients": "鸡蛋2个，米饭150克，面粉适量。", "steps": "①鸡蛋磕入碗中，加入少许面粉打散。②把米饭倒入鸡蛋液里，搅拌。③油锅烧热，倒入米饭面糊，两面煎熟，盛出切块即可。\n米饭蛋饼1份\n+\n莼菜鲤鱼汤1碗\n+\n苹果1个\n营养好搭配"}, "白菜肉末面": {"ingredients": "面条100克，牛肉50克，白菜20克，\n水淀粉、盐、香油各适量。\n牛里脊肉250克，大葱100克，香油、黄椒丝、料酒、酱油、醋、白糖、盐各适量。", "steps": "①将牛肉洗净，切末；白菜洗净，切丝。②面条煮熟，过水后盛入汤碗中。③油锅烧热，放肉末煸炒，再放白菜翻炒，加入盐、水淀粉翻炒至熟，浇在面条上，淋上香油即可。\n营养师建议：面条可换成米线。\n营养配餐：芦笋炒虾球1份、银耳鸡汤1份。\n饮食宜忌：此面营养丰富，新妈妈在月子中可常吃。\n葱爆酸甜牛肉\n牛肉富含蛋白质、锌，大葱含有葱辣素、膳食纤维，新妈妈可常吃此菜。\n①牛里脊肉洗净，切薄片，加料酒、酱油、白糖、香油拌匀；大葱洗净，小部分切葱花，其余全部切丝。②油锅烧热，下牛里脊肉片、葱丝，迅速翻炒至肉片断血色，滴入醋，撒点盐，翻炒至熟，起锅装盘，点缀上彩椒丝，撒上葱花即可。\n葱爆酸甜牛肉1份\n+\n爽口芥蓝1份\n+\n千层饼1块\n## 营养好搭配\n## 非哺乳妈妈\n1. 快出月子了，家人对新妈妈和宝宝的照顾可能不像之前那么无微不至，新妈妈要更加独立了，需要自己搭配饮食，合理运动，保证身体健康。\n2. 同一样食材要换着花样做，这样食欲会更好。\n3. 睡前喝杯牛奶有助于睡眠。牛奶中含有对生理功能具有调节作用的肽类，肽类的镇痛作用会让人感到全身舒适，有利于解除疲劳并入睡，对于产后体虚而导致神经衰弱的新妈妈，牛奶的安眠作用更为明显。"}, "何首乌红枣粥": {"ingredients": "大米50克，何首乌10克，红枣10颗。", "steps": "①红枣洗净：大米洗净，用清水浸泡30分钟。 ②何首乌洗净，切碎，按何首乌与清水1:10的比例，将何首乌放入清水中浸泡2小时。 ③浸泡后用小火煎煮1小时，去渣取汁。 ④再将大米、红枣、何首乌汁一同放入锅内，小火煮成粥即可。\n何首乌红枣粥1碗\n+\n煮鸡蛋1个\n+\n凉拌芹菜1份\n## 营养好搭配"}, "芦笰口蘑汤": {"ingredients": "芦笋100克，口蘑10朵，红椒2个，葱花、盐、香油各适量。", "steps": "①芦笋洗净，切段；口蘑洗净，切片；红椒洗净，切菱形片。②将锅中倒少许香油烧热，下葱花煸香，放芦笋段、口蘑片略炒，加适量水略煮，再放入盐调味。③最后放红椒片煮熟即可。\n营养师建议：可以放些瘦肉。\n营养配餐：红枣蒸鹌鹑1份、米饭1碗。\n饮食宜忌：过敏体质的新妈妈慎食。"}, "西葫芦饼（366）": {"ingredients": "西葫芦、面粉各250克，鸡蛋2个，盐适量。", "steps": "①鸡蛋打散，加盐调味；西葫芦洗净，切丝。②将西葫芦丝放入蛋液中，加面粉搅拌成糊状。③油锅烧热，倒入面糊，煎至两面金黄即可。\n西葫芦饼1份\n+\n彩椒鸡丝1份\n+\n核桃仁紫米粥1碗\n## 营养好搭配"}, "木耳红枣瘦肉汤": {"ingredients": "木耳30克，猪瘦肉100克，红枣7颗，姜片、盐各适量。\n①将木耳浸泡、洗净；红枣浸泡、洗净；猪瘦肉洗净，切丝备用。②把木耳、红枣放入锅中，加入适量清水，煲1小时，加入猪瘦肉丝和姜片，煮开至熟，调入适量盐即可。", "steps": "营养师建议：红枣也可换成桂圆。\n营养配餐：橙香鱼排1份、馒头1个。\n饮食宜忌：胃肠功能不佳者应少食。"}, "奶酪烤鸡翅": {"ingredients": "黄油、奶酪各30克，鸡翅300克，盐适量。", "steps": "①将鸡翅入沸水中汆烫，用盐腌制2小时。②黄油放锅中融化，烧热后放入鸡翅。③用小火将鸡翅正反两面煎至色泽金黄，然后将奶酪擦成碎末，均匀地撒在鸡翅上，等奶酪碎完全溶化即可。\n奶酪烤鸡翅5块\n虾仁炒饭1碗\n胡萝卜汁1杯\n## 营养好搭配"}, "丝瓜虾仁糙米粥（jinpai）": {"ingredients": "丝瓜50克，虾仁40克，糙米60克，盐适量。", "notes": "糙米富含碳水化合物，是新妈妈的肠道清道夫，丝瓜和虾仁则为新妈妈补充了丰富的营养，这款粥美味、消肿又滋补。"}, "丝瓜虾仁糙米粥（366）": {"steps": "## 营养好搭配\n糙米是新妈妈的肠道“清道夫”，可有效预防产后便秘。\n## 原料\n丝瓜、糙米各50克，虾仁40克，盐适量。\n## 做法\n①将糙米清洗后加水浸泡约1小时。\n②将糙米、虾仁一同放入锅中，加入2碗水，用中火煮15分钟呈粥状。\n③丝瓜洗净切段，放入粥内略煮，加适量盐调味即可。\n营养师建议：肠胃不适的新妈妈可加入大米或小米同煮。\n营养配餐：西红柿炒鸡蛋1份、南瓜饼1个。\n饮食宜忌：胃肠功能不佳者应尽量少食。"}, "板栗鱔鱼煲": {"ingredients": "鳝鱼200克，板栗20克，葱段、姜片、盐各适量。", "steps": "①鳝鱼去内脏，洗净后用热水汆烫去黏液。②将鳝鱼切成4厘米长的段，放盐拌匀，备用。③板栗洗净去壳，备用。④将鳝鱼段、板栗、葱段、姜片一同放入锅内，加入清水煮沸后，转小火再煲1小时。⑤出锅时加入盐调味即可。\n板栗鳝鱼煲1碗\n+\n清炒莲藕1份\n+\n米饭1碗\n## 营养好搭配\n牛肉与芹菜搭配成菜，清脆美味，适合产后缺乏食欲的新妈妈食用。\n## 原料\n牛肉150克，芹菜30克，酱油、水淀粉、白糖、盐、葱丝、姜末各适量。\n## 做法\n①牛肉洗净，切丝，加酱油、水淀粉腌制1小时左右；芹菜择叶去根，洗净，切段。②油锅烧热，下姜末和葱丝煸香，加入腌制好的牛肉丝和芹菜段翻炒，可适当加一点清水。③放入适量盐和白糖，出锅即可。\n营养师建议：芹菜也可以用胡萝卜来代替。营养配餐：香油藕片1份、排骨汤面1碗。饮食宜忌：肠胃功能恢复较差的新妈妈宜吃较嫩的芹菜。"}, "豆芽炒肉丁": {"ingredients": "黄豆芽100克，猪肉150克，高汤、盐、酱油、白糖、葱花、姜片、水淀粉各适量。", "steps": "①将黄豆芽洗净，沥水；猪肉洗净，切丁，用水淀粉抓匀上浆。②将肉丁放入锅中翻炒至变色。③另起油锅放姜片爆香，加黄豆芽、酱油略炒，再放入白糖，加高汤、盐，用小火煮熟，放肉丁炒匀，再用水淀粉勾芡，出锅撒上葱花即可。\n豆芽炒肉丁1份\n+\n蒸水饺1份\n+\n香蕉银耳汤1碗\n## 营养好搭配\n## 非哺乳妈妈\n1. 产后非哺乳妈妈也要做到荤素搭配，避免偏食，以免导致某些营养素缺乏，让自己的体质下降。所以，富含蛋白质及钙、磷、铁等矿物质的食物要多食用。\n2. 新妈妈不宜过多吃甜食。\n3. 新妈妈产后容易出现悲伤、沮丧、忧愁、茫然等不良情绪，尤其二孩妈妈更要谨防抑郁，要以乐观、健康的心态去应对所处的环境。平时注意要有充足的睡眠时间，不要过度疲劳。闲暇时可听一些轻柔、舒缓的音乐，看一些图文并茂的杂志，或读一些幽默故事来调节身心。"}, "燕麦糙米糊": {"ingredients": "燕麦40克.糙米30克.黑芝麻20克.\n冰糖适量。", "steps": "1 将糙米、燕麦、黑芝麻分别淘洗干净，浸泡 10 小时。2 除冰糖外的所有材料倒入豆浆机中，加水至上下水位线之间。3 煮好后倒出，加冰糖调味即可。\n燕麦糙米糊1碗\n+\n葱花饼1块\n+\n牛奶1杯\n## 营养好搭配"}, "鱼头香菇豆腐汤": {"ingredients": "胖头鱼鱼头1个，豆腐100克，香菇3朵，葱段、姜片、盐、料酒各适量。", "steps": "1 胖头鱼鱼头去鳃，由下巴处用刀切开，洗净后沥干，用开水汆烫片刻；香菇洗净，切花刀；豆腐切厚片。2 将汆过水的鱼头、香菇、葱段、姜片、料酒和清水放入锅内，煮沸后撇去浮沫。3 改小火炖至鱼头快熟时，放入豆腐煮熟，拣去葱段、姜片，加盐即可。\n营养师建议：清蒸鱼头和鱼头泡饼也不错。营养配餐：芹菜牛肉丝1份，米饭1碗。饮食宜忌：鱼肉不宜与沙参同食。"}, "三 鲜汤面": {"ingredients": "面条50克，鸡肉30克，虾仁20克，香菇2朵，海参1个，盐、酱油各适量。", "steps": "1. 虾仁去虾线洗净：鸡肉、香菇分别洗净，均切成丝；海参泡发，处理干净，切丝。2. 将面条煮熟，连汤盛碗中备用。3. 油锅烧至七成热，放入虾仁、鸡肉丝、香菇丝、海参丝翻炒，加酱油、盐和适量水炒熟，浇在面条上即可。\n三鲜汤面1碗\n+\n葱爆酸甜牛肉1份\n+\n清炒油麦菜1份\n## 营养好搭配"}, "苹果蜜柚橘子汁": {"ingredients": "苹果、橘子各1个，柚子、柠檬、蜂蜜各适量。", "steps": "1 柚子去皮、去子、撕去白膜，取果肉；苹果洗净，去皮及核，切块；橘子去皮、去子取果肉；柠檬挤汁。\n2 将除柠檬汁外的上述水果放入榨汁机中，加入温开水，搅打均匀，调入蜂蜜、柠檬汁即可饮用。\n营养师建议：每周饮用两三次最佳。\n营养配餐：土豆饼1块、熟板栗3颗。\n饮食宜忌：果汁渣不宜过滤掉。"}, "糯米棕": {"ingredients": "新鲜苇叶4张，糯米150克，红枣6颗。", "steps": "1. 糯米先用清水浸泡一夜。2. 鲜苇叶去干净叶上绒毛，洗净：红枣洗净去核。3. 将糯米和红枣裹在苇叶中包成粽子，蒸熟后即可食用。\n糯米粽1个\n+\n豌豆鸡丝1份\n+\n萝卜汤1碗\n## 营养好搭配"}, "芦箏鸡丝汤": {"ingredients": "芦笋、鸡胸肉各100克，金针菇20克，蛋清、高汤、淀粉、盐、香油、彩椒丝各适量。", "steps": "①鸡胸肉切丝，用蛋清、盐、淀粉拌匀腌20分钟。②芦笋洗净，切成长段；金针菇洗净沥干。③鸡肉丝先用开水烫熟，见肉丝散开即可捞起沥干。④锅中放入高汤，加鸡肉丝、芦笋段、金针菇同煮，待熟后加盐，淋上香油，放上彩椒丝即可。\n芦笋鸡丝汤1碗\n+\n鳝鱼粉丝煲1份\n+\n米饭1碗\n## 营养好搭配"}, "田园蔬菜粥": {"ingredients": "西蓝花、胡萝卜、芹菜各30克，大米50克，盐适量。", "steps": "①西蓝花、胡萝卜、芹菜分别洗净，西蓝花掰小朵，胡萝卜、芹菜切丁；大米洗净，浸泡。②锅置火上，放入大米和水，大火烧沸后改小火熬煮。③放入胡萝卜丁、西蓝花、芹菜丁，略煮，加盐调味即可。\n营养师建议：可加入肉末或虾仁。\n营养配餐：葱爆牛肉1份、卷饼1个。\n饮食宜忌：西蓝花先放在盐水中浸泡2分钟，以去除农药残留。"}, "土豆西红柿牛肉汤": {"ingredients": "牛肉100克，西红柿、土豆各50克，酱油、姜末、盐各适量。", "steps": "①牛肉洗净切块，用酱油、姜末、盐腌15分钟。②西红柿洗净去蒂，切片；土豆去皮，切丁。③油锅烧热，倒入牛肉块、土豆丁大火快炒，再倒入西红柿片翻炒，加适量清水，大火煮沸转小火煮至土豆锦软。④加盐调味，煮至牛肉软烂，出锅即可。\n土豆西红柿牛肉汤1碗\n+\n干贝灌汤饺1份\n+\n火龙果1个\n## 营养好搭配"}, "小白菜锅贴": {"ingredients": "小白菜100克，猪肉馅200克，饺子皮、葱末、姜末、生抽、料酒、香油、盐各适量。\n①小白菜洗净，切碎，挤去水分；猪肉馅提前用生抽、料酒和盐腌好，加香油、葱末、姜末、小白菜碎，拌匀。\n②饺子皮中放入馅，对折，中间捏紧，两边略留点空隙。③平底锅热油后转小火，放入锅贴，盖盖儿，锅贴底部将熟时加少许凉水，再盖盖儿，锅贴底部焦黄时即可。", "steps": "营养师建议：猪肉可换成鸡蛋。\n营养配餐：葱油莴笋丝1份、猕猴桃汁1杯。\n饮食宜忌：小白菜有除烦功效，适合心绪烦乱的新妈妈食用。"}, "牛奶香蕉糊": {"ingredients": "牛奶250毫升，香蕉100克，玉米面80克，白糖、熟白芝麻各适量。", "steps": "①将牛奶倒入锅中，开小火，加入玉米面和白糖，边煮边搅拌，煮至玉米面熟。②将香蕉剥皮，用勺子压碎，放入牛奶糊中，再撒上熟白芝麻即可。\n牛奶香蕉糊1碗\n+\n全麦面包1个\n+\n苹果1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈要多吃一些抗疲劳、增强体质的食物，牛肉、鸭肉、蘑菇都是不错的选择。\n2. 非哺乳妈妈因为不需要哺乳，没有必要吃得太多。\n3. 新妈妈多选择富含膳食纤维和益生菌的食物。膳食纤维可以增加肠道中粪便的体积，促进肠道蠕动，有利于排毒瘦身；益生菌可以为结肠带来有益的菌群，利于肠道健康。两者都可使新妈妈减少体内脂肪、垃圾的堆积。"}, "莲子薏米煲鸭汤（366）": {"ingredients": "鸭肉150克，莲子10克，薏米20克，葱段、姜片、料酒、盐、彩椒丝、香菜叶各适量。", "steps": "1 鸭肉切成块，放入开水中余一下捞出后放入锅中。2 在锅中依次放入葱段、姜片、莲子、薏米，再加入料酒，倒入适量开水，用大火煲熟。3 待汤煲好出锅时加盐调味，用香菜叶和彩椒丝点缀即可。\n莲子薏米煲鸭汤 $ ^{1碗} $\n+\n西红柿炒鸡蛋 $ ^{1份} $\n+\n奶酪洋葱饼 $ ^{1块} $\n## 营养好搭配"}, "枸杞炒猪心": {"ingredients": "猪心半个，平菇1朵，枸杞、姜片、酱油、料酒、白糖、盐、水淀粉、香油各适量。", "steps": "1 猪心洗净、切片，用料酒、酱油抓匀；平菇洗净，切片后入开水中焯烫。\n2 油锅烧热，煸香姜片，放猪心炒至变色，放平菇片、枸杞翻炒。3 加白糖、盐调味，加入水淀粉，淋上香油即可。\n营养师建议：枸杞和猪心还可做成汤。\n营养配餐：芹菜炒肉1份、燕麦粥1碗。\n饮食宜忌：有高胆固醇症者慎食。"}, "肉末菜粥": {"ingredients": "大米80克、猪肉末50克、青菜、葱花、姜末、盐各适量。", "steps": "1. 将大米淘洗干净，放入锅内，加适量水，大火烧开后，转小火煮透，熬成粥。2. 将猪肉末放入锅中炒散，放入葱花、姜末炒匀。3. 将青菜切碎，放入锅中与肉末拌炒均匀。4. 将锅中炒好的肉末和青菜放入米粥内，加入盐调味，稍煮一下即可。\n肉末菜粥1碗\n萝卜炖牛筋1份\n馒头1个\n## 营养好搭配"}, "木瓜鸡爪汤": {"ingredients": "鸡爪50克，花生仁20克，木瓜30克，姜片、料酒、香油、盐各适量。", "steps": "①鸡爪去爪尖，洗净；花生仁用温水泡半小时，洗净；木瓜洗净，去皮、去子，切块。 ②沸水锅中放入鸡爪、花生仁、木瓜块、料酒、姜片，煮至熟透；加盐调味，淋上香油即可。\n营养师建议：将花生换成山药、黑豆都可。营养配餐：西红柿鸡片1份、紫薯馒头1个。\n饮食宜忌：不宜多吃，否则容易发胖。"}, "胡萝卜香菇汤": {"ingredients": "胡萝卜50克，香菇、西蓝花各30克，盐适量。", "steps": "1 胡萝卜去皮切菱形片；香菇洗净，去蒂对半切；西蓝花掰成小朵后洗净；备用。2 胡萝卜片、香菇、西蓝花一同放入锅中，加适量清水用大火煮沸，转小火将胡萝卜煮熟。3 出锅时加入盐调味即可。\n胡萝卜香菇汤1碗\n+\n豆芽炒肉丁1份\n+\n玉米饼1个\n## 营养好搭配"}, "排骨玉米汤": {"ingredients": "排骨段500克，玉米100克，盐、香油各适量。", "steps": "①排骨段汆去血水，捞出沥干；玉米切段。②将排骨段、玉米段放入锅中，加入清水，调入盐，大火煮沸后改小火焖2小时，出锅时淋入香油即可。\n排骨玉米汤1碗\n清炒胡萝卜丝1份\n什锦炒饭1份\n## 营养好搭配"}, "蛋奶炖布丁": {"ingredients": "牛奶 250 毫升，鸡蛋 1 个，白糖适量。", "steps": "①将牛奶分两份，一份加入适量白糖，小火加热使白糖溶化，一份备用。\n②锅中加水和白糖，熬至金黄色，倒入布丁模内。③鸡蛋搅匀，加冷牛奶，再倒入加糖的热牛奶，用纱布过滤成蛋奶浆。④蛋奶浆倒入布丁模内八分满，入锅小火隔水炖20分钟，冷却即食。\n营养师建议：可加入时令水果丁。\n营养配餐：花生粥1碗、芹菜茼蒿汁1杯。\n饮食宜忌：白糖不宜添加过量。"}, "木瓜烧带鱼（jinpai）": {"ingredients": "带鱼1条，木瓜1/4个，葱段、姜片、醋、盐、酱油各适量。", "steps": "1 将带鱼去鳞、内脏，洗净，切长段；木瓜洗净，削去瓜皮，除去瓜核，切块。\n2砂锅置火上，加入适量清水及带鱼、木瓜块、葱段、姜片、醋、盐、酱油，一同炖至带鱼熟透即可。", "notes": "木瓜有助于哺乳期的妈妈分泌乳汁，带鱼含有多种营养成分，可以缓解新妈妈脾胃虚弱、消化不良等症状。"}, "木瓜烧带鱼（366）": {"ingredients": "带鱼1条，木瓜50克，葱段、姜片、醋、盐、酱油各适量。", "steps": "1 将带鱼去鳞、内脏，洗净，切长段；木瓜洗净，削去瓜皮，除去瓜核，切块。2 砂锅置火上，加入适量清水及带鱼段、木瓜块、葱段、姜片、醋、盐、酱油，一同烧至带鱼熟透，大火收汁即可。\n木瓜烧带鱼1份\n芹菜竹笋汤1碗\n米饭1碗\n## 营养好搭配"}, "猕猴桃酸奶": {"ingredients": "猕猴桃2个，酸奶250毫升。\n苦菊100克，芝麻酱、盐、醋、白糖、蒜泥各适量。", "steps": "①猕猴桃削皮、切块。②将猕猴桃和酸奶搅拌均匀即可。\n营养师建议：可以依个人口味加入不同水果，如草莓、苹果等。\n营养配餐：西葫芦饼1块、何首乌红枣粥1碗。\n饮食宜忌：宜在饭后或当加餐饮用。芝麻酱拌苦菊\n此菜水分充足，富含维生素，是新妈妈清热降火的美食。\n1 苦菊洗净后沥干水，切段。2 芝麻酱用适量温开水化开，加入盐、白糖、醋搅拌成糊状。3 把拌好的芝麻酱倒在苦菊上，撒上蒜泥，食用时拌匀即可。\n芝麻酱拌苦菊1碗\n+\n小米粥1碗\n+\n香蕉1根\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈此时应注重食物的质量，少食用高脂肪、高蛋白、不易消化的食物，可多食用虾仁、紫薯等营养丰富而又少脂肪的食物，多吃蔬菜、水果。\n2. 新妈妈宜适量吃香油，可缓解便秘，还有滋补作用。\n3. 由于体内激素的变化，有些新妈妈会出现眼花的症状。不用担心，坐月子时只要注意少用眼，多吃一些对眼睛有利的食物，如鱼肉、胡萝卜、橙子等，过一段时间，眼花的症状就会减轻。"}, "紫薯银耳松子粥": {"ingredients": "紫薯50克，银耳10克，大米50克，\n熟松子仁5克。", "steps": "①银耳泡发；紫薯去皮，切粒；大米洗净，浸泡1小时。②锅中加水，放大米，烧开后放入紫薯粒，再烧开后改小火。③放入泡好的银耳，待米粒开花时，撒入熟松子仁即可。\n紫薯银耳松子粥1碗\n+\n鲜肉包1个\n+\n西芹百合1份\n## 营养好搭配"}, "杜仲猪腰汤": {"ingredients": "猪腰50克，杜仲20克，红枣3颗，葱段、姜片、盐各适量。", "steps": "①猪腰洗净，剔除筋膜后切花刀片，汆烫后捞出。②杜仲洗净，放入砂锅中，加清水后用大火煮开，转小火煮成浓汁。③砂锅中倒入适量清水，加葱段、姜片、腰片、红枣，与杜仲药汁同煮，加盐调味即可。\n营养师建议：猪腰炖汤营养不易流失。营养配餐：小白菜锅贴1份、草莓5颗。饮食宜忌：猪腰含胆固醇较高，不可多吃。"}, "菠萝虾仁炒饭（288）": {"ingredients": "虾仁20克 菠萝30克 豌豆40克 鸡蛋1个\n白米饭150克 蒜末10克 盐5克 白糖2克\n食用油15毫升 芝麻油5毫升", "steps": "1 虾仁洗净、去肠泥，沥干水分；菠萝取果肉，切小丁；豌豆洗净，焯烫2分钟后捞起备用。\n2 油锅烧热，爆香蒜末，接着加入虾仁炒至八分熟后，加入豌豆、白米饭和菠萝丁，打入鸡蛋，快速翻炒至饭粒散开。\n3 最后加盐、白糖、芝麻油炒匀后即可食用。"}, "菠萝虾仁炒饭（366）": {"ingredients": "虾仁80克，豌豆100克，米饭150克，菠萝50克，蒜末、盐、香油各适量。", "steps": "①虾仁洗净；菠萝取果肉切小丁；豌豆豆洗净，入沸水焯烫。②油锅烧热，爆香蒜末，加入虾仁炒至八成熟，加豌豆、米饭、菠萝丁快炒至饭粒散开，加盐、香油调味。\n菠萝虾仁炒饭1碗\n+\n清炒菠菜1份\n+\n猪肝汤1碗\n## 营养好搭配"}, "清炖鸽子汤": {"ingredients": "鸽子1只，干香菇1朵，山药50克，红枣3颗，枸杞、姜片、盐各适量。", "steps": "①干香菇泡发后洗净，切花刀；山药削皮，切片。②水烧开，放入鸽子，汆烫后捞出。③砂锅放水烧开，放姜片、红枣、香菇、鸽子，小火炖1个小时；再放入枸杞、山药，用小火炖至鸽肉酥烂，加盐调味。\n营养师建议：鸽肉以清蒸或煲汤为首选。营养配餐：西红柿炒菜花1份、米饭1碗。饮食宜忌：过敏体质的新妈妈应慎食。"}, "凉拌海蜇": {"ingredients": "海蜇皮200克，黄瓜50克，醋、白糖、盐、香油各适量。", "steps": "①将海蜇皮放在清水中浸泡2小时，再充分洗净，切成细丝。②用热水把海蜇丝略烫一下，立刻捞出沥干，晾凉。③把醋、白糖、盐、香油放在一起，调成小料；黄瓜洗净，切成丝。④把海蜇丝先放在盘里，再把黄瓜丝撒在上面，浇上调料拌匀即可。\n凉拌海蜇1碗\n芹菜炒虾仁1份\n南瓜饼1块\n## 营养好搭配"}, "木耳红枣汤": {"ingredients": "红枣3颗，木耳10克，白糖适量。", "steps": "①将木耳与红枣以温水泡发并洗净，放入小碗中。 2加水和适量白糖，将碗置于蒸锅中蒸约1小时。 3喝汤、吃木耳和红枣，或分次食用。\n木耳红枣汤1碗\n+\n虾米冬瓜1份\n+\n南瓜粥1碗\n## 营养好搭配"}, "鸡肝粥": {"ingredients": "鸡肝、大米各100克，葱花、姜末、盐各适量。", "steps": "①鸡肝洗净，切碎：大米洗净。 ②鸡肝碎与大米同放锅中，加适量清水，煮成粥。 ③待熟时放入葱花、姜末、盐，稍煮即可。\n营养师建议：可加入菠菜或豆苗提升食欲。营养配餐：红曲鳗鱼汤1碗，馅饼1个。饮食宜忌：变色、变质的鸡肝切勿食用。"}, "红豆冬瓜粥": {"ingredients": "大米30克，红豆20克，冬瓜、白糖各适量。", "steps": "1 红豆和大米洗净，浸泡4小时；冬瓜去皮，切片。2 在锅中加适量清水，用大火烧沸后，放入红豆和大米，煮至红豆熟透，加入冬瓜同煮。3 煮至冬瓜呈透明状，加白糖即可。\n红豆冬瓜粥1碗\n+\n清炒芥蓝1份\n+\n莲藕炖牛腩1份\n## 营养好搭配"}, "木耳粥（jinpai）": {"ingredients": "大米50克，木耳20克，白糖适量。", "steps": "1 海带先用清水洗净泡软，切成丝；冬瓜连皮切成大块；排骨斩块。\n2 将已斩块的排骨放入烧开的水中略烫，捞起。\n3 将海带、排骨、冬瓜、姜片一起放进锅里，加适量清水，用大火烧开 15 分钟后，用小火煲熟。\n4 快起锅的时候，加料酒、盐调味，撒上香菜碎即可。\n1 把土豆削去皮，切成丝；芹菜择去叶、根，切成长段。\n2 将酱油、盐、醋放入碗内，兑成汁。\n3 油锅烧热，放入土豆丝翻炒。\n4 放入芹菜段、胡萝卜丝，迅速炒拌均匀，倒入兑好的汁，撒上葱段，翻炒入味，出锅装盘即可。\n1 大米洗净，用冷水浸泡后，捞出，沥干水分；木耳用冷水泡软，洗净，撕成小块。\n2 锅中加入适量清水，倒入大米，用大火煮沸。\n3 改小火煮约 30 分钟，等米粒涨开以后，放入木耳拌匀，以小火继续熬煮约 10 分钟。\n4 见大米软烂时加白糖调味即可。\n## 产后第6周", "notes": "木耳能养血驻颜，令人肌肤红润、容光焕发，并可预防缺铁性贫血。此粥还能增强产后新妈妈的免疫力，促进身体机能的恢复。"}, "木耳粥（366）": {"ingredients": "木耳 10 克，大米 50 克。", "steps": "①木耳泡发，撕小朵；大米洗净，浸泡30分钟。②锅置火上，放入大米和适量水，大火烧沸后改小火，放入木耳。③小火熬煮30分钟，关火即可。\n营养师建议：可放入薏米、糙米。\n营养配餐：鸡丝腐竹拌黄瓜1份、鲜虾西芹1份。\n饮食宜忌：木耳泡发后要多次换水清洗。"}, "五 彩虾仁": {"ingredients": "山药、荷兰豆各100克，虾仁、胡萝卜各50克，盐、料酒、香油各适量。", "steps": "①山药、胡萝卜去皮，用盐水浸泡后切长条。 ②虾仁洗净，放盐、料酒腌20分钟。 ③将上述材料入热油锅中同炒至断生，放入荷兰豆炒熟，最后放盐，淋上香油即可。\n五彩虾仁1份\n花生鸡爪汤1碗\n米饭1碗\n营养好搭配\n## 非哺乳妈妈\n1. 为了以后健康瘦身养颜，新妈妈要根据自身情况进行补血，更要预防便秘。\n2. 新妈妈不要空腹喝酸奶。\n3. 妊娠斑，包括黄褐斑、蝴蝶斑或色素沉着等是新妈妈最想消除的皮肤问题。其实，产后祛斑美白不宜过早进行，这是因为随着产后身体的恢复，大部分妊娠斑都能慢慢淡下来。对于确实需要使用美白祛斑产品的新妈妈，最好选用原料天然、成分简单的美白祛斑产品。"}, "阳春面": {"ingredients": "面条150克，洋葱30克，香油、葱末、盐、高汤各适量。", "steps": "①洋葱去皮，洗净，切片。②油锅烧热，放入洋葱片，小火炒出香味，去渣、留葱油备用。③锅中放适量水烧开，放入面条煮熟。④碗中放入一匙葱油，调入盐，将煮熟的面条捞入碗中，加高汤、香油，撒上葱末即可。\n营养师建议：可加入时令蔬菜。\n营养配餐：豆腐烧油菜心1份、小炒肉1份。\n饮食宜忌：哺乳妈妈不宜吃洋葱。"}, "咸香蛋黄饼": {"ingredients": "紫菜 30 克，鸡蛋 2 个，面粉 50 克，盐适量。", "steps": "①紫菜洗净，切碎；鸡蛋取蛋黄打散备用。②将紫菜碎、蛋黄、面粉、盐一起搅拌至浓稠的糊状。③油锅烧热，将原料一勺一勺舀入锅中，用小火煎至两面金黄即可。\n咸香蛋黄饼1碗\n+\n荠菜魔芋汤1碗\n+\n桂圆芡实粥1碗\n## 营养好搭配"}, "杜仲排骨": {"ingredients": "杜仲是非哺乳妈妈清补的好食材。\n排骨段 100 克，杜仲 10 克，米酒水、姜片各适量。", "steps": "①将杜仲洗净，用米酒水小火焖煮半小时，去渣取汁。②排骨段用沸水汆一下，将排骨段、姜片、杜仲药汁放入碗内，盖上盖子，放入锅内隔水蒸1小时即可。\n营养师建议：可加入板栗。\n营养配餐：牛肉萝卜汤1碗、鳗鱼饭1份。\n饮食宜忌：排骨应尽量选择瘦的吃。"}, "杂粮蔬菜瘦肉粥": {"ingredients": "大米、糙米各50克，猪肉100克，\n菠菜、虾皮、盐各适量。", "steps": "①大米、糙米均淘洗干净，煮成杂粮粥备用；菠菜择洗干净，焯水后切段；猪肉洗净，切丝。②油锅烧热，倒入虾皮爆香，放入猪肉丝略炒，加水煮开，放入杂粮粥和菠菜段，再煮片刻加盐即可。\n杂粮蔬菜瘦肉粥1碗\n+\n豆沙包1个\n+\n木瓜汁1杯\n## 营养好搭配"}, "蜜汁南瓜": {"ingredients": "南瓜300克，红枣、白果各20克，枸杞、蜂蜜、白糖、姜片各适量。", "steps": "①南瓜去皮、洗净、切块；红枣、枸杞用温水泡发开。②南瓜丁放入盘里，加入红枣、枸杞、白果、姜片，入蒸笼蒸20分钟。③取出后去掉姜片。④油锅烧热，加适量水、白糖和蜂蜜，小火熬制成汁，浇在南瓜上即可。\n蜜汁南瓜1碗\n+\n小米鳝鱼粥1碗\n+\n草莓5颗\n## 营养好搭配"}, "菠菜鸡蛋饼": {"ingredients": "面粉150克，鸡蛋2个，菠菜3棵，盐、香油各适量。", "steps": "①面粉倒入大碗中，加适量温开水，再打入2个鸡蛋，搅拌均匀，和成蛋面糊。②菠菜焯水沥干后切碎，倒入蛋面糊里，加盐、香油，混合均匀。③油锅烧热，倒入菠菜蛋面糊煎至两面金黄即可。\n营养师建议：可加入玉米面。\n营养配餐：红薯山药小米粥1碗、香蕉1根。\n饮食宜忌：菠菜宜用水焯一下，以去除草酸。"}, "鲫鱼豆腐汤": {"steps": "1 将鲫鱼去鳞、内脏，洗净，用少许料酒、姜丝腌15分钟；豆腐切块。\n2 油锅置火上，烧热，放入鲫鱼、姜丝，小火慢煎鲫鱼至两面微黄，加水煮开。\n3 放入豆腐块，大火再次烧开，改小火慢炖，直到鱼熟汤白，调入少许盐，撒上葱花即可。\n鲫鱼豆腐汤1碗\n+\n鲍汁西蓝花1份\n+\n米饭1碗\n## 营养好搭配"}, "玉米面发糕（jinpai）": {"ingredients": "面粉、玉米面各50克，红枣、泡打粉、酵母粉、白糖、温水各适量。", "notes": "玉米中的维生素 $ B_{6} $、烟酸等成分，具有刺激胃肠蠕动、促进排便的特性，可预防便秘。\n油菜翠绿，清淡可口，与香菇搭配，含大量维生素、膳食纤维、钙、磷、铁等矿物质，是新妈妈百吃不厌的一道素食极品。\n## 顺产关键点"}, "玉米面发糕（366）": {"ingredients": "面粉、玉米面各80克，红枣、泡打粉、酵母粉、白糖各适量。", "steps": "①将面粉、玉米面、白糖、泡打粉先在盆中混合均匀；酵母粉溶于温水后倒入面粉中，揉成均匀的面团。②将面团放入蛋糕模具中，放温暖处诱发40分钟左右。③红枣洗净，加水煮10分钟；将煮好的红枣嵌入发好的面团表面，入蒸锅。④开大火，蒸20分钟，立即取出，取下模具，切成块即可。\n营养师建议：可在和面时加入牛奶。\n营养配餐：虾皮菠菜豆腐汤1碗、苹果1个。\n饮食宜忌：胃肠功能不佳者不可多食。"}, "肉丝银芽汤": {"ingredients": "黄豆芽 200 克，猪瘦肉 100 克，粉丝和豆皮各 50 克，盐、醋、姜末、葱花各适量。", "steps": "①黄豆芽洗净：猪瘦肉和豆皮洗净，切丝；粉丝用温水浸泡3~5分钟。\n②油锅置火上，烧热，放入瘦肉丝、姜末炒至肉变色，下黄豆芽快速翻炒。\n③加入适量清水，下粉丝和豆皮丝，调入盐、醋，煮至肉丝、黄豆芽熟，撒上葱花即可。\n肉丝银芽汤1碗\n鸡蛋饼1个\n西红柿鸡片1份\n## 营养好搭配\n## 非哺乳妈妈\n1. 新妈妈每天的饮食中都要包含新鲜蔬菜和水果，既调养身体，又能达到瘦身的目的。\n2. 魔芋低脂、低糖、低热，无胆固醇，新妈妈宜吃魔芋瘦身。\n3. 皮肤暗淡无光的原因之一就是营养缺失和脾虚失健。建议新妈妈多吃些营养丰富、补脾健胃的食物，如山药、红薯、鲫鱼、大米等；还可以适当吃一些薏米、西红柿、西瓜、橙子、山楂、柑橘等，这些食物利于皮肤的新陈代谢，具有很好的美白肌肤的功效。"}, "西红柿南米": {"ingredients": "西红柿1个，青蒜、黑芝麻、青椒各30克，葱花、盐各适量。", "steps": "①西红柿洗净，去皮，切碎；青蒜、青椒洗净，切碎。②黑芝麻入锅炒香。③油锅烧热，爆香葱花，下入切碎的青椒和青蒜略炒，加入西红柿碎、盐，煸炒片刻盛出，撒上炒香的熟黑芝麻即可。\n西红柿南米1碗\n冬瓜丸子汤1碗\n南瓜饼1个\n## 营养好搭配"}, "凉拌魔芋丝": {"ingredients": "魔芋是一种优质膳食纤维食物，具有减肥、通便的作用。\n魔芋丝200克，黄瓜80克，芝麻酱、酱油、醋、盐、香菜叶、枸杞各适量。\n馒头 200 克，木耳 20 克，西红柿 50 克，鸡蛋 1 个，盐、葱末各适量。", "steps": "①枸杞洗净；黄瓜洗净，切丝；魔芋丝用开水烫熟，晾凉。②芝麻酱用温开水调开，加适量的酱油、醋、盐调成小料。③将魔芋丝、枸杞和黄瓜丝放入盘内，倒入小料拌匀，加香菜叶点缀即可。\n营养师建议：魔芋也适合烧、焖、炒等方式烹饪。\n营养配餐：西蓝花牛柳1份、小米饭1碗。\n饮食宜忌：消化不良者应少食。\n炒馒头\n木耳和鸡蛋含丰富的铁和蛋白质，西红柿富含胡萝卜素和维生素C。\n①馒头切小块；木耳泡发，洗净，切块；西红柿洗净，切块；鸡蛋打散。\n②油锅烧热，放入鸡蛋液炒散，倒入木耳块，再加西红柿块和适量水，最后加盐和馒头块翻炒均匀，撒上葱末即可。\n炒馒头1碗\n+\n红豆排骨汤1碗\n+\n火龙果1个\n## 营养好搭配"}, "香蕉空心菜粥": {"ingredients": "香蕉、空心菜各100克，大米80克。", "steps": "①香蕉去皮，切块；空心菜洗净，切段；大米洗净，浸泡。②锅置火上，放入大米和适量水，大火烧沸后改小火，熬煮成粥。③放入香蕉块、空心菜段，搅拌均匀，略煮片刻即可。\n营养师建议：空心菜可换成水果。\n营养配餐：牛肉炒菠菜1份、葡萄汁1杯。\n饮食宜忌：空心菜不宜久放，以免营养流失。"}, "魔芋鸭肉汤": {"ingredients": "鸭肉100克，魔芋150克，枸杞、盐、姜丝、酱油各适量。", "steps": "①鸭肉和魔芋分别洗净，切块。②魔芋冷水入锅焯烫3分钟，捞出沥水；锅内另加水烧开，放鸭肉略余。③油锅烧热，放鸭肉、姜丝，炒至肉变色，加入水烧开，放魔芋、枸杞煮至鸭肉熟烂，加入盐、酱油调味即可。\n魔芋鸭肉汤1碗\n+\n木耳粥1碗\n+\n橙子1个\n## 营养好搭配"}, "鲤鱼冬瓜汤": {"ingredients": "鲤鱼头1个，冬瓜200克，盐适量。", "steps": "1 鲤鱼头洗净去鳞；冬瓜去皮、去瓤，洗净，切成薄片。2 将鲤鱼头和冬瓜一起放入砂锅里，加 3 小碗水，小火慢炖，待鲤鱼熟透加盐调味后即可吃鱼头喝汤。\n鲤鱼冬瓜汤1碗\n+\n清炒油麦菜1份\n+\n米饭1碗\n## 营养好搭配"}, "木瓜竹荪炖排骨": {"ingredients": "排骨300克，竹荪25克，木瓜100克，盐适量。", "steps": "①排骨切块，放到沸水里煮2分钟后捞出。②竹荪用盐水泡发后，剪小段，洗净；木瓜去皮、去子，切块。③木瓜块、竹荪段、排骨块一起放入砂锅中，加盖儿，加水炖1小时，出锅前加盐调味即可。\n营养师建议：竹荪可与莲子煮汤吃。\n营养配餐：醋熘土豆丝1份、米饭1碗。\n饮食宜忌：木瓜宜选用皮橙黄色，熟透的。"}, "冬瓜薏米汤": {"ingredients": "冬瓜250克，薏米25克，猪瘦肉100克，盐、姜片、陈皮丝各适量。\n1 将薏米洗净，清水浸泡 30 分钟；冬瓜去皮洗净，切块备用；猪瘦肉切片。2 锅中加水，放入泡好的薏米、姜片、猪瘦肉片、陈皮丝，大火烧开后改小火煮。3 稍后加入冬瓜块，煮至冬瓜、薏米烂熟。4 出锅前加入适量盐调味即可。", "steps": "冬瓜薏米汤1碗\n卷饼1个\n猕猴桃1个\n## 营养好搭配"}, "荔枝粥": {"ingredients": "干荔枝20克，大米50克。", "steps": "①大米淘洗干净，用清水浸泡30分钟。②干荔枝去壳取肉，洗净。③大米与干荔枝肉同放入锅中，加适量清水，用大火煮沸，然后转小火煮至粥熟即可。\n营养师建议：喜欢甜食的新妈妈，可以少加些白糖。\n营养配餐：虾皮烧豆腐1份、杏仁5颗。\n饮食宜忌：荔枝不宜一次多食。"}, "银耳木瓜汤": {"ingredients": "银耳10克，木瓜100克，冰糖适量。", "steps": "①银耳用清水浸透泡发，洗净，撕成小朵；木瓜去皮、去子，切成小块。\n②木瓜块和银耳放入锅中煮30分钟。\n③最后放入冰糖煮5分钟即可。\n银耳木瓜汤1碗\n+\n香菇油菜1份\n+\n花卷1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈在身体恢复得不错的情况下，可以从饮食和运动两方面入手达到瘦身的效果。饮食宜清淡，不宜大补。\n2. 平时三餐多摄入红薯、南瓜等富含膳食纤维的食物，减少脂肪堆积。\n3. 新妈妈可以在起床后喝杯温开水，也可以选择淡蜂蜜水、温的蔬果汁，这些都能够加速肠胃的蠕动，把新妈妈夜晚在体内积累的毒素、代谢物排出体外，从而达到健康瘦身的目的。"}, "红薯饼": {"ingredients": "红薯 250 克，糯米粉 50 克，豆沙馅、蜜枣、白糖、葡萄干各适量。", "steps": "①红薯煮熟，去皮捣碎后，与糯米粉和匀成面团；蜜枣、葡萄干洗净剁碎和豆沙馅、白糖混合成馅料。②将红薯面团揉成丸子状，压成圆饼，包入馅料压平。③入油锅煎熟即可。\n红薯饼1块\n+\n煮鸡蛋1个\n+\n猪肝红枣粥1碗\n## 营养好搭配"}, "南瓜绿豆糯米粥": {"ingredients": "绿豆20克，南瓜50克，糯米、大米各30克，冰糖适量。", "steps": "①绿豆、糯米和大米分别洗净，用清水浸泡4~6小时；南瓜去皮、洗净、切块。②锅中放绿豆和适量清水，将绿豆煮熟。③再放入糯米、大米和南瓜块，煮熟后依个人口味放入冰糖即可。\n营养师建议：糯米可换成薏米。\n营养配餐：煮鸡蛋1个、玉米饼1块。\n饮食宜忌：糯米一次不宜吃太多。"}, "百 合绿豆汤": {"ingredients": "绿豆 50 克，鲜百合 25 克，冰糖适量。", "steps": "①绿豆洗净；鲜百合掰成片，洗净。\n②将绿豆和鲜百合同放入砂锅内，加适量水，大火煮沸，改用小火煮至绿豆开花，百合软烂。③最后加入冰糖调味即可。\n百合绿豆汤1碗\n+\n小炒肉1份\n+\n西红柿鸡蛋面1碗\n## 营养好搭配"}, "什锦水果羹（yueshi）": {"ingredients": "苹果，雪梨，猕猴桃或红心火龙果（三种水果及以上），蜂蜜，枸杞制作方法：\n1. 把几种水果分别去皮，切成丁；\n2. 往锅里放水，然后把水果放入一起煮熟；\n3. 出锅时稍微加一些蜂蜜和泡过的枸杞即可。"}, "什锦水果羹（366）": {"steps": "①将苹果、白兰瓜分别洗净，去皮、去子、去核后，切成方丁；草莓洗净去蒂，切两半；猕猴桃去皮，切块。\n②苹果丁、白兰瓜丁、猕猴桃块、草莓一同放入锅内，加清水大火煮沸，转小火再煮10分钟即可。\n营养师建议：选用当季新鲜水果。\n营养配餐：红烧豆腐1份、阳春面1碗。\n饮食宜忌：应现做现吃。"}, "核桃仁莲藕汤（jinpai）": {"ingredients": "莲藕150克，核桃仁10克，红糖适量。", "notes": "莲藕含丰富的维生素K，具有收缩血管和止血的作用，对产后第4周还排出红色恶露的新妈妈有帮助。"}, "核桃仁莲藕汤（366）": {"ingredients": "核桃仁10克，莲藕150克，白糖适量。", "steps": "①莲藕洗净切成片；核桃仁切碎，备用。②将切碎的核桃仁、莲藕片放入锅内，加清水用小火煮至莲藕绵软。③出锅时加适量白糖调味即可。\n核桃仁莲藕汤1碗\n+\n鲜肉小馄饨1碗\n+\n火龙果1个\n## 营养好搭配"}, "雪菜豆腐汤": {"ingredients": "雪菜、豆腐各50克，虾仁、高汤、葱花、盐、香油各适量。", "steps": "①雪菜洗净，切成末；豆腐切成块状，放入清水中；虾仁洗净。②油锅烧热，将葱花爆香，放入雪菜翻炒片刻，加入适量高汤，煮沸后放入豆腐块，烧至豆腐熟透时，放入虾仁煮熟，加入盐、香油即可。\n雪菜豆腐汤1碗\n+\n板栗黄焖鸡1份\n+\n米饭1碗\n## 营养好搭配"}, "香菇鸡汤面": {"ingredients": "面条200克，鸡胸肉100克，油菜、香菇各20克，鸡汤、盐各适量。", "steps": "①鸡胸肉洗净，切片，氽烫熟后捞出。\n$ \\underline{\\text{鸡胸肉洗净，切片，水变熟白易出。}} $\n②油菜、香菇洗净，香菇切花刀；面条煮熟，盛入碗中。 $ \\underline{\\text{③香菇入油锅略煎，加入鸡胸肉翻炒片刻，加鸡汤、盐，烧开后加油菜煮熟，即可浇入面碗中。}} $\n营养师建议：香菇和鸡肉搭配，可炖可炒。营养配餐：豆芽炒肉丁1份、蜂蜜柚子汁1杯。\n饮食宜忌：脾胃湿寒的新妈妈少吃香菇。"}, "黑豆桂圆红枣汤": {"ingredients": "黑豆50克，红枣2颗，桂圆肉15克，冰糖适量。", "steps": "①将黑豆、红枣、桂圆肉洗净，在清水中浸泡。2将泡好的红枣去核；锅内放八分满的水，将泡好的黑豆、红枣、桂圆肉一起放入锅里，用小火煮1小时。3撇去汤上的浮渣，等到水熬得比原来减少1/3左右，放入冰糖调味即可。\n黑豆桂圆红枣汤 1 碗\n+\n虾皮小油菜 1 份\n+\n米饭 1 碗\n## 营养好搭配"}, "黑豆饭": {"ingredients": "大米、糙米各50克，黑豆30克。\n①黑豆、糙米、大米分别洗净，放在大碗里泡6个小时。②连米带豆，带泡米水，一起倒入电饭煲焖熟即可。", "steps": "营养师建议：可加入木耳、紫米等。\n营养配餐：肉末香菇鲫鱼1份、橙汁1杯。\n饮食宜忌：黑豆易加重肾负担，有肾病的新妈妈慎食。"}, "芡实薏米老鸭汤": {"ingredients": "芡实15克，薏米25克，老鸭1只，盐、姜片、料酒各适量。", "steps": "①将芡实、薏米洗净，用清水浸泡。\n②老鸭在水中浸泡出血水，切块，汆水并洗净血沫。③锅中放水，加鸭块、姜片、料酒，大火烧开后放入芡实、薏米，小火炖1个小时，最后放盐调味即可。\n芡实薏米老鸭汤1碗\n+\n西葫芦炒鸡蛋1份\n+\n红薯馒头1个\n## 营养好搭配\n## 非哺乳妈妈\n1. 非哺乳妈妈可在减少正餐摄入量的情况下，进行产后瘦身锻炼，但运动量要循序渐进，慢慢增加。\n2. 新妈妈不宜滥服营养品。\n3. 对于产后瘦身来说，睡眠的好坏也起着很重要的作用。因为睡眠的质量直接影响着激素的分泌量，长时间、优质的睡眠可以增加激素分泌量，促进身体的新陈代谢，让脂肪快速地被分解和消耗，打造易瘦体质。因此，新妈妈要保证充足的睡眠，这样既有充沛的精力照顾宝宝，又可以早日恢复苗条身姿。"}, "竹荪红枣茶": {"ingredients": "竹荪 50 克，红枣 6 颗，莲子 10 克，冰糖适量。", "steps": "①竹荪用水浸泡1小时，剪去两头，洗净泥沙，放在热水中煮1分钟，捞出，沥干水分。②莲子洗净去心，红枣洗净，去掉枣核。③将竹荪、莲子、红枣肉一起放入锅中，加清水大火煮沸后，转小火再煮20分钟，出锅前加入冰糖即可。\n竹荪红枣茶1碗\n+\n西葫芦饼1个\n+\n彩椒炒腐竹1份\n## 营养好搭配"}, "茄丁面": {"ingredients": "面条50克，西红柿、茄子、白菜心各30克，酱油、香油、盐各适量。", "steps": "①西红柿、茄子、白菜心分别洗净，西红柿、茄子切丁，白菜心切丝。②西红柿丁、茄子丁放入烧热的油锅内翻炒，加酱油、盐和水调成的汤汁煮开。③面条和白菜心一同煮熟，出锅装碗。④将汤汁淋在面条上，淋上香油即可。\n营养师建议：可以加入牛肉末。\n营养配餐：羊肉冬瓜汤1碗、猕猴桃1个。\n饮食宜忌：一周食用1次茄子即可。"}, "什锦海鲜面（jinpai）": {"ingredients": "面条50克，蛤蜊2个，虾2只，\n鱿鱼1条，鲑鱼肉20克，香菇2朵，\n里脊肉15克，葱段、香油、盐各适量。", "notes": "鱿鱼富含蛋白质、钙、磷、铁、硒、碘、锰、铜等矿物质，可以补充脑力；鲑鱼肉有补虚劳、健脾胃、暖胃和中的功效。"}, "什锦海鲜面（366）": {"ingredients": "面条50克，虾2只，鱿鱼1只，香菇2朵，葱花、姜末、香油、盐各适量。", "steps": "1 虾洗净，挑出虾线，去壳取虾仁；\n鱿鱼切片，切花刀；香菇洗净，去蒂切片。2 香油倒入锅中烧热，放姜末炒香，加香菇和适量水煮开。3 面条煮熟，捞出备用；将鱿鱼、虾仁放入锅中煮熟，加盐调味，放入面条碗中，撒上葱花即可。\n什锦海鲜面1碗\n拍黄瓜1份\n什锦水果羹1份\n## 营养好搭配"}, "芪枣枸杞茶": {"ingredients": "黄芪2片，红枣3颗，枸杞适量。", "steps": "①将黄芪、红枣洗净，放入锅中加清水煮开，改小火再煮10分钟。②加入枸杞，再煮一两分钟，滤出茶汁饮用即可。\n营养师建议：可将黄芪换成银耳。\n营养配餐：三丝牛肉1份、牛奶馒头1个。\n饮食宜忌：此菜中原料不可过量添加。"}, "红豆冬瓜粥（366）": {"ingredients": "大米30克，红豆20克，冬瓜、白糖各适量。", "steps": "①红豆和大米洗净，泡发；冬瓜去皮，切块。 ②在锅中加适量清水，用大火烧沸后，放入红豆和大米，煮至红豆熟透，加入冬瓜块同煮。 ③煮至冬瓜块呈透明状，加白糖即可。\n红豆冬瓜粥1碗\n牛奶馒头1个\n清炒莴笋1份\n## 营养好搭配"}, "南瓜蒸肉": {"ingredients": "小南瓜1个，猪肉150克，酱油、甜面酱、白糖、葱末各适量。", "steps": "①小南瓜洗净，在瓜蒂处开一个小盖子，挖出瓜瓤。②猪肉洗净切片，加酱油、甜面酱、白糖、葱末拌匀，装入南瓜中，盖上盖子，蒸2小时即可。\n南瓜蒸肉1份\n猪肝汤1碗\n粗粮馒头1个\n## 营养好搭配\n清蒸鲈鱼\n鲈鱼是增加营养、促进泌乳，又不用担心长胖的美食。\n## 原料\n鲈鱼1条，姜丝、葱丝、盐、料酒、蒸鱼豉油、香菜叶各适量。\n## 做法\n①将鲈鱼去鳞、去腮、去内脏，洗净，两面划几刀，抹匀盐和料酒后腌5分钟。②葱丝、姜丝铺在鱼身上，上蒸锅蒸15分钟，淋入蒸鱼豉油，撒上香菜叶即可。\n营养师建议：鲫鱼、黄花鱼等都可下奶。营养配餐：三鲜豆腐汤1碗、花卷1个。饮食宜忌：应少放盐。\n糯米香菇饭\n此饭香甜软糯，可益气补脾，促进血液循环，增强人体免疫力。\n## 原料\n糯米150克，猪里脊肉100克，香菇2朵，油菜、虾仁各30克，姜丝、料酒、盐、酱油、香油各适量。\n## 做法\n①糯米洗净，用清水浸泡2小时，倒入电饭锅中，加水，蒸熟盛出；油菜洗净焯熟码在糯米饭周围；猪里脊肉、香菇分别洗净切丝；虾仁去虾线洗净。②将香油烧热，放入姜丝、猪里脊肉丝、虾仁、香菇丝、料酒、酱油、盐炒熟，浇在糯米饭上即可。\n糯米香菇饭1碗\n虾仁丝瓜1份\n草莓8颗\n## 营养好搭配\n炒豆皮\n炒豆皮简单又营养，是很多新妈妈喜欢的一道素食。\n## 原料\n豆皮1张，香菇、胡萝卜各20克，香油、姜片、盐各适量。\n## 做法\n①香菇洗净，切片；胡萝卜洗净，切丝；豆皮切条。②将香油烧热，爆香姜片，再放入豆皮条、胡萝卜丝、香菇片，炒熟放盐调味即可。\n营养师建议：可加入肉片、白菜等。\n营养配餐：胡萝卜牛蒡排骨汤1碗、玉米面发糕1块。\n饮食宜忌：经常腹泻的新妈妈要少食。\n宫保素三丁\n此菜含多种维生素、膳食纤维等，搭配肉菜同吃更营养。\n## 原料\n土豆200克，甜椒、黄瓜各100克，花生仁50克，葱末、白糖、盐、香油、酱油、水淀粉各适量。\n## 做法\n①甜椒、黄瓜、土豆洗净，切丁；将花生仁、土豆丁分别过油炒熟。 $ ^{②} $油锅烧热，煸香葱末，放入甜椒丁、黄瓜丁、土豆丁、花生仁，大火快炒，加白糖、盐、酱油调味，用水淀粉勾芡，最后淋香油即可出锅。\n宫保素三丁1份\n荷兰豆鲫鱼汤1碗\n米饭1碗\n营养好搭配\n## 非哺乳妈妈\n1. 维生素  $ \\mathrm{B}_{2} $ 可以促进脂肪的新陈代谢，帮助瘦身，新妈妈可多吃紫菜、猪肉、猪肝、黄豆、鳗鱼、蘑菇、木耳、茼蒿等富含维生素  $ \\mathrm{B}_{2} $ 的食物。\n2. 开心果难消化，易发胖，新妈妈不宜过多食用。\n3. 产后瑜伽有助于身体恢复，新妈妈适当练习瑜伽可以改变骨盆底支持组织、韧带的松弛状态，缓解肌肉疼痛。定期适度的瑜伽锻炼还可以帮助新妈妈缓解紧张情绪，紧实胸部、腹部、腿部肌肉，既能防抑郁，又有助于减肥。"}, "紫菜豆腐汤": {"ingredients": "豆腐150克，紫菜25克，鸡蛋1个、葱花、盐、香油各适量。", "steps": "①紫菜泡发，用清水洗去泥沙；豆腐切块，备用；鸡蛋打散，备用。②将泡好的紫菜、豆腐块一同放入锅中，加适量清水，用大火煮沸，转小火继续煮至豆腐熟透。③淋入鸡蛋液，开大火煮熟，出锅时加盐调味，撒上葱花、香油即可。\n紫菜豆腐汤1碗\n+\n蘑菇肉片1份\n+\n米饭1碗\n## 营养好搭配"}, "香蕉苹果粥": {"ingredients": "香蕉100克，苹果50克，糯米40克，冰糖适量。", "steps": "①香蕉、苹果分别去皮，切丁；糯米洗净，浸泡2小时。②锅置火上，放入糯米和适量水，大火烧沸后改小火，熬煮成粥。③待粥煮熟时，放入香蕉丁和苹果丁，略煮片刻。④待粥煮至熟烂时，放入冰糖即可。\n营养师建议：可加入葡萄干。\n营养配餐：煮鸡蛋1个、煎饼1个。\n饮食宜忌：腹泻时不宜食用。"}, "大米绿豆猪肝粥": {"steps": "1 将大米、绿豆分别洗净；猪肝洗净，切碎；绿豆提前泡 4~6 小时。2 锅中加清水适量，放入大米和绿豆，煮至快熟烂时，加入猪肝碎，待猪肝熟透后加盐即可。\n大米绿豆猪肝粥1碗\n+\n木耳西蓝花1份\n+\n花卷1个\n营养好搭配"}, "海带烧黄豆": {"ingredients": "海带80克，黄豆、红椒丁各30克，高汤、盐、葱末、水淀粉、香油各适量。\n①海带泡发洗净，切段；黄豆洗净，提前浸泡6小时。②海带和黄豆分别焯透、捞出。③油锅烧热，将葱末煸出香味，放入海带段，加高汤、黄豆、红椒丁烧开。④加入盐，大火收汁，用水淀粉勾芡，淋香油即可。\n水果酸奶吐司能给新妈妈补充丰富的维生素，有利于美容瘦身。\n吐司2片，酸奶250毫升，蜂蜜、草莓、哈密瓜、猕猴桃、核桃仁碎各适量。", "steps": "营养师建议：可加入排骨炖汤。\n营养配餐：西蓝花鹌鹑蛋汤1碗、鳗鱼饭1碗。\n水果酸奶吐司\n1 吐司切成方丁。2 哈密瓜洗净，去皮，切块；草莓洗净去蒂，切块；猕猴桃取肉切小丁。3 将酸奶盛入碗中，调入适量蜂蜜，再加入吐司丁、哈密瓜块、草莓块、猕猴桃丁、核桃仁碎搅拌均匀。\n水果酸奶吐司1份\n蜂蜜柚子汁1杯\n南瓜饼1块\n营养好搭配\n# 附录 产后不适食疗方\n宝宝出生后，新妈妈的喜悦之情溢于言表，但不安也随之而来。由于生产消耗了大量元气，身体频频出现状况：感冒、气短、乳房胀痛、恶露不净、乳汁不足……采用正确的食疗方法，既能使新妈妈尽快恢复健康，又不会影响哺乳，就让种种不适，消失在一道道美味佳肴里吧！"}, "胡萝卜粥（jinpai）": {"ingredients": "细面条200克，鸡胸肉100克，胡萝卜、香菇各20克，葱花、盐、酱油各适量。\n鲜玉米粒50克，胡萝卜100克，大米60克。", "steps": "1 将大米洗净；红枣去核洗净；核桃仁洗净。\n2 将大米、红枣、核桃仁放入锅中，加适量清水，用大火烧沸后改用小火，等大米成粥后，加入冰糖搅拌均匀即可。\n2 胡萝卜洗净，去皮，切片；鸡汤加盐和少许酱油调味；香菇入油锅略煎。\n3 将煮熟的面条盛入碗中，把胡萝卜片和鸡肉摆在面条上，淋上热鸡汤，再点缀上葱花和煎好的香菇即可。\n1 鲜玉米粒洗净；胡萝卜洗净，去皮，切成小块，备用。\n2 大米洗净，用清水浸泡 30 分钟。\n3 将大米、胡萝卜块、玉米粒一同放入锅内，加适量清水，大火煮沸，转小火继续煮至大米熟透即可。\n## 产后第26天", "notes": "胡萝卜健脾和胃，玉米调中健胃，此粥很适合新妈妈食用。"}, "胡萝卜粥（366）": {"ingredients": "玉米粒50克，胡萝卜100克，大米60克。", "steps": "①玉米粒洗净；胡萝卜洗净，去皮，切成小块。②大米洗净，用清水浸泡30分钟。③将大米、胡萝卜块、玉米粒一同放入锅内，加适量清水，大火煮沸，转小火继续煮至大米熟透即可。"}, "西红柿鸡片": {"ingredients": "鸡胸肉、西红柿各100克，水淀粉、干淀粉、盐各适量。", "steps": "①鸡胸肉洗净，切片，放入碗中，加盐、干淀粉腌制。②西红柿洗净，切丁。③油锅中放鸡胸片，炒熟，加盐、西红柿丁翻炒，最后用水淀粉勾芡即可。"}, "牛肉粥": {"ingredients": "牛肉丝、胡萝卜丝、大米各50克，蛋清、料酒、葱丝、姜丝、盐各适量。", "steps": "①将牛肉丝用姜丝、蛋清、料酒腌一下。②大米淘洗干净，加适量水，煮至八成熟。③将牛肉丝放入粥中煮开，撇去浮沫，加胡萝卜丝同煮。④小火煮30分钟后，加盐、葱丝调味即可。"}, "小米蒸排骨": {"ingredients": "猪排骨250克，小米100克，料酒、冰糖、豆瓣酱、香油、盐、葱花各适量。", "steps": "①猪排骨洗净，斩成段；小米洗净。②猪排骨加豆瓣酱、冰糖、料酒、盐、香油拌匀，装入蒸碗内，加入小米，上笼用大火蒸熟，取出，撒上葱花。"}, "生姜葱白红糖汤": {"ingredients": "带根须的葱白25克，生姜片20克，红糖适量。", "steps": "①将带根须的葱白洗净。②将葱白和生姜片放入锅内，加1碗水煮开。③放适量红糖，趁热服下。"}, "莲藕橙汁": {"ingredients": "莲藕100克，橙子60克。", "steps": "①莲藕洗净后削皮，切小块；橙子切成4等份，去皮后剥成瓣，去子。②将莲藕、橙子和适量纯净水放入榨汁机榨汁即可。"}, "荔枝山药莲子粥": {"ingredients": "干荔枝5颗，大米50克，山药30克，莲子20克，红糖适量。", "steps": "①干荔枝去壳除核，洗净；大米淘洗干净。②山药去皮，洗净，切片；莲子去心，洗净。③锅内放适量清水，加入干荔枝肉、大米、山药、莲子，用大火烧开后转小火熬煮，至米烂汤稠时，放入红糖搅匀即可。"}, "桂圆红枣茶": {"ingredients": "红枣6颗，桂圆2颗。", "steps": "①红枣洗净去核，枣肉备用。②桂圆剥去壳，取桂圆肉备用。③将桂圆肉、红枣肉放入锅内，加入清水煮沸，转小火再煮30分钟即可饮用。"}, "胡萝卜炒豌豆": {"ingredients": "胡萝卜150克，豌豆100克，姜片、醋、盐各适量。", "steps": "①胡萝卜洗净，切丁； $ \\underset{\\cdot}{将} $胡萝卜丁和豌豆放入开水中焯1分钟后，捞出。②锅中油烧热，放入姜片煸香，倒入胡萝卜丁、豌豆，爆炒至熟，调入醋和盐，翻炒均匀即可。"}, "桔梗红豆粥": {"ingredients": "桔梗、皂角刺各10克，红豆20克，大米50克。做法：①桔梗、皂角刺、红豆、大米分别洗净；红豆提前浸泡半日。②桔梗和皂角刺加适量水煮20分钟，去渣取汁。③将红豆和大米煮成粥后，加入药汁拌服即可。"}, "山楂红糖饮": {"ingredients": "山楂4颗，红糖适量。", "steps": "①山楂洗净，切成薄片，晾干备用。②锅中加入适量清水，放在火上，用大火将山楂煮至烂熟。③再加入红糖煮3分钟，出锅即可。"}, "阿胶鸡蛋羹": {"ingredients": "鸡蛋2个，阿胶10克，盐适量。", "steps": "①鸡蛋磕入碗中，阿胶打碎。②把阿胶碎放入鸡蛋液中，加入盐和适量清水，搅拌均匀。③将鸡蛋液上锅，用大火蒸熟即可食用。"}, "三 色补血汤": {"ingredients": "南瓜50克，银耳10克，莲子、红枣各5颗，红糖适量。", "steps": "①南瓜去皮、去子，洗净切块。②莲子去苦心；红枣洗净；银耳泡发后，撕成小朵，去除根蒂。③所有食材放入砂煲中，加入适量温水，大火烧开后转小火，煮至南瓜熟烂，调入红糖即可。"}, "红豆饭": {"ingredients": "红豆 50 克，大米 100 克，熟黑芝麻适量。", "steps": "①红豆提前浸泡4小时，加入水煮开后，调成中火煮20分钟，捞出备用。②大米洗净沥干，与红豆一起放入电饭煲中加水蒸熟。③最后撒上黑芝麻即可。"}, "鲤鱼红枣汤": {"ingredients": "鲤鱼1条，红枣4颗，香菜末、盐、料酒各适量。", "steps": "①红枣洗净：鲤鱼处理好，洗净。 ②锅置于火上加清水适量，放入鲤鱼、红枣、盐、料酒，煮至鱼肉熟烂，加香菜末即可。"}, "红豆薏米姜汤": {"ingredients": "红豆、薏米各50克，姜片、白糖各适量。", "steps": "①红豆、薏米用清水浸泡4小时。②锅中放适量水，放入红豆、薏米、姜片，大火煮开后转小火煮40分钟，加白糖调味即可。"}, "百 合莲子桂花饮": {"ingredients": "鲜百合10克，莲子4颗，桂花蜜、冰糖各适量。", "steps": "①鲜百合掰开洗净；莲子去心洗净。②锅中加适量水，放入莲子，煮开后，加入百合瓣，煮至莲子绵软。③加入冰糖至融化，然后添加桂花蜜即可。"}, "虾米炒芹菜": {"ingredients": "干虾米50克，芹菜150克，酱油适量。", "steps": "①干虾米用温水浸泡；芹菜去老叶后洗净，切段，用开水略焯一下。②油锅置火上，烧热，下芹菜快炒，并放入虾米、酱油，用大火快炒几下即成。"}, "红糖姜饮": {"ingredients": "红糖30克，姜丝10克。", "steps": "①姜丝放入锅中，加适量水煮开。②放入红糖，再次煮开取汤汁饮用即可。"}, "黄瓜藤汤": {"ingredients": "干黄瓜藤30克，红糖50克，米酒50毫升。", "steps": "①将干黄瓜藤、红糖、米酒放入锅中，加入适量水，煎服。②每日1次，连服3次。"}, "花生红枣莲藕汤": {"ingredients": "干香菇4朵，莲藕1节，花生仁20克，红枣4颗，白果3颗，盐适量。", "steps": "①干香菇洗净，用温水浸泡；莲藕洗净，削皮，切成片备用；花生仁放开水锅里煮一下，以去涩味。②砂锅烧水，水开后，把所有食材一起放入锅里炖1小时，加盐调味即可。"}, "红枣蒸鹌鹑（366）": {"ingredients": "鹌鹑1只，红枣8颗，姜片、葱段、盐、淀粉、料酒、香油各适量。", "steps": "①鹌鹑洗净，斩成块；红枣切成小片。②将鹌鹑与红枣片、姜片、葱段、盐、料酒、淀粉拌匀，放入蒸碗里。③将蒸碗放入蒸锅中，将鹌鹑蒸熟后淋上香油即可。"}, "鱼头豆腐汤": {"ingredients": "胖头鱼鱼头200克，豆腐100克，葱段、姜片、盐、料酒各适量。", "steps": "①将胖头鱼鱼头洗净备用；豆腐切成2厘米厚的块。②将鱼头、葱段、姜片、料酒放入锅内，加清水大火煮沸。③加盖，改用小火炖至鱼头快熟时，拣去葱段和姜片。④放入豆腐块，继续用小火炖至豆腐熟透，最后用盐调味即可。"}, "豌豆炒虾仁（jinpai）": {"ingredients": "虾仁100克，嫩豌豆50克，鸡汤、盐、水淀粉、香油各适量。", "notes": "豌豆中富含膳食纤维，可以通便，豌豆和虾仁都含有丰富的蛋白质，有利于乳汁的分泌。"}, "豌豆炒虾仁（366）": {"ingredients": "虾仁200克，豌豆50克，鸡汤、盐、水淀粉、香油各适量。", "steps": "①将豌豆洗净，放入开水锅中焯一下，备用。②炒锅中放入香油，待三成热时，将虾仁入锅，快速滑散后倒入漏勺中控油。③炒锅内留底油，烧热，放入豌豆翻炒几下，加适量鸡汤、盐，随即放入虾仁，用水淀粉勾薄芡，翻炒几下即可。\nDocument generated by Anna's Archive around 2023-2024 as part of the DuXiu collection (https://annas-blog.org/duxiu-exclusive.html).\nImages have been losslessly embedded. Information about the original file can be found in PDF attachments. Some stats (more in the PDF attachments):\n{\n\"filename\": \"MTQ0MTg3NDAuemlw\",\n\"filename_decoded\": \"14418740.zip\",\n\"filesize\": 127952293,\n\"md5\": \"0faed8fbad1260eac3c52fba810a4aa\",\n\"header_md5\": \"ff42b156121452df0cbd30200488e403\",\n\"sha1\": \"3e6325adbf7f8e67d10c18dac0cb8548033a74bc\",\n\"sha256\": \"10400c87dca1dc22a29623c06cfcc94eebf44b8cd9f5d0fa5092aac13d4e3972\",\n\"crc32\": 1274142095,\n\"zip_password\": \"\",\n\"uncompressed_size\": 127861327,\n\"pdg_dir_name\": \"14418740\\_u2568\\_u255f\\_u255d\\_u2562\\_u2558\\_u252c\\_u2554\\_u2310\\_u2558\\_u252c\\_u256b\\_u2559\\_u2593\\_u2550366\\_u2514\\_u00b2\",\n\"pdg_main_pages_found\": 215,\n\"pdg_main_pages_max\": 215,\n\"total_pages\": 232,\n\"total_pixels\": 1421792768,\n\"pdf_generation_missing_pages\": false\n}"}};

{ id: 335, name: '现买现吃 通草炖猪蹄', category: 'lunch', nature: 'neutral', ingredients: '', desc: '食材功效：猪蹄中含有丰富的大分子胶原蛋白，能使皮肤细润饱满、平整光滑。猪蹄还有补血通乳的作用，是传统的产后催乳佳品。', stage: '第2周', favorite: false },
{ id: 336, name: '牛奶', category: 'snack', nature: 'neutral', ingredients: '奶香麦片粥', desc: '食材功效：牛奶中含有的磷，对促进宝宝大脑发育有重要的作用；牛奶中含有的镁能缓解心脏和神经系统疲劳；牛奶中含有的锌能促进伤口更快地愈合。', stage: '', favorite: false },
{ id: 337, name: '别急着喝下奶汤', category: 'snack', nature: 'neutral', ingredients: '', desc: '产后前两三天不要急着喝催乳的汤，不然胀奶期可能会很疼痛，也容易患乳腺炎。而且，产后新妈妈的身体太虚弱，马上喝下奶汤，往往会“虚不受补”，反而会导致乳汁分泌不畅。另外，过早喝催乳汤，乳汁下来过快过多，新', stage: '第2周', favorite: false },
{ id: 338, name: '经常喝些小米粥', category: 'breakfast', nature: 'cool', ingredients: '', desc: '小米粥营养价值丰富，有“代参汤”的美称。很多北方新妈妈在坐月子期间都会选择食用小米粥。小米粥不仅含有丰富的维生素 $ B_{1} $、维生素 $ B_{2} $，其含铁量也很高，可以使产后虚寒的新妈妈', stage: '', favorite: false },
{ id: 339, name: '宜食用红枣炒米茶', category: 'snack', nature: 'warm', ingredients: '', desc: '很多南方的新妈妈都会在月子里吃些红枣炒米茶。红枣具有补脾和胃、补血的功效，而炒米同样具有暖胃功效，可以帮助新妈妈更好地吸收食物的营养。不过，任何食物都不宜进补过量，以免影响身体恢复。', stage: '', favorite: false },
{ id: 340, name: '宜恰当饮用生化汤', category: 'snack', nature: 'neutral', ingredients: '', desc: '生化汤是一种传统的产后方，能“生”出新血，“化”去旧瘀，可以帮助新妈妈排出恶露，但是饮用要恰当，不能过量，否则有可能增加出血量，不利于子宫修复。', stage: '', favorite: false },
{ id: 341, name: '宜吃煮蛋和蒸蛋', category: 'lunch', nature: 'warm', ingredients: '如果产后新妈妈便、可以在鸡蛋羹中淋、会有良好疗效、但食用时需注意、过量食用会导致消、一般以每天不超过', desc: '鸡蛋富含蛋白质，是许多新妈妈的首选补品。煮鸡蛋、蛋羹、蛋花汤是不错的食用方法，既能杀灭细菌，又能使蛋白适当受热变软，易与胃液混合，有助于消化，是脾胃虚弱的产后新妈妈的补益佳品。', stage: '', favorite: false },
{ id: 342, name: '不宜同时服用子宫收缩剂和生化汤', category: 'dinner', nature: 'neutral', ingredients: '', desc: '', stage: '', favorite: false },
{ id: 343, name: '不宜喝长时间煮的骨头汤', category: 'dinner', nature: 'neutral', ingredients: '', desc: '动物骨骼中富含钙质，但这些钙质难以溶解，即使是长时间熬煮的骨头汤，其中钙的含量也微乎其微。而且经过长时间的熬煮，原料及汤中一些怕热的营养素丧失殆尽，所以哺乳的新妈妈既不要指望用骨头汤补钙，也不要喝煲的', stage: '', favorite: false },
{ id: 344, name: '不宜天天喝浓汤', category: 'dinner', nature: 'neutral', ingredients: '产后不宜天天喝浓、即脂肪含量很高的、如猪蹄汤、排骨汤等、因为过多的高脂肪、也会导致宝宝出现、新妈妈应适当喝些、维生素', desc: '产后不宜天天喝浓汤，即脂肪含量很高的汤，如猪蹄汤、排骨汤等，因为过多的高脂肪食物不仅让新妈妈身体发胖，也会导致宝宝出现消化不良。新妈妈应适当喝些富含蛋白质、维生素、钙、磷、铁、锌等营养素的高汤，如瘦肉', stage: '', favorite: false },
{ id: 345, name: '不宜只喝小米粥', category: 'breakfast', nature: 'neutral', ingredients: '北方有一种坐月子、就是分娩之后只能、连续喝好几周、其实、小米粥是很有营养、特别是在月子期间、但是也不能只以小、而忽视其他营养成', desc: '北方有一种坐月子的习惯，就是分娩之后只能以小米粥为主食，连续喝好几周。其实，小米粥是很有营养，特别是在月子期间，但是也不能只以小米粥为主食，而忽视其他营养成分的摄入。刚分娩后的几天可以以小米粥等流质食', stage: '', favorite: false },
{ id: 346, name: '鲜奶糯米桂圆粥', category: 'breakfast', nature: 'neutral', ingredients: '原料、鲜百合、红枣', desc: '', stage: '', favorite: false },
{ id: 347, name: '枸杞红枣粥', category: 'breakfast', nature: 'warm', ingredients: '原料、豆浆、姜片、葱段、盐各适量', desc: '营养功效：枸杞子、红枣和红糖都有补养身体、滋润气血的功效，对有气血不足、脾胃虚弱、失眠、恶露不净等症状的产后妈妈来说，是极佳补品。', stage: '', favorite: false },
{ id: 348, name: '豆浆莴苣汤', category: 'dinner', nature: 'neutral', ingredients: '', desc: '营养功效：豆浆营养丰富，易于消化吸收，可以滋阴润燥，补虚增乳。妈妈进补顺利，宝宝发育就会更好。', stage: '', favorite: false },
{ id: 349, name: '红小豆黑米粥', category: 'breakfast', nature: 'neutral', ingredients: '', desc: '', stage: '', favorite: false },
{ id: 350, name: '黄花豆腐瘦肉汤', category: 'dinner', nature: 'neutral', ingredients: '', desc: '营养功效：黄花菜具有清热除烦、利水消肿、止血下乳的作用，与富含蛋白质的豆腐和滋阴润燥的猪瘦肉同食，补气、生血、催乳的功效显著。', stage: '第2周', favorite: false },
{ id: 351, name: '鲢鱼丝瓜汤', category: 'dinner', nature: 'neutral', ingredients: '原料、丝瓜、葱段、姜片、白糖、料酒各适量', desc: '营养功效：丝瓜具有通经络、行血经的功效；鲢鱼有温中益气的作用。此汤两物相配，具有补中益气、生血通乳的作用。', stage: '', favorite: false },
{ id: 352, name: '干贝冬瓜汤', category: 'dinner', nature: 'warm', ingredients: '原料、干贝、料酒各适量', desc: '营养功效：冬瓜的营养价值很高，特别是维生素C的含量是鸡肉、牛肉的3倍；干贝有稳定情绪的作用；吃些天然食物来对抗抑郁，对妈妈和宝宝来说都是安全的。', stage: '', favorite: false },
{ id: 353, name: '冬笋雪菜黄花鱼汤', category: 'dinner', nature: 'warm', ingredients: '原料、冬笋、雪菜各、葱段、姜片、料酒各适量', desc: '营养功效：黄花鱼有健脾和胃、益气填精之功效，对产后抑郁症有良好的抗击作用。良好的精神状态是保证母乳质量的前提。', stage: '', favorite: false },
{ id: 354, name: '不宜吃煎蛋和生蛋', category: 'lunch', nature: 'warm', ingredients: '', desc: '食用鸡蛋要讲究方法，才能使营养成分被充分吸收。生鸡蛋不可以吃，因为它难消化，易受细菌感染，有损健康；鸡蛋煮得过老，使蛋白质结构紧密而不易消化，吃了这样的鸡蛋，会使新妈妈脾胃不适，产生打嗝、烦躁不安的情', stage: '', favorite: false },
{ id: 355, name: '西红柿炒鸡蛋', category: 'lunch', nature: 'warm', ingredients: '原料、鸡蛋、白糖、盐各适量', desc: '营养功效：鸡蛋营养全面，西红柿富含矿物质和维生素，西红柿炒鸡蛋可开胃健食，非常适合产后新妈妈食用。', stage: '', favorite: true },
{ id: 356, name: '豆腐馅饼', category: 'lunch', nature: 'warm', ingredients: '', desc: '营养功效：豆腐含有丰富的植物蛋白和钙，容易消化，热量也低，其温和滋润的功效能逐渐唤起新妈妈的食欲。', stage: '', favorite: false },
{ id: 357, name: '芹菜牛肉丝', category: 'lunch', nature: 'neutral', ingredients: '', desc: '营养功效：此菜具有益气、补血的功效，牛肉和芹菜都含有丰富的铁质，非常适合产后贫血的新妈妈食用。', stage: '', favorite: false },
{ id: 358, name: '西红柿鸡蛋面', category: 'lunch', nature: 'warm', ingredients: '', desc: '营养功效：西红柿具有生津止渴、健胃消食、补血养血和增进食欲的功效，新妈妈用西红柿做面或汤，可养胃助消化。', stage: '', favorite: false },
{ id: 359, name: '明虾炖豆腐', category: 'lunch', nature: 'warm', ingredients: '原料、豆腐各、葱花、姜片、盐各适量', desc: '营养功效：虾营养丰富，肉质松软，易消化，对产后身体虚弱的妈妈是极好的进补食物。虾的通乳作用较强，对产后乳汁分泌不畅的妈妈尤为适宜。', stage: '', favorite: false },
{ id: 360, name: '荷兰豆烧鲫鱼', category: 'lunch', nature: 'warm', ingredients: '原料、牛肉、盐适量', desc: '营养功效：鲫鱼有健脾利湿、和中开胃、活血通络的功效，对产后妈妈有很好的滋补作用。', stage: '', favorite: false },
{ id: 361, name: '肉丸粥', category: 'breakfast', nature: 'neutral', ingredients: '', desc: '', stage: '', favorite: false },
{ id: 362, name: '红小豆花生乳鸽汤', category: 'dinner', nature: 'warm', ingredients: '原料、花生仁、桂圆肉各、乳鸽、盐适量', desc: '营养功效：此汤营养丰富，不仅可以帮助哺乳妈妈分泌乳汁，还能促进妈妈的伤口愈合，预防贫血。', stage: '', favorite: false },
{ id: 363, name: '口蘑腰片', category: 'lunch', nature: 'warm', ingredients: '原料、茭白、口蘑、葱花、姜片、黄酒、淀粉、香油各适量', desc: '营养功效：猪腰具有补肾强身的作用，它还具有较高的含铁量，极容易被人体吸收，有利于产后补血。', stage: '', favorite: false },
{ id: 364, name: '南瓜饼', category: 'lunch', nature: 'warm', ingredients: '原料、荠菜、火腿、姜片、水淀粉各适量、营养功效、维生素、还有润肺益气', desc: '原料：羊肝100克，荠菜50克，火腿10克，姜片、盐、水淀粉各适量。营养功效：南瓜营养丰富，维生素E含量较高，还有润肺益气、缓解便秘的作用，有利于新妈妈健康。', stage: '', favorite: true },

{ id: 366, name: '不宜空腹喝酸奶', category: 'snack', nature: 'neutral', ingredients: '', desc: '爱喝酸奶的新妈妈最好选择饭后两小时后饮用酸奶。空腹时喝酸奶，乳酸菌很容易被胃酸杀死，其营养价值和保健作用就会大大减弱。此外，酸奶不能加热喝，因为活性乳酸菌会很容易被烫死，使酸奶的口感变差，营养流失。喝', stage: '', favorite: false },

{ id: 637, name: '油炸食物', category: 'lunch', nature: 'neutral', ingredients: '', desc: '产后新妈妈需要补充丰富的营养，但不宜吃油炸食物，要知道，淀粉类的食物经过油炸之后会产生丙烯酰胺，而且温度越高产生的丙烯酰胺就越多。丙烯酰胺对大脑的影响非常巨大，摄入量过多会造成记忆力下降、反应迟钝等现', stage: '', favorite: false },
{ id: 638, name: '空腹喝牛奶、豆浆和酸奶', category: 'snack', nature: 'neutral', ingredients: '', desc: '产后新妈妈不宜空腹喝牛奶、豆浆，大家都知道牛奶和豆浆中都含有大量的蛋白质，空腹饮用，不利于新妈妈消化。建议新妈妈将牛奶、豆浆和其他食物搭配饮用，或者在饭后吃。空腹饮用酸奶，胃中的胃液会抑制酸奶中的活性', stage: '', favorite: false },
{ id: 639, name: '发奶汤', category: 'snack', nature: 'neutral', ingredients: '其实、现在的月子餐不建、首先、新妈妈的肠胃功能、无法消化太油腻的、大量食用浓汤、反而会加重新妈妈、其次', desc: '传统上认为新妈妈在生产后比较虚弱，要尽快摄入营养丰富的汤和滋补品，如鲫鱼汤、猪脚汤、排骨汤，这些可以补充营养，促进身体恢复、乳汁分泌，使宝宝得到充足的母乳。', stage: '', favorite: false },
{ id: 640, name: '争议 13 小米粥', category: 'breakfast', nature: 'neutral', ingredients: '', desc: '', stage: '', favorite: false },
{ id: 641, name: '鱼汤', category: 'dinner', nature: 'warm', ingredients: '', desc: '剖腹产产妇子宫受到创伤，应多补充动物性蛋白，鸡、鱼、瘦肉、动物血等。鱼类是新妈妈很好的进补食品，而且有利于下奶，剖腹产或侧切的新妈妈则不宜过多食用，因为鱼类，特别是海鱼类体内含有丰富的有机酸物质，会抑', stage: '', favorite: false },
{ id: 642, name: '养生茶', category: 'snack', nature: 'neutral', ingredients: '产后大量出汗、排恶露、还要喂奶、身体内的水分自然、所以必须大量补充、但是常有宝妈反应、这就是中医所说的、那么能否吃一些清', desc: '以下所有养生茶都是结合大多数产妇的体质和常见产后问题，运用中医理论调制而成。', stage: '第1周', favorite: false },

// 数据操作
function loadMeals() {
  const version = localStorage.getItem(DATA_VERSION_KEY);
  const data = localStorage.getItem(STORAGE_KEY);
  if (data && version === DATA_VERSION) return JSON.parse(data);
  // 版本不匹配或首次加载，重置为默认数据
  localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultMeals));
  localStorage.setItem(DATA_VERSION_KEY, DATA_VERSION);
  return defaultMeals;
}

// 分类映射
const categoryMap = {
  breakfast: '早餐',
  lunch: '午餐',
  dinner: '晚餐',
  snack: '加餐'
};

const natureMap = {
  warm: '温补',
  cool: '清凉',
  neutral: '平和'
};

// 渲染
function renderMeals() {
  const meals = loadMeals();
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('mealGrid');

  let filtered = meals;

  if (currentTab === 'favorite') {
    filtered = filtered.filter(m => m.favorite);
  } else if (currentTab !== 'all') {
    filtered = filtered.filter(m => m.category === currentTab);
  }

  if (search) {
    filtered = filtered.filter(m =>
      m.name.toLowerCase().includes(search) ||
      (m.ingredients && m.ingredients.toLowerCase().includes(search))
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <div class="empty-icon">${search ? '🔍' : '🍲'}</div>
        <h3>${search ? '没有找到匹配的餐谱' : '暂无餐谱'}</h3>
        <p>${search ? '试试换个关键词搜索' : '换个类别看看'}</p>
      </div>
    `;
  } else {
    grid.innerHTML = filtered.map((meal, i) => `
      <div class="meal-card" style="animation-delay: ${i * 0.06}s" onclick="openDetail(${meal.id})">
        <div class="card-header">
          <div class="card-title-group">
            <div class="card-name">${escapeHtml(meal.name)}</div>
            <span class="card-category ${meal.category}">${categoryMap[meal.category]}</span>
            ${meal.stage ? `<span class="card-stage">${meal.stage}</span>` : ''}
          </div>
        </div>
        ${meal.desc ? `<div class="card-desc">${escapeHtml(meal.desc)}</div>` : ''}
        <div class="card-meta">
          ${meal.ingredients ? `<span class="meta-tag">🥘 ${escapeHtml(meal.ingredients.split('、').slice(0, 3).join('、'))}</span>` : ''}
          ${meal.nature ? `<span class="meta-tag"><span class="dot ${meal.nature}"></span>${natureMap[meal.nature]}</span>` : ''}
          ${meal.stage ? `<span class="meta-tag">📅 ${escapeHtml(meal.stage)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  updateStats(meals);
}

function updateStats(meals) {
  document.getElementById('stat-breakfast').textContent = meals.filter(m => m.category === 'breakfast').length;
  document.getElementById('stat-lunch').textContent = meals.filter(m => m.category === 'lunch').length;
  document.getElementById('stat-dinner').textContent = meals.filter(m => m.category === 'dinner').length;
  document.getElementById('stat-snack').textContent = meals.filter(m => m.category === 'snack').length;
  document.getElementById('stat-total').textContent = meals.length;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 标签切换
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-bar .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMeals();
}


// 菜谱详情
function openDetail(id) {
  const meals = loadMeals();
  const meal = meals.find(m => m.id === id);
  if (!meal) return;

  document.getElementById('detailName').textContent = meal.name;

  // 标签
  const tagsHtml = [];
  if (meal.category) tagsHtml.push(`<span class="detail-tag ${meal.category}">${categoryMap[meal.category]}</span>`);
  if (meal.nature) tagsHtml.push(`<span class="detail-tag ${meal.nature}">${natureMap[meal.nature] || meal.nature}</span>`);
  if (meal.stage) tagsHtml.push(`<span class="detail-tag stage">${meal.stage}</span>`);
  // 检查是否为我喜欢
  if (meal.favorite) {
    tagsHtml.push('<span class="detail-tag warm">我喜欢</span>');
  }
  document.getElementById('detailTags').innerHTML = tagsHtml.join('');

  // 详情内容
  const detail = recipeDetails[meal.name];
  let bodyHtml = '';

  if (meal.desc) {
    bodyHtml += `<div class="detail-desc">${escapeHtml(meal.desc)}</div>`;
  }

  if (detail) {
    if (detail.ingredients) {
      bodyHtml += `
        <div class="detail-section">
          <div class="detail-section-title">食材用料</div>
          <div class="detail-section-content">${escapeHtml(detail.ingredients)}</div>
        </div>`;
    }
    if (detail.steps) {
      bodyHtml += `
        <div class="detail-section">
          <div class="detail-section-title">做法步骤</div>
          <div class="detail-section-content steps-content">${escapeHtml(detail.steps)}</div>
        </div>`;
    }
    if (detail.notes) {
      bodyHtml += `
        <div class="detail-section">
          <div class="detail-section-title">小贴士</div>
          <div class="detail-section-content">${escapeHtml(detail.notes)}</div>
        </div>`;
    }
  } else if (!meal.desc) {
    bodyHtml = '<div class="detail-no-data">暂无详细做法</div>';
  }

  document.getElementById('detailBody').innerHTML = bodyHtml;

  // 显示弹窗
  document.getElementById('detailOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// 点击遮罩关闭
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// ESC关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

// 初始化
renderMeals();
</script>
